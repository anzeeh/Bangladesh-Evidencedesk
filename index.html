rovements in the delivery of both maternal and child nutrition services. The proportion of eligible pregnant women who received requisite antenatal services (receipt of at least 30 iron and folic acid tablets, nutrition counseling, and weight measurement) increased by 2.7 percent over the duration. Similarly, the proportion of children between 0 and 23 months, who received age-appropriate nutrition counseling, increased by 8.9 percent over the same period. The paper identifies several factors that led to these improvements and notes the impediments. The HSSP renewed focus on the importance of delivering quality nutrition services, and the technical assistance provided through the HSSP has strengthened capacity, not only around the delivery of services but also in improving the data ecosystem and quality of project monitoring and results verification. There are, however, issues impeding service delivery of nutrition services. The Community Health Care providers (CHCPs) are often faced with competing priorities, as nutrition is one of the many services they provide. Similarly, the CHCPs have been found to lack the required capacity and skills in delivering services and are also burdened with poor Information Technology (IT) equipment", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Governance & Service Delivery"], "methods": ["DiD"]}, {"id": 135, "title": "WASH Interventions and Child Diarrhea at the Interface of Climate and Socioeconomic Position in Bangladesh", "authors": "Ante-Testard et al.", "authorsFull": "Ante-Testard, Peral Anne; Rerolle, Francois; Nguyen, Anna T.; Ashraf, Sania; Parvez, Sarker Masud; Naser, Abu Mohammed; Benmarhnia, Tarik; Rahman, Mahbubur; Luby, Stephen P.; Benjamin-Chung, Jade; Arnold, Benjamin F.", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Nature Communications", "doi": "https://doi.org/10.1038/s41467-024-45624-1", "url": "https://www.nature.com/articles/s41467-024-45624-1", "abstract": "Many diarrhea-causing pathogens are climate-sensitive, and populations with the lowest socioeconomic position (SEP) are often most vulnerable to climate related transmission. Household Water, Sanitation, and Handwashing (WASH) interventions constitute one potential effective strategy to reduce child diar rhea, especially among low-income households. Capitalizing on a cluster ran domized trial population (360 clusters, 4941 children with 8440 measurements) in rural Bangladesh, one of the world’s most climate-sensitive regions, we showthatimprovedWASHsubstantiallyreducesdiarrheariskwith largest benefits among children with lowest SEP and during the monsoon season. We extrapolated trial results to rural Bangladesh regions using high resolution geospatial layers to identify areas mostlikely to benefit.Scaling upa similar intervention could prevent an estimated 734 (95% CI 385, 1085) cases per 1000 children per month during the seasonal monsoon, with marked regional heterogeneities. Here, we show how to extend large-scale trials to informWASHstrategiesamongclimate-sensitiveandlow-incomepopulations.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": []}, {"id": 136, "title": "Sustainable Common-Pool Resource Management Through Community-Based Enterprises: A Pathway to Community Resilience in Bangladesh", "authors": "Safkat et al.", "authorsFull": "Safkat, Raisul Millat; Jafor, Md. Abu", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "No DOI", "url": "https://www.scopus.com/pages/publications/105028971388", "abstract": "Community resilience has become a central concept in disaster risk reduction and sustainable development discourse, especially in countries like Bangladesh that face recurring environmental, social, and economic shocks. Despite its increasing prominence, empirical evidence remains limited on how community-based enterprises (CBEs), as collective management mechanisms, can bolster resilience by sustainably governing common-pool resources (CPRs). This study explores how the community-based enterprise model, like the Community-based Enterprise Approach (CEA), contributes to community resilience, thereby bridging the gap between resource governance and the broader discourse on sustainable development. This study adopts a mixedmethods design and incorporates a Randomized Controlled Trial (RCT) to assess the impact of the Community-based Enterprise Approach (CEA) model on community resilience. Communities in the Laksam subdistrict were randomly assigned to either a CEA-implemented intervention group or a non-CEA control group. Due to the absence of a community-scale census in Bangladesh’s national statistical framework, we relied on secondary data sourced from the Bangladesh Academy for Rural Development (BARD). Drawing on these data, we constructed a Community Resilience Index (CRI) comprising seven dimensions: resource robustness, social capital, economic development, information and communication, community competence, leadership, and collective action to systematically compare resilience outcomes across the two groups. The analysis reveals a significantly higher CRI score in the CEA area (0.79) compared to the control area (0.47), demonstrating notable improvements in social capital, community competence, and leadership. These results highlight that participatory resource governance, collective decision-making, and local knowledge-sharing under the CEA model contribute to enhanced adaptive capacity. Aligning with Ostrom’s design principles and adaptive capacity theory, the findings show that well-managed CPRs can simultaneously promote sustainable livelihoods and resilience building.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Child Marriage & Social Norms", "Trade & Macroeconomy"], "methods": ["RCT"]}, {"id": 137, "title": "Beyond Loans: Empowering Women Through Tailored Support", "authors": "Ara et al.", "authorsFull": "Ara, Jinnat; Sarkar, Dipanwita", "year": 2026, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The Journal of Development Studies", "doi": "https://doi.org/10.1080/00220388.2025.2607417", "url": "https://www.tandfonline.com/doi/full/10.1080/00220388.2025.2607417", "abstract": "We examine the impact of an anti-poverty program which complements credit with tailored sup- port, on empowerment of female beneficiaries in Bangladesh. This intervention uniquely targets the sand- wiched segment of poor households that are often excluded from traditional microfinance and grant-based support. Utilising two years of panel data from a randomised intervention by BRAC, we estimate the pro- gram’s average intent-to-treat effects using a difference-in-differences approach with inverse probability attri- tion weights to address potential selective attrition. Our findings, based on multidimensional metrics, indicate notable shifts in both sole and joint influence of women beneficiaries on household financial decisions related to savings, land transactions, and asset purchases. Women’s influence on decisions related to children’s well- being and essential household expenditures also increased. The program further strengthened women’s social capital, improved their legal awareness, reduced intimate partner violence and enhanced confidence in com- petitive environments. Our study highlights the importance of customised support as complementary to the extension of credit in bringing not only immediate empowering benefits, but generating positive outcomes that can sustain the long-term upliftment of female beneficiaries.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Women's Empowerment & Gender", "Agriculture & Food Security", "Child Marriage & Social Norms"], "methods": ["DiD"]}, {"id": 138, "title": "Developmental Benefits of Play-Centric Home Visiting and Telephone-Supported Pashe Achhi in Bangladesh During the COVID-19 Pandemic", "authors": "Nath", "authorsFull": "Nath, Samir Ranjan", "year": 2026, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1080/03054985.2026.2625266", "url": "https://doi.org/10.1080/03054985.2026.2625266", "abstract": "Amid the Covid-19 pandemic, classroom-based, play-centric preschool services for 4-year-olds were shifted to two sequential interventions – home visits and mobile phone-based Pashe Acchi (Beside You). Both segments were weekly and comprised both tele-counselling and tele-learning components. Mother–child dyads received the interventions. This quasi-experimental study evaluates early developmental benefits of these two play-centric non-overlapping interventions over 10 months. They and similar-aged children living in the same community constituted the intervention and comparison groups, respectively. The 1:1 propensity score-matching technique was applied to the baseline data from 508 children, yielding a sample of 386 for analysis. The mother-reported Extended Ages and Stages Questionnaire (EASQ) was the measurement tool, analysed using a two-factor ANCOVA with repeated measures. The intervention effect was evident in the full-scale EASQ and communication and fine-motor domains, with a ‘moderate’ effect size, and in the problem-solving and personal-social domains with a ‘small’ effect size. No effect was observed in the gross-motor domain. Although the effects likely depend on a dosage of 830 ‘contact’ minutes, the interventions show promise for enhancing home learning environments and could potentially be adapted for other emergencies.", "primaryTheme": "Early Childhood Development", "themes": ["Early Childhood Development", "Agriculture & Food Security"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 139, "title": "How Does a Rural Poverty Alleviation Program Affect Parents’ Aspirations About Their Children? Evidence From Brac-Tup in Bangladesh", "authors": "Castaño et al.", "authorsFull": "Castaño, Alejandro Montoya; Arends-Kuenning, Mary", "year": 2026, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The Journal of Development Studies", "doi": "10.1080/00220388.2025.2607412", "url": "https://www.tandfonline.com/doi/full/10.1080/00220388.2025.2607412", "abstract": "This paper analyses the unintended effects of a randomised controlled trial in Bangladesh targeting the ultra-poor on parental occupational aspirations for their children. Because significant aspirational gaps exist between poor and wealthy households, as well as between boys and girls, this study analyses whether a graduation-type program can reduce these gaps. Because the intervention bundles different services including the transfer of a productive asset, training, coaching, and a monthly stipend, this research explores which components of the intervention might be driving changes in aspirations. Further, it analyses whether higher aspirations are linked to better educational outcomes. Using a difference-in-differences strategy, the results indicate that the intervention reduces the aspirational gaps for boys only, whereas for girls the intervention could be reinforcing traditional gender roles", "primaryTheme": "Education & Skills", "themes": ["Education & Skills"], "methods": ["RCT", "DiD"]}, {"id": 140, "title": "A Business Case for Human Rights at Work? Experimental Evidence on Labor Trafficking and Child Labor at Brick Kilns in Bangladesh", "authors": "Miller et al.", "authorsFull": "Miller, Grant; Biswas, Debashish; Mahajan, Aprajit; Babiarz, Kimberly Singer; Brooks, Nina R.; Brunner, Jessie; Ashraf, Sania; Shane, Jack; Maithel, Sameer; Ahmed, Shoeb; Mahzab, Moogdho; Uddin, Mohammad Rofi; Rahman, Mahbubur; Luby, Stephen P.", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "NBER Working Paper", "doi": "10.3386/w32829", "url": "https://www.nber.org/papers/w32829", "abstract": "Globally, coercive labor (i.e., forced, bonded, and/or trafficked labor) and child labor are disproportionately prevalent in environments with weak regulatory enforcement and state capacity. Effective strategies for addressing them may therefore need to align with the private incentives of business owners, not relying on government action alone. Recognizing this, we test a ‘business case’ for improving work conditions and promoting human rights using a randomized controlled trial across nearly 300 brick kilns in Bangladesh. Among study kilns, rates of coercive and child labor are high: about 50% of sampled workers are trafficked, and about 70% of kilns use child labor. Our experiment introduced a production method that increased kiln productivity and revenue, and we test if these productivity gains in turn increase worker “compensation” (including better work conditions). Because adoption of the method requires important changes in worker routines, we also test if providing information to kiln owners about positively incentivizing workers to enhance adoption (and hence business revenue) can lead to better work conditions. We find no evidence that productivity gains alone reduced labor trafficking or child labor, but adding the information intervention reduced child labor by 25-30% without reducing revenue or increasing costs.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Governance & Service Delivery"], "methods": ["RCT"]}, {"id": 141, "title": "Leveraging Virtual Contact and Social Networks to Foster Interethnic Harmony", "authors": "Siddique et al.", "authorsFull": "Siddique, Abu; Vlassopoulos, Michael; Zenou, Yves", "year": 2026, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Quarterly Journal of Economics", "doi": "10.1093/qje/qjag001", "url": "https://academic.oup.com/qje/article/141/2/1449/8426299", "abstract": "This article investigates whether virtual contact, initiated through a documentary film, can promote interethnic harmony. We carried out a cluster-randomized field experiment involving over 3,300 households across 121 multiethnic villages in Bangladesh. We find that a documentary film, designed to humanize the ethnic-minority Santals and evoke empathy among the ethnic majority Bengalis, increased the ethnic majority’s prosociality toward minorities, though the strength of the evidence varies by treatment arm and outcome. Using emotion-detecting software to analyze facial expressions during the film viewing suggests that the documentary elicited emotional responses consistent with empathy. We do not find evidence that the intervention reduced the prevalence of negative stereotypes and discriminatory opinions toward minorities. In villages assigned to target network-central people, we find positive behavioral effects on untreated individuals, including Santals, and village-level administrative data suggest a reduction in police complaints in those villages. About five months after the intervention, we conducted a casual-work field experiment involving 720 participants from the main intervention. In this task, pairs of ethnic-majority and minority participants jointly produced paper bags for a local supplier under a piece-rate compensation scheme. We find positive treatment effects on productivity for both ethnic groups, with effects concentrated in villages where network-central people were treated. For the ethnic majority, increased prosociality, and for the ethnic minority, reciprocity or peer pressure may have contributed to increased productivity. Overall, our findings suggest that virtual contact and social networks may help promote harmony in multiethnic communities.", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms"], "methods": ["RCT"]}, {"id": 142, "title": "The Double-Edged Sword of Social Capital: Impacts on Women’s Health in Extreme Poverty", "authors": "Lawson et al.", "authorsFull": "Lawson, David; Uddin, Moslah", "year": 2026, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Social Science & Medicine", "doi": "10.1016/j.socscimed.2026.119109", "url": "https://www.sciencedirect.com/science/article/pii/S0277953626001851", "abstract": "Social capital is extremely important in determining health outcomes yet relatively little is known about how different types of social capital impact on individuals' health outcomes, particularly for the poorest in society. We use secondary data generated from a quasi-experimental study conducted among extremely poor women in rural Bangladesh and apply Propensity Score Matching (PSM) technique to create comparable treatment and control groups. Using a comparative analytical approach, we examine how social capital effects vary and investigate how different social capital measures are associated with extremely poor women's health. We find that an increase in social capital is not always good for the health outcomes with effects dependent upon both the efforts required by an individual to acquire social capital and the cost implications associated with creating and maintaining social networks. Equally, we are able to identify a positive link between social capital and self-reported health amongst the population that receive specific interventions, but negative for the control group where the quality, rather than quantity, of social capital is strongly associated with better health outcomes.", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms", "Women's Empowerment & Gender"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 143, "title": "Assessing the Impact of Livestock Extension Services on Food Security: Evidence From Livestock Farming Households in Bangladesh", "authors": "Alam et al.", "authorsFull": "Alam, Mohammad Jahangir; Sarma, Paresh Kumar; Begum, Ismat Ara; Iqbal, Md. Asif", "year": 2026, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.1155/aia/6718460", "url": "https://onlinelibrary.wiley.com/doi/epdf/10.1155/aia/6718460", "abstract": "Livestock extension services (LESs) play a crucial role in promoting the acceptance of improved livestock technologies, enhancing livestock production, and strengthening household food and nutritional security. This study examines the association between LESs and household food and nutritional security in livestock farming households in the southern Delta region of Bangladesh, utilizing data from the Bangladesh Integrated Household Survey 2018 (BIHS-2018). To address potential endogeneity, we applied endogenous switching regression (ESR) and propensity score matching (PSM) methods. The results indicate that LESs have a statistically significant positive effect on food and nutritional security, with households receiving extension services exhibiting higher dietary diversity and calorie intake compared to nonrecipients. These findings underscore the importance of LESs in facilitating the adoption of improved livestock management practices. This underscores the importance of extension services in the livestock sector to ensure food and nutritional security. The findings suggest that policymakers should enhance farmer outreach, improve advisory support, and facilitate technology adoption (TA) to support sustainable food and nutritional security among livestock farming households.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet"], "methods": ["PSM"]}, {"id": 144, "title": "Impact of a Homestead Food Production Program on Women’s Empowerment: Pro-WEAI Results From the FAARM Trial in Bangladesh", "authors": "Waid et al.", "authorsFull": "Waid, Jillian L; Wendt, Amanda S; Sinharoy, Sheela S; Kader, Abdul; Gabrysch, Sabine", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "World Development", "doi": "10.1016/j.worlddev.2022.106001", "url": "https://www.sciencedirect.com/science/article/pii/S0305750X22001917?via%3Dihub", "abstract": "Nutrition-sensitive agricultural programs have the potential to improve women's and children's nutrition, along with women's empowerment. The project-level Women's Empowerment in Agriculture Index (pro-WEAI) aims to standardize the measurement of women's agency and enable the assessment of impact over typical project timelines. Within the Food and Agricultural Approaches to Reducing Malnutrition (FAARM) cluster-randomized controlled trial in rural Habiganj, Sylhet, Bangladesh, we examined quantitative pro-WEAI data collected from a subsample of trial participants and their husbands (n = 885) approximately four months after the end of the intervention. We evaluated the impact of a three-year homestead food production program on men’s and women's agency separately by pro-WEAI domain and indicator, using multilevel logistic and linear regression. We show that women in the FAARM intervention group had levels of agency similar to men and much higher than women in the control group (Odds Ratio [OR] 7.7, p < 0.001), corresponding to better gender equity in intervention areas (OR 3.5, p < 0.001). The higher levels of agency among intervention women were driven by greater intrinsic and collective agency but not by instrumental agency. Compared to controls, more women in the intervention group found intimate partner violence unacceptable (OR 3.5, p < 0.001), had greater ownership of assets (OR 2.6, p = 0.001), better control of income (OR 1.8, p = 0.042), higher levels of group membership (OR 14.0, p < 0.001), and membership in groups they considered influential (OR 166.8, p < 0.001). Self-efficacy was greater in intervention areas for both women (OR 3.2, p < 0.001) and men (OR 2.3, p = 0.002). Our results contribute to the development of benchmarks for interpreting pro-WEAI scores across programs. Our assessment of the impact of a homestead food production program on women's agency provides additional rationale for women-led agricultural projects. We plan to build on these findings by examining the role of improved women's agency on the pathway from the intervention to nutritional impacts.", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender", "Agriculture & Food Security", "Nutrition & Diet"], "methods": ["RCT"]}, {"id": 145, "title": "Returns to International Migration: Evidence from a Bangladesh-Malaysia Visa Lottery", "authors": "Mobarak et al.", "authorsFull": "Mobarak, Ahmed Mushfiq; Sharif, Iffath; Shrestha, Maheshwor", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "American Economic Journal: Applied Economics", "doi": "10.1257/app.20220258", "url": "https://www.aeaweb.org/articles?id=10.1257/app.20220258", "abstract": "South Asians traveling to richer Asian nations is the world's largest migration corridor. We track down applicants to a government lottery that randomly allocated visas to Bangladeshis for temporary labor contracts in Malaysia, five years later. Most lottery winners migrate, and migrants' earnings triple. Their remittance raises their family's standard of living in Bangladesh. The migrant's absence pauses marriage and childbirth and shifts decision-making power toward females. Migration removes enterprising individuals, lowering household entrepreneurship, but does not crowd out other family members' labor supply. A deferred migration offer never materialized for a subgroup. Their premigration investments in skills generate no returns in the domestic market.", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender", "Financial Inclusion & Cash", "Labour, Jobs & Garment Sector"], "methods": ["RCT"]}, {"id": 146, "title": "Effect of Oral Iron Supplementation on Cognitive Function among Children and Adolescents in Low- and Middle-Income Countries: A Systematic Review and Meta-Analysis.", "authors": "Chen", "authorsFull": "Chen, Zekun", "year": 2022, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Nutrients", "doi": "https://doi.org/10.3390/", "url": "https://creativecommons.org/licenses/by/4.0/", "abstract": "Background: There is abundant evidence showing that iron deficiency is closely linked with delayed brain development, worse school performance, and behavioral abnormalities. However, evidence on the impact of iron supplementation among children and adolescents in low- and middle- income countries (LMICs) has been inconsistent. This study aims to examine the effect of oral iron supplementation on cognitive function among children and adolescents in LMICs. Methods: A systematic review and meta-analysis was conducted to examine the impact of iron supplementation on cognitive function (including intelligence, attention, short-term memory, long-term memory, and school performance) among children and adolescents aged 5 to 19. We searched PubMed, Embase, Web of Science, CINAHL, and references of related articles published from the inception of the databases to 1 May 2022. Random-effects pooled standardized mean difference (SMD) with 95% confidence intervals (CIs) were calculated to estimate the effect of iron supplementation on cognitive function. We also investigated the heterogeneity of the effects using subgroup and meta- regression analyses. This review was registered with PROSPERO (CRD42020179064). Results: Nine studies with 1196 individual participants from five countries were identified and included. Iron had a positive impact on intelligence test scores among children and adolescents (SMD = 0.47, 95% confidence interval [CI]: 0.10, 0.83). Meta-regression showed that the intelligence test scores improved with increasing the iron supplement dose (odds ratio [CI] = 1.02, 95% CI: 1.00, 1.04). There were no significant effects on attention, short-term memory, long-term memory, or school performance. Conclusions: Oral iron intake can improve the intelligence test scores of children and adolescents in LMICs and should be considered for future nutritional interventions.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 147, "title": "Interventions to address unsafe child feces disposal practices in the Asia-Pacific region: a systematic review", "authors": "Sprouse et al.", "authorsFull": "Sprouse, Lauren; Liles, Anna; Cronk, Ryan; Bauza, Valerie; Tidwell, James B; Manga, Musa", "year": 2022, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.2166/h2oj.2022.137", "url": "https://iwaponline.com/h2open/article/5/4/583/91342/Interventions-to-address-unsafe-child-feces", "abstract": "Despite clear evidence of the adverse health impacts of unsafe child feces disposal (CFD), there is little evidence of the effectiveness of interventions targeting the improvement of unsafe CFD practices in the Asia-Pacific region. A systematic review of the literature was conducted to identify and evaluate the quality of both behavior change and hardware interventions targeting the improvement of CFD practices in this region. A total of 695 articles were screened, and 15 studies were included. The combined hardware and behavior change interventions reported the highest rates of safe CFD (SCFD) post-intervention; however, these interventions were of lower quality. Four interventions focused specifically on improving SCFD practices, while the remaining seven studies evaluated the impacts of large-scale interventions, such as India’s MANTRA and Total Sanitation Campaign programs, on unsafe CFD practices. Large-scale programs and hardware interventions are important for providing communities with the infrastructure necessary to improve unsafe CFD practices, but such interventions may be improved by the addition of a behavioral change component. With little evidence available on the effectiveness of behavioral interventions on reducing unsafe CFD in the Asia-Pacific region, future work should focus on how behavior change models combined with hardware interventions impact unsafe CFD.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 148, "title": "Factors Associated with Mortality in Nipah Virus Infection: Diagnostic Accuracy and Therapeutic Interventions — A Systematic Review and Meta-Analysis", "authors": "Singh", "authorsFull": "Singh, Shalini", "year": 2026, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "Other", "doi": "No DOI", "url": "https://ijmpr.in/article/factors-associated-with-mortality-in-nipah-virus-infection-diagnostic-accuracy-and-therapeutic-interventions-a-systematic-review-and-meta-analysis-2126/", "abstract": "Nipah virus infection is a high-consequence zoonotic disease associated with recurrent outbreaks and substantial mortality in South and Southeast Asia. We conducted a systematic review and meta-analysis to evaluate laboratory predictors of mortality, diagnostic performance of commonly used tests, and associations between therapeutic interventions and survival. PubMed/MEDLINE, Embase, Scopus, Web of Science, and Cochrane Central were searched from inception to December 2025. Studies reporting laboratory-confirmed Nipah virus infection with mortality outcomes were included. Random-effects models were used to calculate pooled odds ratios (OR), mean differences (MD), sensitivity, specificity, and diagnostic odds ratios.Twenty-five studies comprising 1,172 laboratory-confirmed cases were included. The pooled mortality rate was 58.6% (95% CI 52.4–64.7; I²=72%). Elevated aspartate aminotransferase (MD 84.5 U/L, 95% CI 51.2–117.8), alanine aminotransferase (MD 67.3 U/L, 39.8–94.7), thrombocytopenia (OR 2.94, 1.89–4.56), leukocytosis (OR 2.21, 1.43–3.42), and increased cerebrospinal fluid protein (MD 32.7 mg/dL, 14.1–51.3) were associated with mortality. Reverse transcription polymerase chain reaction demonstrated pooled sensitivity of 91.3% (86.7–94.4) and specificity of 97.8% (94.9–99.1), with area under the summary receiver operating characteristic curve of 0.97. Ribavirin was not associated with reduced mortality (OR 0.88, 0.62–1.26). Mechanical ventilation was associated with mortality (OR 4.73, 3.01–7.42), whereas early intensive care admission was associated with reduced mortality (OR 0.72, 0.54–0.96). Mortality remains high, underscoring the need for early risk stratification, rapid molecular diagnosis, and improved supportive care pathways.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 149, "title": "Peer Counselling as an Approach to Improve Complementary Feeding Practices: a Narrative Review", "authors": "Haque et al.", "authorsFull": "Haque, Nabila Binte; Seema, Mihrshahi; Haider, Rukhsana", "year": 2023, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Health, Population & Nutrition", "doi": "10.1186/s41043-023-00408-z", "url": "https://jhpn.biomedcentral.com/articles/10.1186/s41043-023-00408-z", "abstract": "BackgroundAppropriate complementary feeding can help reduce the risk of malnutrition and is especially important in Asian and African countries. Peer counselling has been used as an approach to improve complementary feeding practices and is often combined with other interventions, like food fortification or supplements, or as a part of broader nutrition education program. The aim of this narrative review is to assess the effectiveness of peer counselling on improving complementary feeding practices in Asian and African countries.MethodsWe searched through seven electronic databases: CINAHL, MEDLINE (OVID), PubMed, Embase, Web of Science, the Cochrane Library and WHO Global Health library from 2000 to April 2021, and had the following inclusion criteria. Studies were included if they were community- or hospital-based, had infants aged 5–24 months old, had individual or group peer counselling, and the effects of peer counselling on complementary feeding practices were measured. Methodological quality was assessed using the Joanna Briggs Institute’s critical appraisal checklist for evidence studies.ResultsOut of 6 studies that met the above criteria, 3 studies were randomised controlled trials and 3 were quasi-experimental studies. In Bangladesh, India, Nepal and Somalia, peer counselling was found to be effective in improving timely initiation of complementary feeding, minimum meal frequency and minimum dietary diversity in all of our selected studies. In addition, improvement in breastfeeding practices, complementary foods preparation, hygiene, psychological stimulation for cognitive development of children and mothers’ understanding of hunger cues were observed in some of our selected studies.ConclusionsThis review evaluates the effectiveness of peer counselling to improve complementary feeding practices in Asian and African countries. Peer counselling improves timely complementary feeding and ensures the correct proportions and consistency of foods including adequate amounts of food is given. Other important complementary feeding indicators like minimum dietary diversity, minimum meal frequency and minimum acceptable diet can also be increased through peer-counselling interventions. Peer counselling is well known to enhance the rate of breastfeeding practices, but this review suggests it is also effective for complementary feeding and may inform future nutrition programs to extend the length of peer counselling for mothers.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Early Childhood Development", "WASH", "Education & Skills"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 150, "title": "Effects of Preconception Nutrition Interventions on Pregnancy and Birth Outcomes in South Asia: A Systematic Review.", "authors": "Saville", "authorsFull": "Saville, Naomi M.", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1016/j.lansea.2025.100580", "url": "https://www.thelancet.com/pdfs/journals/lansea/PIIS2772-3682(25)00051-4.pdf", "abstract": "Undernutrition amongst reproductive age women, low birth weight, small for gestational age and preterm birth present significant health burdens in South Asia which interventions in pregnancy alone have not resolved. Effectiveness of preconception nutrition interventions is not well-documented. This systematic review summarises evidence on the effect of preconception nutrition interventions on pregnancy and birth outcomes in South Asia. We found highly heteroge neous evidence across four micronutrient supplementation, two food supplementation, and three complex interventions trials. Preconception micronutrient supplementation alone did not affect birth size, but food supplementation was effective with and without multiple micronutrients, especially when initiated at least 90 days before conception. Com bined health, nutrition, psychosocial care, and WaSH interventions addressing determinants at multiple levels were most effective. However intensive delivery by project employees poses problems for scale-up. More robust South Asian pre conception intervention trials to identify scalable interventions that are effective in real-world delivery settings are needed", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 151, "title": "Effectiveness of Interventions on Early Initiation of Breastfeeding in South Asia: A Systematic Review and Meta-Analysis of Randomized Controlled Trials", "authors": "Rifat", "authorsFull": "Rifat, M. A.", "year": 2025, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "International Breastfeeding Journal", "doi": "https://doi.org/10.1186/s13006-025-00736-2", "url": "https://internationalbreastfeedingjournal.biomedcentral.com/articles/10.1186/s13006-025-00736-2", "abstract": "BackgroundEarly initiation of breastfeeding, defined as breastfeeding within one hour of birth, halves the risk of neonatal mortality, establishing it as a crucial outcome component in various interventions implemented across South Asian countries. However, the overall effect of these interventions remain unexamined. Therefore, this study seeks to address this knowledge gap by evaluating the overall effect of these interventions on maternal early initiation of breastfeeding practice.MethodsA systematic literature search was performed to identify randomised controlled trials conducted in South Asia focusing on early initiation of breastfeeding as an outcome variable. The interventions identified were categorized into behavioral, mobile health (mHealth), health system strengthening, and nutritional interventions. Random effects meta-analysis was conducted to estimate the pooled effect of interventions and effectiveness by intervention categories. Heterogeneity was explored by sub-group and meta-regression analyses. The risk of bias and strength of evidence were assessed by Cochrane’s RoB2 assessment tool and GRADE criteria, respectively.ResultsWe included 22 articles published, representing 19 unique interventions, from a pool of 2,524 screened records for review and narrative synthesis. Among these, 19 articles were eligible for meta-analysis. The pooled relative risk (RR) of early initiation of breastfeeding among mothers in the intervention groups, as compared to their counterparts, was 1.55 (95% CI: 1.24, 1.95; I2 = 99.56; p < 0.001). Interventions targeted health system strengthening represented stronger effect than other types of interventions. The overall strength of evidence was moderate.ConclusionThe overall intervention effect appeared efficacious in improving maternal early initiation of breastfeeding practice in South Asia, providing valuable insights for policymakers to develop contextually feasible strategies.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Health Systems & Disease Control"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 152, "title": "Sustainable Water, Sanitation, and Hygiene Behavior Change in South Asia: A Systematic Review", "authors": "Jabbi et al.", "authorsFull": "Jabbi, Alhaji; Jayaprakash, Sajithkumar Kuruduparambu; Cheong, Jun Young; Sanyang, Edrisa; Kunjappan, Sony; Padil, Vinod V. T.", "year": 2026, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Sustainable Development", "doi": "10.1002/sd.70661", "url": "https://onlinelibrary.wiley.com/doi/10.1002/sd.70661", "abstract": "The sustainability of community-based water, sanitation, and hygiene (WASH) interventions is essential for achieving sustainable global public health outcomes. This systematic review synthesizes evidence from WASH-related studies across South Asia (Bangladesh, Bhutan, India, Maldives, Nepal, Pakistan, Sri Lanka) on factors affecting intervention sustainability, including facilitators, barriers, and contextual effectiveness. A comprehensive search of PubMed, Scopus, and Google Scholar was conducted for English-language studies published between 2014 and 2024. From an initial 22,933 records, 75 studies met the inclusion criteria, which focused on community-based WASH interventions in South Asian countries. Institution-based and emergency WASH programs were excluded. This review employed the Saunders and colleagues' process evaluation framework to examine implementation factors affecting WASH intervention sustainability. The findings indicate that interventions combining infrastructure and behavior change had more sustainable outcomes in the form of maintained behavioral changes, continued infrastructure functionality, and persistent health improvements beyond the intervention period. Interventions based on existing models and frameworks generally had better outcomes but require adaptation to contexts. Well-monitored interventions (those with regular feedback loops) achieved higher fidelity (implementing the program as intended). However, many studies seemed to lack a sustainability-focused design, leading to a decline in desired sustainable outcomes. Also, bottom-up community engagement was absent in a majority of the studies despite claims of high engagement. The persistent challenges include cultural resistance, limited resources, limited equity, and inadequate local capacity. Success factors include community ownership, participatory monitoring, and alignment with government programs. These insights highlight the need for context-sensitive, community-driven, multi-component strategies to achieve lasting behavioral change toward Sustainable Development Goal (SDG) 6.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 153, "title": "Vitamin B12 Supplementation During Pregnancy for Maternal and Child Health Outcomes.", "authors": "Finkelstein et al.", "authorsFull": "Finkelstein, Julia L.; FOthergill, Amy; Venkatramanan, Sudha; Layden, Alexander J.; Williams, Jennifer L.; Crider, Krista S.; Qi, Yan Ping", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Cochrane Library", "doi": "https://doi.org/10.1002%2F14651858.CD013823.pub2", "url": "https://www.cochranelibrary.com/cdsr/doi/10.1002/14651858.CD013823.pub2/pdf/full", "abstract": "Background Vitamin B12 deficiency is a major public health problem worldwide, with the highest burden in elderly people, pregnant women, and young children. Due to its role in DNA synthesis and methylation, folate metabolism, and erythropoiesis, vitamin B12 supplementation during pregnancy may confer longer-term benefits to maternal and child health outcomes. Objectives To evaluate the benefits and harms of oral vitamin B12 supplementation during pregnancy on maternal and child health outcomes. Search methods We searched the Cochrane Pregnancy and Childbirth's Trials Register, ClinicalTrials.gov, the World Health Organization International Clinical Trials Registry Platform (ICTRP) on 2 June 2023, and reference lists of retrieved studies. Selection criteria Randomised controlled trials (RCTs), quasi-RCTs, or cluster-RCTs evaluating the eAects of oral vitamin B12 supplementation compared to placebo or no vitamin B12 supplementation during pregnancy. Data collection and analysis We used standard Cochrane methods. Four review authors independently assessed trial eligibility. Two review authors independently extracted data from included studies and conducted checks for accuracy. Three review authors independently assessed the risk of bias of the included studies using the Cochrane RoB 1 tool. We used GRADE to evaluate the certainty of evidence for primary outcomes. Main results The review included five trials with 984 pregnant women. All trials were conducted in low- and middle-income countries, including India, Bangladesh, South Africa, and Croatia. At enrolment, 26% to 51% of pregnant women had vitamin B12 deficiency (less than 150 pmol/L), and the prevalence of anaemia (haemoglobin less than 11.0 g/dL) ranged from 30% to 46%. The dosage of vitamin B12 supplementation varied from 5 μg/day to 250 μg/day, with administration beginning at 8 to 28 weeks' gestation through to delivery or three months' postpartum, and the duration of supplementation ranged from 8 to 16weeks to 32 to 38weeks. Three trials, involving 609 pregnantwomen, contributed data for meta-analyses ofthe eAects of vitaminB12 supplementation compared to placebo or no vitaminB12 supplementation. Maternal anaemia: there may be little to no diAerence for maternal anaemia by intervention group, but the evidence is very uncertain (70.9% versus 65.0%; risk ratio (RR) 1.08, 95% confidence interval (CI) 0.93 to 1.26; 2 trials, 284 women; very low-certainty evidence). Maternal vitamin B12 status: vitamin B12 supplementation during pregnancy may reduce the risk of maternal vitamin B12 deficiency compared to placebo or no vitamin B12 supplementation, but the evidence is very uncertain (25.9% versus 67.9%; RR 0.38, 95% CI 0.28 to 0.51; 2 trials, 272 women; very low-certainty evidence). Women who received vitamin B12 supplements during pregnancy may have higher total vitamin B12 concentrations compared to placebo or no vitamin B12 supplementation (mean diAerence (MD) 60.89 pmol/L, 95% CI 40.86 to 80.92; 3 trials, 412 women). However, there was substantial heterogeneity (I 2 = 85%). Adverse pregnancy outcomes: the evidence is uncertain about the eAect on adverse pregnancy outcomes, including preterm birth (RR 0.97, 95% CI 0.55 to 1.74; 2 trials, 340 women; low-certainty evidence), and low birthweight (RR 1.50, 95% CI 0.93 to 2.43; 2 trials, 344 women; low-certainty evidence). Two trials reported data on spontaneous abortion (or miscarriage); however, the trials did not report quantitative data for meta-analysis and there was no clear definition of spontaneous abortion in the study reports. No trials evaluated the eAects of vitamin B12 supplementation during pregnancy on neural tube defects. Infant vitamin B12 status: children born to women who received vitamin B12 supplementation had higher total vitamin B12 concentrations compared to placebo or no vitamin B12 supplementation (MD 71.89 pmol/L, 95% CI 20.23 to 123.54; 2 trials, 144 children). Child cognitive outcomes: three ancillary analyses of one trial reported child cognitive outcomes; however, data were not reported in a format that could be included in quantitative meta-analyses. In one study, maternal vitamin B12 supplementation did not improve neurodevelopment status (e.g. cognitive, language (receptive and expressive), motor (fine and gross), social-emotional, or adaptive (conceptual, social, practical) domains)in children compared to placebo (9 months,Bayley Scales ofInfant and ToddlerDevelopment Third Edition (BSID-III); 1 trial; low-certainty evidence) or neurophysiological outcomes (72 months, event-related potential measures; 1 trial; low-certainty evidence), though children born to women who received vitamin B12 supplementation had improved expressive language domain compared to placebo (30 months, BSID-III; 1 trial; low-certainty evidence).", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Health Systems & Disease Control"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 154, "title": "How Migrant Resource Centres Affect Migration Decisions: Quasi-experimental Evidence From Afghanistan, Bangladesh, Iraq and Pakistan", "authors": "Dennison", "authorsFull": "Dennison, James", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "International Migration", "doi": "10.1111/imig.13082", "url": "https://onlinelibrary.wiley.com/doi/full/10.1111/imig.13082", "abstract": "Several Migrant Resource Centres (MRCs) have been set up in South Asia jointly by national governments of origin and destination countries. Their objectives include encouragement of potential migrants to seek regular rather than irregular routes and to ensure the safety of those migrating, regardless of status. Of theoretical note, their activities utilise innovative, highly personalised counselling. This article provides quasi-experimental evidence of the effect of four activities – telephone and online counselling, and college outreach and pre-departure sessions – on 2215 randomly allocated users of the MRCs' services across six MRCs in four countries: Afghanistan, Bangladesh, Iraq and Pakistan. The effects are a large reduction in self-reported likelihood of migrating irregularly, and a strong increase in awareness of safe options and who to contact for assistance whilst migrating. The effects are consistent across activity type and MRC location, although magnitudes vary. These findings have implications for our understanding of how the decision to migrate is made, what interventions are effective and why.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector"], "methods": ["RCT", "Quasi-experimental"]}, {"id": 155, "title": "Innovative, Enhanced Community Management of Non-hypoxaemic Chest-Indrawing Pneumonia in 2-59-Month-Old Children: A Cluster-Randomised Trial in Africa and Asia", "authors": "EMPIC Study Group", "authorsFull": "EMPIC Study Group", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "BMJ Global Health", "doi": "https://doi.org/10.1136/bmjgh-2021-006405", "url": "https://doi.org/10.1136/bmjgh-2021-006405", "abstract": "Introduction The WHO recommends oral amoxicillin for 2–59-month-old children with chest-indrawing pneumonia presenting at the health facility. Community-level health workers (CLHWs) are not allowed to treat these children when presented at the community level. This study aimed to evaluate whether CLHWs can safely and effectively treat children 2–59 months-old with chest indrawing with a 5-day course of oral amoxicillin in a few selected countries in Africa and Asia, especially when a referral is not feasible. Methods We conducted a prospective multicountry cluster-randomised, open-label, non-inferiority trial in rural areas of four countries (Bangladesh, Ethiopia, India and Malawi) from September 2016 to December 2018. Children aged 2–59 months having parents/ caregivers reported cough and/or difficult breathing presenting to a CLHW were screened for enrolment. CLHWs in the intervention clusters assessed children for hypoxaemia and treated non-hypoxaemic chestindrawing pneumonia with two times per day oral amoxicillin (50 mg/kg body weight per dose) for 5 days at the community level. CLHWs in the control clusters identified chest indrawing and referred them to a referral-level health facility for treatment. Study supervisors performed pulse oximetry in the control clusters except in Bangladesh. Children were assessed for the primary outcome (clinical treatment failure) up to day 14 after enrolment. The accuracy and impact of pulse oximetry by CLHWs in the intervention clusters were also assessed. Results In 208 clusters, 1688 CLHWs assessed 62363 children with cough and/or difficulty breathing. Of these, 4013 non-hypoxaemic 2–59-month-old children with chestindrawing pneumonia were enrolled. We excluded 116 children from analysis, leaving 3897 for intention-to-treat analysis. In the intervention clusters, 4.3% (90/2081) failed treatment, including five deaths, while in the control clusters, 4.4% (79/1816) failed treatment, including five deaths. The adjusted risk difference was -0.01 (95% CI −1.5% to 1.5%), which satisfied the prespecified non-inferiority criterion. CLHWs correctly performed pulse oximetry in 91.1% (2001/2196) of cases in the intervention clusters. Conclusions The community treatment of nonhypoxaemic children with chest-indrawing pneumonia with 5-day oral amoxicillin by trained, equipped and supervised CLHWs is non-inferior to currently recommended facility-based treatment. These findings encourage a review of the existing strategy of community-based management of pneumonia.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Maternal & Child Health"], "methods": []}, {"id": 156, "title": "Egg Consumption and Growth in Children: A Meta-Analysis of Interventional Trials", "authors": "Larson et al.", "authorsFull": "Larson, Elisabeth A.; Zhao, Zaixin; Bader-Larsen, Karlen S.; Magkos, Faidon", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Frontiers in Nutrition", "doi": "https://doi.org/10.3389/fnut.2023.1278753", "url": "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10796599/", "abstract": "Introduction: Stunting and wasting are prevalent in low- and middleincome countries, putting children at risk for disease and disability. Eggs are a nutrient-rich food that can potentially facilitate growth. Purpose: The aim of this meta-analysis was to evaluate the potential beneficial effect of egg supplementation on growth in children. Methods: Following the PRISMA guidelines, PubMed and Healthline (Ovid) were systematically searched for interventional studies on egg supplementation for growth in children aged 6 months to 18 years, with no restrictions on date. Studies were evaluated for quality using Cochrane’s GRADE technique. Data were pooled and reported as means and 95% confidence intervals. Results: Seven studies reporting on 9 unique interventions in 3,575 male and female participants were included in the meta-analysis. Participants in the intervention groups experienced significantly greater increases in height/ length (by 0.47 [0.13, 0.80] cm, p < 0.01) and weight (by 0.07 [0.01, 0.13] kg, p = 0.03) when compared to those in the control groups. Conclusion: Eggs are an affordable, nutritious option for improving growth in children, though more studies with longer interventions are warranted", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 157, "title": "Interventions Promoting Resilience Through Climate Smart Agricultural Practices for Women Farmers: A Systematic Review", "authors": "Saran et al.", "authorsFull": "Saran, Ashrita; Singh, Sabina; Gupta, Neha; Walke, Sujata Chodankar; Rao, Ranjana; Simiyu, Christine; Malhotra, Suchi; Mishra, Avni; Puskur, Ranjitha; Masset, Edoardo; White, Howard; Waddington, Hugh", "year": 2024, "type": "Systematic Review", "status": "Protocol", "pubType": "Journal article", "journal": "Campbell Systematic Reviews", "doi": "https://doi.org/10.1002/cl2.1426", "url": "https://onlinelibrary.wiley.com/doi/full/10.1002/cl2.1426", "abstract": "BackgroundClimate change poses a significant threat to agricultural production worldwide, with developing countries being particularly vulnerable to its negative impacts. Agriculture, which is a crucial factor in ensuring food security and livelihoods, is particularly vulnerable to changes in climate patterns, such as increased temperatures, drought, and extreme weather events. One approach to addressing these challenges is by promoting the adoption of climate-smart agriculture (CSA) practices among farmers. CSA combines traditional agricultural practices with innovative techniques and technologies to adapt to and mitigate the impacts of climate change. infrastructure. By adopting CSA practices, farmers can enhance their resilience to climate variability and improve their productivity.ObjectivesThis review examines the effectiveness of interventions promoting CSA to enhance farmers' knowledge of the benefits of CSA approaches, subsequent adoption of CSA, and disadoption of harmful agricultural practices in low- and middle-income countries (LMICs).Search MethodsWe searched 39 academic and online databases, websites, and repositories and screened over 19,000 experimental and quasi-experimental publications to identify studies promoting CSA practices to women farmers. We conducted a citation tracking process on included studies and contacted experts to ensure a thorough search.Selection CriteriaThe review focused on studies that included interventions promoting climate-smart agricultural approaches. Using EPPI Reviewer 4, two review authors independently screened the impact evaluation using a standardized screening tool.Data Collection and AnalysisInformation about participant characteristics, intervention characteristics, control conditions, research design, sample size, bias risk, outcomes, and results were gathered. Data collection and quantitative analysis were conducted using standard Campbell Collaboration methods.Main ResultsEight impact evaluations were found (two randomized controlled trials) evaluating the effects of CSA practices on farmer's knowledge gains of the benefits of CSA practices and subsequent adoption. Knowledge dissemination approaches such as Farmer Field Schools and weather and climate information services were found to positively impact farmers' knowledge and adoption of specific CSA practices. However, the evidence supporting this claim is uncertain as a high risk of bias was assessed for five of the eight included studies. However, we found no effects on the disadoption of harmful practices such as pesticide overuse.Authors' ConclusionsThe evidence base for studies promoting climate-smart agricultural approaches (CSA) to farmers in LMICs is small, and there is a lack of studies reporting sex-disaggregated data and studies explicitly targeting women farmers. The review suggests that knowledge dissemination techniques are significantly effective in improving CSA knowledge and adoption, including integrated pest management techniques and their benefits, adoption of climate-resilient rice seed varieties (STRVs), and use of botanical pesticides by farmers. More and better confidence studies are needed to inform policy and programming, including those that look at a wider range of interventions, including changing norms, values, and institutional arrangements.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 158, "title": "Safety Interventions for Women in Urban Public Transport of South Asia: A Systematic Review and Synthesis", "authors": "Mowri et al.", "authorsFull": "Mowri, Seama; Bailey, Ajay; Helbich, Marco; Ettema, Dick; Hasan, Md Musleh Uddin", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1007/978-981-19-9265-0_47-1#DOI", "url": "https://research-portal.uu.nl/ws/files/240924869/978-981-19-9265-0_47-1.pdf", "abstract": "Literature has documented how women’s mobility in the global South is limited by affordability concerns, sociocultural restrictions, and fear of sexual violence in public transport. Violence against women (VAW) and gender-based violence (GBV) are not only key public health challenges but also constitute human rights violations, impacting women’s access to healthcare, education, and employment opportunities. Growing recognition of this challenge has led to a plethora of interventions and measures to make women feel safer. This chapter presents a systematic review, examining interventions that have shaped women’s safety in urban mobility across six South Asian countries. A three-stage screening process of online, English language academic, and gray literature yielded 57 articles that met the inclusion criteria for this review. Results were classified into five categories (technological solutions, women-only services, built-environment design, social activism & legislative changes, and mixed approaches), and the evidence around their impact on women’s safety was analyzed. Overall, there is a strong rationale for integrated interventions that complement and reinforce each other. By utilizing the insights provided in this chapter, policymakers and urban planners can effectively design gender-responsive transport in South Asia and beyond, serving as a means to reduce GBV and minimize the significant negative health impact experienced by women and girls.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 159, "title": "Effect of Integrating Social and Behavior Change Communication Strategies in Nutrition-Sensitive Social-Protection Programs on Specific Nutritional Outcomes: A Systematic Review", "authors": "Shafique", "authorsFull": "Shafique, Kashif", "year": 2025, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "Other", "doi": "https://doi.org/10.1093/nutrit/nuaf063", "url": "https://academic.oup.com/nutritionreviews/advance-article-abstract/doi/10.1093/nutrit/nuaf063/8152197?redirectedFrom=PDF", "abstract": "ContextAchieving adequate nutrition for vulnerable populations is central to the second Sustainable Development Goal. Nutrition-sensitive social-protection programs combined with social and behavior change communication (SBCC) interventions can support this goal, particularly in developing countries. However, systematic evidence on the impact of integrating SBCC strategies into these programs is limited, especially concerning anthropometric outcomes, dietary diversity, food consumption, and food security.ObjectiveThis systematic review aimed to assess the importance of integrating SBCC interventions into nutrition-sensitive social-protection programs for optimal nutritional outcomes.Data SourcesPubMed, Web of Science, EMBASE, ScienceDirect, and Google Scholar databases were searched for original research articles before December 2024.Data ExtractionA total of 15 publications, involving data from multiple households, mothers, and children, were identified. All extracted data were compiled, compared, and critically analyzed.Data AnalysisThe review included 7 randomized controlled trials, 5 cluster-randomized trials, and 3 descriptive studies. Most studies demonstrated significant improvements in maternal and child dietary diversity, household food consumption, and minimum meal frequencies. Knowledge and practices around exclusive breastfeeding and complementary feeding also improved substantially. Among children, stunting, wasting, and underweight prevalence decreased significantly, with effect sizes indicating meaningful public health impacts. However, the sustainability of these outcomes depended on the follow-up duration. Notably, none of the included studies exhibited a high risk of bias, reinforcing the reliability of the findings.ConclusionIntegrating SBCC into nutrition-sensitive social-protection programs is effective in achieving clinically significant nutritional outcomes for vulnerable populations. While the findings suggest sustained benefits, further research is needed to determine optimal entry points, effective messaging, advocacy strategies, and communication channels. This is particularly critical for lower-and middle-income countries, where malnutrition remains a critical challenge.Systematic Review RegistrationPROSPERO registration no. CRD42023452510.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Agriculture & Food Security"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 160, "title": "Mobile Health Interventions for Caregivers to Prevent Stunting Among Children: A Scoping Review", "authors": "Choliq", "authorsFull": "Choliq, Idham", "year": 2026, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "International Journal of Nursing Practice", "doi": "https://doi.org/10.1111/ijn.70117", "url": "https://doi.org/10.1111/ijn.70117", "abstract": "Aim: To map the current literature on the use of mobile health interventions by caregivers to prevent stunting in children. Background: Combining mobile technology with health education or community engagement has shown promise as an intervention for preventing child stunting. Method: Following Arksey and O'Malley's scoping methodology and PRISMA-ScR guidelines, a systematic search was conducted across multiple databases, including PubMed, Scopus, CINAHL, Cochrane Library and Web of Science. A total of 317 records were assessed, and seven studies were included for critical review. Results: Included studies composed of three randomized controlled trials, one quasi-experimental trial and three pilot studies. Types of mobile health interventions included mobile apps, interactive voice response (IVR) audio messages, WhatsApp and chatbots, which were delivered through self-guided and provider-assisted modes. Protocols were conducted through daily or weekly messages or structured multi-week modules over periods of weeks to months. Outcomes measured included caregivers' cognition, child diet, child growth and health, service utilization and maternal well-being. Improvements were observed in caregivers' knowledge and feeding practices. However, the results for child growth and immunization were inconsistent. Conclusion: Mobile health interventions have considerable p", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Health Systems & Disease Control"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 161, "title": "Effects of Vitamin A and Vitamin D3 Supplementation on Child Growth and Development in Low- and Middle-Income Countries: a Systematic Review and Meta-Analysis", "authors": "Peng", "authorsFull": "Peng, Likun", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.21037/tp-2025-507", "url": "https://tp.amegroups.org/article/view/147334/html", "abstract": "Vitamin A and vitamin D3 are essential micronutrients for child growth and development. However, previous studies have shown inconsistent results with respect to their individual and combined effects on anthropometric outcomes. We aimed to conduct a systematic review and meta-analysis to assess the impact of vitamin A, vitamin D3, and their combination on child growth. Methods: Randomized controlled trials (RCTs) that evaluated the effects of vitamin A, vitamin D3, or their combination on growth in children aged 0–14 years (primary population: children aged 0–5 years; secondary exploratory analyses: 0–14 years) were included. Data were pooled using fixed- or random-effects models, and heterogeneity was assessed with the I-squared (I2) statistic. Results: A total of 12 RCTs involving 6,340 children were included. Vitamin D3 supplementation alone had no significant effect on height-for-age Z-score (HAZ) or weight-for-height Z-score WHZ, but was associated with a modest yet statistically significant improvement in weight-for-age Z-score (WAZ), though the clinical relevance of this finding remains uncertain. Vitamin A supplementation alone had no significant impact on HAZ, WAZ, or WHZ. Among children aged 0–5 years, combined supplementation of vitamins A and D3 showed a small but significant improvement in WAZ, but no consistent effects on HAZ or WHZ. Substantial heterogeneity was observed in the combined group, attributable to variability in supplement formulations, dosages, and study populations. Conclusions: Neither vitamin A nor vitamin D3 alone significantly improved child growth. Combined supplementation may provide modest benefits in weight gain but is insufficient to address linear growth or acute malnutrition. Future strategies should adopt multi-nutrient approaches and consider contextual factors such as infection control, dietary diversity, and socioeconomic conditions.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 162, "title": "Mortality Among Children Aged 28 Days–17 Years With Pneumonia Who Are Not Severely Undernourished and the Effect of Macronutrient Supplementation: A Systematic Review and Meta-Analysis", "authors": "Nalwanga", "authorsFull": "Nalwanga, Damalie", "year": 2025, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "BMJ Open", "doi": "https://dx.doi.org/10.1136/bmjopen-2024-091766", "url": "https://bmjopen.bmj.com/content/15/4/e091766", "abstract": "Objective Pneumonia is associated with four times higher odds of death among children with severe undernutrition. However, there is an equipoise for the mortality of children without severe undernutrition and the impact of macronutrient interventions. We collated evidence on mortality, anthropometric outcomes and the effect of macronutrient interventions in the management of non-severely undernourished children (28 days–17 years) with pneumonia globally.Design Systematic review and meta-analysis using a priori criteria developed following the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guideline.Data sources PubMed, Medline, EMBASE, Web of Science, Google Scholar, Scopus, Cochrane Central and bibliographies were searched between January 2000 and July 2024.Eligibility criteria We included articles conducted among children between 28 days and 17 years with pneumonia and non-severe malnutrition that reported on mortality and changes in anthropometric status or macronutrient supplementation. Studies conducted exclusively among adults, on micronutrient supplementation, case studies, commentaries and reviews were excluded.Data extraction and synthesis Two reviewers independently screened, abstracted the data and conducted risk of bias (RoB) using standard criteria including the RoB in non-randomised follow-up studies of exposure for observational studies and the revised Cochrane RoB assessment tool for randomised studies (RoB 2.0). Heterogeneity was assessed using the I2 statistic, and subgroup analysis was done. Data were analysed using both narrative and quantitative synthesis. Quantitative synthesis was done using the maximum likelihood random-effects model in STATA V.18.0, with the ‘meta_es’ command.Results A total of 15 articles were included (11 conducted in sub-Saharan Africa and four in Asia), with 169 901 participants overall. The mortality among non-severely undernourished children with pneumonia was 3.0% (95% CI 2% to 5%, I2=99.38%), with a range of 1–13% across studies. Children with moderate undernutrition had a higher overall mortality, 9.0% (95% CI 6% to 13%, I2=89.50%), than well-nourished children, with a range of 3–19% across studies. Only one of the 15 studies reported anthropometric outcomes during follow-up and compared mortality rates of those who did versus did not receive macronutrients. The study results were inconclusive.Conclusions Mortality among non-severely undernourished children with pneumonia ranges between 1–13% globally. There is inadequate follow-up nutritional assessment and management for non-severely undernourished children with pneumonia.PROSPERO registration number CRD42021257272.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 163, "title": "Digital Health Interventions for Pregnant Women and Mothers With Under 5-Year-Olds in Low- and Middle-Income Countries: A Scoping Review", "authors": "Adusei-Mensah", "authorsFull": "Adusei-Mensah, Frank", "year": 2025, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "Other", "doi": "https://doi.org/10.1016/j.glohj.2025.06.008", "url": "https://www.sciencedirect.com/science/article/pii/S2414644725000326", "abstract": "ObjectiveThis scoping review explores digital health interventions used to improve maternal health and the health of children under-5-year-olds in rural areas of low- and middle-income countries (LMICs), identifying current practices and research gaps.MethodsGuided by PRISMA Extension for Scoping Reviews, a comprehensive search was conducted across PubMed, Web of Science, and grey literature search with Google Scholar, and the South African National Electronic Theses and Dissertations Portal. MeSH terms and Boolean operators were used. Studies were screened using the Population, Concept, and Context framework, and data were extracted systematically.ResultsOf 5,114 records, 63 met inclusion criteria. Digital health interventions, particularly mobile health, were found to enhance service delivery, education, and support for maternal and child health in LMICs. However, challenges such as limited access to technology, digital literacy, and cultural barriers persist. Contextual factors, including geography and sociocultural norms, significantly influenced implementation success.ConclusionDigital health interventions show promise in improving maternal and child health in LMICs. However, regional disparities, technological limitations, and cultural misalignment hinder scalability. Future research should focus on culturally adaptive, community-engaged approaches and long-term impact assessments to support sustainable health promotion in low-resource settings.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Governance & Service Delivery", "Agriculture & Food Security", "Education & Skills"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 164, "title": "Effective Treatment Coverage for Sick Young Infants With Possible Serious Bacterial Infection When Referral Not Feasible in Low–and Middle-Income Countries: Systematic Review and Meta-Analysis", "authors": "Mekonnen", "authorsFull": "Mekonnen, Wassie Negash", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "—", "journal": "BMC Public Health", "doi": "https://doi.org/10.1186/s12889-025-25934-9", "url": "https://link.springer.com/article/10.1186/s12889-025-25934-9", "abstract": "AbstractIntroductionBacterial infections are major causes of neonatal deaths globally and about 6.9 million episodes occur among young infants in low-and middle-income countries every year. A comprehensive cascade of care from identifying the target population to outcome-adjusted coverage is essential to identify service delivery bottlenecks and take corrective action; however, the majority of studies included single treatment coverage rates. In this study, we conducted a systematic review and meta-analysis to estimate pooled coverage levels across stages of the care cascade, using a standardized framework for treatment coverageMethodsWe searched studies using a population, concept, and context framework combined with the Boolean terms ‘AND’ and ‘OR’ on PubMed/Medline, Cochrane, EMBASE, and Web of Science databases and grey literature. Two independent reviewers appraised eligible studies for their quality using the JBI appraisal checklist. We used a random effect model with a 95% CI in STATA 14 to estimate the treatment coverage along care cascades. We evaluated the publication bias through funnel plots and Egger's test, both of which indicated the absence of publication bias. However, we observed significant heterogeneity; consequently, subgroup analyses were conducted, taking into account the year of publication, setting, design, and location of treatmentResultthe overall pooled estimates of contact coverage, intervention coverage, quality-adjusted coverage, user adherence-adjusted coverage, and outcome-adjusted coverage from 16 studies were 71% (95% CI: 60%–82%; I² = 99.85%), 67% (95% CI: 55%–78%; I² = 99.75%), 61% (95% CI: 46%–76%; I² = 99.84%), 60% (95% CI: 43%–76%; I² = 99.4%), and 56% (95% CI: 43%–68%; I² = 99.0%), respectively.In the subgroup analysis based on study settings, studies conducted in India reported lower coverage levels compared to those in Ethiopia. Specifically, the contact coverage was 65% (95% CI: 53%–77%; I² = 97.4%), intervention coverage was 64% (95% CI: 49%–79%; I² = 98.3%), quality-adjusted coverage was 60% (95% CI: 41%–79%; I² = 98.9%), and outcome-adjusted coverage was 58% (95% CI: 38%–78%; I² = 99.02%)ConclusionThe pooled estimates indicate suboptimal levels of contact coverage, intervention coverage, and quality-adjusted coverage, highlighting challenges in delivering essential services. The lower levels of user adherence-adjusted coverage and outcome-adjusted coverage suggest potential issues with treatment effectiveness and patient outcomes. Therefore, targeted interventions and appropriate resource allocation to improve healthcare access, quality, and outcomes are crucial in low-resource settings.The review protocol has been registered on the International Prospective Register of Systematic Reviews (PROSPERO), (ID: CRD42024525174).", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Governance & Service Delivery"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 165, "title": "The Green Supply Chain and its Impact on Industrial Sustainability: A Systematic Literature Review 2022-2024", "authors": "Jarek et al.", "authorsFull": "Jarek, León Paucar Ehrlich; Cristopher, Vasquez Luján; Winston, Torres Velasquez Julio", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "No DOI", "url": "https://proceedings.laccei.org/index.php/laccei/article/download/4721/4704", "abstract": "The Green Supply Chain (GSCM) is presented as a key strategy to promote the sustainability of industries. This study aims to analyze the impact of GSCM practices on industrial sustainability between 2022 and 2024, focusing on waste management, resource efficiency and environmental improvements compared to the conventional chain. Using the PRISMA 2020 methodology, 23 relevant studies were collected from the SCOPUS database under strict inclusion and exclusion criteria, integrating a qualitative and quantitative approach to ensure the reliability of the results. The findings revealed that practices such as sustainable logistics and transportation, selection of responsible suppliers, sustainable product design and use of renewable energy have had a positive impact on sustainability. In addition, 70% of the studies highlighted a significant reduction in greenhouse gas emissions; also, 57% reported optimization in the use of resources and higher recycling and reuse rates. In addition, these practices improved economic performance by reducing long-term operating costs and fostered corporate social responsibility. However, initial implementation may require significant investments, although economic and resource optimization benefits can be seen in the short term. It is concluded that GSCM is fundamental to achieving industrial sustainability, combining environmental, economic and social benefits. It is recommended to explore emerging technologies such as Artificial Intelligence to overcome challenges in its adoption, especially in developing economies", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 166, "title": "Prevention of Malaria in Pregnancy Through Health Education Intervention Programs on Insecticide-Treated Nets Use: A Systematic Review", "authors": "Onyinyechi et al.", "authorsFull": "Onyinyechi, Opara Monica; Ismail, Suriani; Nazan, Ahmed Iqmer Nashriq Mohd", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "BMC Public Health", "doi": "https://doi.org/10.1186/s12889-024-17650-7", "url": "https://link.springer.com/content/pdf/10.1186/s12889-024-17650-7.pdf", "abstract": "Malaria is a widespread and prevalent disease that affects human population globally, particularly in tropical coun tries. Malaria is a major health issue in sub-Saharan Africa and it contributes to morbidity and mortality among individ uals in Africa. Pregnant women have been also reported as high risk of people been infected with malaria. This review attempted to evaluate the various methods used for health education programs and the effectiveness of the pro grams in improving ITNs among pregnant women. Methods The search involved various databases; EBCOHOST, MEDLINE, CINAHL, Cochrane library, ScienceDi
