const EVALS = [{"id": 0, "title": "Does linking women farmers to markets improve food security? Evidence from rural Bangladesh", "authors": "Lee et al.", "authorsFull": "Lee, Han Bum; McNamara, Paul E.; Bhattacharyya, Kamal", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Agriculture & Food Security", "doi": "https://doi.org/10.1186/s40066-022-00373-6", "url": "https://link.springer.com/article/10.1186/s40066-022-00373-6#citeas", "abstract": "Background: This study examined the effect of linking small-scale women farmers to markets, referred to as community marketing, and homestead food production extension services in two districts of rural Bangladesh. Method: We particularly focused on identifying the relationship between treatment and food security, monthly expenditure patterns, and food production and marketing by adopting a doubly robust method that mediated bias from project site selection and potential misspecification of the postulated outcome or treatment model. Results: The main results showed that establishing community marketing sites along with extension services provided women farmers a secured marketing outlet for food production, plausibly associated with a decreased likelihood of a reduction in monthly expenditures on healthcare (12.7 percentage points), child education (19.4 percentage points), and transportation (51.5 percentage points) during the lean season. However, if farmers did not spend extra income generated from marketing on food purchases, it would be difficult to anticipate an improvement in food security. Conclusion: Community marketing was devised to link women smallholders to the markets without conflicting with social and cultural norms for which women were responsive, and our research findings supported the claim that they benefited from community marketing participation. Therefore, government, NGO, or other extension providers looking for a culturally appropriate approach to address women farmers’ limited mobility may consider using or modifying community marketing.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": []}, {"id": 1, "title": "Social and Financial Incentives for Overcoming a Collective Action Problem", "authors": "Bakhtiar et al.", "authorsFull": "Bakhtiar, M. Mehrab; Guiteras, Raymond P.; Levinsohn, James; Mobarak, Ahmed Mushfiq", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Development Economics", "doi": "10.1016/j.jdeveco.2023.103072", "url": "https://www.sciencedirect.com/science/article/pii/S0304387823000275", "abstract": "Addressing public health externalities often requires community-level collective action. Due to social norms, each person’s sanitation investment decisions may depend on the decisions of neighbors. We report on a cluster randomized controlled trial conducted with 19,000 households in rural Bangladesh where we grouped neighboring households and introduced (either financial or social recognition) rewards with a joint liability component for the group, or asked each group member to make a private or public pledge to maintain a hygienic latrine. The group financial reward has the strongest impact in the short term (3 months), inducing a 7.5–12.5 percentage point increase in hygienic latrine ownership, but this effect dissipates in the mediumterm (15 months). In contrast, the public commitment induced a 4.2–6.3 percentage point increase in hygienic latrine ownership in the short term, but this effect persists in the medium term. Non-financial social recognition or a private pledge has no detectable effect on sanitation investments.", "primaryTheme": "WASH", "themes": ["WASH", "Governance & Service Delivery", "Child Marriage & Social Norms"], "methods": ["RCT"]}, {"id": 2, "title": "Validity of Vision Screening Program Conducted by Preschool Teachers: An Interventional Study", "authors": "Mezbah et al.", "authorsFull": "Mezbah, Uddin; Omar, Rokiah; Isa, Zaleha Md; Knight, Victor Feizal", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.51329/mehdiophthal1439", "url": "https://dx.doi.org/10.51329/mehdiophthal1439", "abstract": "Background: Clear vision is crucial for effective learning among preschool children. Hence, early detection of vision impairment and prompt treatment are required to improve prognosis. Currently, limited information is available, and no program exists to screen for vision impairment among preschoolers in Bangladesh. This study aimed to validate the KieVision™ Preschool Vision Screening Kit, translated into the Bengali language, to improve vision impairment detection among preschool children.Methods: In this prospective case–control study, 60 preschool teachers from Chittagong were randomly selected. The study group was trained to conduct vision screening among preschool children using the translated kit, whereas the control group was trained using the Chittagong Eye Infirmary and Training Complex (CEITC) School Teachers’ Training Module. Fifteen preschool children aged 4–6 years were screened by each preschool teacher and again by the optometrist.Results: Sixty preschool teachers screened 900 children. The results showed a higher validity of vision screening findings by the preschool teachers in the study group (sensitivity, 68.00%; specificity, 92.75%) than in the control group (sensitivity 47.37%, specificity 70.39%). The level of agreement between the preschool teachers and optometrists was high for all tests (first-order agreement coefficient [AC1] ≥ 0.80 in the study group). The sensitivity and specificity of the visual acuity test for the study group were 59.65% and 94.15%, respectively, while in the control group it was 13.33% and 62.54%, respectively. A similar trend was noted in the general observation component and Hirschberg’s test. Conclusions: The Bengali Language KieVision™ Preschool Vision Screening Kit can be used effectively by preschool teachers in vision screening programs to improve the identification of vision impairment among preschool children in Bangladesh.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Education & Skills"], "methods": []}, {"id": 3, "title": "The Effect of a Large-Scale Water, Sanitation and Hygiene Intervention in Bangladesh on Knowledge, Behaviour and Health: Findings from an Endline Programme Evaluation.", "authors": "Aluri et al.", "authorsFull": "Aluri, Kelly Zhang; Halder, Amal K; Islam, Mahfuza; Benjamin-Chung, Jade; Alam, Monirul; Shoab, Abul Kasham; Rahman, Mahbubur; Unicomb, Leanne; Luby, Stephen P", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Tropical Medicine & International Health", "doi": "https://dx.doi.org/10.1111/tmi.13813", "url": "https://pubmed.ncbi.nlm.nih.gov/36096154/", "abstract": "OBJECTIVES: The Sanitation, Hygiene Education and Water Supply in Bangladesh Programme (SHEWA-B) was a 5-year intervention aiming to improve water, sanitation and hygiene (WASH) practices among 20 million rural residents through community hygiene promoters. This analysis evaluates the impact of SHEWA-B on knowledge, behaviour and childhood diarrhoea outcomes., METHODS: The evaluation included repeated cross-sectional surveys and health surveillance in matched cohorts in intervention and control clusters. Cross-sectional surveys and structured observations at baseline, midline, and endline assessed the availability of WASH technology, caregiver knowledge and behaviour. Fieldworkers collected monthly health data in a subset of control and intervention households to determine the prevalence of diarrhoea., RESULTS: Of 5091 households surveyed, participants residing in intervention clusters showed minimal improvements in knowledge, reported behaviour, or use of WASH technology compared to the control clusters. During structured observations, intervention households increased more than control households at handwashing before preparing food and after cleaning a baby's anus when comparing endline to baseline, but these changes were not seen when comparing endline to the midline. The prevalence of childhood diarrhoea remained similar in both groups before (10.2% in intervention, 10.0% in control) and after (8.8% in intervention, 11.7% in control) midline changes were made to improve the intervention. Intervention clusters showed no improvement in diarrhoea over time compared to control clusters., CONCLUSIONS: SHEWA-B's community-based WASH promotion did not yield the intended impact on knowledge, behaviour or health. Greater priority should be given to approaches that have demonstrated effectiveness. Including rigorous evaluations would broaden the evidence base to support and improve large-scale programmes. Copyright © 2022 The Authors Tropical Medicine & International Health Published by John Wiley & Sons Ltd.", "primaryTheme": "WASH", "themes": ["WASH", "Agriculture & Food Security"], "methods": []}, {"id": 4, "title": "Enhanced Women's Decision-making Power After The Suchana Intervention in North-eastern Bangladesh: A Cluster Randomised Pre-post Study.", "authors": "Haque et al.", "authorsFull": "Haque, Md Ahshanul; Choudhury, Nuzhat; Ahmed, S M Tanvir; Farzana, Fahmida Dil; Ali, Mohammad; Naz, Farina; Siddiqua, Towfida Jahan; Raihan, Mohammad Jyoti; Rahman, Sheikh Shahed; Faruque, A. S. G.; Ahmed, Tahmeed", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "BMJ Open", "doi": "https://dx.doi.org/10.1136/bmjopen-2021-054148", "url": "http://ovidsp.ovid.com/ovidweb.cgi?T=JS&PAGE=reference&D=mesx&NEWS=N&AN=35922107", "abstract": "OBJECTIVES: Women's decision-making power is a dimension of empowerment and is crucial for better physical and psychosocial outcomes of mothers. Suchana, a large-scale development programme in Bangladesh, actively provided social interventions on behaviour change communication to empower women belonging to the poorest social segment. This paper aims to assess the impact of the Suchana intervention on various indicators related to women's decision-making power., DESIGN, SETTING AND PARTICIPANTS: The evaluation design was a cluster randomised pre-post design with two cross-sectional surveys conducted among beneficiary women with at least one child aged <23 months from randomly selected poor or very poor beneficiary households in Sylhet division., OUTCOME MEASURE: Decision-making indicators included food purchases, major household purchases, food preparation, children's healthcare as well as women's own healthcare and visiting family and relatives., RESULTS: Our findings suggest that 45% of women were able to make decisions on food purchases, 25% on major household purchases, 78% on food preparation, 59% on children's healthcare, 51% on their own healthcare and 43% on visiting family and relatives at baseline in the intervention group, whereas the results were almost the same in the control group. In contrast, at the endline survey, the respective proportions were 75%, 56%, 87%, 80%, 77% and 67% in the intervention group, which were significantly improved when compared with the control group. The prevalence of those outcome indicators were 64%, 41%, 80%, 71%, 68% and 56%, respectively, in the control group. As per multiple logistic regression analysis and structural equation modelling, the Suchana intervention had a substantial influence on the latent variable of women's decision-making power., CONCLUSION: In terms of food purchases, major household purchases, children's healthcare, their own healthcare and visiting family and relatives, the Suchana intervention favourably influenced the decision-making power of rural women living in a vulnerable region of Bangladesh.", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender"], "methods": ["RCT", "Quasi-experimental"]}, {"id": 5, "title": "Food Security Status of Suchana-participating Households in North-eastern Rural Bangladesh", "authors": "Haque et al.", "authorsFull": "Haque, Md Ahshanul; Choudhury, Nuzhat; Ahmed, S. M. Tanvir; Farzana, Fahmida Dil; Ali, Mohammad; Naz, Farina; Khan, Ashfaque; Wahid, Barbie Zaman; Siddiqua, Towfida Jahan; Akter, Rumana; Rahman, Sheikh Shahed; Faruque, A. S. G.; Ahmed, Tahmeed", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Frontiers in public health", "doi": "10.3389/fpubh.2022.950676", "url": "https://www.frontiersin.org/articles/10.3389/fpubh.2022.950676/full", "abstract": "Despite achieving remarkable progress, food insecurity remains a major public health challenge in Bangladesh, and severe food insecurity status has not been reduced in susceptible areas and vulnerable regions in Bangladesh. Wetlands that are susceptible to flooding can be found in Bangladesh's north-eastern Sylhet division. Suchana, a large-scale nutrition programme, implemented nutrition-specific and sensitive interventions in poor and very poor households in Sylhet and Moulvibazar districts in the north-eastern region of Bangladesh. The aim of this article is to assess the association between the Suchana intervention and household food security status among poor and very poor households in north-eastern rural Bangladesh using the Suchana baseline and endline survey databases. The baseline survey was conducted between November 2016 and February 2017, while the endline survey was undertaken 3 years later, during the same months. The outcome variable in this analysis was household food security status, which was measured using the Food and Nutrition Technical Assistance's Guideline. Descriptive statistics were used to summarize the data; after controlling for the union as a cluster and relevant covariates, a multiple multinomial logistic regression model was used to estimate the independent effect of the Suchana intervention as an exposure. Overall, 14.0% of households were food secure at the baseline survey (intervention: 14.1%, control: 14.0%) and 22.0% were food secure (intervention: 26.6%, control: 20.2%) at the endline survey. For households in the intervention area in comparison to the control area, the odds of being moderately food insecure [aOR: 1.36 (1.05, 1.76), p < 0.05], mildly food insecure [aOR: 1.83 (1.33, 2.51), p < 0.001], or food secure [aOR: 2.21 (1.47, 3.33), p < 0.001] compared to being severely food insecure was significantly higher. Thus, we infer that the 3 years of Suchana intervention marginally increased household food security status among the socio-economically disadvantaged population in north-eastern rural Bangladesh. If concerns regarding gender equity, women's education, and income-generating activities are addressed, the population could experience even greater benefits in food security. In order to overcome these challenges, all stakeholders including programme implementers and policymakers should work together to implement the appropriate measures.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet", "Women's Empowerment & Gender", "Climate, Energy & Environment"], "methods": []}, {"id": 6, "title": "Assessing Acceptance and Effects of Child Feeding Counseling on Nutritional Status of Children Aged 6-23 Months in a Semi-Urban Community", "authors": "Roy et al.", "authorsFull": "Roy, S.K.; Jahan, Khurshid; Alam, Nurul; Tasnim, Saria; Rois, Rumana", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "British Journal of Nutrition", "doi": "10.1017/S0007114522003658", "url": "https://www.cambridge.org/core/journals/british-journal-of-nutrition/article/abs/assessing-acceptance-and-effects-of-child-feeding-counselling-on-nutritional-status-of-children-aged-623-months-in-a-semiurban-community/80ACED34964F2FBA8212BE5407BACD86", "abstract": "In Bangladesh, only 34 % of the children aged 18–23 months old are given minimum acceptable diets of complementary foods. Objective of the study was to find the effects of complementary feeding counselling on nutritional status among 6–23 months old children of poor families. This was a community-based randomised control trial. A total of 192 children in two groups were randomly selected. Nutrition education was given for a period of 4 months with post-intervention follow-up for 2 months. After 4 months of intervention, the difference in height for age Z score, weight for height Z score and weight for age Z score were significantly higher in the intervention group than in the control group (1·01 ± 0·31 v. 0·19 ± 0·01, P =< 0·001; 1·34 ± 0·15 v 0·72 ± 0·11, P =< 0·001; 1·5 ± 0·24 v. 0·62 ± 0·04, P =< 0·001). Mid-upper arm circumference Z score also improved in the intervention group than in the control group (0·95 ± 0·03 v. 0·57 ± 0·12, P =< 0·001). Morbidity of the children in the intervention group significantly reduced than in the control group (49 % v 80·20 %, P =< 0·001). Higher feeding frequency (3–4 times) (71·9 % v. 45·8 %) and energy intake increased in the intervention group than in the control group. Promotion of complementary feeding from the family foods can improve the nutritional status of 6–23 months old children of poor families within a short period.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Climate, Energy & Environment", "Education & Skills"], "methods": ["RCT"]}, {"id": 7, "title": "A cluster randomized controlled trial for measuring the impact of a social norm intervention addressing child marriage in Pirgacha in Rangpur district of Bangladesh: study protocol for evaluation of the Tipping Point Initiative", "authors": "Parvin et al.", "authorsFull": "Parvin, Kausar; Talukder, Aloka; Mamun, Mahfuz Al; Kalra, Sadhvi; Laterra, Anne; Naved, Ruchira Tabassum", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Journal article", "journal": "Global Health Action", "doi": "https://dx.doi.org/10.1080/16549716.2022.2057644", "url": "http://ovidsp.ovid.com/ovidweb.cgi?T=JS&PAGE=reference&D=mesx&NEWS=N&AN=35441566", "abstract": "Child Marriage (CM) is one of the major developmental concerns in Bangladesh, reporting one of the highest rates of CM (59%) globally. To date, interventions to address CM in Bangladesh have failed to seriously engage with social norms that are important contributors to CM. This paper describes the evaluation design of the Tipping Point Initiative that aims to reduce CM through social norm change and increasing adolescent girls' agency to voice their rights. The Tipping Point Initiative evaluation trial employs a mixed method design. The quantitative component includes a three-arm Cluster Randomized Controlled Trial design, where Arm 1 receives Tipping Point Program (TPP); Arm 2 receives Tipping Point Program Plus (TPP+), a social norms-enhanced version of TPP; and Arm 3 is the Control. The trial covers 51 clusters (villages) in Pirgacha, in Rangpur district, randomized into three study arms (17 per arms). From each cluster, a cohort of 25 adolescent girls aged 12-<16 years were selected randomly for participation in the survey and intervention. Further, a cross-section of adults (six males and six females) were randomly selected from each cluster for survey. Qualitative baseline data were collected from two purposively selected intervention villages in each intervention arm. Thirty In-Depth Interviews, eight Key Informant Interviews and 16 Focus Group Discussion were conducted with adolescent girls, boys, adult women and men. Same strategies have been followed at endline. The intervention was implemented from April 2019 to December 2020. The endline was conducted 10 months after the end of intervention. Intention-to-treat analysis approach will be used for impact assessment. Both narrative analysis and Grounded Theory approach will be employed in analysing qualitative data. The learnings are expected to inform programs and policies regarding what works and does not work to address CM in such social norms intervention in Bangladesh.", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms", "Women's Empowerment & Gender"], "methods": ["RCT"]}, {"id": 8, "title": "Private Transfers, Public Transfers, and Food Insecurity During the Time of COVID-19: Evidence From Bangladesh", "authors": "Ahmed et al.", "authorsFull": "Ahmed, Akhter; Bakhtiar, M. Mehrab; Gilligan, Daniel O.; Hoddinott, John; Roy, Shalini", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Applied Economic Perspectives and Policy", "doi": "10.1002/aepp.13373", "url": "https://onlinelibrary.wiley.com/doi/epdf/10.1002/aepp.13373", "abstract": "In the aftermath of the COVID-19 pandemic, interest has grown in what kinds of assistance protect household food security during shocks. We study rural and urban Bangladesh from 2018 to 2019 to late 2021, assessing how pre-pandemic access to social safety net programs and private remittances relate to household food insecurity during the pandemic. Using longitudinal data and estimating differences-in-differences models with household fixed effects, we find that prepandemic access to social protection is associated with significant reductions in food insecurity in all rounds collected during the pandemic, particularly in our urban sample. However, pre-pandemic access to remittances shows no similar protective effect.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Social Protection & Safety Nets", "Financial Inclusion & Cash"], "methods": ["DiD"]}, {"id": 9, "title": "Identifying Latent Classes of Empowerment Among Early Adolescent Girls and the Factors that Cultivate Them: Evidence from a Community-Based Skills Training Program", "authors": "Misunas et al.", "authorsFull": "Misunas, Christina; Amin, Sajeda", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Adolescence", "doi": "https://doi.org/10.1002/jad.12014", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1002/jad.12014", "abstract": "Background: Efforts to empower adolescent girls remain constrained by confusion around how to conceptually define empowerment and how to design interventions. More research, particularly among young adolescents, is needed that considers con-textual and age‐specific circumstances. This paper examines the latent classes of empowerment among early adolescent girls in Bangladesh and factors associated with membership in these classes. Using data from the Bangladeshi Association for Life Skills, Income, and Knowledge for Adolescents project, a four‐arm randomized con-trolled trial designed to evaluate different community‐based approaches for adolescents' skills development, we identify the latent classes before and after intervention and explore whether girls' membership in the study arms was associated with latent class membership at endline.Methods: To identify underlying subgroups among the sample, we conducted latent class analysis at baseline and endline using indicators of seven different constructs of empowerment based on the literature. Using multinomial logistic regression analysis, we assessed whether respondents' background characteristics and membership in the study arms were predictive of latent class membership at both timepoints.Results: A three‐class model at baseline and a four‐class model at endline showed optimal fit. In both models, three distinct latent classes were observed: (1) a least empowered class, (2) a mobile, socially active class, and (3) a socially progressive class. At endline, a fourth class emerged—the most empowered—that was mobile, socially active, and socially progressive. Girls' marital status, religion, and parents' level of education predicted latent class membership; household wealth was predictive at baseline, but not endline. Study arm was also associated with class membership at endline: girls in the Gender‐Rights Awareness Arm had the highest probability of belonging to the fourth, most empowered class.Conclusion: This paper identifies and characterizes latent classes of empowerment that exist among the sample before and after the intervention. The apparent differential effects of interventions in predicting latent class membership have implications for community‐based programming. Findings suggest that skills‐building curriculum focused on promoting gender equitable norms, voice, and agency has potential to influence early adolescent girls across multiple dimensions of empowerment.", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender", "Education & Skills"], "methods": []}, {"id": 10, "title": "Dietary Diversity Modification Through School-Based Nutrition Education Among Bangladeshi Adolescent Girls: A Cluster Randomized Controlled Trial", "authors": "Nyma et al.", "authorsFull": "Nyma, Zannatun; Rahman, Mahfuzur; Das, Subhasish; Alam, Md Ashraful; Haque, Enamul; Ahmed, Tahmeed", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "PLoS One", "doi": "https://doi.org/10.1371/journal.pone.0282407", "url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0282407", "abstract": "A matched, pair-cluster randomized controlled trial was conducted from July 2019 to September 2020. Randomization was done to select intervention and control schools. There were 300 participants (150 in the intervention and 150 in the control arm) at baseline. We randomly selected our study participants (adolescent girls) from grades six, seven, and eight of each school. Our intervention components included parents’ meetings, eight nutrition education sessions, and the distribution of information, education, and communication materials. An hour-long nutrition education session was provided using audio-visual techniques in a class of intervention school once a week by trained staffs of icddr,b for two months. Data on dietary diversity, anthropometry, socio-economic and morbidity status, a complete menstrual history, and haemoglobin status of adolescent girls were collected at recruitment and after five months of intervention. We calculated the mean dietary diversity score of adolescent girls at baseline and at the endline. As the dietary diversity score was incomparable between the control and intervention arm at baseline, we performed the difference-in-difference analysis to assess the effect of the intervention.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Education & Skills", "Women's Empowerment & Gender"], "methods": ["RCT", "DiD"]}, {"id": 11, "title": "Health Care Services Use, Stillbirth, and Neonatal and Infant Survival following Implementation of the Maternal Health Voucher Scheme in Bangladesh: a Difference-in-differences Analysis of Bangladesh Demographic and Health Survey Data, 2000 to 2016", "authors": "Nandi et al.", "authorsFull": "Nandi, Arijit; Charters, Thomas; Quamruzzaman, Amm; Strumpf, Erin C.; Kaufman, Jay S.; Heymann, Jody; Mukherji, Arnab; Harper, Sam", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "PLoS Medicine", "doi": "https://doi.org/10.1371/journal.pmed.1004022", "url": "https://journals.plos.org/plosmedicine/article?id=10.1371/journal.pmed.1004022", "abstract": "Background: Starting in 2006 to 2007, the Government of Bangladesh implemented the Maternal Health Voucher Scheme (MHVS). This program provides pregnant women with vouchers that can be exchanged for health services from eligible public and private sector providers. In this study, we examined whether access to the MHVS was associated with maternal health services utilization, stillbirth, and neonatal and infant mortality. Methods and findings: We used information on pregnancies and live births between 2000 to 2016 reported by women 15 to 49 years of age surveyed as part of the Bangladesh Demographic and Health Surveys. Our analytic sample included 23,275 pregnancies lasting at least 7 months for analyses of stillbirth and between 15,125 and 21,668 live births for analyses of health services use, neonatal, and infant mortality. With respect to live births occurring prior to the introduction of the MHVS, 31.3%, 14.1%, and 18.0% of women, respectively, reported receiving at least 3 antenatal care visits, delivering in a health institution, and having a skilled birth attendant at delivery. Rates of neonatal and infant mortality during this period were 40 and 63 per 1,000 live births, respectively, and there were 32 stillbirths per 1,000 pregnancies lasting at least 7 months. We applied a difference-in-differences design to estimate the effect of providing subdistrict-level access to the MHVS program, with inverse probability of treatment weights to address selection into the program. The introduction of the MHVS program was associated with a lagged improvement in the probability of delivering in a health facility, one of the primary targets of the program, although associations with other health services were less evident. After 6 years of access to the MHVS, the probabilities of reporting at least 3 antenatal care visits, delivering in a health facility, and having a skilled birth attendant present increased by 3.0 [95% confidence interval (95% CI) = −4.8, 10.7], 6.5 (95% CI = −0.6, 13.6), and 5.8 (95% CI = −1.8, 13.3) percentage points, respectively. We did not observe evidence consistent with the program improving health outcomes, with probabilities of stillbirth, neonatal mortality, and infant mortality decreasing by 0.7 (95% CI = −1.3, 2.6), 0.8 (95% CI = −1.7, 3.4), and 1.3 (95% CI = −2.5, 5.1) percentage points, respectively, after 6 years of access to the MHVS. The sample size was insufficient to detect smaller associations with adequate precision. Additionally, we cannot rule out the possibility of measurement error, although it was likely nondifferential by treatment group, or unmeasured confounding by concomitant interventions that were implemented differentially in treated and control areas. Conclusions: In this study, we found that the introduction of the MHVS was positively associated with the probability of delivering in a health facility, but despite a longer period of follow-up than most extant evaluations, we did not observe attendant reductions in stillbirth, neonatal mortality, or infant mortality. Further work and engagement with stakeholders is needed to assess if the MHVS has affected the quality of care and health inequalities and whether the design and eligibility of the program should be modified to improve maternal and neonatal health outcomes.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health"], "methods": ["DiD"]}, {"id": 12, "title": "Reaching women at work with health programming in Bangladesh: results of difference-in-differences analysis among female factory workers", "authors": "Chace Dwyer et al.", "authorsFull": "Chace Dwyer, Sara; Hossain, Md Irfan; Bajracharya, Ashish; Jain, Aparna", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Sexual and Reproductive Health Matters", "doi": "10.1080/26410397.2021.1991116", "url": "https://www.tandfonline.com/doi/full/10.1080/26410397.2021.1991116", "abstract": "The rapid growth of Bangladesh’s ready-made garment sector has transformed the country’s economy while also employing a predominantly female workforce. Companies have begun collaborating with NGOs to provide health messages to and expand health services for workers. This study evaluates the effect of the Health Enables Return (HER) health model’s approach of using peer health educators to deliver health messages and increased the availability of health products. Using repeated cross-sectional data from female workers in HER health and comparison factories between May 2015 and March 2017, baseline (n = 1704) and endline (n = 1503) samples were matched on eight characteristics and then difference-in-differences estimations were used to determine the effect of the HERhealth model on knowledge and behaviors. The average changes over time in knowledge and behaviors were statistically different between the HERhealth and comparison factories. Knowledge of when a woman is at higher risk for pregnancy during her menstrual cycle increased from baseline to end line in both groups but was 12 percentage points greater in the HERhealth factories than in the comparison. An increase in family planning use among ever-married women was observed in the HERhealth factories but decreased in the comparison factories leading to a 12 percentage point difference-in-differences. The greatest effect of the HERhealth model was observed on women’s use of sanitary products for menstrual management which significantly increased in both groups, but the increase was 35% greater in the HERhealth factories. The HERhealth model is effective in increasing knowledge and improving health behaviors when health products are available in factory infirmaries.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector", "Women's Empowerment & Gender", "Maternal & Child Health"], "methods": ["DiD"]}, {"id": 13, "title": "Evaluating The Mediating Role of Energy Subsidies on Social Well-being and Energy Poverty Alleviation in Bangladesh", "authors": "Hosan et al.", "authorsFull": "Hosan, Shahadat; Sen, Kanchan Kumar; Rahman, Md. Matiar; Karmaker, Shamal Chandra; Chapman, Andrew J.; Saha, Bidyut Baran", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Energy Research & Social Science", "doi": "10.1016/j.erss.2023.103088", "url": "https://doi.org/10.1016/j.erss.2023.103088", "abstract": "Energy subsidies are a widespread policy instrument employed by national governments to regulate the mechanism of energy resource allocation in contemporary market economies. The economic impact of these subsidies has been quantitatively evaluated for various nations in the literature using different approaches. However, the impact of energy subsidies on social wellbeing tracked by looking at school drop-out, health status, and earning capacity through mediating effects of energy poverty employing mediation analysis using household-level data is rarely investigated, particularly for energy-poor countries. Thus, by employing mediation analysis with data from three waves of the national Household Income and Expenditure Survey (HIES) of Bangladesh for the years 2005, 2010, and 2016, this study intends to reveal the mediating effects of energy subsidies on social wellbeing via energy poverty. The results obtained utilizing a mixed-effect regression approach suggest that energy subsidies and energy poverty are significantly linked, and energy subsidies improve social wellbeing by mediating effects of energy poverty. This finding is robust to alternative ways of addressing endogeneity using Lewbel's two-stage least squares (2SLS) method. Additionally, the richer households realize better social wellbeing and have less energy poverty, gaining more than other households from energy subsidies. The policy relevance of this paper advocates further innovation in energy subsidy reforms in energy-poor countries for combating energy poverty and ensuring clean, sustainable, and affordable energy for all in line with the aims of the sustainable development goals (SDGs) 7, affordable and clean energy.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["IV"]}, {"id": 14, "title": "Protocol for a Cluster Randomised Controlled Trial of LPG Cookstoves Compared to Usual Cooking Practices To Reduce Perinatal Mortality and Morbidity in Rural Bangladesh Called Poriborton: The CHANge Trial", "authors": "Raynes-Greenow et al.", "authorsFull": "Raynes-Greenow, Camille; Alam, Ashraful; Billah, Sk Masum; Islam, Sajia; Agho, Kingsley; Rokonuzzaman, S. M.; Thornburg, Jonathan; El Arifeen, Shams; Chowdhury, Atique Iqbal; Dibley, Michael J.", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Published protocol", "journal": "BioMed Central (BMC)", "doi": "10.1186/s13063-022-06146-7", "url": "https://trialsjournal.biomedcentral.com/articles/10.1186/s13063-022-06146-7", "abstract": "Background: Household air pollution is a leading health risk for global morbidity and mortality and a major health risk in South Asia. However, there are no prospective investigations of the impact of household air pollution on perinatal morbidity and mortality. Our trial aims to assess the impact of liquefied petroleum gas (LPG) for cooking to reduce household air pollution exposure on perinatal morbidity and mortality compared to usual cooking practices in Bangladesh.Hypothesis: In a community-based cluster randomised controlled trial of pregnant women cooking with LPG throughout pregnancy, perinatal mortality will be reduced by 35% compared with usual cooking practices in a rural community in Bangladesh.Methods: A two-arm community-based cluster randomised controlled trial will be conducted in the Sherpur district, Bangladesh. In the intervention arm, pregnant women receive an LPG cookstove and LPG in cylinders supplied throughout pregnancy until birth. In the control or usual practice arm, pregnant women continue their usual cooking practices, predominately traditional stoves with biomass fuel. Eligible women are pregnant women with a gestational age of 40–120 days, aged between 15 and 49 years, and permanent residents of the study area. The primary outcome is the difference in perinatal mortality between the LPG arm and the usual cooking arm. Secondary outcomes include (i) preterm birth and low birth weight, (ii) personal level exposure to household air pollution, (iii) satisfaction and acceptability of the LPG stove and stove use, and (iv) cost-effectiveness and cost-utility in reducing perinatal morbidity and mortality. We follow up all women and infants to 45 days after the birth. Personal exposure to household air pollution is assessed at three-time points in a sub-sample of the study population using the MicroPEMTM. The total required sample size is 4944 pregnant women.Discussion: This trial will produce evidence of the effectiveness of reduced exposure to household air pollution through LPG cooking to reduce perinatal morbidity and mortality compared to usual cooking practices. This evidence will inform policies for the adoption of clean fuel in Bangladesh and other similar settings.Trial registration: Australian New Zealand Clinical Trials Registry ACTRN12618001214224. Prospectively registered on 19 July 2019", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Maternal & Child Health", "Nutrition & Diet", "Agriculture & Food Security"], "methods": ["RCT"]}, {"id": 15, "title": "Reducing Emissions and Air Pollution from the Informal Sector: Evidence from Bangladesh", "authors": "Brooks et al.", "authorsFull": "Brooks, Nina R.; Biswas, Debashish; Maithel, Sameer; Miller, Grant; Mahajan, Aprajit; Uddin, M. Rofi; Mazhab, Moogdho; Rahman, Mahbubur; Luby, Stephen P.; Ahmed, Shoeb", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "NBER Working Paper Series", "doi": "10.3386/w32794", "url": "https://www.nber.org/papers/w32794", "abstract": "We present results from a randomized controlled trial in Bangladesh that introduced operational practices to improve energy efficiency and reduce emissions in 276 “zigzag” brick kilns. 65% of intervention kilns adopted the improved practices. Treatment assignment reduced energy use by 10.3% (p-value<0.001) and decreased CO2 and PM2.5 emissions by 171 metric tons and 0.45 metric tons, respectively, per kiln per year. Valuing the CO2 reductions using a social cost of carbon of $185/MT, we find that the social benefits outweigh costs by a factor of 190 to 1. The intervention, which required no new capital investment, also decreased fuel costs and increased brick quality. Our results demonstrate the potential for privately profitable, as well as publicly beneficial, improvements to address environmental problems in informal industries.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["RCT"]}, {"id": 16, "title": "Impact of Agricultural Intervention on Income and Employment in Hoar Wetland Areas of Bangladesh", "authors": "Ahamed et al.", "authorsFull": "Ahamed, Jasim U.; Marium, Bibi; Begum, Ismat A.; Ding, Shijun; Ahmed, Tukir; Molla, Md. Mosharraf U.; Alam, Mohammad J.", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.1002/uar2.70001", "url": "https://acsess.onlinelibrary.wiley.com/doi/full/10.1002/uar2.70001", "abstract": "The study aimed to investigate the current scenario of wetland households and the impact of agricultural interventions. It also sought to qualitatively assess rural development, the food system, and poverty from the perspective of wetland areas in Bangladesh. A total of 1000 respondents were selected using a simple random sampling technique. Descriptive statistics and econometric models were employed for data analysis. The findings reveal that livelihood activities are seasonal. They also indicate that rice-valued well-being has significantly improved due to successive agricultural policy regimes. Additionally, protection interventions, well-being, and policy periods were negatively associated with poverty. The study found that agricultural interventions have substantially enhanced income, employment, and labor productivity due to successive agricultural policy regimes. To advance development in wetland areas, it is recommended to focus on enhancing local knowledge, implementing river erosion control measures, developing rice varieties, diversifying crops, improving flood control measures, establishing a nutritious food supply chain, and enacting relevant regulations.Plain Language SummaryThe study aimed to investigate the current scenario of wetland households and the impact of agricultural interventions. It also sought to qualitatively assess rural development, the food system, and poverty from the perspective of wetland areas in Bangladesh. A total of 1000 respondents were selected using a simple random sampling technique. Descriptive statistics and econometric models were employed for data analysis. The findings reveal that livelihood activities are seasonal. They also indicate that rice-valued well-being has significantly improved due to successive agricultural policy regimes. Additionally, protection interventions, well-being, and policy periods were negatively associated with poverty. The study found that agricultural interventions have substantially enhanced income, employment, and labor productivity due to successive agricultural policy regimes. To advance development in wetland areas, it is recommended to focus on enhancing local knowledge, implementing rive.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment"], "methods": []}, {"id": 17, "title": "Reducing Household Air Pollution Exposure to Improve Early Child Growth And Development; A Randomized Control Trial Protocol for The \"Poriborton-Extension: The CHANge Trial\"", "authors": "Raynes-Greenow et al.", "authorsFull": "Raynes-Greenow, Camille; Billah, Sk Masum; Islam, Sajia; Rokonuzzaman, S M; Tofail, Fahmida; Kirkwood, Elizabeth K.; Alam, Ashraful; Chartier, Ryan; Ferdous, Tarana E; El, Arifeen Shams; Dibley, Michael J; Homaira, Nusrat; Hayes, Alison; Thornburg, Jonathan; Kelly, Patrick", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Published protocol", "journal": "Trials", "doi": "10.1186/s13063-022-06342-5", "url": "https://trialsjournal.biomedcentral.com/articles/10.1186/s13063-022-06342-5", "abstract": "Background: Globally, household air pollution (HAP) is a leading environmental cause of morbidity and mortality. Our trial aims to assess the impact of liquefied petroleum gas (LPG) for cooking to reduce household air pollution exposure on child health outcomes, compared to usual cooking practices in Bangladesh. The primary aim is to evaluate if reduced exposure to HAP through the provision of LPG for cooking from early gestation through to age 2 improves child anthropometry, health, and neuro-cognitive developmental outcomes, compared to children exposed to emissions from usual practice.Methods: Two-arm parallel cluster randomized controlled trial (cCRT). We will extend the intervention and follow-up of our existing \"Poriborton\" trial. In a subset of the original surviving participants, we will supply LPG cylinders and LPG stoves (intervention) compared to usual cooking practices and extend the follow-up to 24 months of age. The expected final sample size, for both (intervention and control) is 1854 children with follow-up to 2 years of age available for analysis. Discussion: This trial will answer important research gaps related to HAP and child health and neuro-cognitive developmental outcomes. This evidence will help to understand the impact of a HAP intervention on child health to inform policies for the adoption of clean fuel in Bangladesh and other similar settings. Trial Registration: The Poriborton: Change trial: Household Air Pollution and Perinatal and early Neonatal mortality is registered with the Australian New Zealand Clinical Trials Registry, ACTRN12618001214224, original trial registered on 19th July 2018, extension approved on 23rd June 2021. www.anzctr.org.au .", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Maternal & Child Health", "Early Childhood Development", "Agriculture & Food Security", "Nutrition & Diet"], "methods": ["RCT"]}, {"id": 18, "title": "Increasing Boro Rice Productivity through Credit: Evidence from Bangladesh", "authors": "Rayhan et al.", "authorsFull": "Rayhan, Shah Johir; Rahman, Md Sadique; Lyu, Kaiyu", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Agricultural Economics", "doi": "10.17221/341/2023", "url": "https://agricecon.agriculturejournals.cz/artkey/age-202402-0004_increasing-boro-rice-productivity-through-credit-evidence-from-bangladesh.php", "abstract": "Rice productivity needs to be increased to feed Bangladesh’s growing population. Productivity can be increased by adopting improved varieties and management practices, which require additional capital inputs. In this article, we aim to estimate the effect of formal and semiformal credit on rice productivity in Bangladesh. We surveyed 500 rice farmers to achieve these objectives. We used descriptive statistics, propensity score matching and Heckman’s endogenous treatment effect model to analyse the data. The findings indicate that literacy, television ownership and training positively influenced access to formal credit. In general, credit recipients achieved higher productivity than did non-recipients. In the situation of credit source-specific effect, we found mixed results. Given the estimated difference of 438 kg/ha to 495 kg/ha, the results indicated that formal credit recipients had significantly higher productivity than did formal credit non-recipients. In contrast, endogenous treatment effect model results suggested that both formal and semiformal sources of credit had a significant effect on rice productivity. Increased agricultural loan disbursement through formal and semiformal credit institutions is strongly advocated. Farmers’ decision-making abilities regarding the most effective source of credit can be improved through training in financial literacy. The central bank of Bangladesh, along with the credit regulatory authorities of non-governmental organisations, can implement appropriate agricultural credit programmes for farmers.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Financial Inclusion & Cash", "Education & Skills"], "methods": ["PSM"]}, {"id": 19, "title": "Reeling in Hope: Can Fishery Credit Really Improve Food Expenditure Status for Poor Fish Farming Communities in Rural Bangladesh?", "authors": "Syed et al.", "authorsFull": "Syed, Robayet Ferdous; Mahmud, Kazi Tanvir; Hossain, Jinat; Matin, Shaira", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Rural and Community Development", "doi": "No DOI", "url": "https://journals.brandonu.ca/jrcd/article/download/2523/641", "abstract": "The fish farming communities in Bangladesh often find themselves trapped in poverty due to limited resources and low living standards. Many of these communities face financial constraints, struggling to secure credit from formal financial institutions. This compels them to turn to informal lending sources with unfavorable terms and conditions. To address this challenge, Non-Governmental Organizations (NGOs) have taken the initiative to provide credit facilities to these fish farming communities. In this study, we employed the Simple Random Sampling (SRS) technique to select 385 fish farmers from the Khulna district who had received credit support from NGOs. The Propensity Score Matching (PSM) technique was then applied to evaluate the impact of fishery credit on the household food expenditure of the sampled fish farmers. Contrary to existing literature suggesting that access to fisheries credit improves food security, our empirical findings present a different perspective. The Binary Logistic Regression (BLR) study identified two factors influencing the food purchasing capacity of fish farmers: the value of nonland assets and the proximity of NGOs' branch offices to the fish farmers' dwellings. To enhance the food security status of underprivileged fish farming communities, it is recommended to focus on transferring assets and establishing NGO offices in close proximity to villages. These measures can significantly contribute to improving the food expenditure capacity of these communities.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Financial Inclusion & Cash"], "methods": ["PSM"]}, {"id": 20, "title": "Increasing Production Diversity and Diet Quality: Evidence From Bangladesh", "authors": "Ahmed et al.", "authorsFull": "Ahmed, Akhter; Coleman, Fiona; Ghostlaw, Julie; Hoddinott, John; Menon, Purnima; Parvin, Aklima; Pereira, Audrey; Quisumbing, Agnes; Roy, Shalini; Younus, Masuma; Rakshit, Deboleena", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "American Journal of Agricultural Economics", "doi": "10.1111/ajae.12427", "url": "https://onlinelibrary.wiley.com/doi/10.1111/ajae.12427", "abstract": "In the context of rural Bangladesh, we assess whether agriculture training alone, nutrition behavior communication change (BCC) alone, combined agriculture training and nutrition BCC, or agriculture training and nutrition BCC combined with gender sensitization improve: (a) production diversity, either on household fields or through crop, livestock, or aquaculture activities carried out near the family homestead; and (b) diet diversity and the quality of household diets. All treatment arms were implemented by government employees. Implementation quality was high. No treatment increased production diversification of crops grown on fields. Treatment arms with agricultural training did increase the number of different crops grown in homestead gardens and the likelihood of any egg, dairy, or fish production but the magnitudes of these effect sizes were small. All agricultural treatment arms had, in percentage terms, large effects on measures of levels of homestead production. However, because baseline levels of production were low, the magnitude of these changes in absolute terms was modest. Nearly all treatment arms improved measures of food consumption and diet with the largest effects found when nutrition and agriculture training were combined. Relative to treatments combining agriculture and nutrition training, we find no significant impact of adding the gender sensitization on our measures of production diversity or diet quality. Interventions that combine agricultural training and nutrition BCC can improve both production diversity and diet quality, but they are not a panacea. They can, however, contribute toward better diets of rural households.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet"], "methods": []}, {"id": 21, "title": "Impact of Stimulus Packages on Business Recovery During the COVID-19 Pandemic in Bangladesh", "authors": "Raihan et al.", "authorsFull": "Raihan, Selim; FNU Jonated; Ahmed, Md. Tuhin", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of South Asian Development", "doi": "10.1177/09731741241240612", "url": "https://journals.sagepub.com/doi/abs/10.1177/09731741241240612?casa_token=__dPhTrmQf4AAAAA:kTt-unUWwPsKhxsVy-hAy-ohYFzitW1fFJ54pa_KIkK4iyBUxs5EcHAn_9tgi_sYSseSuDO0o1juSQ", "abstract": "The COVID-19 pandemic significantly impacted Bangladesh’s economy, leading to disruptions in supply chains and a decline in business activities. To counter these effects, the government introduced stimulus packages aiming to aid business recovery. This article evaluates the impact of these measures using a unique dataset from the Business Confidence Index survey conducted by the South Asian Network on Economic Modeling in April 2021. This survey covered 503 firms across eight divisions in Bangladesh. Using the Propensity Score Matching technique for causal estimation, findings suggest that firms that availed the stimulus packages demonstrated around 9 percentage points higher recovery than those that did not. Such insights are instrumental for future policy design and strengthening evidence-based policymaking", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash"], "methods": ["PSM"]}, {"id": 22, "title": "Economic Well-Being Induced Women’s Empowerment: Evidence From Coastal Fishing Communities of Bangladesh", "authors": "Palash et al.", "authorsFull": "Palash, Md Salauddin; Haque, A.B.M. Mahfuzul; Rahman, Md Wakilur; Nahiduzzaman, Md; Hossain, Akbar", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Heliyon", "doi": "https://doi.org/10.1016/j.heliyon.2024.e28743", "url": "https://doi.org/10.1016/j.heliyon.2024.e28743", "abstract": "Women’s empowerment is an important policy agenda that is critical for developing countries like Bangladesh to achieve sustainable development goals (SDGs). The prime objective of this paper was to examine whether community savings groups can truly improve the economic conditions of women which turns into women’s empowerment in fishing communities or not. The propensity score matching (PSM) and logistic regression technique were incorporated, and required data were collected from Community Savings Groups (CSG) interventions and non-CSG villages of coastal Bangladesh. Quantitative data were collected from 615 women comprising 306 CSG participants (treatment group) and 309 non-participants (control group). The results affirm CSG group members were economically more solvent and less dependent on borrowed money than non-CSG group members. Improved economic indicators (savings, income and expenditure) of CSG households make the foundation of attaining women’s empowerment for the intervened group. The findings revealed that CSG women performed better in various dimensions of leadership capacity than non-CSG women. Econometric analysis confirmed positive impacts of CSG interventions on savings, gross household income, earning from catching fish, alternative incomegenerating activities (AIGAs), expenditure, and women’s empowerment. The initiatives of CSG not only generate economic well-being but also contribute to women’s empowerment. Financial access, improved literacy and an enabling environment for the productive engagement of women reduce gender inequality in fishing communities. To sustain the benefits of CSG, establishing institutional linkages (advisory and financial), legality/registration of CSGs from the government authority, and facilitation of alternative IGAs are crucial.", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender", "Financial Inclusion & Cash", "Education & Skills"], "methods": ["PSM"]}, {"id": 23, "title": "Effect of Low-Cost Kitchen with Improved Cookstove on Birthweight of Neonates in Shahjadpur, Bangladesh: A Cluster-Randomised Controlled Trial", "authors": "Ahmed et al.", "authorsFull": "Ahmed, Anisuddin; Rahman, Ahmed Ehsanur; Ahmed, Saifuddin; Rahman, Fariya; Sujan, Hasan Mahmud; Ahmmed, Faisal; Hossain, Aniqa Tasnim; Sayeed, Abu; Hossain, Shahed; Huq, Nafisa Lira; Quaiyum, Mohammad Abdul; Reichenbach, Laura; El Arifeen, Shams", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10. 1016/j.lansea.2023. 100342", "url": "https://www.thelancet.com/journals/lansea/article/PIIS2772-3682(23)00202-0/fulltext", "abstract": "BackgroundSmoke from biomass fuels used for cooking in traditional cookstoves contains a variety of health-damaging pollutants. Inhalation of these pollutants by pregnant women has been linked to abnormal foetal development and adverse pregnancy outcomes, including low birthweight (LBW). There is a dearth of data on environmental interventions that have the potential to reduce exposure to biomass fuel during pregnancy and improve birth outcomes. International Centre for Diarrheal Disease Research, Bangladesh (icddr,b) therefore, designed a low-cost kitchen with an improved cookstove and examined the impact of this intervention on the birthweight of neonates.Methodsicddr,b conducted a cluster-randomised controlled trial of a ‘low-cost kitchen with improved cookstove’ intervention among 1,267 pregnant women who used traditional cookstoves in a rural sub-district of Bangladesh. All participants were enrolled during the first trimester of pregnancy among 104 randomly selected clusters after obtaining informed consent. The model kitchens were installed in 628 participants' households of the intervention group, and 639 participants continued to use traditional cookstoves as the control group. The primary outcome was the proportion of LBW neonates between the intervention and control groups. The study also examined if the intervention would reduce CO exposure, measured by the differences in maternal blood carbon monoxide saturation (SpCO) levels and prevalence of LBW in neonates. We performed a generalized structural equation model for jointly assessing the simultaneous relationships of biomass fuel exposure to LBW of neonates and the relationships of LBW of neonates to maternal blood SpCO level. This trial was registered with ClinicalTrials.gov (NCT02923882).FindingsWe found that in the intervention group using ‘low-cost kitchen with improved cookstove’, the risk of LBW reduced by 37% (adjusted risk ratio: 0.63, 95% CI [0.45, 0.89]). Between the second and third trimester, the mean maternal blood SpCO level was significantly reduced from 10.4% to 8.9% (p-value <0.01) in the intervention group but remained unchanged in the control group (11.6% and 11.5%). Of the total effects of the intervention on the risk of LBW, 48.3% was mediated through maternal blood SpCO level.InterpretationThe risk of LBW among rural neonates was reduced in the intervention group using ‘low-cost kitchen with improved cookstove’, which may be attributed to the reduction in maternal blood SpCO level. Additional research is needed to identify other mechanisms through which biomass fuel exposure might lead to adverse pregnancy outcomes.FundingGrand Challenges Canada: Rising Stars in Global Health Programme.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Nutrition & Diet", "Maternal & Child Health", "WASH"], "methods": ["RCT"]}, {"id": 24, "title": "Multinational Enforcement of Labor Law: experimental Evidence on Strengthening Occupational Safety and Health Committees", "authors": "Boudreau", "authorsFull": "Boudreau, Laura", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Econometrica", "doi": "https://doi.org/10.3982/ECTA19408", "url": "https://onlinelibrary.wiley.com/doi/abs/10.3982/ECTA19408", "abstract": "Annually, work-related mortality is responsible for 5–7% of all global deaths, and at least 1-in-9 workers experience nonfatal occupational accidents (ILO (2019a,b)). Occupational Safety and Health (OSH) committees are considered the key worker voice institution through which to improve workplace safety and health (ILO (1981)). I present evidence of OSH committees' causal effects on workers and on factories. To do so, I collaborated with 29 multinational apparel buyers that committed to enforce a local mandate for OSH committees on their suppliers in Bangladesh. With the buyers, I implemented a nearly year-long field experiment with 84 supplier factories, randomly enforcing the mandate on half. The buyers' intervention increased compliance with the OSH committee law. Exploiting the experimental variation in OSH committees' strength, I find that stronger OSH committees had small, positive effects on objective measures of safety. These improvements did not come at a cost to workers in terms of wages or employment or to factories in terms of labor productivity. The effects on compliance, safety, and voice were largest for factories with better managerial practices. Factories with worse practices did not improve, and workers in these factories reported lower job satisfaction; this finding suggests complementarity between external enforcement and internal capacity in determining the efficacy of regulation.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector", "Governance & Service Delivery"], "methods": ["RCT"]}, {"id": 25, "title": "Food Policy and Food Security in Northern Bangladesh: An Empirical Study of the Impact of Food Policy on Household Food Security", "authors": "Sultana et al.", "authorsFull": "Sultana, Naznin; Sabau, Gabriela", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.1016/j.ssaho.2023.100508", "url": "https://www.sciencedirect.com/science/article/pii/S2590291123001134", "abstract": "Food insecurity is an ongoing national concern both in developing and in developed countries. Well-designed food policies, including aspects such as food production, distribution, consumption, availability, purchasing procedures, techniques of food processing and marketing, and food support, may contribute to solving the problem of food insecurity at household level. We study the impact of government provided food support on the households’ daily calorie intake, as well as on the food security index by using survey data from three subdistricts (Puthia, Paba and Charghat) of the Rajshahi district in Bangladesh. The survey was conducted using 160 households out of which 41.9 percent were food support receivers and 58.1 percent were food support nonreceivers. The extent of food insecurity among the respondents was estimated by calculating the daily mean calorie intake and the food security index. The PSM (propensity score matching) technique was used to assess the effects of government food support on rural households’ food insecurity. The results have shown that dissimilarities exist in unobserved characteristics between the two groups, as food prices and own agricultural production may influence the households’ decision to receive or not government food support. This has influenced the calorie intake and the food security index of the sample respondents. A comparison of the means of the matched sample showed that the two groups did not differ in food expenditure. Therefore, the impact of government food support on the calorie intake or the food security index may not be underestimated. The study concluded that food policy in the form of government food support can be efficiently implemented in a well-functioning socio-economic system.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Social Protection & Safety Nets"], "methods": ["PSM"]}, {"id": 26, "title": "Strengthening Nutrition Interventions During Antenatal Care Improved Maternal Dietary Diversity and Child Feeding Practices in Urban Bangladesh: Results of a Quasi-experimental Evaluation Study", "authors": "Nguyen et al.", "authorsFull": "Nguyen, Phuong H.; Sununtnasuk, Celeste; Christopher, Anita; Ash, Deborah; Ireen, Santhia; Kabir, Rowshan; Mahmud, Zeba; Ali, Mohsin; Forissier, Thomas; Escobar-DeMarco, Jessica; Frongillo, Edward A.; Menon, Purnima", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The Journal of Nutrition", "doi": "https://doi.org/10.1016/j.tjnut.2023.06.023", "url": "https://www.sciencedirect.com/science/article/pii/S0022316623724292", "abstract": "BackgroundBangladesh is urbanizing rapidly, facing challenges of malnutrition, low coverage and poor quality of urban nutrition services.ObjectivesWe assessed the effect of integrating maternal, infant, and young child nutrition interventions, delivered at urban Maternal Neonatal and Child Health facilities, on maternal dietary diversity, iron and folic acid (IFA) and calcium consumption, and child feeding practices.MethodsWe used a quasi-experimental design with a nonrandom assignment of 20 health care facilities in Dhaka to intensive and standard service arms. We conducted facility-based observations and community-based surveys at baseline (2020) and endline (2022) (n = 2455 observations and surveys with 1678 pregnant women [PW] or recently delivered women [RDW] at endline). We derived difference-in-difference (DID) estimates, adjusted for characteristics that differed at baseline or endline, and accounted for clustering.ResultsExposure to antenatal care (ANC) was similar in both arms: two-thirds of RDW received ANC during the first trimester and three-fourths received ≥4 ANC checkups. Compared to the standard arm, a higher proportion of PW in the intensive arm received counseling on dietary diversity (DID: 45 percentage points [pp]), and a higher proportion of RDW received IFA (25 pp) and calcium supplementation (19 pp), showed adequate weight gain (44 pp), and recorded appropriate child feeding (27 pp). Improvements were greater in the intensive than the standard arm for the number of food groups consumed (DID: 1.1 food groups) and minimum dietary diversity (23 pp); no effect was observed for IFA and calcium consumption during pregnancy. However, effects were observed for early initiation of (20 pp) and exclusive breastfeeding (45 pp), introduction of solid or semisolid foods (28 pp), and egg and/or flesh food consumption (33 pp) among children. Minimum dietary diversity and acceptable diet remained low in both arms.ConclusionsIntensifying nutrition in government-aligned health care services delivered by experienced nongovernmental organization-run facilities is a feasible model to address the urban health gap, nutrition services coverage, and improve practices.The trial was registered at clinicaltrials.gov as NCT03882268.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health"], "methods": ["DiD", "Quasi-experimental"]}, {"id": 27, "title": "The Effects of Yogurt Supplementation and Nutritional Education on Malnourished Infants: A Pilot RCT in Dhaka’s Slums", "authors": "Jannat et al.", "authorsFull": "Jannat, Kaniz; Agho, Kingsley Emwinyore; Parvez, Sarker Masud; Rahman, Mahbubur; Thomson, Russell; Amin, Mohammed Badrul; Merom, Dafna", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Nutrients", "doi": "https://doi.org/10.3390/nu15132986", "url": "https://doi.org/10.3390/nu15132986", "abstract": "Our objective was to quantify the effects of yogurt supplementation and nutrition education over three months on the linear growth of infants at risk of stunting. We conducted a three-arm pilot randomized controlled trial: (1) nutrition education for mothers; (2) nutrition education plus a daily yogurt supplement (50 g) for the index child; and (3) usual care (control). Dyads of children aged 4–6 months and at risk of stunting [length-for-age z-score (LAZ) ≤ −1 SD and >−2 SD] and their mothers with ≤10 years of education were eligible for the study. Participants were recruited from five slum areas in Dhaka, Bangladesh. Intention-to-treat (N = 162) and complete-case analyses (N = 127) showed no between-group statistically significant differences in LAZ or weight-for-age (WAZ). However, the yogurt group showed greater change in linear growth compared to the control (LAZ: mean difference 0.20, 95% CI: −0.06, 0.47, p-value 0.13), which was also slightly greater than the education-only group. Children in the yogurt plus group were five times (95% CI: 0.80, 31.80, p-value 0.09) more likely to meet the minimum dietary diversity (MDD) score compared to the control. A 3-month follow-up of this pilot study did not demonstrate that yogurt was beneficial to linear growth. However, there were encouraging trends that merit replication of the intervention with larger samples and longer follow-ups.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Education & Skills"], "methods": ["RCT"]}, {"id": 28, "title": "Impact evaluation of a community nutrition and livelihood program on child nutrition in rural Bangladesh.", "authors": "Kang et al.", "authorsFull": "Kang, Yunhee; Prihartono, Indira; Hossain, Md. Iqbal; Min, Shinhye; Kim, Heeyeon; Cho, Yoonho; Han, Seungheon; Kim, Hee Sun", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Maternal and Child Nutrition", "doi": "10.1111/mcn.13461", "url": "https://onlinelibrary.wiley.com/doi/epdf/10.1111/mcn.13461", "abstract": "Given the high prevalence of child undernutrition in Bangladesh, multi‐sectoralapproaches involving livelihood promotion have potential to mitigate the burden ofundernutrition. This study examined the impact of an economic development (ED)program providing poultry assets, gardening skills and saving training added tothe Positive Deviant (PD)/Hearth program (PDH/ED), compared to PD/Hearthonly (PDH). A total of 1029 children who attended PD/Hearth sessions inSeptember–November 2018 at 6–13 months of age were enrolled in the cohortstudy in July–August 2019. The cohort, comprised of 532 children in the PDH/EDgroup and 593 children in the PDH group, was reassessed in November 2020. Theprogram impact on child nutrition, food security, crop production, dietary qualityand household income was estimated using a difference‐in‐differences approachaccounting for the sociodemographic differences between PDH/ED and PDHgroups. Compared to the PDH group, the PDH/ED group showed increases in childdietary diversity score (DDS) (+0.32), child minimum dietary diversity (13.7percentage points [pp]), and maternal DDS (+0.28) (all p < 0.05). From 2019 to2020, the PDH/ED households improved food security by 12.6 pp and diversifiedcrop production (bananas (9.7 pp), papaya (11.1 pp), carrots (3.8 pp) and lemons (5.9pp)), and increased the proportion of annual income ≥60,000 Taka by 12.4 pp andlast month income ≥5000 Taka by 7.8 pp, compared to PDH group (all p < 0.05).However, there was no impact on child nutritional status, morbidity, livestock ownershipand total annual/last income. Incorporating an ED program into nutritionprogramming could benefit food security and dietary diversity in rural Bangladesh.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet", "Trade & Macroeconomy"], "methods": []}, {"id": 29, "title": "Effects of Moringa oleifera leaves on hemoglobin and serum retinol levels and underweight status among adolescent girls in rural Bangladesh.", "authors": "Khanam et al.", "authorsFull": "Khanam, Mansura; Sanin, Kazi Istiaque; Ara, Gulshan; Rita, Razia Sultana; Boitchi, Anika Bushra; Dil Farzana, Fahmida; Haque, Md Ahshanul; Ahmed, Tahmeed", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Frontiers in Nutrition", "doi": "10.3389/fnut.2022.959890", "url": "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9353109/pdf/fnut-09-959890.pdf", "abstract": "Objectives: Moringa oleifera has been used for centuries due to its medicinal properties and health benefits. The plant has antifungal, anti-viral, and anti- inflammatory properties. We aimed to evaluate the effect of consumption of Moringa leaves, along with a regular diet on serum hemoglobin and retinol and underweight status among rural Bangladeshi adolescent girls.Methods: This school-based quasi-experimental study involved 226 adolescent girls (12–14 years-old). Intervention group (n = 113) received a meal comprising rice, concentrated dal, and fried potato with Moringa pakora (oil-fried snack); the control group (at a different school in an adjacent area with similar population demographics) received calorie-matched meal without Moringa pakora for 6 months. We used generalized liner regression (GLM) analysis, to explore the effect of the intervention among the groups between baseline and endline.Results: Mean age of the intervention and control groups were 12.7 ± 0.7 and 13.3 ± 0.8 years, respectively. After adjusting for maternal education, absenteeism, asset index, BMI-for-age Z-score, GLM regression showed significant positive changes in hemoglobin (intervention vs. control: coef = 0.41, P = 0.010) and serum retinol (coef = 0.27, P = 0.00). No significant changes in weight was observed between groups.Conclusion: Consumption of Moringa leaves has the potential to improving hemoglobin and serum retinol level and should be encouraged as regular diet.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Education & Skills"], "methods": ["Quasi-experimental"]}, {"id": 30, "title": "Effects of Open Water Availability on Productivity and Efficiency of Tilapia Fish Farming", "authors": "Mitra et al.", "authorsFull": "Mitra, Sandip; Khan, Akhtaruzzaman; Rahman, Takibur; Nielsen, Rasmus", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Aquaculture Economics & Management", "doi": "https://doi.org/10.1080/13657305.2022.2115578", "url": "https://doi.org/10.1080/13657305.2022.2115578", "abstract": "Intensive pond aquaculture production is increasing and playing a major role in global aquaculture production, especially in developing countries. Empirical evidence shows that the access to and exchange of fresh water in tilapia pond aquaculture is important for making pond production ecologically more sound, efficient and productive. This study investigates productivity and efficiency differences between farms with access to open water resources and farms without access using data obtained from 311 interviews with tilapia farmers in Bangladesh. Propensity Score Matching (PSM) and metafrontier DEA have been employed to estimate productivity and efficiency differences between the groups. Results show that farms located in areas with access to open water resources are significantly more efficient, but a bit surprisingly less productive than farms located in areas with deficit access to water resources. Furthermore, output could be increased by 29% and 40% without increasing input in areas with good access and limited access to water, respectively. Thus, promoting intensive aquaculture pond production in areas with access to water resources should focus on how to increase productivity, while areas with limited access should focus on optimal use of input in order to improve water quality and efficiency", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 31, "title": "BEP Supplementation Research in Bangladesh (JiVitA-BEP-IR)", "authors": "Christian et al.", "authorsFull": "Christian, Parul; Zavala, Eleonor; Mohan, Diwakar; Ali, Hasmot; Siddiqua, Towfida J.; Haque, Rezwanul; Ayesha, Kaniz; Ahsan, Khalid Bin; Sujan, Hasan Mahmud; Khaled, Nazrana; Rahman, Atiya; Chakraborty, Barnali; Dyer, Brian; Wu, Lee S. F; Kalbarczyk, Anna; Erchick, Daniel J.; Thorne-Lyman, Andrew L.; Tumilowicz, Alison; Afsana, Kaosar", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Published protocol", "journal": "Cochrane Library", "doi": "No DOI", "url": "https://www.cochranelibrary.com/es/central/doi/10.1002/central/CN-02471427/full", "abstract": "The primary aim of the study is to evaluate the effect of a fortified balanced energy and, protein (BEP) supplementation vs. control (multiple micronutrient supplement, MMS) without, targeting and with targeting (either by low pre-pregnancy BMI or low pre-pregnancy BMI and, inadequate gestational weight gain) on birth weight as the main outcome. To do this we are, proposing a cluster-randomized, open labeled effectiveness trial with four arms . Our main, overall aim is:, 1. To compare the mean birth weight of infants born to mother randomized across four arms, including targeted and untargeted BEP versus MMS., Additionally, to examine the effectiveness of untargeted and targeted BEP, supplementation as follows:, 2. To compare the mean birth weight of infants born to mothers who were randomized to, receive BEP supplementation versus control (MMS) during pregnancy. [arm 2 versus 1], 3. To compare mean birth weight of infants born to mothers who were randomized to receive, BEP supplementation based on low pre-pregnancy BMI (w/wo inadequate gestational weight, gain) versus control (MMS) during pregnancy. [arms 3+4 versus 1], 4. To compare mean birth weight of infants born to mothers who were randomized to receive, BEP supplementation based on low pre-pregnancy BMI (w/wo inadequate gestational weight, gain) versus BEP supplementation during pregnancy regardless of pre-pregnancy BMI. [arms, 3+4 versus 2], In addition to the above comparisons, between group differences and 95% confidence intervals, will be estimated for both primary and secondary outcomes (shown below), with specific, comparisons as described below for the primary outcome of birth weight., Secondary Aims:, 1. To compare the mean birth weight of infants born to mothers who received BEP, supplementation during pregnancy based on low pre-pregnancy BMI versus untargeted BEP, supplementation during pregnancy [arm 3 versus 2], 2. To compare the mean birth weight of infants born to mothers who received BEP, supplementation during pregnancy versus BEP supplementation during pregnancy based on, low pre-pregnancy BMI and ge
