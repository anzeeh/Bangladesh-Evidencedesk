 and term–SGA (0·93, 0·89–0·98; p=0·0066). Prenatal SQ-LNS had no significant effects on the risk of giving birth to small vulnerable newborns except for preterm–large for gestational age–non-LBW in the ten-group categorisation (0·78, 0·65–0·94; p=0·023).InterpretationPrenatal MMS and SQ-LNS reduce the risk of giving birth to small vulnerable newborns to varying extents, with the greatest magnitude of effects observed for small vulnerable newborn types that confer the greatest neonatal mortality risk. This study underscores the importance of nutritional supplements in prenatal care.FundingBill & Melinda Gates Foundation.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 195, "title": "A Systematic Review of Microfinance Interventions and Violence Against Women: Results From Low- and Middle-Income Contexts", "authors": "Williams et al.", "authorsFull": "Williams, Anaise; Wamue-Ngare, Grace; Malelu-Gitau, Abigael; Heise, Lori; Glass, Nancy; Edeh, Cynthia; Aiura, Yurie; Gitahi, Tabitha; Rakuomi, Joan; Decker, Michele R.", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "BMJ Global Health", "doi": "10.1136/bmjgh-2024-016851", "url": "https://gh.bmj.com/content/10/4/e016851", "abstract": "Background: Women’s economic empowerment is a longstanding strategy for reducing violence against women and girls (VAWG). Microfinance, the provision of credit and savings opportunities to low-resourced populations, is often delivered in combination with other types of programming, such as gender training, making it hard to assess impact alone and/or in combination with other programming. We assess the effectiveness of diverse forms of microfinance intervention delivery on VAWG.Methods: The systematic review covered nine databases and grey literature sources for articles published between January 2015 and August 2023. Eligible studies were English language experimental and quasi-experimental evaluations of microfinance programming with a VAWG outcome conducted within a low- or middle-income country. Study members reviewed in Covidence and extracted summary data. A parallel qualitative scoping review was conducted.Results: A total of 3288 studies were reviewed, of which 16 were eligible, with an additional nine grey literature sourced studies (n=25). Most assessed group microfinance (n=16) in relation to intimate partner violence (n=20). Across studies, there were 38 trial arm comparisons, of which 30 were from low-bias studies, inclusive of 15 that identified economic impact. Only 24% (n=9) of comparisons assessed impacts of microfinance programming delivered alone; six null and three protective. Impacts of adding supplemental non-economic programming to microfinance (n=14) and delivering microfinance with non-economic programming (n=15) had mixed results. Qualitative synthesis highlighted the benefits and harms of microfinance.Conclusion: Microfinance can reduce VAWG in some cases; however, overall results are mixed with the majority being null results. Several complexities emerged: variability in both microfinance programme delivery, often involving supplementary programming, and measurement of economic impact on the pathway to reducing VAWG. Both reflect the expanded programming underway and must be considered for a nuanced understanding of microfinance’s VAWG impact. The review identifies a small but important evidence base of VAWG increasing due to programming. Varied supplemental non-economic programming was not consistently found to enhance the effectiveness of microfinance in reducing VAWG. Actionable gaps for future programmatic and evaluation work include examining differences across supplemental programming, populations, and outcomes.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Women's Empowerment & Gender"], "methods": ["Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 196, "title": "Eye Care Interventions That Reduce Access Inequities for Women, Rural Residents and Older People in Low- and Middle-Income Countries: A Scoping Review", "authors": "Cardona", "authorsFull": "Cardona, Magnolia", "year": 2025, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "Frontiers in public health", "doi": "https://doi.org/10.3389/fpubh.2025.1578848", "url": "https://www.frontiersin.org/journals/public-health/articles/10.3389/fpubh.2025.1578848/full", "abstract": "Introduction: Women, older people and rural residents in low-middle-income settings are mainly impacted by the economic and psychosocial consequences of preventable blindness from undiagnosed and untreated cataracts diabetic retinopathy.Methods: This review of PubMed 2002-2023 and the grey literature aimed to identify strategies effective in reducing access inequities to eye health screening and treatment for the above vulnerable groups.Results: Thirty-nine publications from 16 countries were included. Fifteen focused on cataract, 17 on diabetic retinopathy, and seven on general ophthalmology. This article focuses on the twenty-four studies of moderate or high quality. Rural residents were more likely to benefit (16 studies) while direct effectiveness among women were reported in seven studies. Only three studies reported actual benefits for older people. Outreach services and teleophthalmology were effective interventions increasing screening attendance and referral rates for women and rural residents. Health financing to enhance cataract surgery acceptance and actual surgical rates reported effectiveness for rural residents but showed only modest improvements. Digital technology improved overall appointment uptake and referral adherence for rural residents but not significantly for women. Teleophthalmology was successful in building local capacity for accurate diagnosis but its impact on referral compliance was not demonstrated. Limited evidence was found for the effectiveness of health education alone to boost screening attendance for either subgroup.Discussion: The evidence for effectiveness in reducing inequities is not always direct, uses mixed outcomes, and had heterogenous designs. Yet, the results of the higher quality publications in this review indicate modest improvements worth pursuing further.Systematic Review Registration: https://osf.io/yr7tg/files/osfstorage?view_only=968ba9e8c910470ca227dcdb0da3cda8.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 197, "title": "Use of Community Engagement Interventions to Improve Child Immunisation in Low- and Middle-Income Countries: A Systematic Review and Meta-Analysis", "authors": "Jain et al.", "authorsFull": "Jain, Monica; Shisler, Shanon; Lane, Charlotte; Bagai, Avantika; Brown, Elizabeth; Engelbert, Mark; Vardy, Yoav; Eyers, John; Anda Leon, Daniela; Parsekar, Shradha", "year": 2022, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Campbell Systematic Reviews", "doi": "10.1002/cl2.1253", "url": "https://doi.org/10.1002/cl2.1253", "abstract": "Immunisation is one of the most cost-effective interventions to prevent and control life-threatening infectious diseases. Nonetheless, rates of routine vaccination of children in low- and middle-income countries (LMICs) are strikingly low or stagnant. In 2019, an estimated 19.7 million infants did not receive routine immunisations. Community engagement interventions are increasingly being emphasised in international and national policy frameworks as a means to improve immunisation coverage and reach marginalised communities. This systematic review examines the effectiveness and cost-effectiveness of community engagement interventions on outcomes related to childhood immunisation in LMICs and identifies contextual, design and implementation features that may be associated with effectiveness. We identified 61 quantitative and mixed methods impact evaluations and 47 associated qualitative studies related to community engagement interventions for inclusion in the reteview. For cost-effectiveness analysis 14 of the 61 studies had the needed combination of cost and effectiveness data. The 61 included impact evaluations were concentrated in South Asia and Sub-Saharan Africa and spread across 19 LMICs. The review found that community engagement interventions had a small but significant, positive effect on all primary immunisation outcomes related to coverage and their timeliness. The findings are robust to exclusion of studies assessed as high risk of bias. Qualitative evidence indicates appropriate intervention design, including building in community engagement features; addressing common contextual barriers of immunisation and leveraging facilitators; and accounting for existing implementation constraints and practicalities on the ground are consistently cited as reasons for intervention success. Among the studies for which we were able to calculate cost-effectiveness, we find that the median non-vaccine cost per dose of intervention to increase immunisation coverage by 1% was US $3.68. Given the broad scope of the review in terms of interventions and outcomes, there is significant variation in findings. Among the various types of community engagement interventions, those that involve creation of community buy-in or development of new cadres of community-based structures were found to have consistent positive effect on more primary vaccination coverage outcomes than if the engagement is limited to the design or delivery of an intervention or is a combination of the various types. The evidence base for sub-group analysis for female children was sparse (only two studies) and the effect on coverage of both full immunisation and third dose of diphtheria pertussis tetanus for this group was insignificant.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 198, "title": "Interventions To Improve Water, Sanitation, And Hygiene For Preventing Soil-Transmitted Helminth Infection", "authors": "Freeman et al.", "authorsFull": "Freeman, Matthew C.; Strunz, Eric; Utzinger, Jürg; Addiss, David G.; Garn, Joshua V.; Wilkers, Jennifer L.; Meehan, Ashley A.; Pfadenhauer, Lisa M.; Burns, Jacob; Imtiaz, Rubina", "year": 2022, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Cochrane Database of Systematic Reviews", "doi": "10.1002/14651858.CD012199.pub2", "url": "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9208960/", "abstract": "BackgroundIt is estimated that 1.5 billion people are infected with soil‐transmitted helminths (STHs) worldwide. Re‐infection occurs rapidly following deworming, and interruption of transmission is unlikely without complementary control efforts such as improvements in water, sanitation, and hygiene (WASH) access and behaviours.ObjectivesTo assess the effectiveness of WASH interventions to prevent STH infection.Search methodsWe used standard, extensive Cochrane search methods. The latest search date was 19 October 2021.Selection criteriaWe included interventions to improve WASH access or practices in communities where STHs are endemic. We included randomized controlled trials (RCTs), as well as trials with an external control group where participants (or clusters) were allocated to different interventions using a non‐random method (non‐RCTs). We did not include observational study designs. Our primary outcome was prevalence of any STH infection. Prevalence of individual worms was a secondary outcome, including for Ascaris lumbricoides, Trichuris trichiura, hookworm (Ancylostoma duodenale or Necator americanus), or Strongyloides stercoralis. Intensity of infection, measured as a count of eggs per gram of faeces for each species, was another secondary outcome.Data collection and analysisTwo review authors independently reviewed titles and abstracts and full‐text records for eligibility, performed data extraction, and assessed risk of bias using the Cochrane risk of bias assessment tool for RCTs and the EPOC tool for non‐RCTs. We used a random‐effects meta‐analysis to pool study estimates. We used Moran’s I² statistic to assess heterogeneity and conducted subgroup analyses to explore sources of heterogeneity. We assessed the certainty of the evidence using the GRADE approach.Main resultsWe included 32 studies (16 RCTs and 16 non‐RCTs) involving a total of 52,944 participants in the review. Twenty‐two studies (14 RCTs (16 estimates) and eight non‐RCTs (11 estimates)) reported on our primary outcome, prevalence of infection with at least one STH species. Twenty‐one studies reported on the prevalence of A lumbricoides (12 RCTs and 9 non‐RCTs); 17 on the prevalence of T trichiura (9 RCTs and 8 non‐RCTs); 18 on the prevalence of hookworm (10 RCTs and 8 non‐RCTs); and one on the prevalence of S stercoralis (1 non‐RCT). Sixteen studies measured the intensity of infection for an individual STH type. Ten RCTs and five non‐RCTs reported on the intensity of infection of A lumbricoides; eight RCTs and five non‐RCTs measured the intensity of infection of T trichiura; and eight RCTs and five non‐RCTs measured the intensity of hookworm infection. No studies reported on the intensity of infection of S stercoralis.The overall pooled effect estimates showed that the WASH interventions under study may result in a slight reduction of any STH infection, with an odds ratio (OR) of 0.86 amongst RCTs (95% confidence interval (CI) 0.74 to 1.01; moderate‐certainty evidence) and an OR of 0.71 amongst non‐RCTs (95% CI 0.54 to 0.94; low‐certainty evidence). All six of the meta‐analyses assessing individual worm infection amongst both RCTs and non‐RCTs had pooled estimates in the preventive direction, although all CIs encapsulated the null, leaving the possibility of the null or even harmful effects; the certainty of the evidence ranged from very low to moderate. Individual studies assessing intensity of infection showed mixed evidence supporting WASH. Subgroup analyses focusing on narrow specific subsets of water, sanitation, and hygiene interventions did very little to elucidate which interventions might be better than others. Data on intensity of infection (e.g. faecal egg count) were reported in a variety of ways across studies, precluding the pooling of results for this outcome.We did not find any studies reporting adverse events resulting from the WASH interventions under study or from mass drug administration (MDA).Authors' conclusionsWhilst the available evidence suggests that the WASH interventions under study may slightly protect against STH infection, WASH also serves as a broad preventive measure for many other diseases that have a faecal oral transmission route of transmission. As many of the studies were done in addition to MDA/deworming (i.e. MDA was ongoing in both the intervention and control arm), our data support WHO recommendations for implementation of improvements to basic sanitation and adequate access to safe water alongside MDA. The biological plausibility for improved access to WASH to interrupt transmission of STHs is clear, but WASH interventions as currently delivered have shown impacts that were lower than expected. There is a need for more rigorous and targeted implementation research and process evaluations in order that future WASH interventions can better provide benefit to users. Inconsistent reporting of the intensity of infection underscores the need to define the minimal, standard data that should be collected globally on STHs to enable pooled analyses and comparisons.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 199, "title": "Differential Effectiveness of Water, Sanitation, and Handwashing Interventions to Reduce Child Diarrhea in Dry and Rainy Seasons: A Systematic Review and Meta-Analysis of Intervention Trials", "authors": "Hubbard et al.", "authorsFull": "Hubbard, Sydney; Wolf, Jennyfer; Oza, Hemali H; Arnold, Benjamin F.; Freeman, Matthew C.; Levy, Karen", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Environmental Health Perspectives", "doi": "10.1289/EHP14502", "url": "https://ehp.niehs.nih.gov/doi/10.1289/EHP14502", "abstract": "Background:Studies evaluating how water, sanitation, and/or handwashing (WASH) interventions in low- and middle-income countries impact diarrheal diseases have shown inconsistent results. The prevalence of enteric pathogen infections and diarrhea are highly seasonal and climate-sensitive, which could explain heterogeneous findings. Understanding how season influences the effectiveness of WASH interventions is critical for informing intervention approaches that will be resistant under the varying weather conditions that climate change will bring.Methods:We conducted a systematic review of the literature and meta-analysis to test whether and to what extent the impact of WASH interventions on diarrhea differs by season. We searched the literature for randomized and nonrandomized controlled WASH intervention trials and identified the season in which data were collected—rainy, dry, or both—for each study using proximate land station weather datasets. We compared the relative risk (RR) estimates for the impact of interventions on diarrhea for each study, stratified by season, and analyzed estimates using meta-analysis and meta-regression. This study is registered with PROSPERO, CRD42021231137.Results:A total of 50 studies met the inclusion criteria, resulting in 34 drinking water intervention estimates, 8 sanitation intervention estimates, and 14 handwashing intervention estimates. Of the total studies, 60% (𝑛=30) spanned more than one season, with most single-season studies (75%, 𝑛=15) occurring exclusively in the dry season. The effect of WASH interventions was stronger in dry seasons than in rainy seasons, with a 33% [95% confidence interval (CI): 24%, 41%] and 18% reduction (95% CI: 5%, 29%) in diarrhea risk, respectively. When stratified by type of intervention, the stronger effect size in dry seasons was consistent for water and handwashing interventions but not for sanitation interventions.Conclusions:Estimates of the seasonal impact of WASH interventions revealed larger effects in the dry season than in the rainy season overall and for water and handwashing interventions in particular. These patterns likely affected previous estimates of intervention effectiveness, which included more dry season estimates. These findings suggest the need to collect data across seasons and report seasonally stratified results to allow for more accurate estimates of the burden of disease impacted by WASH investments and to improve projections of potential impacts of these interventions under future climate conditions. These findings also underscore the need for robust WASH interventions designed to be resistant to seasonal variations in temperature and rainfall now and under future climate change scenarios.", "primaryTheme": "WASH", "themes": ["WASH", "Climate, Energy & Environment"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 200, "title": "The Effect of Nutrition-Specific and Nutrition-Sensitive Interventions on the Double Burden of Malnutrition in Low-Income and Middle-Income Countries: A Systematic Review", "authors": "Escher et al.", "authorsFull": "Escher, Nora A.; Andrade, Giovanna C.; Ghosh-Jerath, Suparna; Millett, Christopher; Seferidi, Paraskevi", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "The Lancet Global Health", "doi": "10.1016/S2214-109X(23)00562-4", "url": "https://www.thelancet.com/journals/langlo/article/PIIS2214-109X(23)00562-4/fulltext?dm_i=7MI4,248Q,D8T82,82VJ,1", "abstract": "Background Low-income and middle-income countries (LMICs) experiencing nutrition transition face an increasing double burden of malnutrition (DBM). WHO has urged the identification of risks and opportunities in nutrition interventions to mitigate the DBM, but robust evidence is missing. This review summarises the effect of nutritionspecific and nutrition-sensitive interventions on undernutrition and overnutrition in LMICs. Methods We searched four major databases and grey literature for publications in English, French, Portuguese, and Spanish from Jan 1, 2000, to Aug 14, 2023. Eligible studies evaluated nutrition-specific or nutrition-sensitive interventions on both undernutrition and overnutrition, employing robust study designs (individually randomised, cluster randomised, and non-randomised trials; interrupted time series; controlled before–after; and prospective cohort studies). Studies were synthesised narratively, and classified as DBM-beneficial, potentially DBM-beneficial, DBM-neutral, potentially DBM-harmful, and DBM-harmful, using vote counting. This review is registered with PROSPERO (CRD42022320131). Findings We identified 26 studies evaluating 20 nutrition-specific (maternal and child health [MCH] and school-based programmes) and six nutrition-sensitive (conditional cash transfers and other social policies) interventions. Seven of eight MCH interventions providing food-based or nutritional supplements indicated possible DBM-harmful effects, associated with increased maternal or child overweight. Most school-based programmes and MCH interventions that target behavioural change were considered potentially DBM-beneficial. Two studies of conditional cash transfers suggested DBM-beneficial effects in children, whereas one indicated potentially harmful effects on maternal overweight. A study on a family planning service and one on an education reform revealed possible long-term harmful effects on obesity. Interpretation There is considerable scope to repurpose existing nutrition interventions to reduce the growing burden of the DBM in LMICs. In settings undergoing rapid nutrition transition, specific policy attention is required to ensure that food-based or supplement-based MCH programmes do not unintentionally increase maternal or child overweight. Consistent reporting of undernutrition and overnutrition outcomes in all nutrition interventions is essential to expand the evidence base to identify and promote interventions maximising benefits and minimising harms on the DBM.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Financial Inclusion & Cash", "Education & Skills"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 201, "title": "Impact of conditional and unconditional cash transfers on health outcomes and use of health services in humanitarian settings: a mixed-methods systematic review", "authors": "van Daalen et al.", "authorsFull": "van Daalen, Kim Robin; Dada, Sara; James, Rosemary; Ashworth, Henry Charles; Khorsand, Parnian; Lim, Jiewon; Mooney, Ciaran; Khankan, Yasmeen; Essar, Mohammad Yasir; Kuhn, Isla; Juillard, Helene; Blanchet, Karl", "year": 2022, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "BMJ Global Health", "doi": "10.1136/mbjgh-2021-007902", "url": "https://gh.bmj.com/content/7/1/e007902", "abstract": "Background: Cash transfers, payments provided by formal or informal institutions to recipients, are increasingly used in emergencies. While increasing autonomy and being supportive of local economies, cash transfers are a cost-effective method in some settings to cover basic needs and extend benefits of limited humanitarian aid budgets. Yet, the extent to which cash transfers impact health in humanitarian settings remains largely unexplored. This systematic review evaluates the evidence on the effect of cash transfers on health outcomes and health service utilisation in humanitarian contexts.Methods: Studies eligible for inclusion were peer reviewed (quantitative, qualitative and mixed-methods). Nine databases (PubMed, EMBAS, Medline, CINAHL, Global Health, Scopus, Web of Science Core Collection, SciELO and LiLACS) were searched without language and without a lower bound time restriction through 24 February 2021. The search was updated to include articles published through 8 December 2021. Data were extracted using a piloted extraction tool and quality was assessed using The Joanna Briggs Critical Appraisal Tool. Due to heterogeneity in study designs and outcomes, results were synthesised narratively and no meta-analysis was performed.Results: 30, 673 records were identified. After removing duplicates, 17, 715 were double screened by abstract and title, and 201 in full text. Twenty-three articles from 16 countries were included reporting on nutrition outcomes, psychosocial and mental health, general/subjective health and well-being, acute illness (eg, diarrhoea, respiratory infection), diabetes control (eg, blood glucose self-monitoring, haemoglobin A1C levels) and gender-based violence. Nineteen studies reported some positive impacts on various health outcomes and use of health services, 11 reported no statistically significant impact on outcomes assessed and 4 reported potential negative impacts on health outcomes.Discussion: Although there is evidence to suggest a positive relationship between cash transfers and health outcomes in humanitarian settings, high-quality empirical evidence, that is methodologically robust, investigates a range of humanitarian settings and is conducted over longer time periods is needed. This should consider factors influencing programme implementation and the differential impact of cash transfers designed to improve health versus multipurpose cash transfers.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Nutrition & Diet", "Health Systems & Disease Control", "WASH"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 202, "title": "Scoping Review of Interventions To Improve Continuity of Postdischarge Care for Newborns in LMICs.", "authors": "Grewal et al.", "authorsFull": "Grewal, Gulraj; Fuller, Sebastian S.; Rababeh, Asma; Maina, Michuki; English, Mike; Paton, Chris; Papoutsi, Chrysanthi", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "—", "journal": "BMJ Global Health", "doi": "doi:10.1136/ bmjgh-2023-012894", "url": "https://gh.bmj.com/content/bmjgh/9/1/e012894.full.pdf", "abstract": "Introduction Neonatal mortality remains significant in low-income and middle-income countries (LMICs) with in-hospital mortality rates similar to those following discharge from healthcare facilities. Care continuity interventions have been suggested as a way of reducing postdischarge mortality by better linking care between facilities and communities. This scoping review aims to map and describe interventions used in LMICs to improve care continuity for newborns after discharge and examine assumptions underpinning the design and delivery of continuity. Methods We searched seven databases (MEDLINE, CINAHL, Scopus, Web of Science, EMBASE, Cochrane library and (Ovid) Global health). Publications with primary data on interventions focused on continuity of care for newborns in LMICs were included. Extracted data included year of publication, study location, study design and type of intervention. Drawing on relevant theoretical frameworks and classifications, we assessed the extent to which interventions adopted participatory methods and how they attempted to establish continuity. Results A total of 65 papers were included in this review; 28 core articles with rich descriptions were prioritised for more in-depth analysis. Most articles adopted quantitative designs. Interventions focused on improving continuity and flow of information via education sessions led by community health workers during home visits. Extending previous frameworks, our findings highlight the importance of interpersonal continuity in LMICs where communication and relationships between family members, healthcare workers and members of the wider community play a vital role in creating support systems for postdischarge care. Only a small proportion of studies focused on high-risk babies. Some studies used participatory methods, although often without meaningful engagement in problem definition and intervention implementation. Conclusion Efforts to reduce neonatal mortality and morbidity should draw across multiple continuity logics (informational, relational, interpersonal and managerial) to strengthen care after hospital discharge in LMIC settings and further focus on high-risk neonates, as they often have the worst outcomes.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Maternal & Child Health"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 203, "title": "The Impact of Foreign Direct Investment on Economic Development in South Asia and Southeastern Asia", "authors": "Chizema", "authorsFull": "Chizema, Darlington", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Economies", "doi": "10.3390/economies13060157", "url": "https://www.mdpi.com/2227-7099/13/6/157", "abstract": "This study examines the impact of inward foreign direct investment (FDI) on economic growth in South and Southeast Asia from 2006 to 2022, using a comprehensive panel dataset and multiple econometric techniques. The baseline estimation employs Feasible Generalized Least Squares (FGLS), with robustness checks using Fixed Effects with Driscoll–Kraay standard errors, the Common Correlated Effects Mean Group (CCEMG) estimator, and Two-Stage Least Squares (2SLS). The results consistently show that FDI and Gross Capital Formation (GCF) significantly promote growth, while the Human Capital Index (HCI), Trade Openness (TO), and Inflation (I) have limited or adverse effects. Government spending (GS) is negatively associated with growth, suggesting inefficiencies in public resource allocation. The findings underscore the importance of enhancing absorptive capacity through investments in education, institutional quality, and trade facilitation. Policy recommendations include adopting performance-based budgeting and independent audits, drawing on Malaysia’s anti-corruption and audit reforms. To address the weak impact of human capital, this study advocates for expanding public–private partnerships in technical and vocational education, modelled on Singapore’s SkillsFuture initiative. Additionally, digital investment platforms like Indonesia’s Online Single Submission (OSS) system and infrastructure upgrades are recommended to reduce trade costs and improve the investment climate. Finally, the study calls for deeper regional integration through harmonized investment regulations under the ASEAN Comprehensive Investment Agreement (ACIA) and the development of cross-border special economic zones (SEZs). These recommendations are grounded in empirical evidence and tailored to the region’s structural characteristics, offering actionable insights for policy-makers.", "primaryTheme": "Trade & Macroeconomy", "themes": ["Trade & Macroeconomy"], "methods": ["IV"]}, {"id": 204, "title": "Language of Instruction in Schools in Low- and Middle-Income Countries: A Systematic Review", "authors": "Nakamura et al.", "authorsFull": "Nakamura, Pooja; Molotsky, Adria; Zarzur, Rosa Castro; Ranjit, Varsha; Haddad, Yasmina; de Hoop, Thomas", "year": 2023, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Campbell Systematic Reviews", "doi": "DOI: 10.1002/cl2.1351", "url": "https://onlinelibrary.wiley.com/doi/pdf/10.1002/cl2.1351", "abstract": "Based on the theory of change, we gather, organize, and synthesize the evidence on the impact of three language of instruction (LOI) choices (teaching in mother tongue [MT] with later transition, teaching in a non‐MT language, or teaching in two or more languages at one time) on literacy and biliteracy outcomes. We focus on quantitative and qualitative studies of LOI interventions in low‐ and middle‐income countries (LMICs) and consider languages that are commonly spoken in the developing world. As such, we include studies that examine transfers from local languages to English, but not those evaluating transfers from local languages to languages that are less spoken in LMICs (e.g., Swedish).", "primaryTheme": "Education & Skills", "themes": ["Education & Skills"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 205, "title": "Does WASH FIT Improve Water, Sanitation, and Hygiene and Related Health Impacts in Healthcare Facilities? A Systematic Review", "authors": "Lineberger et al.", "authorsFull": "Lineberger, Hannah; Cronk, Ryan; Kpodzro, Sena; Salzberg, Aaron; Anderson, Darcy M.", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "International Journal of Environmental Research and Public Health", "doi": "10.3390/ijerph22050708", "url": "https://www.mdpi.com/1660-4601/22/5/708", "abstract": "Environmental health services in healthcare facilities are important, but coverage gaps remain. The World Health Organization and UNICEF developed the Water and Sanitation for Health Facility Improvement Tool (WASH FIT) to assess and improve environmental health services in healthcare facilities. Over 70 countries have adopted it. However, there is little evidence of its effectiveness. This systematic review evaluates whether WASH FIT improves environmental health services and associated health outcomes and impacts. We extracted data from 31 studies on inputs, activities, outputs, outcomes, and impacts associated with WASH FIT and summarized findings using a logic model framework. Twenty-three studies reported quantitative outputs for environmental health services. Of these, only nine reported longitudinal changes in these outputs throughout WASH FIT implementation. Six studies reported quantitative outcomes; the remainder described outcomes qualitatively or not at all. No studies directly measured impacts or evaluated WASH FIT against a rigorous control group. We found that available evidence was insufficient to evaluate WASH FIT’s effectiveness. Further effort is needed to identify the inputs and activities required to implement WASH FIT and to draw specific links between changes in outputs, outcomes, and impacts. Opportunities exist to improve evidence by more comprehensively reporting WASH FIT assessments and exploiting data on health impacts within health management information systems.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 206, "title": "Evidence on Strategies for Integrating Nutrition Interventions With Health and Immunization Systems in Conflict-Affected Areas of Low- and Lower-Middle-Income Settings-A Systematic Review", "authors": "Khan", "authorsFull": "Khan, Amira M.", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1093/nutrit/nuaf031", "url": "https://academic.oup.com/nutritionreviews/advance-article-pdf/doi/10.1093/nutrit/nuaf031/62922475/nuaf031.pdf", "abstract": "Context: Pervasive conflict and war adversely affect a nation’s sustainable development. Health and health systems deteriorate, causing long-lasting impacts on diets and nutrition. For the most vulnerable, integrated models of delivery of essential nutrition interventions are critical for the efficiency and sustainability of programs in these settings. Objective: The objective of this systematic review was to provide evidence on coverage, utilization, and impact of integrated programs in conflict-affected, low- and middle-income countries (LMICs). Data Sources: A database search was conducted in MEDLINE, Embase, CINAHL, and CENTRAL from January 1, 2000 to February 14, 2024. Gray literature was also reviewed. Data Extraction: Quantitative and qualitative studies, including observational or intervention designs, and reviews and program evaluations conducted in LMICs, focusing on women (≥19years) and children (0-19years) were included. Data extraction and risk-of-bias assessment were conducted independently by 2 investi gators using a standardized tool. Data Analysis: In total, 93 studies (103 reports) were included from 25 countries, including 32 unique gray literature records. The conflict-affected regions included South-East Asia (n ¼ 27), Eastern-Mediterranean (n ¼ 8), Africa (n ¼ 58), and the Americas (n ¼1). The review distinguished programs based on nutrition-specific, nutrition-sensitive, and health components. Although the coverage and utilization of integrated nutrition and health programs has been substantial, the impact of the strategies on health and nutrition has been limited. The meta-analysis found no significant differences in rates of wasting among children under 5 years; however, it showed that children who received an integrated strategy experienced a 28% lower risk of underweight (P ¼.007) and a 12% reduced risk of stunting (P ¼.05) compared with those who did not. Conclusion: This review has provided an in-depth insight into integrated nutrition and health strategies in conflict-affected settings, identifying key facilitators and barriers that can inform future policy and program design. Integrating nutrition programs into health systems and enhancing government and community owner ship could enhance efficiency and sustainability, given challenging environments.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 207, "title": "Impact of mHealth Interventions on Maternal, Newborn, and Child Health From Conception to 24 Months Postpartum in Low- and Middle-Income Countries: A Systematic Review", "authors": "Knop et al.", "authorsFull": "Knop, Marianne Ravn; Nagashima-Hayashi, Michiko; Lin, Ruixi; Saing, Chan Hang; Ung, Mengieng; Oy, Sreymom; Yam, Esabelle Lo Yan; Zahari, Marina; Yi, Siyan", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "BMC Medicine", "doi": "https://doi.org/10.1186/s12916-024-03417-9", "url": "https://link.springer.com/content/pdf/10.1186/s12916-024-03417-9.pdf", "abstract": "Background Mobile health (mHealth) technologies have been harnessed in low- and middle-income countries (LMICs) to address the intricate challenges confronting maternal, newborn, and child health (MNCH). This review aspires to scrutinize the efectiveness of mHealth interventions on MNCH outcomes during the pivotal frst 1000 days of life, encompassing the period from conception through pregnancy, childbirth, and post-delivery, up to the age of 2 years. Methods A comprehensive search was systematically conducted in May 2022 across databases, including PubMed, Cochrane Library, Embase, Cumulative Index to Nursing & Allied Health (CINAHL), Web of Science, Scopus, PsycINFO, and Trip Pro, to unearth peer-reviewed articles published between 2000 and 2022. The inclusion criteria consisted of (i) mHealth interventions directed at MNCH; (ii) study designs, including randomized controlled trials (RCTs), RCT variations, quasi-experimental designs, controlled before-and-after studies, or interrupted time series studies); (iii) reports of outcomes pertinent to the frst 1000 days concept; and (iv) inclusion of participants from LMICs. Each study was screened for quality in alignment with the Cochrane Handbook for Systematic Reviews of Interventions and the Joanne Briggs Institute Critical Appraisal tools. The included articles were then analyzed and categorized into 12 mHealth functions and outcome domain categories (antenatal, delivery, and postnatal care), followed by for‑ est plot comparisons of efect measures. Results From the initial pool of 7119 articles, we included 131 in this review, comprising 56 RCTs, 38 cluster-RCTs, and 37 quasi-experimental studies. Notably, 62% of these articles exhibited a moderate or high risk of bias. Promis‑ ingly, mHealth strategies, such as dispatching text message reminders to women and equipping healthcare pro‑ viders with digital planning and scheduling tools, exhibited the capacity to augment antenatal clinic attendance and enhance the punctuality of child immunization. However, fndings regarding facility-based delivery, child immu‑ nization attendance, and infant feeding practices were inconclusive. Conclusions This review suggests that mHealth interventions can improve antenatal care attendance and child immunization timeliness in LMICs. However, their impact on facility-based delivery and infant feeding practices varies. Nevertheless, the potential of mHealth to enhance MNCH services in resource-limited settings is promising. More context-specifc implementation studies with rigorous evaluations are essential.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Nutrition & Diet", "Health Systems & Disease Control"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 208, "title": "Removing Price Subsidies and Impacts on Consumption and Production Patterns: Evidence From a Systematic Literature Review", "authors": "Liu et al.", "authorsFull": "Liu, Jing Jing; Salleh, Norlida Hanim Mohd; Yahoo, Masoud; Nor, Nor Ghani Bin Md; Ahmad, Riayati", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.52372/jps39103", "url": "https://www.e-jps.org/archive/view_article?pid=jps-39-1-29", "abstract": "Due to the increasing trend in prices for food and energy products in global markets, subsidy removal and complementary policies have received significant attention in recent years. Critics of subsidy removal express concerns about the potential negative effects on the economy, including impacts on GDP, employment, household welfare, and production sectors. This has led to worries among majority economic policy-making bodies regarding potential social unrest, particularly its impact on low-income households. Therefore, there exists a debate in the literature on the potential impacts of subsidy removal. This study aims to provide a comprehensive overview of the impacts if subsidy removal policies and related subjects using the Preferred Reporting Items for systematic Reviews and Meta-Analyses (PRISMA). The main research question is, ‘Do subsidy removal schemes necessarily lead to economic distortions?’ The results indicate that impacts on the economy and household indicators are more explored than the influences on government and industry. The magnitude of these impacts varies depending on the types of subsidies and the extent of subsidy reduction. Considerable attention has been given to the impact of energy subsidy removal in Asian developing countries, while there is a lack of studies on other subsidized products and developed countries. Governments are advised to investigate their unique internal policy dynamics while considering external environments.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 209, "title": "Supporting Agriculture in Developing Countries: New Insights on the Impact of Official Development Assistance Using a Climate Perspective", "authors": "Trentinaglia et al.", "authorsFull": "Trentinaglia, Maria Teresa; Baldi, Lucia; Peri, Massimo", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Agricultural and Food Economics", "doi": "10.1186/s40100-023-00282-7", "url": "https://agrifoodecon.springeropen.com/articles/10.1186/s40100-023-00282-7", "abstract": "Agriculture is a major source of food and income for poor and rural households living in developing countries; yet, agricultural systems are increasingly threatened by changing climate conditions that compromise their productivity and resilience. Over time, international aid has provided support to the agricultural systems of recipient countries, though the literature is not unanimous in confirming their effectiveness. To shed light on this issue, the purpose of this work is to assess the efficacy of these aid in increasing the agricultural productivity of recipient nations, employing original approaches. First, to adopt a climate change perspective, we conduct our analysis using a recent classification adopted by the Official Development Assistance—the Rio Markers— which distinguishes aid between adaptation and mitigation to climate change. Second, taking into account that the starting conditions of recipient countries can significantly impact aid effectiveness, we classify 115 developing countries into four subgroups according to their vulnerability and readiness to climate change, as evaluated by the ND-Gain indicators. We perform a two-stage instrumental variable approach within the context of panel models to investigate the potential growth-enhancing impact that different types of agricultural aid may exert on the agriculture Total Factor Productivity in recipient countries. Our findings show that aid to agriculture, especially adaptation aid, has a positive impact on agricultural productivity growth. We also observe that countries with a higher climate readiness benefit the most from aid, whereas countries highly vulnerable and heavily dependent on the agricultural sector are less able to leverage the aid received to the same extent. Overall, our analysis confirms the importance of international aid to the agricultural sector and suggests that accurate impact assessment analyses should also consider a climate perspective to distinguish adaptation from mitigation aid.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Agriculture & Food Security"], "methods": ["IV"]}, {"id": 210, "title": "The effects of agricultural output market access interventions on agricultural, socio-economic, food security, and nutrition outcomes in low- and middle-income countries: A systematic review", "authors": "Marion et al.", "authorsFull": "Marion, Pierre; Lwamba, Etienne; Floridi, Andrea; Pande, Suvarna; Bhattacharyya, Megha; Young, Sarah; Fenton Villar, Paul; Shisler, Shanon", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Campbell Systematic Reviews", "doi": "10.1002/cl2.1411", "url": "https://onlinelibrary.wiley.com/doi/10.1002/cl2.1411", "abstract": "BackgroundAn estimated two billion people do not have sufficient access to nutritious food, and nearly half are dependent on small-scale and subsistence farming. Projections show that the global population is not on track to reach the Sustainable Development Goals. With this in mind, development actors are increasingly seeking to better integrate rural farmers into agricultural markets. This synthesis of the literature can help to inform policy decisions to improve outcomes for smallholder farmers in low- and middle-income countries, and to enable the realization of the Sustainable Development Goals. This work is the most comprehensive and up-to-date review synthesizing evidence from 262 interventions.ObjectivesThe purpose of this systematic review is to appraise and synthesize evidence of the effects of five types of interventions facilitating farmers' access to output markets in low- and middle-income countries. We examine how these effects vary across contexts and subgroups. We also identify evidence on program costs and evidence gaps in the literature.Search MethodsThe search of included studies was based on nine major databases/search engines and 25 institutional websites, using a set of English search terms. We also conducted forward and backward citation tracking of literature, published a public call for papers, and contacted key experts.Selection CriteriaWe included studies on the effects of five types of output market access interventions, focusing on participants residing in low- and middle-income countries: (1) Farm-to-market transport infrastructure interventions; (2) Access to output market information interventions; (3) New marketplaces or alternative marketing opportunities interventions; (4) Contract farming interventions; (5) Improved storage infrastructure and technologies interventions. We included published and unpublished studies from 2000 onwards, with experimental and quasi-experimental study designs focusing on relevant outcomes.Data Collection and AnalysisWe screened 52,366 studies, identifying a total of 439 papers representing 289 unique studies on the effects of 262 interventions in 53 countries. Data extraction and risk of bias assessments were completed by two independent reviewers.Main ResultsAll five types of output market access interventions resulted in small-to-moderate positive effects on almost all measures of market participation, agricultural production, and welfare outcomes. These improvements occurred through a reduction in transaction costs, adoption of improved practices, greater farm investment, access to higher prices for farmers, greater volume sold, and increased farm income. Effects vary by intervention type. However, the body of evidence is comprised of a large share of included studies with a high risk of bias. Few studies have information on the cost of interventions, and there are gaps in the available evidence.Authors' ConclusionsOutput market access interventions are effective in reducing transaction costs and addressing market failures, thereby leading to higher income levels. Evidence of effects on food security and nutrition is sparse and has not provided conclusive findings. We also found that multi-component interventions are not necessarily more effective than single component interventions. The specific needs and dynamics of each context should inform the choice of the intervention and approach. Investments in additional research with low risk of selection bias and confounding effects will improve the evidence base, especially for outcomes that constitute gaps in the literature. For example, the effects on quality of agricultural products and group participation are under-researched, and we did not find any included studies focusing on North Africa or the Middle East. Collecting and reporting information on interventions' cost-effectiveness will help decision-makers to prioritize limited resources.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet"], "methods": ["Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 211, "title": "Nutritional Management of Low Birth Weight and Preterm Infants in Low- and Low Middle-Income Countries", "authors": "Azhar", "authorsFull": "Azhar, Maha", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "Other", "doi": "10.1159/000542154", "url": "https://karger.com/neo/article/122/Suppl.%201/209/916369", "abstract": "Introduction: Preterm and low birth weight (LBW) infants are at an increased risk of morbidity and mortality compared with their term counterparts, with more than 20 million LBW infants born each year, the majority in lower middle-income countries (LMICs). Given the increased vulnerability and higher nutritional needs of these infants, optimizing feeding strategies may play a crucial role in improving their health outcomes. Methods: We updated evidence of Every Newborn Series published in The Lancet 2014 by identifying relevant systematic reviews, extracting low-income country (LIC) and LMIC data, and conducting revised meta-analysis for these contexts. Results: We found 15 reviews; the evidence showed that early initiation of enteral feeding reduced neonatal mortality overall, but not in LIC/LMIC settings. Breastfeeding promotion interventions increased the prevalence of early initiation of breastfeeding and exclusive breastfeeding at 3 and 6 months of age in LMIC settings. There was an increased risk of neonatal mortality with formula milk in LIC/LMIC settings. Despite contributing to greater weight gain, there was a higher risk of necrotizing enterocolitis with formula milk overall. Breast milk fortification and nutrient-enriched formula improved growth outcomes. Iron and vitamin A supplementation reduced anemia and mortality rates (LMIC), respectively. The evidence also suggested that benefits of various different micronutrient supplementation interventions such as zinc, calcium/phosphorous, and vitamin D, outweigh the risks since our review demonstrates little to no adverse effects deriving from their supplementation, particularly for a breastfed preterm and/or LBW infant. Conclusion: Early adequate nutritional support of preterm or LBW infant is paramount to averse adverse health outcomes, contribute to normal growth, resistance to infection, and optimal development. Breast milk feeding and micronutrient supplementation are crucial to reduce diarrhea incidence and mortality respectively while feed fortification or nutrient-enriched formula, when breast milk is not available, to enhance better growth especially in LMICs where there is higher population of growth restriction and stunting. This review also highlights need for randomized trials in LMICs at large scale to further strengthen the evidence.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "WASH"], "methods": ["Systematic Review / Meta-analysis"]}];

const THEME_ORDER = [
  "Nutrition & Diet","Maternal & Child Health","Health Systems & Disease Control",
  "Early Childhood Development","WASH","Agriculture & Food Security",
  "Women's Empowerment & Gender","Climate, Energy & Environment",
  "Financial Inclusion & Cash","Education & Skills","Social Protection & Safety Nets",
  "Labour, Jobs & Garment Sector","Child Marriage & Social Norms",
  "Governance & Service Delivery","Trade & Macroeconomy","Other / Cross-cutting",
];
const METHOD_ORDER = ["RCT","Quasi-experimental","DiD","PSM","IV","RDD","Systematic Review / Meta-analysis"];
const YEARS = [2022,2023,2024,2025,2026];

const STOP = new Set("the a an and or of to in on for with from this that these those study studies evidence bangladesh impact effect effects intervention interventions does do what which how is are was were be been being it its their our your we they i you he she them about into over under between during within across more most less than then there here can could should would may might will shall using used use also such other any all some each per via not no yes".split(/\s+/));

/* ---------- text utilities ---------- */
function tokens(q){ return (q.toLowerCase().match(/[a-z][a-z'-]+/g)||[]).filter(t=>t.length>2 && !STOP.has(t)); }
function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

function rank(query, pool, k){
  const q = tokens(query);
  if(!q.length) return pool.slice(0,k);
  const scored = pool.map(s=>{
    const hay = (s.title+" "+s.abstract+" "+s.themes.join(" ")+" "+s.authorsFull).toLowerCase();
    const tlow = s.title.toLowerCase();
    let score=0;
    q.forEach(t=>{
      const m = hay.match(new RegExp("\\b"+esc(t),"g"));
      if(m){ score += m.length; if(tlow.includes(t)) score += 4; }
    });
    return {s,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  if(!scored.length) return pool.slice(0,k);
  return scored.slice(0,k).map(x=>x.s);
}

/* ---------- tiny markdown renderer ---------- */
function inlineMd(text, keyBase){
  // bold **x** and links to source titles left as-is
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p,i)=>{
    if(/^\*\*[^*]+\*\*$/.test(p)) return <strong key={keyBase+"-b"+i}>{p.slice(2,-2)}</strong>;
    return <span key={keyBase+"-s"+i}>{p}</span>;
  });
}
function renderAnswer(md){
  const lines = md.replace(/\r/g,"").split("\n");
  const blocks=[]; let list=null;
  const flush=()=>{ if(list){ blocks.push(<ul className="ans-ul" key={"ul"+blocks.length}>{list}</ul>); list=null; } };
  lines.forEach((ln,idx)=>{
    const t=ln.trim();
    if(!t){ flush(); return; }
    if(/^#{1,4}\s/.test(t)){ flush(); blocks.push(<h4 className="ans-h" key={"h"+idx}>{inlineMd(t.replace(/^#{1,4}\s/,""),"h"+idx)}</h4>); return; }
    if(/^[-•*]\s+/.test(t)){ if(!list) list=[]; list.push(<li key={"li"+idx}>{inlineMd(t.replace(/^[-•*]\s+/,""),"li"+idx)}</li>); return; }
    flush(); blocks.push(<p className="ans-p" key={"p"+idx}>{inlineMd(t,"p"+idx)}</p>);
  });
  flush(); return blocks;
}

/* ---------- small presentational bits ---------- */
function Bar({label,count,max,active,onClick}){
  return (
    <button className={"bar "+(active?"bar-on":"")} onClick={onClick} title={label+" — "+count+" studies"}>
      <span className="bar-label">{label}</span>
      <span className="bar-track"><span className="bar-fill" style={{width:(max?Math.max(6,(count/max)*100):0)+"%"}}/></span>
      <span className="bar-num">{count}</span>
    </button>
  );
}

function TypeBadge({type}){
  const sr = type==="Systematic Review";
  return <span className={"tbadge "+(sr?"tb-sr":"tb-ie")}>{sr?"Review":"Impact eval"}</span>;
}

function App(){
  const [query,setQuery] = useState("");
  const [themes,setThemes] = useState(()=>new Set());
  const [type,setType] = useState("all");
  const [methods,setMethods] = useState(()=>new Set());
  const [years,setYears] = useState(()=>new Set());
  const [statuses,setStatuses] = useState(()=>new Set());
  const [sort,setSort] = useState("new");
  const [expanded,setExpanded] = useState(()=>new Set());
  const [showLandscape,setShowLandscape] = useState(true);

  const toggle = (setter)=>(val)=>setter(prev=>{ const n=new Set(prev); n.has(val)?n.delete(val):n.add(val); return n; });

  /* corpus stats (static) */
  const themeCounts = useMemo(()=>{ const m={}; EVALS.forEach(e=>{m[e.primaryTheme]=(m[e.primaryTheme]||0)+1;}); return m; },[]);

  /* filtered set */
  const filtered = useMemo(()=>{
    const q = query.trim().toLowerCase();
    let out = EVALS.filter(e=>{
      if(type!=="all" && e.type!==type) return false;
      if(themes.size && !themes.has(e.primaryTheme) && !e.themes.some(t=>themes.has(t))) return false;
      if(methods.size && !e.methods.some(m=>methods.has(m))) return false;
      if(years.size && !years.has(e.year)) return false;
      if(statuses.size){
        const ongoing = /protocol|ongoing/i.test(e.status);
        const completed = /complete/i.test(e.status);
        const want = (statuses.has("Completed")&&completed)||(statuses.has("Ongoing")&&ongoing);
        if(!want) return false;
      }
      if(q){
        const hay=(e.title+" "+e.authorsFull+" "+e.abstract+" "+e.journal).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    if(sort==="new") out=[...out].sort((a,b)=>(b.year||0)-(a.year||0)|| a.title.localeCompare(b.title));
    else if(sort==="old") out=[...out].sort((a,b)=>(a.year||0)-(b.year||0)|| a.title.localeCompare(b.title));
    else out=[...out].sort((a,b)=>a.title.localeCompare(b.title));
    return out;
  },[query,themes,type,methods,years,statuses,sort]);

  /* landscape mini-stats from filtered */
  const land = useMemo(()=>{
    const th={}, me={}, yr={}; let ie=0,sr=0;
    filtered.forEach(e=>{
      th[e.primaryTheme]=(th[e.primaryTheme]||0)+1;
      e.methods.forEach(m=>me[m]=(me[m]||0)+1);
      yr[e.year]=(yr[e.year]||0)+1;
      e.type==="Systematic Review"?sr++:ie++;
    });
    return {th,me,yr,ie,sr};
  },[filtered]);

  const activeFilters = themes.size+methods.size+years.size+statuses.size+(type!=="all"?1:0)+(query?1:0);
  const clearAll=()=>{ setQuery(""); setThemes(new Set()); setType("all"); setMethods(new Set()); setYears(new Set()); setStatuses(new Set()); };

  return (
    <div className="root">
      <style>{CSS}</style>

      <header className="mast">
        <div className="mast-inner">
          <div className="mast-id">
            <div className="kicker">3ie evidence repository · Bangladesh</div>
            <h1 className="title">Bangladesh Evidence Desk</h1>
            <p className="dek">{EVALS.length} impact evaluations and systematic reviews, 2022–2026. Browse by theme, trace every source, and ask the evidence what works.</p>
          </div>
        </div>
        <div className="statstrip">
          <Stat n={EVALS.length} l="evaluations"/>
          <Stat n={EVALS.filter(e=>e.type==="Impact Evaluation").length} l="impact evals"/>
          <Stat n={EVALS.filter(e=>e.type==="Systematic Review").length} l="systematic reviews"/>
          <Stat n={EVALS.filter(e=>e.methods.includes("RCT")).length} l="randomised trials"/>
          <Stat n={THEME_ORDER.filter(t=>themeCounts[t]).length} l="themes"/>
        </div>
      </header>

      <div className="layout">
        {/* ---- filter rail ---- */}
        <aside className="rail">
          <div className="search">
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search titles, authors, text…" />
            {query && <button className="x" onClick={()=>setQuery("")}>×</button>}
          </div>

          <div className="rail-head">
            <span>Themes</span>
            {themes.size>0 && <button className="mini" onClick={()=>setThemes(new Set())}>reset</button>}
          </div>
          <div className="theme-index">
            {THEME_ORDER.filter(t=>themeCounts[t]).map(t=>(
              <Bar key={t} label={t} count={themeCounts[t]} max={Math.max(...Object.values(themeCounts))}
                   active={themes.has(t)} onClick={()=>toggle(setThemes)(t)} />
            ))}
          </div>

          <div className="rail-head"><span>Type</span></div>
          <div className="chips">
            {["all","Impact Evaluation","Systematic Review"].map(t=>(
              <button key={t} className={"chip "+(type===t?"chip-on":"")} onClick={()=>setType(t)}>
                {t==="all"?"All":t==="Impact Evaluation"?"Impact evals":"Reviews"}
              </button>
            ))}
          </div>

          <div className="rail-head"><span>Method</span></div>
          <div className="chips">
            {METHOD_ORDER.map(m=>(
              <button key={m} className={"chip "+(methods.has(m)?"chip-on":"")} onClick={()=>toggle(setMethods)(m)}>
                {m==="Systematic Review / Meta-analysis"?"Review/MA":m}
              </button>
            ))}
          </div>

          <div className="rail-head"><span>Year</span></div>
          <div className="chips">
            {YEARS.map(y=>(
              <button key={y} className={"chip "+(years.has(y)?"chip-on":"")} onClick={()=>toggle(setYears)(y)}>{y}</button>
            ))}
          </div>

          <div className="rail-head"><span>Status</span></div>
          <div className="chips">
            {["Completed","Ongoing"].map(s=>(
              <button key={s} className={"chip "+(statuses.has(s)?"chip-on":"")} onClick={()=>toggle(setStatuses)(s)}>{s}</button>
            ))}
          </div>

          {activeFilters>0 && <button className="clear" onClick={clearAll}>Clear all filters</button>}
        </aside>

        {/* ---- main ---- */}
        <main className="main">

          <>
            <div className="result-bar">
              <div className="count"><b>{filtered.length}</b> of {EVALS.length} evaluations</div>
              <div className="sort">
                <button className={showLandscape?"linkbtn on":"linkbtn"} onClick={()=>setShowLandscape(s=>!s)}>
                  {showLandscape?"Hide landscape":"Show landscape"}
                </button>
                <span className="dot">·</span>
                <label>Sort</label>
                <select value={sort} onChange={e=>setSort(e.target.value)}>
                  <option value="new">Newest</option>
                  <option value="old">Oldest</option>
                  <option value="az">Title A–Z</option>
                </select>
              </div>
            </div>

            {showLandscape && (
              <section className="landscape">
                <div className="land-panel">
                  <h3>By theme</h3>
                  {THEME_ORDER.filter(t=>land.th[t]).sort((a,b)=>land.th[b]-land.th[a]).slice(0,8).map(t=>(
                    <Bar key={t} label={t} count={land.th[t]} max={Math.max(...Object.values(land.th),1)}
                         active={themes.has(t)} onClick={()=>toggle(setThemes)(t)} />
                  ))}
                </div>
                <div className="land-panel">
                  <h3>By method</h3>
                  {METHOD_ORDER.filter(m=>land.me[m]).map(m=>(
                    <Bar key={m} label={m==="Systematic Review / Meta-analysis"?"Review / MA":m} count={land.me[m]}
                         max={Math.max(...Object.values(land.me),1)} active={methods.has(m)} onClick={()=>toggle(setMethods)(m)} />
                  ))}
                </div>
                <div className="land-panel">
                  <h3>By year</h3>
                  {YEARS.filter(y=>land.yr[y]).map(y=>(
                    <Bar key={y} label={String(y)} count={land.yr[y]} max={Math.max(...Object.values(land.yr),1)}
                         active={years.has(y)} onClick={()=>toggle(setYears)(y)} />
                  ))}
                  <div className="split"><span><i className="sw ie"/> {land.ie} impact</span><span><i className="sw sr"/> {land.sr} reviews</span></div>
                </div>
              </section>
            )}

            <div className="cards">
              {filtered.length===0 && (
                <div className="empty">
                  <p>No evaluations match these filters.</p>
                  <button className="clear" onClick={clearAll}>Clear all filters</button>
                </div>
              )}
              {filtered.map(e=>(
                <article className="card" key={e.id}>
                  <div className="card-top">
                    <TypeBadge type={e.type}/>
                    <span className="yr">{e.year||"—"}</span>
                    {/protocol|ongoing/i.test(e.status) && <span className="ongoing">Ongoing</span>}
                  </div>
                  <h2 className="card-title">{e.title}</h2>
                  <div className="meta">
                    <span className="auth">{e.authors}</span>
                    {e.journal && <><span className="dot">·</span><span className="jrnl">{e.journal}</span></>}
                  </div>
                  <div className="taglines">
                    <button className="theme-tag" onClick={()=>{setThemes(new Set([e.primaryTheme])); window.scrollTo({top:0,behavior:"smooth"});}}>{e.primaryTheme}</button>
                    {e.themes.slice(1,3).map(t=>(
                      <button key={t} className="theme-tag sub" onClick={()=>{setThemes(new Set([t])); window.scrollTo({top:0,behavior:"smooth"});}}>{t}</button>
                    ))}
                    {e.methods.map(m=>(
                      <span key={m} className="mtag">{m==="Systematic Review / Meta-analysis"?"Review/MA":m}</span>
                    ))}
                  </div>
                  {e.abstract && (
                    <p className={"abs "+(expanded.has(e.id)?"abs-open":"")}>{e.abstract}</p>
                  )}
                  <div className="card-foot">
                    {e.abstract && (
                      <button className="linkbtn" onClick={()=>toggle(setExpanded)(e.id)}>
                        {expanded.has(e.id)?"Show less":"Read abstract"}
                      </button>
                    )}
                    {e.url && <a className="source" href={e.url} target="_blank" rel="noreferrer">Open source ↗</a>}
                  </div>
                </article>
              ))}
            </div>
          </>
        </main>
      </div>
      <footer className="foot">Source data exported from the International Initiative for Impact Evaluation (3ie) repository · classification and synthesis are heuristic aids for analysis, not official 3ie labels.</footer>
    </div>
  );
}

function Stat({n,l}){ return <div className="stat"><span className="stat-n">{n}</span><span className="stat-l">{l}</span></div>; }

.ask-scope .mini{margin-left:auto;font-size:12px}
.thread{flex:1;overflow:auto;padding:22px 18px;display:flex;flex-direction:column;gap:16px}
.ask-intro{margin:auto 0;text-align:center;padding:10px}
.ask-intro h3{font-family:'Fraunces',serif;font-weight:500;font-size:24px;margin:0 0 8px}
.ask-intro p{color:var(--muted);max-width:54ch;margin:0 auto 22px;font-size:14px}
.suggest{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:680px;margin:0 auto}
.suggest button{text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;color:var(--fg);font-size:13px;line-height:1.4;transition:.15s}
.suggest button:hover{border-color:var(--accent);color:var(--accent)}
.bubble{max-width:90%;font-size:14px;line-height:1.6}
.bubble.user{align-self:flex-end;background:var(--accent);color:#1a1208;padding:11px 15px;border-radius:13px 13px 4px 13px;font-weight:500;max-width:80%}
.bubble.bot{align-self:flex-start;background:var(--bg);border:1px solid var(--line);padding:16px 18px;border-radius:13px 13px 13px 4px;width:100%;max-width:100%}
.bubble.bot.err{border-color:var(--accent-d)}
.thinking{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
.thinking span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s} .thinking span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.ans-p{margin:0 0 10px} .ans-p:last-child{margin-bottom:0}
.ans-h{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:16px 0 7px;color:var(--accent)}
.ans-ul{margin:0 0 10px;padding-left:20px} .ans-ul li{margin-bottom:5px}
.ans strong{color:var(--fg);font-weight:600}
.consulted{margin-top:14px;border-top:1px solid var(--line);padding-top:10px}
.consulted summary{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.05em;
  color:var(--accent);cursor:pointer;text-transform:uppercase}
.consulted ul{margin:10px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:7px}
.consulted li{font-size:12.5px;color:var(--muted);line-height:1.4}
.consulted a{color:var(--fg);text-decoration:none;border-bottom:1px solid var(--line-strong)}
.consulted a:hover{color:var(--accent);border-color:var(--accent)}
.src-meta{color:var(--faint)}
.composer{display:flex;gap:10px;padding:14px 16px;border-top:1px solid var(--line);background:var(--panel)}
.composer textarea{flex:1;resize:none;background:var(--bg);border:1px solid var(--line);border-radius:11px;
  padding:12px 14px;color:var(--fg);font-family:inherit;font-size:14px;line-height:1.4;max-height:140px}
.composer textarea:focus{outline:none;border-color:var(--accent)}
.composer textarea::placeholder{color:var(--faint)}
.send{background:var(--accent);color:#1a1208;border:none;border-radius:11px;padding:0 22px;font-weight:600;font-size:14px;transition:.15s;align-self:stretch}
.send:hover:not(:disabled){background:var(--accent-d)}
.send:disabled{opacity:.45;cursor:not-allowed}

.foot{max-width:1280px;margin:0 auto;padding:8px 26px 34px;color:var(--faint);font-size:11.5px;
  font-family:'IBM Plex Mono',monospace;line-height:1.6;border-top:1px solid var(--line);}

@media(max-width:1080px){
  .layout{grid-template-columns:1fr}
  .rail{position:relative;max-height:none;top:0}
  .landscape{grid-template-columns:1fr}
  .title{font-size:34px}
}
@media(max-width:640px){
  .mast-inner{padding:22px 16px 12px}
  .layout{padding:16px}
  .suggest{grid-template-columns:1fr}
  .ask{height:auto;min-height:0}
  .thread{max-height:60vh}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
`;
