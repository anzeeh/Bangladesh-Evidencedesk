rect, Pub Med, SAGE, Sringer link, Web of Science and Wiley Online Library. It was limited to full text research articles that report intervention studies, written in English Language, published between 2003 to 2022. The key words were “malaria”, “malaria prevention”, “health education”, “insecticide-treated nets”, “utilization”, “pregnant women”. Results A total of eleven articles met the inclusion criteria and included in the review. Six studies reported rand omized controlled trials (RCTs) while five reported non-randomized controlled trials (NRCT). Conclusions There are evidences from the results which showed that health education programs were improved among pregnant women due to the use of ITNs and LLINS utilization. Furthermore, additional interventions directed at significant others need to be implemented, considering their important role in determining pregnant women’s use of ITNs", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 167, "title": "Linking Communities and Health Facilities To Improve Child Health in Low-Resource Settings: A Systematic Review", "authors": "Luliano et al.", "authorsFull": "Luliano, Agnese; Burgess, Rochelle Ann; Shittu, Funmilayo; King, Carina; Bakare, Ayobami A.; Valentine, Paula; Haruna, Ibrahim; Colbourn, Tim", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Health Policy and Planning", "doi": "https://doi.org/10.1093/heapol/czae028", "url": "https://academic.oup.com/heapol/article-pdf/39/6/613/58060787/czae028.pdf", "abstract": "Community–facility linkage interventions are gaining popularity as a way to improve community health in low-income settings. Their aim is to create/strengthen a relationship between community members and local healthcare providers. Representatives from both groups can address health issues together, overcome trust problems, potentially leading to participants’ empowerment to be responsible for their own health. This can be achieved via different approaches. We conducted a systematic literature review to explore how this type of intervention has been implemented in rural and low or lower-middle-income countries, its various features and how/if it has helped to improve child health in these settings. Publications from three electronic databases (Web of Science, PubMed and Embase) up to 03 February 2022 were screened, with 14 papers meeting the inclusion criteria (rural setting in low/lower-middle-income countries, presence of a community–facility linkage component, outcomes of interest related to under-5 children’s health, peer-reviewed articles containing original data written in English). We used Rosato’s integrated conceptual framework for community participation to assess the transformative and community-empowering capacities of the interventions, and realist principles to synthesize the outcomes. The results of this analysis highlight which conditions can lead to the success of this type of intervention: active inclusion of hard-to-reach groups, involvement of community members in implementation’s decisions, activities tailored to the actual needs of interventions’ contexts and usage of mixed methods for a comprehensive evaluation. These lessons informed the design of a community–facility linkage intervention and offer a framework to inform the development of monitoring and evaluation plans for future implementations", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 168, "title": "Behaviour Change Interventions to Improve Household Sanitation and Hygiene Practices in Urban Settings: A Systematic Scoping Review", "authors": "MacLeod et al.", "authorsFull": "MacLeod, Clara; Davies, Katherine; Mwenge, Mwamba M.; Chipungu, Jenala; Cumming, Oliver; Dreibelbis, Robert", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "International Journal of Hygiene and Environmental Health", "doi": "https://doi.org/10.1016/j.ijheh.2025.114519", "url": "https://www.sciencedirect.com/science/article/pii/S143846392500001X", "abstract": "IntroductionBehaviour change interventions have the potential to improve sanitation and hygiene practices in urban settings. However, evidence on which behaviour change interventions have successfully improved sanitation and hygiene practices in urban settings is unclear.MethodsWe performed electronic searches across five databases and one grey literature database to identify relevant studies published between January 1, 1990 and November 20, 2023 in English. Eligible study designs included randomised and non-randomised controlled trials with a concurrent control. Studies were eligible for inclusion if they reported a behaviour change intervention for improving sanitation and/or hygiene practices in an urban setting. Individual behaviour change intervention components were mapped to one of nine intervention functions of the capabilities, opportunities, motivations, and behaviour (COM-B) framework. Risk of bias was assessed for each study using an adapted Newcastle-Ottawa scale.ResultsAfter de-duplication, 8249 documents were screened by abstract and title, with 79 documents retrieved for full-text screening. We included 13 studies ranging from low- to high-quality. The behaviour change interventions had mixed effects on sanitation and hygiene practices in urban settings. Specifically, interventions improved latrine quality but not safe child faeces disposal. Interventions often improved handwashing with soap at key times and sometimes increased the presence of soap and water at the handwashing facility, used as a proxy measure for handwashing. There is limited evidence on food hygiene practices. Most behavioural outcomes were measured between 6 and 12 months after intervention implementation, which may undermine the sustainability of behaviour change interventions.ConclusionDespite overall mixed behavioural effects on sanitation and hygiene practices, behaviour change interventions can improve certain behaviours in urban settings, such as latrine quality improvements and handwashing with soap at the household or compound level. More ambitious behaviour change interventions are needed to reduce disparities in sanitation and hygiene access in urban areas globally.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 169, "title": "How Do Gender Transformative Interventions Reduce Adolescent Pregnancy in Low- and Middle-Income Countries: A Realist Synthesis", "authors": "Shukla et al.", "authorsFull": "Shukla, Shruti; Kharade, Aishwarya; Böhret, Ines; Jumaniyazova, Manzura; Meyer, Sarah R.; Abejirinde, Ibukun-Oluwa Omolade; Shenderovich, Yulia; Steinert, Janina", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Global Health", "doi": "10.7189/jogh.15.04102", "url": "https://jogh.org/2025/jogh-15-04102", "abstract": "BackgroundAdolescent pregnancy poses a significant health challenge for girls aged 15–19 in low- and middle-income countries. While gender transformative interventions (GTIs) aim to address this issue, a substantial research gap exists concerning the underlying mechanisms contributing to their success. This study employs a realist synthesis approach to systematically investigate how, why, for whom, and in what contexts GTIs effectively reduce adolescent pregnancy.MethodsA five-step realist review examined literature from four databases and five organisational repositories, including published and grey literature. The review focused on GTIs for adolescents aged 10–19 in low- or middle-income countries. Narrative synthesis and realist analysis were used to develop context–mechanism–outcome configurations.ResultsThe review analysed 28 documents covering 14 interventions and proposing eight programme theories across three settings. In the school, creating a supportive environment to foster positive social norms and providing a safe space was emphasised. Comprehensive sexual health education to promote critical thinking, knowledge retention, and goal setting was one of the key strategies. Empowering boys to adopt positive gender norms for behaviour change was also identified. In the health facility, providing a safe, supportive, and confidential environment for accessing services, as well as using digital health apps to empower adolescents in sexual reproductive health, were key. In the community, empowering girls through life skills and economic support and involving community members to foster stronger interpersonal bonds and a gender-positive environment were highlighted. These interventions led to increased contraceptive use, delayed marriage, and reduced adolescent pregnancy.ConclusionThis realist synthesis proposes eight nuanced programme theories of successful GTIs, providing essential insights for developing, implementing, and improving future programmes. These findings offer a foundation for effective strategies to mitigate adolescent pregnancy in diverse socio-cultural contexts.RegistrationPROSPERO: CRD42023398293.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Child Marriage & Social Norms"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 170, "title": "Incentives in Immunisation Campaigns in Low- and Middle-Income Countries: A Scoping Review Mapping Evidence on Effectiveness and Unintended Consequences", "authors": "Saunders", "authorsFull": "Saunders, Matthew J.", "year": 2025, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "BMJ Global Health", "doi": "https://dx.doi.org/10.1136/bmjgh-2025-019662", "url": "https://gh.bmj.com/content/10/6/e019662", "abstract": "Introduction Various incentive programmes are being used to improve immunisation uptake, despite limited understanding of their effectiveness and potential unintended consequences. We conducted a scoping review to map and synthesise evidence on their use in low- and middle-income countries (LMIC), compare experiences across regions and incentive types, and identify unintended consequences and implementation challenges.Methods We searched Ovid MEDLINE and grey literature for studies published between 2000 and 2024 investigating incentives in immunisation campaigns in LMIC. We included quantitative and qualitative studies investigating monetary or non-monetary incentives provided conditionally or unconditionally on immunisation uptake. Data were synthesised narratively to summarise evidence on effectiveness, perceptions and attitudes and unintended consequences.Results We included 40 studies from 19 countries (20 from Africa, 13 from Asia and seven from Latin America). Of these, 31 evaluated effectiveness through randomised trials (n=17) or quasi-experimental designs (n=14). Most evaluated monetary incentives for childhood immunisations, particularly conditional cash transfers, while some examined non-monetary incentives including food, mobile phone credit and symbolic rewards. While effect sizes varied substantially across different interventions and contexts, most studies demonstrated modest positive short-term effects on immunisation uptake, and no studies showed decreased uptake. However, several revealed unintended consequences, including reduced intrinsic motivation manifesting as lower immunisation uptake when incentives were withdrawn, creation of payment expectations and implementation challenges affecting acceptability. Several studies highlighted how incentive programmes could undermine community volunteerism and trust in both immunisation and health services, particularly when poorly implemented or withdrawn.Conclusions While incentives can improve short-term immunisation uptake in LMIC, their effects vary by context, and they can have negative unintended consequences which need to be taken into consideration in programme design. Future programmes should be co-designed with communities, consider locally acceptable non-monetary alternatives, incorporate strategies to maintain intrinsic motivation and ensure sustainable implementation within existing health systems.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Financial Inclusion & Cash", "Governance & Service Delivery"], "methods": ["Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 171, "title": "Effectiveness of Telemedicine Interventions for the Management of Tuberculosis in Low- and Middle-Income Countries: a Systematic Review Protocol", "authors": "Orolfo", "authorsFull": "Orolfo, Diana Dalisay A.", "year": 2025, "type": "Systematic Review", "status": "Protocol/ongoing", "pubType": "Published protocol", "journal": "Other", "doi": "10.11124/JBIES-25-00049", "url": "https://journals.lww.com/jbisrir/fulltext/2026/01000/effectiveness_of_telemedicine_interventions_for.7.aspx", "abstract": "Objective: This systematic review will aim to evaluate the effectiveness of telemedicine interventions compared with traditional or in-person care in improving medication adherence and clinical outcomes among adult patients with tuberculosis in low- and middle-income countries. Introduction: Tuberculosis remains a major public health challenge, particularly in low- and middle-income countries, where health care access is limited and treatment adherence is suboptimal. Telemedicine interventions, including video-observed therapy, text message reminders, and mobile health applications, offer innovative solutions to enhance tuberculosis management. However, evidence on their effectiveness remains fragmented, especially in low-resource settings, necessitating a comprehensive review to inform policy and practice. Eligibility criteria: This review will include randomized controlled trials and quasi-experimental studies conducted in low- and middle-income countries involving adult patients with tuberculosis. Eligible studies will evaluate telemedicine interventions with a minimum duration of 30 days and report on at least 1 primary outcome (medication adherence or tuberculosis clinical outcomes) or secondary outcome (acceptability or patient satisfaction). Methods: The review will adhere to the JBI methodology for systematic reviews of effectiveness. A 3-step search strategy will be followed to identify published and unpublished studies and gray literature. Databases to be searched will include PubMed, CINAHL (EBSCOhost), Embase (Ovid), Global Health (Ovid), and ScienceDirect. There will be no date or language restrictions. Two reviewers will independently screen and select studies, critically appraise studies, and extract data. If feasible, a meta-analysis will be conducted; otherwise, the synthesis without meta-analysis (SWiM) approach to data synthesis will be used. The GRADE approach will assess evidence certainty, and the findings will be summarized accordingly.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 172, "title": "The Effectiveness of Rural Community Health Workers in Improving Health Outcomes During the COVID-19 Pandemic: A Systematic Review.", "authors": "Kaseje et al.", "authorsFull": "Kaseje, Neema; Ranganathan , Meghna; Magadi, Monica; Oria, Kevin; Haines, Andy", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Global Health Action", "doi": "https://doi.org/10.1080/16549716.2023.2292385", "url": "https://www.tandfonline.com/doi/pdf/10.1080/16549716.2023.2292385", "abstract": "Background: Rural community health workers [CHWs] play a critical role in improving health outcomes during non-pandemic times, but evidence on their effectiveness during the COVID19 pandemic is limited. There is a need to focus on rural CHWs and rural health systems as they have limited material and human resources rendering them more vulnerable than urban health systems to severe disruptions during pandemics. Objectives: This systematic review aims to describe and appraise the current evidence on the effectiveness of rural CHWs in improving access to health services and health outcomes during the COVID-19 pandemic in low-and middle-income countries [LMICs]. Methods: We searched electronic databases for articles published from 2020 to 2023 describing rural CHW interventions during the COVID-19 pandemic in LMICs. We extracted data on study characteristics, interventions, outcome measures, and main results. We conducted a narrative synthesis of key results. Results: Fifteen studies from 10 countries met our inclusion criteria. Most of the studies were from Asia [10 of 15 studies]. Study designs varied and included descriptive and analytical studies. The evidence suggested that rural CHW interventions led to increased household access to health services and may be effective in improving COVID-19 and non-COVID-19 health outcomes. Overall, however, the quality of evidence was poor due to methodological limitations; 14 of 15 studies had a high risk of bias. Conclusion: Rural CHWs may have improved access to health services and health outcomes during the COVID-19 pandemic in LMICs but more rigorous studies are needed during future pandemics to evaluate their effectiveness in improving health outcomes in different settings and to assess appropriate support required to ensure their impact at scale.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 173, "title": "Menstrual Hygiene Management Interventions and Their Effects on Schoolgirls’ Menstrual Hygiene Experiences in Low and Middle Countries: A Systematic Review", "authors": "Betsu et al.", "authorsFull": "Betsu, Balem Demtsu; Medhanyie, Araya Abrha; Gebrehiwet, Tesfay Gebregzabher; Wall, L. Lewis", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "PLoS One", "doi": "10.1371/journal.pone.0302523", "url": "https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0302523&type=printable", "abstract": "Background Inadequate menstrual hygiene management can result in physical, social, psychological, and educational challenges for schoolgirls. To address these issues, researchers have conducted intervention studies, but the impact on school attendance has varied. This review has systematically collected and evaluated evidence about the effects of menstrual hygiene interventions on schoolgirls. Method A systematic search of the literature was done and reported according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA statement). Both peer-reviewed journals and gray literature were searched using PubMed and Google Scholar. The search included individual, or cluster randomized controlled trials, and quasiexperimental studies, and covered the period from the date of indexing until January 3, 2023. Result A review of sixteen trial studies showed that menstrual hygiene interventions have a positive effect on schoolgirls’ school attendance, performance, and dropout rates, as well as on their menstrual knowledge, attitudes, practices, and emotional well-being. There was a low to medium risk of bias in most of the studies. Additionally, the literature overlooked the impact of interventions that involve parental and male engagement, interventions correcting community misperceptions about menstruation, and the impact of infrastructure improvements on water, sanitation, and hygiene. Conclusion Interventions aimed at improving menstrual hygiene management can enhance schoolgirls’ educational outcomes, and can improve their menstrual knowledge, attitudes, and practices by helping them manage their periods more effectively. Most interventions have focused on the provision of menstrual products and menstrual education but have neglected improvements in the physical environment at home and school and the social norms surrounding menstruation. Trial studies should take a holistic approach that considers the total socio-cultural environment in which menstrual hygiene management takes place, thus enabling stakeholders and policymakers to develop sustainable, long-term solutions to these problems.", "primaryTheme": "WASH", "themes": ["WASH", "Women's Empowerment & Gender", "Child Marriage & Social Norms"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 174, "title": "Effects of Prenatal Nutritional Supplements on Gestational Weight Gain in Low- and Middle-income Countries: a Meta-analysis of Individual Participant Data.", "authors": "Enju et al.", "authorsFull": "Enju, Liu; Wang, Dongging; Darling, Anne Marie; Perumal, Nandita; Wang, Molin; Ahmed, Tahmeed; Christian, Parul; Dewey, Kathryn; Kac, Gilberto; Kennedy, Stephen; Subramoney, Vishak; Briggs, Brittany; Fawzi, Wafaie W", "year": 2022, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1093/ajcn/nqac259", "url": "https://www.sciencedirect.com/science/article/pii/S0002916523037176?via%3Dihub", "abstract": "ABSTRACT Background: Gestational weight gain (GWG) below or above the Institute of Medicine (IOM) recommendations has been associated with adverse perinatal outcomes. Few studies have examined the effect of prenatal nutrient supplementations on GWG in low- and middle-income countries (LMICs).Objectives: We aimed to investigate the effects of multiple micronutrient supplements (MMSs) and small-quantity lipid-based nutrient supplements (LNSs) on GWG in LMICs.Methods: A 2-stage meta-analysis of individual participant data was conducted to examine the effects of MMSs (45,507 women from 14 trials) and small-quantity LNSs (6237 women from 4 trials) on GWG compared with iron and folic acid supplements only. Percentage adequacy of GWG and total weight gain at delivery were calculated according to the IOM 2009 guidelines. Binary out- comes included severely inadequate (percentage adequacy 125%) GWG. Results from individual trials were pooled using fixed-effects inverse-variance models. Heterogeneity was examined using I2 , stratified analysis, and meta-regression.Results: MMSs resulted in a greater percentage adequacy of GWG [weighted mean difference (WMD): 0.86%; 95% CI: 0.28%, 1.44%; P < 0.01] and higher GWG at delivery (WMD: 209 g; 95% CI: 139, 280 g; P < 0.01) than among those in the control arm. Women who received MMSs had a 2.9% reduced risk of severely inadequate GWG (RR: 0.971; 95% CI: 0.956, 0.987; P < 0.01). No association was found between small-quantity LNSs and GWG percentage adequacy (WMD: 1.51%; 95% CI: −0.38%, 3.40%;P = 0.21). Neither MMSs nor small-quantity LNSs were associated with excessive GWG.Conclusions: Maternal MMSs were associated with greater GWG percentage adequacy and total GWG at delivery than was iron and folic acid only. This finding is consistent with previous results on birth outcomes and will inform policy development and local recommendations of switching routine prenatal iron and folic acid supplements to MMSs. Am J Clin Nutr 2022;0:1–13.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 175, "title": "Promoting Exclusive Breastfeeding Through Community-Based Maternal Interventions: Evidence From a Systematic Review", "authors": "Sutianingsih", "authorsFull": "Sutianingsih, Hani", "year": 2026, "type": "Systematic Review", "status": "Unknown", "pubType": "—", "journal": "Other", "doi": "10.4314/thrb.v27i1.21", "url": "https://www.ajol.info/index.php/thrb/article/view/314437", "abstract": "Background: Exclusive breastfeeding (EBF) for the first six months is essential for optimal infant health and development. Despite global recommendations, EBF rates remain below targets in many countries, including Indonesia. Sociocultural norms, limited maternal confidence, and insufficient emotional and practical support contribute to early breastfeeding discontinuation. Community-based maternal interventions have emerged as promising strategies to strengthen support systems and improve breastfeeding practices.Objective: This systematic review examines the effectiveness of such interventions in enhancing early initiation of breastfeeding (EIBF) and EBF.Method: The review has been reported according to the PRISMA 2020 provisions. From 2014 to 2024 a systematic literature search was performed in PubMed, Scopus, EBSCOhost, and Wiley. Studies were eligible if they utilized randomised control trial (RCT) and quasi-experimental design methodology, evaluated community based maternal interventions and reported a measurable outcome of EIBF, EBF, and self Efficacy in Breastfeeding. Given the diversity among individual reports a narrative approach was adopted.Results: Out of 2,941 records, 23 studies fulfilled the inclusion standards. Depending on the types of interventions, the studies were organized into four groups: community and peer support; digital and mHealth strategies; partner and family engagement; and facility-based or multicomponent strategies. Community-based and peer-support interventions increased the EIBF by 15–26%, and EBF also increased, with effect sizes reaching OR 5.10. Digital interventions also led to an improvement, albeit small to moderate (RR 1.20–1.90), improvement, especially if interpersonal counseling was also provided. Partner-engagement interventions increased paternal breastfeeding knowledge by 57%, thus assisting with the early breastfeeding success. Multicomponent strategies led to the best outcomes with EBF rates up to 81% noted 3 months postpartum.Conclusion: Community-focused maternal programs that involve peer support, family participation, and health system engagement have proven to enhance early initiation and exclusive continuation of breastfeeding. These strategies should be considered for inclusion in maternal and child health initiatives.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Health Systems & Disease Control"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 176, "title": "COVID-19 Policy Actions and Inflation Targeting in South Asia", "authors": "Rizvi", "authorsFull": "Rizvi, Syed Aun R.", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Asian Economics", "doi": "10.1016/j.asieco.2022.101576", "url": "https://www.sciencedirect.com/science/article/pii/S1049007822001324?via%3Dihub", "abstract": "In this paper, we examine the impact of policy actions undertaken by governments during the COVID-19 pandemic on Consumer Price Index (CPI) in five major South Asian nations, namely, Bangladesh, India, Nepal, Pakistan and Sri Lanka. Using panel fixed effects regression with robust standard errors, we show the relative importance of monetary and financial interventions on reducing CPI while fiscal interventions, direct grants and aid are insignificant. Further, delving into nature of policy interventions, our study finds evidence of negative impact of Credit Support, and Healthcare Support on CPI in South Asian nations. While our investigation is preliminary, it provides insights into additional understanding of effectiveness of policy actions on inflation targeting.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash"], "methods": []}, {"id": 177, "title": "Inpatient Versus Outpatient Management of Young Infants With a Single Low-Mortality-Risk Sign of Possible Serious Bacterial Infection in Sub-Saharan Africa and South Asia: An Open-Label, Multicentre, Two-Arm, Randomised Controlled Trial", "authors": "Baqui", "authorsFull": "Baqui, Abdullah H.", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "The Lancet Global Health", "doi": "https://doi.org/10.1016/S2214-109X(25)00243-8", "url": "https://www.thelancet.com/journals/langlo/article/PIIS2214-109X(25)00243-8/fulltext", "abstract": "BackgroundResearch has shown low mortality in young infants with a single low-mortality-risk possible serious bacterial infection (PSBI) sign. Outpatient treatment of young infants (age <2 months) with a single low-mortality-risk PSBI sign might be as effective and safe as hospitalisation. Outpatient treatment overcomes the challenges of hospitalisation and improves access in low-resource settings. Our aim was to assess clinical outcomes in patients with one low-mortality-risk PSBI sign treated as outpatients compared with inpatient treatment.MethodsWe did an open-label, multicentre, two-arm, randomised controlled trial at seven sites across Bangladesh, Ethiopia, India, Nigeria, Pakistan, and Tanzania. Young infants presenting to study hospitals with one of three low-mortality-risk PSBI signs (ie, fast breathing if age <7 days, body temperature ≥38°C, or severe chest indrawing) were randomly assigned (1:1) to the outpatient treatment group (2-day injectable gentamicin plus 7-day oral amoxicillin) or the inpatient treatment group (7-day injectable ampicillin plus gentamicin, with supportive care). The primary outcome was poor clinical outcome, which was a composite of any one of the following: death, critical illness, signs of other serious infections, new PSBI signs on days 2, 4, 8, and 15 or persistence of the presenting sign on day 8 after randomisation. We evaluated superiority and non-inferiority using the Farrington–Manning score test. The trial is registered with the ISRCTN Registry (ISRCTN44033252).FindingsBetween June 24, 2021, and April 26, 2024, 7001 young infants were enrolled and randomly assigned to the outpatient treatment group (n=3501) or the inpatient treatment group (n=3500), and were part of the intention-to-treat (ITT) population. Poor clinical outcomes occurred in 269 (7·7%) of 3501 outpatients and 272 (7·8%) of 3500 inpatients in the ITT analysis (risk difference –0·0009 [95% CI –0·0134 to 0·0116]; p=1·0000 for superiority analysis). Deaths were significantly lower in the outpatient group (nine [0·3%] of 3501) than in the inpatient group (23 [0·7%] of 3500; risk difference –0·0040 [–0·0072 to –0·0008]). In the per-protocol analysis, outpatient treatment (266 [7·7%] of 3455) was non-inferior to inpatient treatment (269 [7·9%] of 3416) for poor clinical outcomes (risk difference –0·0018 [–0·0144 to 0·0109]; p=0·0012 for non-inferiority). Apart from deaths, there were no treatment-related serious adverse events.InterpretationOutpatient treatment (gentamicin injection and oral amoxicillin) for infants with a single low-mortality-risk PSBI sign was non-inferior to standard inpatient treatment, with significantly lower mortality in the outpatient treatment group.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health"], "methods": ["RCT"]}, {"id": 178, "title": "Effectiveness of Interventions Utilizing Community Health Worker Model on Reducing Stunting in Low- and Middle-Income Countries: A Systematic Review", "authors": "Pranata", "authorsFull": "Pranata, Muhammad Alwi Eka", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Iranian Journal of Public Health", "doi": "No DOI", "url": "https://publish.kne-publishing.com/index.php/ijph/article/download/20381/19051", "abstract": "Background: This study aimed to assess the effectiveness of interventions delivered by CHWs and their strategies for reducing stunting in LMICs. Methods: We undertook a systematic review following PRISMA guidelines. The articles were selected from major electronic databases, reference lists and grey literature from 2016 and 2023. Results: Seventeen articles were included in the final analysis from the initial 2,899 search results. CHW-led interventions significantly reduce stunting. Training and refresher courses enhanced outcomes, while challenges included inconsistent implementation and resource constraints. The variability in results underscores the need for multisectoral collaboration to maximize impact. Conclusion: Our findings highlighted the significant role of CHW-led interventions in reducing stunting, emphasizing their potential as accessible and reliable resources for local communities", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Nutrition & Diet"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 179, "title": "A Systematic Review of the Benefits of Breastfeeding Against Postpartum Depression in Low-Middle-Income Countries", "authors": "Lubis", "authorsFull": "Lubis, Pika Novriani", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1080/09638237.2024.2361232", "url": "https://www.tandfonline.com/doi/full/10.1080/09638237.2024.2361232", "abstract": "Background: The positive impact of breastfeeding against postpartum depression has been increasingly reported. However, no studies have systematically and critically examined current evidence on breastfeeding practices’ influences on postpartum depression in LMICs. Aim: To review the influence of breastfeeding on postpartum depression in LMICs. Methods: We searched original research in English published over the last ten years (2012 – 2022) within 8 databases: EBSCOhost, EMBASE, Pubmed, Sage Journals, Science Direct, APA PsycArticles, Taylor & Francis, Google Scholar, and citation tracking. The risk of bias assessment used The Newcastle Ottawa Scale and The Modified Jadad Scale. We followed the PRISMA statement after the protocol had been registered on the PROSPERO. The review included 21 of 11015 articles. Results: Of 21 articles, 16 examined breastfeeding practices, 2 each investigated breastfeeding self-efficacy and breastfeeding education, and 1 each assessed breastfeeding attitude and breastfeeding support. 3 randomized control trials and 5 cohorts revealed that breastfeeding decreased the EPDS scores. However, 4 cross-sectional studies indicated that breastfeeding is nonsignificantly associated with postpartum depression. Conclusion: This review indicated that breastfeeding may alleviate or prevent postpartum depression. Our findings indicated that integrating breastfeeding-related programs and policies into postpartum depression prevention may benefit public health. Registration: PROSPERO (CRD42022315143).", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 180, "title": "Safe Drinking Water and Its Impact on Children’s Growth and Development: A Systematic Review", "authors": "Rosemiarti et al.", "authorsFull": "Rosemiarti, Tria; Sunardi, Diana; Putri, Netta Meridianti", "year": 2026, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "International Journal of Environmental Research and Public Health", "doi": "10.3390/ijerph23030313", "url": "https://www.mdpi.com/1660-4601/23/3/313", "abstract": "Access to safe drinking water is critical for child growth and development. However, microbial contamination is a constant threat in many low- and middle-income countries. The current systematic review sets out to examine the evidence of drinking water quality and the physical and cognitive development of children aged 0 to 5 years. The review authors conducted a comprehensive search of SCOPUS, EBSCO, PubMed, the Cochrane Library, and Google Search for cohort studies and clinical trials conducted in English between the years 2010 and 2025. Of 222 studies, 15 were included in the review and the majority were conducted in low- and middle-income countries. The findings consistently demonstrate that microbiological contamination, predominantly by Escherichia coli (the primary water quality indicator examined across studies), is associated with an increased risk of stunting (odds ratio up to 4.14) and reductions in height-for-age Z-scores (HAZ) (by 0.29–0.57). There is currently limited evidence in the studies reviewed that suggests a correlation between the presence of unsafe drinking water and a decrease in cognitive development; however, the evidence is insufficient and warrants further study. Integrated water, sanitation and hygiene (WASH) and nutrition programs had promising growth results, which varied depending on the initial sanitation coverage of the target population, adherence to the intervention, and the overall design of the program. To sum up, contaminated drinking water negatively affects physical and cognitive development during early childhood. Comprehensive WASH–nutrition strategies need to be implemented to reduce this impact and further progress towards Sustainable Development Goal (SDG) 6.", "primaryTheme": "WASH", "themes": ["WASH", "Early Childhood Development", "Nutrition & Diet"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 181, "title": "Community-Based Child Food Interventions/Supplements for the Prevention of Wasting in Children up to 5 Years at Risk of Wasting and Nutritional Oedema: A Systematic Review and Meta-Analysis", "authors": "Lassi", "authorsFull": "Lassi, Zohra S.", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1093/nutrit/nuaf041", "url": "https://academic.oup.com/nutritionreviews/advance-article-pdf/doi/10.1093/nutrit/nuaf041/63001601/nuaf041.pdf", "abstract": "Context: Malnutrition poses a significant threat to child health, with millions of children worldwide affected by wasting, which increases the risk of morbidity and mortality. Objective: In this study we sought to evaluate the effectiveness of community- based infant/child food interventions and supplements for preventing wasting among children up to 5 years at risk of wasting and nutritional oedema. The World Health Organization commissioned this review to update their guidelines on wasting due to malnutrition in children. Data sources: Nine databases were searched from inception until July 2021 and an updated search was carried out on MEDLINE and Ovid MEDLINE until April 13, 2023, and included 24 studies (98 articles) evaluating the impact of community- based infant/child food interventions/supplements for the prevention of wasting among children up to 5 years. Data extraction: Two review authors independently extracted data and assessed the quality of included studies using the Cochrane Risk of Bias Tool 2.0. Grading of Recommendations, Assessment, Development, and Evaluation (GRADE) criteria were used to assess the quality of evidence. Data analysis: This review included 19 cluster–randomized controlled trials (cRCTs) and 5 RCTs evaluating the impact of community-based infant/child food interventions/supplements including fortified blended foods (FBFs), small-quantity (SQ), medium-quantity (MQ), or large-quantity (LQ) lipid-based nutrient supple ments (LNS), and multiple micronutrient powder (MNP) for the prevention of wast ing among children up to 5 years of age. The analysis showed that infants/children given supplementation with LNS (either SQ, MQ, or LQ) had significantly reduced wasting and significant improvements in weight-for-age z-score, mid–upper-arm circumference (MUAC), and underweight prevalence, along with significant reduc tions in mortality. The MNP supplementation had little or no impact on wasting but was associated with increased incidences of rapid breathing/chest indrawing and diarrhea morbidity. Overall, the studies were judged to have raised some con cerns for the outcomes of wasting and adverse anthropometric indices. However, the GRADE analysis suggested low-to-moderate certainty of outcomes. Conclusions: The findings of this review highlight the effectiveness of SQ-LNS and MQ/LQ-LNS supplementation in decreasing rates of wasting, underweight, and mortality and increasing MUAC and weight-for-age z-scores. Methodological limi tations in most studies emphasize the need for future trials with direct comparisons of various dietary supplementation strategies.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "WASH"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 182, "title": "Scope, Range and Effectiveness of Interventions to Address Social Norms to Prevent and Delay Child Marriage and Empower Adolescent Girls: A Systematic Review", "authors": "Greene et al.", "authorsFull": "Greene, Margaret E.; Edmeades, Jeffrey; Siddiqi, Manahil", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "BMJ Open", "doi": "10.1136/bmjopen-2022-071275", "url": "https://bmjopen.bmj.com/content/14/1/e071275", "abstract": "Objectives Harmful gender and social norms prescribe divergent opportunities for girls and boys and drive child marriage. This systematic review examines the scope, range and effectiveness of interventions to change social norms and delay child marriage. Design We systematically assess the contributions made by interventions that work to shift norms to prevent child marriage or to limit its harmful consequences. Our analysis classifies each study’s quality in evaluation and implementation design regarding shifting norms. Data sources We conducted a search of electronic databases (PubMed, PsycINFO, Embase, CINAHL Plus, Popline, Web of Science and Cochrane Library) and grey literature (targeted hand-searches of 15 key organisations and Google Scholar). Eligibility criteria Included interventions sought to change norms related to child marriage, were evaluated in experimental or quasi-experimental evaluations, collected data on age at marriage and norms/attitudes, and were published in English from January 2000 to September 2021. Data extraction and synthesis We used a standardised form to extract data from all eligible studies, and doublescreened to validate coding and reporting. We classified the studies by low, medium and high quality for evaluation and risk of bias, and separately by the extent to which they addressed social norms. Results Our assessment of the 12 eligible studies identified revealed little evidence of a systematic relationship between social norms related to marriage and changes in child marriage behaviours. We found stronger evidence of programme effect on child marriage outcomes than on social norms, though only a minority of studies found an effect for either. Studies that appeared effective in changing child marriage norms varied greatly in scale and extent of programming, and few attempted to identify the appropriate reference groups for measuring social norms. Conclusion The studies evaluated by our review provide only weak evidence on the impact of interventions on norms, and on the link between shifts in norms and marriage behaviour.", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms"], "methods": ["Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 183, "title": "Coproduced, Arts Interventions for Nurturing Care (0–5 Years) in Low-Income and Middle-Income Countries (LMICs): A Realist Review.", "authors": "Gale et al.", "authorsFull": "Gale, Kay Nicola; Ahmed, Kalim; Diarra, Niele Hawa; Manaseki-Holland, Semira; Asamane, Evans; Sidibe, Cheick Sidya; Toure, Ousmane B.; Wilson, Michael Lowery; Griffiths, Paula L.", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "BMJ Open", "doi": "https://doi.org/10.1136/bmjopen-2023-083093", "url": "https://bmjopen.bmj.com/content/bmjopen/14/5/e083093.full.pdf", "abstract": "Objectives Community-based arts interventions have the potential to support contextually relevant nurturing care programmes and policies that adapt to different settings. Understanding the distinctive features of using the arts in local, culturally specific ways in low/middle-income countries (LMICs); how this varies by context; and gaining a better understanding of the perspectives on desirable outcomes for communities is important evidence that this review generates. Design We conducted a realist review of papers that covered outcomes related to child health or development (0–5 years) AND arts-based approaches AND communitybased, participatory approaches AND based in LMICs using a range of databases and other networks. A coding framework was developed covering context, intervention, outcomes, mechanisms, study, sustainability, transferability and scalability. Results The included papers reported 18 unique interventions. Interventions covered 14 countries, with evidence lacking for South America, Arab countries and parts of Africa. Lead authors came from mostly clinical science-based disciplines and from institutions in a different country to the country/countries studied. Intended outcomes from interventions included clinical, health systems/organisation, changes in practices/behaviours/ knowledge/attitudes, and wider social and educational goals. We identified three demi-regularities (semi-predictable patterns or pathways of programme functioning): participatory design based on valuing different sources of expertise; dynamic adaptation of intervention to context; and community participation in arts-based approaches. Conclusions Our findings suggest that arts-based, nurturing care interventions have greater potential when they include local knowledge, embed into existing infrastructures and there is a clear plan for ongoing resourcing of the intervention. Studies with better documentation of the lessons learnt, regarding the intervention delivery process and the power dynamics involved, are needed to better understand what works, for whom and in which contexts.", "primaryTheme": "Early Childhood Development", "themes": ["Early Childhood Development", "Health Systems & Disease Control"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 184, "title": "Effectiveness of Food-Based Intervention to Improve the Linear Growth of Children under Five: A Systematic Review and Meta-Analysis", "authors": "Mamun et al.", "authorsFull": "Mamun, Abdullah Al; Mahmudiono, Trias; Yudhastuti, Ririh; Triatmaja, Nining Tyas; Chen, Hsiu-Ling", "year": 2023, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Nutrients", "doi": "10.3390/nu15112430", "url": "https://pubmed.ncbi.nlm.nih.gov/37299393/", "abstract": "Food-based interventions to improve linear growth are most often applied in low- and middle-income countries. However, not all food interventions have been proven to be effective in promoting linear growth. This study aimed to assess the impact and effectiveness of food interventions for improving linear growth in children under five years old. This study was conducted by following the PRISMA guidelines and the data were extracted and presented following the PRISMA recommendations. Studies were identified through a literature search of the SCOPUS, Web of Science, PubMed, ScienceDirect, and ProQuest databases from 2000 to 2022. Only randomized control studies were included in this review based on the inclusion and exclusion criteria. Out of 1125 studies identified, a total of 15 studies were included in this systematic review and meta-analysis. The review result indicated that food-based intervention can help to improve linear growth (MD: 0.20, 95% CI: 0.04 to 0.35, p = 0.01) among children under five. However, there was no significant difference in changes in underweight status (MD: 0.25; CI: -0.15 to 0.64; p = 0.22) and wasting status (MD: 0.09; CI: -0.02 to 0.20; p = 0.12) between the intervention and control groups. Overall, food-based interventions were found to be helpful for improving children's linear growth.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["RCT", "Systematic Review / Meta-analysis"]}, {"id": 185, "title": "Does Rural Household Electrification Improve Education in the Global South? Evidence from a Robust Bayesian Meta-analysis", "authors": "Ekeocha et al.", "authorsFull": "Ekeocha, Davidmac O.; Garikipati, Supriya", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1177/01956574251340007", "url": "https://journals.sagepub.com/doi/pdf/10.1177/01956574251340007", "abstract": "Lack of access to modern electrification limits educational progress, highlighting the critical role of energy interventions in advancing educational outcomes, particularly in developing countries. Despite increasing interest in this topic, the causal effects of energy interventions on educational outcomes in developing countries remain largely inconclusive. This paper consolidates existing evidence by conducting a meta-analysis of 33 studies using robust Bayesian model averaging methods, synthesizing 301 effect sizes. We evaluate the impact of modern energy interventions—including rural household electrification (RHE) and solar electrification—on nine distinct educational outcomes. Our findings indicate that these interventions substantially improve educational outcomes, particularly for children, with an average increase of 15.4 percentage points in key metrics such as educational attainment, school enrolment, and daily study hours. Specifically, RHE increases children’s daily study hours by 55 minutes and enhances lifetime earnings potential through additional schooling years, while solar electrification yields a 42-minute increase in study hours. However, effects on adult literacy and learning outcomes are weaker, suggesting that energy access must be complemented by targeted educational interventions. Heterogeneity in effect sizes underscores the importance of contextual factors, such as geography and demographics. Importantly, we detect no significant publication bias, and Hamiltonian Markov Chain meta-regressions reveal that household-level experimental designs yield more reliable estimates. These results highlight the transformative role of modern energy infrastructure in bridging educational gaps and fostering sustainable development. Policymakers are encouraged to prioritize investments in rural electrification and integrate energy access with broader educational and economic strategies, such as pairing electrification with enrolment and adult literacy programs to maximize impact.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment", "Education & Skills"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 186, "title": "Nutritional Management of Growth Faltering in Infants Aged Under Six Months in Asia and Africa: Study Protocol for a Multicentre Randomised Trial (Branch, BReAstfeediNg Counselling and Management of growtH).", "authors": "WHO BRANCH study group", "authorsFull": "WHO BRANCH study group", "year": 2025, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Journal article", "journal": "Trials", "doi": "https://dx.doi.org/10.1186/s13063-025-09034-y", "url": "https://dx.doi.org/10.1186/s13063-025-09034-y", "abstract": "Background Treatment of growth faltering in early infancy may improve short and long term child health outcomes. The overall aim of this trial is to determine, in infants who meet study criteria for growth faltering, the effect of intensive breastfeeding counselling and support (IBFCS) plus nutritional milk supplementation (NMS) compared with IBFCS alone, on mortality, morbidity and growth at 6 completed months in low resource settings in South Asia and SubSaharan Africa. The primary outcome of the trial is wasting free survival (alive without wasting (weight for length standard deviation score< −2 standard deviations (SD))) at 6 completed months of age. Methods This is a multi-centre, parallel-group, individually-randomized, non-blinded, controlled trial implemented in seven countries: three in Asia (Bangladesh, India and Pakistan) and four in Africa (Ethiopia, Nigeria, Tanzania and Uganda). Eleven thousand (11,000) infants with a gestational age of at least 28 weeks are enrolled and individually randomised between 7 and 14 days of age. The mother of each infant receives breastfeeding support from trained peer counsellors. Research workers follow up each infant 1–2 weekly at the infant’s home to collect growth and outcome data. If infants meet study criteria for growth problems (slow weight gain, growth concern or growth faltering) they are reviewed by study clinicians, their medical problems are treated, and their mothers receive IBFCS. Infants with growth faltering in the intervention arm also receive nutritional milk supplementation (NMS) (prescribed quantities of term infant formula that meets Codex Alimentarius standards calculated to fulfill the needs for catch up growth). The comparison group receives IBFCS alone. Weekly growth monitoring continues and final outcome data (mortality, wasting) are measured in all infants at 6 completed months. Discussion This large randomised trial will provide evidence about the role of NMS, if any, in infants with growth faltering who do not respond to IBFCS and treatment of medical problems in low resource settings. Trial registration Australian and New Zealand Clinical Trial Registry (ANZCTR) CTRN12624000704594. Registered on June 4 2024.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": []}, {"id": 187, "title": "Effectiveness of Interventions for Improving Social Inclusion Outcomes for People With Disabilities in Low- and Middle-Income Countries: A Systematic Review", "authors": "Saran et al.", "authorsFull": "Saran, Ashrita; Hunt, Xanthe; White, Howard; Kuper, Hannah", "year": 2023, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Campbell Systematic Reviews", "doi": "DOI: 10.1002/cl2.1316", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1002/cl2.1316", "abstract": "Background: People with disabilities—more than a billion people worldwide—are frequently excluded from social and political life, and often experience stigmatising attitudes and behaviours from people without disabilities. This stigma, coupled with inaccessible environments and systems and institutional barriers (e.g., lack of inclusive legislation), may result in discrimination against people with disabilities (and their families) to the degree that they are not able to enjoy their rights on an equal basis with others. Objectives: This review examines the effectiveness of interventions for improving social inclusion outcomes (acquisition of skills for social inclusion, broad‐based social inclusion, and improved relationships) for people with disabilities in low‐ and middle‐income countries (LMICs). Search Methods: We searched academic and online databases, carried out citation tracking of included studies, and contacted experts to ensure our search was as comprehensive as possible. We also ran the searches with search terms specific to social inclusion review using Open Alex in EPPI reviewer. Selection Criteria: We included all studies which reported on impact evaluations of interventions to improve social inclusion outcomes for people with disabilities in LMIC. Data Collection and Analysis: We used review management software EPPI Reviewer to screen the search results. Two review authors independently extracted the data from each study report, including for the confidence in study findings appraisal. Data and information were extracted regarding available characteristics of participants, intervention characteristics and control conditions, research design, sample size, risk of bias and outcomes, and results. Random‐effects inverse variance weighted meta‐analytic methods were used to synthesise standardised mean differences for the outcomes. Main Results: We identified 37 experimental and quasi‐experimental studies. Studies were conducted in 16 countries, with the majority of the included studies (n = 13) from South Asia and nine each from East Asia, the Pacific, the Middle East, and North Africa. Most studies targeted children with disabilities (n = 23), and 12 targeted adults with disabilities. Most focused on people with intellectual disabilities (n = 20) and psychosocial disabilities (n = 13). Regarding intervention content, most (n = 17) of the included programmes aimed to improve the social and communication skills of people with disabilities through social skills training programmes. Ten studies aimed at providing personal assistance and support and evaluated the effects of a parent training programme on the interactive skills of parents of children and their children with disabilities. We calculated effect sizes from experimental and quasi‐experimental studies for outcomes on skills for social inclusion, relationships of people with disabilities with family and community members, and broad‐based social inclusion among people with disabilities. A meta‐analysis of 16 studies indicates an overall positive, statistically significant and large effect of the interventions for skills for social inclusion with standardised mean difference (SMD) = 0.87, confidence interval (CI) = 0.57 to 1.16, k = 26, I 2 = 77%, p < 0.001). For relationships across 12 studies, we find a positive but moderate effect (SMD = 0.61, CI = 0.41 to 0.80, k = 15, I 2 = 64%, p < 0.01). As for the overall effect on broad‐based social inclusion, we find the average effect size was large, and there was significant dispersion across studies (SMD = 0.72, CI = 0.33 to 1.11, k = 2, I 2 = 93%, p < 0.01). Despite the significant and large effects estimated by the studies, some limitations must be noted. Although there was a consensus on the direction of the effects, the studies presented considerable heterogeneity in the size of the effects. A majority (n = 27) of studies were assessed to be of low confidence related to methodological limitations, so the findings must be interpreted with caution. Tests for publication bias show that the effect sizes of social skills (p < 0.01) and social inclusion (p = 0.01) are all likely to be inflated by the existence of the publication bias. Authors’ Conclusions: The review's findings suggest that various interventions to improve the social inclusion of people with disabilities have a significant positive effect. Interventions such as social and communication training and personal assistance led to significant improvement in the social behaviour and social skills of people with disabilities. Studies targeting broad‐based social inclusion showed a large and significant positive effect. A moderate effect was reported from interventions designed to improve relationships between people with disabilities and their families and communities. However, the findings of this review must be interpreted cautiously, given the low confidence in study methods, severe heterogeneity and significant publication bias. The available evidence focused primarily on individual‐level barriers such as interventions for improving social or communications skills of people with disabilities and not the systemic drivers of exclusions such as addressing societal barriers to inclusion, such as stigma reduction, and interventions to strengthen legislation, infrastructure, and institutions", "primaryTheme": "Education & Skills", "themes": ["Education & Skills"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 188, "title": "Mental Health and Wellbeing Co-Benefits of Climate Change Mitigation and Adaptation Strategies: A Systematic Review", "authors": "Flores et al.", "authorsFull": "Flores, Elaine C.; Brown, Laura J.; Kakuma, Ritsuko; Eaton, Julian; Dangour, Alan D.", "year": 2023, "type": "Systematic Review", "status": "Completed", "pubType": "Published report", "journal": "The Lancet Planetary Health", "doi": "10.2139/ssrn.4517171", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4517171", "abstract": "Background: climate change has already impacted the health and wellbeing of ~5 billion people globally. However, the potential influence of climate change mitigation and adaptation strategies on mental health and wellbeing outcomes in low-and-middle-income countries (LMICs) remains insufficiently understood. We aimed to determine the effect of these strategies on mental health and wellbeing outcomes among LMICs beneficiaries. Methods: We carried out a systematic review to identify intervention and case studies published from 2013 to 2022, searching OVID Medline, Embase, PsycINFO, Global Health, Cochrane Library, GreenFile, Web of Science, and a subset of studies from the 'Global Adaptation Mapping Initiative' database. We included controlled, quasi-experimental, pilot, and focussed case studies reporting mental health or wellbeing outcomes assessments of climate change mitigation and adaptation strategies. We categorised studies by design, geographic region, target population, setting, environmental hazard, strategy type and primary outcomes. PROSPERO registry: CRD42021262711. Findings: 9,532 studies were initially retrieved, and 15 studies involving 12,255 participants met the inclusion criteria. Twelve studies described single-adaptation strategies in nine LMICs, while three reported mitigation programmes. Most studies evaluated broader wellbeing measures, and only two randomised evaluations assessed common mental disorders such as depression, trauma or anxiety using validated scales. Nine studies (53.3%) reported significant beneficial changes in mental health or wellbeing outcomes among beneficiaries, while six (46.7%) obtained mixed results linked to local and sociocultural factors. The findings suggest the potential benefits of these strategies, however, the practical significance of the interventions remains unclear due to heterogeneous reporting and gaps in effect size assessments. Interpretation: Our review highlights the scarcity and limited nature of the current evidence, underscoring the need for further equitable research. The ongoing global climate and mental health crises press us to fully understand and address these strategies' psychosocial impacts and translate these findings into effective policy and transdisciplinary action as an opportunity to prevent and ameliorate significant, long-term problems population's mental health and wellbeing.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 189, "title": "Effectiveness of Economic Development Interventions in Humanitarian Settings in Low- and Middle-Income Countries: A Mixed-Method Systematic Review", "authors": "Malhotra et al.", "authorsFull": "Malhotra, Suchi Kapoor; Vigneri, Marcella; Cruz, Nina Dela; Hou, Liangying; White, Howard", "year": 2023, "type": "Systematic Review", "status": "Completed", "pubType": "Published report", "journal": "Other", "doi": "10.51744/CSWP9", "url": "https://cedilprogramme.org/publications/effectiveness-humanitarian-interventions", "abstract": "Humanitarian crises affect communities and people across the world, causing high levels of mortality and malnutrition, leading to the spread of diseases epidemics and health emergencies, and arresting economic growth. Several causes may trigger a humanitarian crisis: political events, such as armed conflicts, coups, and ethnic and religious persecution, and environmental catastrophes, such as floods, earthquakes and typhoons.This review looks at economic development interventions, such as livelihoods programmes, market support programmes, and local area development projects. Economic development interventions support economic development in the area in which humanitarian emergencies occur. It focuses on interventions and programmes that aim to bridge the transition from emergency response to the development of local economic systems post-conflict and post-disaster in low- and middle-income countries", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Climate, Energy & Environment", "Trade & Macroeconomy", "Social Protection & Safety Nets"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 190, "title": "Global Trends and Effectiveness of Nutritional and Behavioural Interventions on Breastfeeding Practices, Human Milk Composition, and Neonatal Health Outcomes: A Review", "authors": "Obonyo", "authorsFull": "Obonyo, Kevin Omondi", "year": 2026, "type": "Systematic Review", "status": "Unknown", "pubType": "Journal article", "journal": "African Journal of Food, Agriculture, Nutrition and Development", "doi": "10.18697/ajfand.148.26415", "url": "https://ajfand.net/Volume26/No1/Obonyo26415.pdf", "abstract": "Optimal lactation and adequate neonatal nutrition are fundamental to infant growth, immune development, and long-term health. Despite sustained global efforts to promote exclusive breastfeeding, substantial disparities persist across regions, driven by sociocultural, economic and health-system factors. This systematic review aimed to synthesize evidence on the effectiveness of nutritional and behavioural interventions in improving breastfeeding practices, human milk composition, and neonatal health outcomes, and to characterize intervention strategies relevant to the global management of maternal and neonatal malnutrition. Preferred reporting items for systematic reviews and meta-analyses (PRISMA) guided systematic review (2000–2025) search was conducted across PubMed, Scopus, Web of Science, and Cochrane Library for studies published to date. Randomized Controlled Trials (RCTs), quasi-experimental studies, and observational studies evaluating maternal supplementation, breastfeeding counselling and integrated neonatal nutrition interventions were included. A total of 421 records were identified through database searches. After the removal of 312 titles and abstracts, 109 unique studies remained for data associate screening. Articles with data associates were reviewed, resulting in the exclusion of 81 studies that did not meet the inclusion criteria. Subsequently, 28 full-text articles were assessed for eligibility and were found suitable for inclusion in the systematic review analysis. Behavioural interventions particularly structured breastfeeding counselling, peer-support programmes, and digital health strategies consistently and significantly increased exclusive breastfeeding rates at six months. Nutritional interventions, including maternal supplementation with vitamin D, docosahexaenoic acid (DHA), multivitamins and probiotics, demonstrated modest improvements in human milk composition and infant gut colonization but showed inconsistent effects on infant growth indicators. Subgroup analyses revealed stronger and more consistent benefits in low- and middle-income countries, where multimodal interventions combining counselling and supplementation were more effective in improving breastfeeding initiation and duration than in high-income settings. Overall heterogeneity was moderate, with evidence certainty rated high for exclusive breastfeeding outcomes and low to moderate for milk composition and growth outcomes. Behavioural and nutritional interventions enhance breastfeeding practices and selectively improve biological markers of neonatal nutrition, although effects on infant growth remain inconclusive. These findings underscore the need for integrated, context-specific strategies that combine community-based counselling, maternal nutritional support, and enabling policy environments to advance neonatal nutrition globally. Future research should prioritize standardized outcome measures, long-term follow-up, and evidence generation in underrepresented high-income settings to strengthen global applicability and policy translation.﻿", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Health Systems & Disease Control"], "methods": ["RCT", "Quasi-experimental", "Systematic Review / Meta-analysis"]}, {"id": 191, "title": "Gut Microbiome-Targeted Nutrition Interventions and Growth among Children in Low- and Middle-Income Countries: A Systematic Review and Meta-Analysis", "authors": "Addae et al.", "authorsFull": "Addae, Hammond Yaw; Apprey, Charles; Kwarteng, Alexander", "year": 2024, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Current Developments in Nutrition", "doi": "https://doi.org/10.1016/j.cdnut.2024.102085", "url": "https://www.sciencedirect.com/science/article/pii/S2475299124000118", "abstract": "icrobiome (GM) may limit some nutrition interventions’ effects among healthy children with undernutrition. Objectives: This review aimed to evaluate the effects of GM-targeted nutrition interventions on growth outcomes among children (0–59 mo) using published studies in low- and middle-income countries. Methods: The methods were guided by the Cochrane methodology. The literature search was conducted to include articles published from inception to July 2023 in PubMed, Google Scholar, and Cochrane Databases. We identified and included 35 studies among 11,047 children. The analysis was conducted considering various growth parameters in the qualitative synthesis and weight gain (kg) in the meta-analysis. Results: In the qualitative synthesis, 55.6% of prebiotics, 66.7% of probiotics, 71.4% of synbiotics, and 28.6% of “microbiome complementary feed” studies had significant effects on growth outcomes. Also, prebiotics had more studies with significant effects among healthy children, whereas probiotics, synbiotics, and “microbiome complementary feeds” had more studies with significant effects among children with undernutrition. Nineteen studies were included in the meta-analyses, of which 7 (36.8%) measured GM outcomes. The meta-analysis showed that prebiotics exhibited heterogeneity but had significant effects on weight in the intervention as compared with the control (mean difference [MD]: 0.14 kg; 95% CI: 0.02, 0.25; I2 ¼ 63%, P ¼ 0.02; 4 studies, n ¼ 932). Probiotics had significant effects on weight in the intervention (MD: 0.15 kg; 95% CI: 0.06, 0.25; I2 ¼ 42%, P ¼ 0.05; 8 studies, n ¼ 2437) as compared to the control. However, synbiotics (MD: 0.26 kg; 95% CI: –0.04, 0.56; I2 ¼ 41%, P ¼ 0.17; 4 studies, n ¼ 1896] and “microbiome complementary feed” (MD: –0.03 kg; 95% CI: –0.18, 0.11; I2 ¼ 0%, P ¼ 0.60; 3 studies, n ¼ 733] had no significant effects on weight in the intervention as compared with control. Conclusions: Although probiotics and synbiotics may be effective at enhancing growth among children, the selection of interventions should be contingent upon health status.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 192, "title": "Strategies, Interventions, and Uptake of Catch-Up Vaccination Among Adolescent and Adult Migrants, Refugees, and Internally Displaced Persons (IDPs) in Low- and Middle-Income Countries (LMICs): A Systematic Review", "authors": "Faijue", "authorsFull": "Faijue, Darlington David", "year": 2026, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Vaccine", "doi": "10.1016/j.vaccine.2026.128249", "url": "https://www.sciencedirect.com/science/article/pii/S0264410X26000563", "abstract": "Background: Catch-up vaccination helps close immunity gaps among migrants, refugees and internally displaced people (IDPs) in low- and middle-income countries (LMICs). Despite immunisation life-course policies and global guidelines promoting catch-up vaccination of arriving migrants, vaccination strategies for adolescent and adult populations are poorly described. We synthesised evidence on catch-up vaccination strategies and interventions, delivery platforms, uptake and coverage, and contextual barriers and enablers in LMICs. Methods: We searched Embase, Medline, PsycINFO, Global Health, Web of Science and grey literature sources (including websites of international and national public health organisations and agencies) for primary studies and reports on catch-up vaccination strategies and interventions, delivery platforms, uptake and coverage, and contextual barriers and enablers targeting adolescents (9–18 years) and, or adults (≥19 years) in migrants (foreign-born, including refugees) and internally displaced people (IDPs; displaced within national borders) across 136 LMICs, (from January 1st 2000 to February 1st 2025; all languages). Study quality was accessed using ROBINS-I, CASP, AACODS and, AGREE II tools. Results: Thirty-seven records met the inclusion criteria (13 peer-reviewed, 24 grey literature), reporting catch-up vaccination activities across 16 LMICs. Most studies were conducted in Uganda (n = 6), Bangladesh (n = 4), Lebanon (n = 3), and Kenya (n = 3). Interventions reached ≥48,000 migrants, refugees, and IDPs (primarily Rohingya refugees in Bangladesh during COVID-19 catch-up campaigns). Populations targeted included mostly refugees (n = 16 studies; 43.2%), general migrants (n = 14; 37.8%), and IDPs (n = 5; 13.5%), with a smaller number involving mixed or other migrant groups (n = 4; 10.8%). The most frequently delivered vaccines were measles-rubella (n = 12; 32.4%), COVID-19 primary-series catch-up (n = 9; 24.3%), HPV (n = 6; 16.2%), polio OPV/IPV (n = 5; 13.5%), and Hepatitis B (n = 3; 8.1%). Catch-up vaccine delivery most commonly occurred through primary care via opportunistic offers (n = 11) and mobile/outreach delivery (n = 11), with additional implementation in fixed posts in camps/settlements (n = 7), supplemental immunisation activities (SIAs) (n = 6), school-linked delivery (n = 5), and hospital/outpatient opportunistic vaccination (n = 4). High uptake (≥85%) was reported where access barriers were minimised (e.g., walk-in availability, extended hours) was paired with community or peer engagement and simple recall systems (SMS or e-booking). Reported barriers included documentation/entitlement checks, language barriers, and fragmented or non-interoperable vaccination records. Conclusions: Migrants remain at risk of under-immunisation, and greater emphasis must be placed on promotion of vaccination across the life-course for missed vaccines, doses, and boosters. Strengthening catch-up vaccination in adolescents and adults, and improving migration-disaggregated data and delivery systems, are urgently needed", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Labour, Jobs & Garment Sector"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 193, "title": "School Feeding Programs for Improving the Physical and Psychological Health of School Children Experiencing Socioeconomic Disadvantage.", "authors": "Kristjansson E et al.", "authorsFull": "Kristjansson E; Osman, Muna; Dignam, Michael; Labelle, Patrick; Magwood, Olivia; Huerta Galicia, Andrea; Cooke-Hughes, Paige; Wells, George A.; Krasevec, Julia; Enns, Aganeta; Nepton, Arghavan; Janzen, Laura; Shea, Beverley; Liberato, Selma; Garner, Jennifer; Welch, Vivian A.", "year": 2022, "type": "Systematic Review", "status": "Protocol", "pubType": "Published protocol", "journal": "Cochrane Library", "doi": "DOI: 10.1002/14651858.CD014794.", "url": "", "abstract": "Objectives This is a protocol for a Cochrane Review (intervention). The objectives are as follows:To assess the effectiveness of school feeding programs for improving the physical and psychological health of children experiencing socioeconomic disadvantage across the world.To compare the effectiveness of school feeding programs for children experiencing socioeconomic disadvantage and those experiencing socioeconomic advantage. This includes subgroup analyses by income and gender.To understand the process by which school feeding programs achieve (or fail to achieve) an impact on growth, cognitive development, and school performance.To gather data useful for cost–benefit analysis.", "primaryTheme": "Education & Skills", "themes": ["Education & Skills", "Early Childhood Development"], "methods": ["Systematic Review / Meta-analysis"]}, {"id": 194, "title": "The Effects of Prenatal Multiple Micronutrient Supplementation and Small-Quantity Lipid-Based Nutrient Supplementation on Small Vulnerable Newborn Types in Low-Income and Middle-Income Countries: A Meta-Analysis of Individual Participant Data", "authors": "Shinde et al.", "authorsFull": "Shinde, Sachin; Wang, Dongqing; Yussuf, Mashavu H; Mwanyika-Sando, Mary; Aboud, Said; Fawzi, Wafaie W.; Liu, Enju; Perumal, Nandita; Partap, Uttara; Cliffer, Ilana R.; Costa, Janaína Calu; Wang, Molin", "year": 2025, "type": "Systematic Review", "status": "Completed", "pubType": "Journal article", "journal": "Lancet Global Health", "doi": "10.1016/S2214-109X(24)00449-2", "url": "https://www.thelancet.com/journals/langlo/article/PIIS2214-109X(24)00449-2/fulltext", "abstract": "BackgroundSmall vulnerable newborn types, defined by combinations of being born too soon or too small, have distinct determinants and health consequences. We aimed to assess the effects of prenatal multiple micronutrient supplementation (MMS) and small-quantity lipid-based nutrient supplementation (SQ-LNS) on small vulnerable newborn types, which are currently unknown.MethodsIn this meta-analysis, individual participant data from randomised controlled trials of MMS and randomised controlled trials of SQ-LNS in low-income and middle-income countries were used. We systematically searched the literature using PubMed, Embase, and Web of Science to identify randomised controlled trials of prenatal nutritional supplementation using MMS or SQ-LNS among pregnant people published between Jan 1, 2000, and Dec 31, 2021. Studies were excluded if they were conducted exclusively among participants selected by pre-existing health conditions, such as anaemia status, HIV infection, or diabetes. We contacted the corresponding authors of all identified studies to seek data contribution. As individual participant data became available, we mapped relevant variables and harmonised the data across studies. Iron and folic acid supplementation was the control group in most studies. Newborns were classified into ten groups through the combinations of preterm or term birth, small, appropriate, and large for gestational age, and low birthweight (LBW) or non-LBW. Newborns were also analysed using a four-group categorisation of preterm or term and LBW or non-LBW. Log-binomial models were used to estimate study-specific risk ratios (RRs), which were pooled using meta-analyses.Findings14 randomised controlled trials of MMS (n=42 618; the mean maternal age at study enrolment was 24·3 years [SD 5.6]; 22 086 [51·8%] male neonates and 20 532 [48·2%] female neonates) and four randomised controlled trials of SQ-LNS (n=6246; the mean maternal age at study enrolment was 23·3 years [SD 5·3]; 3137 [50·2%] male neonates and 3109 [49·8%] female neonates) were used. In the ten-group categorisation of small vulnerable newborns, prenatal MMS reduced the risk of preterm–small for gestational age (SGA)–LBW (RR 0·73, 95% CI 0·64–0·84; p=0·0003); preterm–appropriate for gestational age (AGA)–LBW (0·82, 0·74–0·91; p=0·0010); preterm–AGA–non-LBW (0·89, 0·80–0·98; p=0·019); term–SGA–LBW (0·91, 0·85–0·96; p=0·0046); and term–SGA–non-LBW (0·95, 0·90–1·00; p=0·050). In the four-group categorisation, prenatal MMS reduced the risk of preterm–SGA (0·71, 0·62–0·82; p=0·0002)
