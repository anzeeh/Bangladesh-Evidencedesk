stational weight gain. [arm 4 versus 2], 3. To compare the mean birth weight of infants born to mothers who received BEP, supplementation during pregnancy based on pre-pregnancy BMI only versus BEP, supplementation during pregnancy based on low pre-pregnancy BMI and gestational weight, gain. [arm 4 versus 3], 4. To compare the difference in mean birth weights of infants born to mothers who were, randomized to receive BEP without targeting or with targeting relative to the control, (MMS). [arm 2 versus 1 versus arm 3 and 4 versus 1], Other objectives of the study include:, 1. Assess how low MUAC compares relative to low BMI in identifying women for targeting and, how well MUAC change tracks with gestational weight gain change throughout pregnancy., 2. Conduct a qualitative study in the three BEP arms of the study to better understand, acceptability, use, sharing and other components of adherence to BEP among women and, family members and understand women's perceptions related to the screening and targeting, employed in the trial., 3. Conduct a mixed methods implementation feasibility study to assess how feasible the most, effective delivery approach of BEP (according to the trial findings) would be according, to national and subnational stakeholders in Bangladesh., 4. Conduct a costing and cost-effectiveness analysis to compare cost of screening and, cost-effectiveness of targeted vs. an untargeted supplementation approach to inform, future programs., The study design will be conducted as a cluster-randomized, unblinded trial with 4 arms among, newly pregnant women. A total of 112 sectors (unit of randomization, comprising 150-200, households with women of reproductive age) will be randomized to one of the four, supplementation arms, with control arm being provided a daily multiple micronutrient, supplement (MMS)., Arm 1: Control - Daily MMS Arm 2: All women receive BEP Arm 3: Low BMI women receive BEP,, others receive MMS Arm 4: Low BMI women rec ive BEP, women with inadequate gestational weight, gain get switched to BEP, other receive MMS, Study Site and Participants:, The study will be conducted in the re-sized \"JiVitA\" (a well established field site) study, area in a rural northwestern district of Bangladesh. The BEP effectiveness trial will be done, among married pregnant women of reproductive age. A home-based initial census will identify, all women of reproductive age living in the selected JiVitA area. We will use the JiVitA, pregnancy surveillance system entailing monthly ascertainment of last menstrual period and, urine-based testing among women who missed their period in the past 30 days to identify newly, pregnant women for enrollment in the study. During the surveillance weight and height of the, women will be assessed to calculate pre-pregnancy body mass index (BMI)., Randomization in the study will be done at a cluster level, with JIVitA sectors being used as, the unit of randomization, as done in our previous studies. At pregnancy ascertainment, women, will be consented for participation in the trial, and begin receiving their daily supplements, as per their random allocation at the beginning of the second trimester., Field Procedures and Data Collection, A cadre of JiVitA female staff (known as Community Health Research Workers (CHRWs), community, health research workers) who are responsible for conducting the pregnancy surveillance will, also be doing monthly anthropometry and distribution of the study interventions. Enrollment, into the main trial will be conducted by experienced Field Interviewers (FIs), who will also, be responsible for conducting a late pregnancy visit and birth assessment visits. Once a, consenting pregnant woman has reached 12-14 weeks gestation, according to LMP, her local CHRW, will visit her monthly to distribute BEP and MMS supplements, collect compliance measurements, for both, and to collect ANC visit and provider history., Information collected from the women includes: household socioeconomic status and food, security using the FANTA Household Food Insecurity Access Scale (HFAIS), pregnancy history,, 7-day diet recall, 28-day morbidity recall, an empowerment and agency module based on the, Women's Agency Scale, a depression module adapted from the Edinburgh Postnatal Depression, Scale, and anthropometry, including weight, and MUAC. Hemoglobin levels will also be assessed, using a finger-prick blood draw and Hemocue machine. A late pregnancy visit will also be, conducted at about 32-34 week of gestation to collect diet, morbidity, anthropometry,, depression and food security information as well as to repeat Hb. A birth surveillance system, will be set up for birth notification and an early visit to the home for birth assessment and, anthropometry. An FI will conduct the visit to collect pregnancy outcome information, infant, anthropometry (length, weight, head and chest circumference) and ask a brief questionnaire on, labor and delivery and measure blood pressure. One month post livebirth or stillbirth a home, visit will be done to assess infant vital status and to measure maternal weight to estimate, BMI., Monitoring Supplement Adherence and Use In this effectiveness trial, supplement distribution, will be done monthly. Empty food packets and MMS blister packs will be collected back and, counted. A calendar to mark daily consumption will be given as an aid. After 2 weeks a phone, based assessment of number of BEP packets or MMS tablets will be done as well counseling, provided for any issues related to daily adherence and to encourage high compliance., Counseling:, All women in the trial will receive counseling for antenatal care and danger signs using the, BCC materials developed by the Ministry of Health of Bangladesh. In addition, pamphlets for, supplement benefits and use will be used for counseling. Adequate weight gain counseling, using pamphlets will be done over the course of the pregnancy, across all four arms., Sample Size:, Our sample size estimates are based on the hypothesis that either untargeted or tar eted low, pre-pregnancy BMI based BEP supplementation (along with MMS to women with normal BMI) will, increase birth weight by 100 g compared with supplementation with MMS alone. We anticipate a, total sample size of 2120 (528 *4 arms) pregnant women identified through pregnancy, surveillance in one year of enrollment resulting in 1456 livebirths (assuming a pregnancy, loss of 28% and loss to follow-up of 6%) from 112 or 28 per arm sectors (units created in, JiVitA and used for randomization) across 4-6 Unions (sub-district administrative unit)., Data Analysis Our primary treatment effects analysis will be done on singleton livebirths., The analysis will be an intention-to-treat approach, i.e. all study outcomes will be analyzed, as randomized. We will present crude estimates of all primary and secondary outcomes with, their 95% confidence intervals adjusted for clustering at the sector level using Huber-White, sandwich estimators.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Women's Empowerment & Gender", "Agriculture & Food Security", "Climate, Energy & Environment"], "methods": []}, {"id": 32, "title": "Non-Price Energy Conservation Information and Household Energy Consumption in a Developing Country: Evidence From an RCT", "authors": "Ahsanuzzaman et al.", "authorsFull": "Ahsanuzzaman; Eskander, Shaikh; Islam, Asad; Wang, Liang Choon", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Environmental Economics & Management", "doi": "10.1016/j.jeem.2024.103022", "url": "https://www.sciencedirect.com/science/article/pii/S0095069624000962", "abstract": "We use a randomized controlled trial in Bangladesh to test three types of non-price energy conservation strategies that influence electricity consumption of households: (i) advice on electricity conservation methods (knowledge treatment); (ii) (median) electricity consumption of others in the suburb (suburb comparison); and (iii) (median) electricity consumption of neighbors (neighbor comparison). We find that providing advice on saving energy could reduce households’ electricity consumption and bills significantly. The effects are stronger for advice on electricity conservation methods than neighbor and suburb comparisons. The effects of providing information about own electricity consumption relative to neighbors’ electricity consumption is similar to the effects of giving information about own electricity consumption relative to electricity consumption of households in the same suburb. The effects among households who were inefficient users in neighbor and suburb comparison groups are almost as strong as those in the knowledge treatment group. The effects across all treatment groups become stronger over time as they receive repeated information.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["RCT"]}, {"id": 33, "title": "Incentives to Improve Government Agricultural Extension Agent Performance: A Randomized Controlled Trial in Bangladesh", "authors": "Alam et al.", "authorsFull": "Alam, Md. Rajibul; Kijima, Yoko", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Economic Development and Cultural Change", "doi": "10.1086/723492", "url": "https://www.journals.uchicago.edu/doi/epdf/10.1086/723492", "abstract": "This study provides empirical evidence on how financial and nonfinancial incentives improve service delivery of government agricultural extension agents. A randomized controlled trial was conducted in 40 subdistrict agriculture offices in Bangladesh, with 807 agricultural extension officers, randomly allocated into five groups (one control and four treatment). The financial incentive was a one-time monetary reward, while the nonfinancial incentive was recognition by the district director. In the nonfinancial incentive treatment, we added another treatment in which the two worst performers, instead of best, are selected for inspection. In the financial incentive, we created another treatment where the best performer is selected based on performance level. We find that financial and nonfinancial incentives have positive effects of equal magnitude, about 1 standard deviation of total performance index on average. Giving a disadvantage to better performers does not decrease effort by better performers.", "primaryTheme": "Governance & Service Delivery", "themes": ["Governance & Service Delivery", "Agriculture & Food Security"], "methods": ["RCT"]}, {"id": 34, "title": "Nobo Jatra Project: Performance and Impact Evaluation: Endline Evaluation of Bureau for Humanitarian Assistance Resilience Food Security Activity in Bangladesh: Volume 1 - Report", "authors": "Yishay et al.", "authorsFull": "Yishay, Ariel Ben; Nolan, Katherine; Shieh, Jacqueline; Velyvis, Kristen; Meyer, Laura; Dorsey, Naomi", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published report", "journal": "not applicable", "doi": "No DOI", "url": "https://library.alnap.org/help-library/nobo-jatra-project-performance-and-impact-evaluation-endline-evaluation-of-bureau-for-0", "abstract": "This report shares findings from the analysis of qualitative and quantitative endline data focused on the Nobo Jatra project in Bangladesh. The Nobo Jatra project was implemented by World Vision and local partners in the southwestern coastal areas of Bangladesh in the Khulna and Satkhira districts and aimed to address the underlying causes of chronic food insecurity by improving knowledge, capacity, links to food production and income generation and facilitating improvements in household assets and savings. A quantitative survey was conducted in 108representative villages in southwest Bangladesh and captured information on farming, health,nutrition, resilience, and consumption. Half of these villages were treatment villages and half were comparison villages. In-depth qualitative data was collected from four treatment villages where the project was well implemented and the community engaged. The quantitative data analysis allows us to look at indicators in treatment villages before and after the project was implemented, as well as compare the experiences of treatment and comparison villages. The qualitative data allows us to understand the potential of the interventions when well-implemented, as well as how and why they worked or did not work as intended.The pre-post evaluation shows improvement across a large number of indicators between baseline and endline in treated villages, although it suggests that more help is needed for increasing nearby access to water, helping women earn more cash, supporting female farmers,and supporting households with adult-only women. The qualitative study provides insights into the mechanisms that led to these improvements, and key challenges for indicators showing limited results.The analysis of the treatment and comparison villages suggests little difference between treatment and comparison villages in child stunting and underweight status, and higher child diarrhea rates in treatment villages. However the analysis also shows more children receiving a minimally acceptable diet in project areas, greater women’s autonomy and empowerment, and households in treatment villages better able to maintain their food consumption in the face of shocks. Qualitative analysis in villages with the most comprehensive programming highlights achievements across nutrition, food security, income, and disaster preparedness outcomes, as well as the pathways by which these outcomes occurred. This included unexpected insights into the ways interventions affected income and the effects of increased income. Furthermore,the project strengthened local input and service provisioning systems in best-case scenario villages, but future sustainability of these systems varies by sector. The qualitative study also found that Nobo Jatra’s interventions strengthened household resiliencies and food security,helping households during recent natural disasters and the COVID-19 pandemic.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet", "Climate, Energy & Environment", "Women's Empowerment & Gender", "WASH", "Financial Inclusion & Cash"], "methods": ["Quasi-experimental"]}, {"id": 35, "title": "The Impacts of Rural Development Project on Resilience to Climatic Disasters: The Case of Bangladesh", "authors": "Park", "authorsFull": "Park, Bokyeong", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "World Development", "doi": "10.1016/j.worlddev.2024.106631", "url": "https://www.sciencedirect.com/science/article/pii/S0305750X24001013?via%3Dihub", "abstract": "This study assesses the effects of a comprehensive rural development project on resilience to a climate shock, using the case Saemaul Zero Hunger Communities (SZHC) project implemented in central Bangladesh from 2014 to 2017. The project is suitable to such assessment since the target area was flood-prone and experienced major flooding during the project. Moreover, the project took holistic approaches that tackle multiple dimensions of vulnerability simultaneously, rather than addressing them in isolation. This study focuses on resilience capacities underpinning resilience and supposes that they are composed of absorptive, adaptive, and transformative capacity. After identifying various indicators to measure each capacity, the study estimates their average treatment effects on the treated using the propensity score matching method. The results show that the SZHC project significantly helped the households’ recovery from the flood in terms of food security and livelihood, and mostly enhanced the three resilience capacities: increased income and assets, reduced disruption in child education, diversified income sources, and strengthened social capital such as women's community participation.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Agriculture & Food Security", "Child Marriage & Social Norms"], "methods": ["PSM"]}, {"id": 36, "title": "SHOUHARDO III Performance and Impact Evaluation: Endline Evaluation of Bureau for Humanitarian Assistance Resilience Food Security Activity in Bangladesh, Implemented by CARE International: Volume I - Report", "authors": "Yishay et al.", "authorsFull": "Yishay, Ariel Ben; Nolan, Katherine; Meyer, Laura; Shieh, Jacqueline; Velyvis, Kristen; Dorsey, Naomi; Nyabwari, Joy", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published report", "journal": "not applicable", "doi": "No DOI", "url": "https://library.alnap.org/help-library/shouhardo-iii-performance-and-impact-evaluation-endline-evaluation-of-bureau-for-0", "abstract": "This report evaluates the performance of the SHOUHARDO III project, which targets poor households in the char and haor (wetland) areas of Bangladesh and aims to address food and incomeinsecurity, maternal and child health and nutrition, women’s and youth empowerment, as well as improve access to public services while building resilience capacities. This evaluation employs three methodologies: qualitative inquiry, pre-post comparison, and impact evaluation. The impact evaluation matches communities treated by SHOUHARDO III with untreated communities ex-post,using baseline stunting rates from the 2014 DHS dataset.The evaluation finds that the SHOUHARDO III project engaged more than 40% of households surveyed within target villages and successfully targeted poor and female-headed households. The analysis of baseline and endline statuses (pre-post analysis) of households in the SHOUHARDO III-targeted areas demonstrates that households from these areas improved across several indicators,including poverty levels, the nutritional status of women and children, women’s empowerment, and gender equity. From a qualitative standpoint, participants from areas where SHOUHARDO III appeared well-implemented offers insights into the potential of the interventions. The qualitative evaluation found mechanisms of change in several areas that can be built upon and enhanced.Qualitative findings show that the program succeeded in promoting multi-sectoral change at household and community levels. They also show that SHOUHARDO III effectively targeted services to the most food-insecure, Poor and Extremely Poor members of communities, and its multi-generational and gender-inclusive approach to its interventions facilitated community acceptance.From the impact evaluation, it is likely that we can credit SHOUHARDO III with improvements in women’s dietary diversity, women and children’s minimum acceptable diet, antenatal care access,and the increase in participation across several sectors. In addition, households in SHOUHARDO III villages experienced statistically significant differences in one resilience indicator, and households in program villages that experienced major shocks were better able to maintain their food consumption than similar households in comparison villages.However, the impact evaluation does not find meaningful differences between households in targeted communities and households in non-targeted communities in terms of women’s mobility and decision-making, children’s nutritional status (including child stunting and underweight status),children’s diarrhea, exclusive breastfeeding, household hunger, and improved use of health and nutrition services overall. Improvements in most measured conditions in the SHOUHARDO III program areas appear to have been matched by similar improvements in non-program areas,suggesting broader forces may account for them.Ultimately understanding differences between program areas and non-program areas can help inform decisions about future chapters of the SHOUHARDO III program and other development food security programs to ensure the most effective programs for vulnerable populations. Understanding the dynamics and mechanisms of change and responses of participants to interventions can also inform future work. Salient findings are also important to highlight for action. The research team concludes this report with recommendations.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Women's Empowerment & Gender", "Agriculture & Food Security", "Climate, Energy & Environment", "Maternal & Child Health", "WASH", "Financial Inclusion & Cash"], "methods": ["Quasi-experimental"]}, {"id": 37, "title": "Social Safety Nets and Productivity Outcomes: Evidence and Implications for Bangladeshi Rice Growers", "authors": "Salam et al.", "authorsFull": "Salam, Md Abdus; Anik, Asif Reza", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1111/asej.12310", "url": "https://onlinelibrary.wiley.com/doi/epdf/10.1111/asej.12310", "abstract": "Using national representative cross-sectional data from 8846 rice growing plots in Bangladesh, we analyze the impact of social safety net programs (SSNPs) on rice farmers’ productivity and efficiency. This study applied the propensity score matching (PSM) approach to correct the possible self-selection biases arising from observed and unobserved factors affecting a household’s SSNP participation decisions. The stochastic frontier production function is estimated separately for participants and non-participants to compare yield and technical efficiency. Our results show that the output elasticities of all inputs except land and fertilizer are significantly higher for non-participants than participants. The SSNP participants are estimated to have 1.95% higher technical efficiency than the non-participants, while their frontier yield is 11.75% higher. The average treatment effect on treated (ATET) also confirms the yield and efficiency-enhancing role of SSNPs, particularly in climate-stressed areas. The study argues for widening the SSNP coverage to increase the marginal farmers’ efficiency in climate-vulnerable areas. Other policy interventions include policies to increase farmers’ access to land through the proper functioning land market, education, providing literacy training, and different production inputs.", "primaryTheme": "Social Protection & Safety Nets", "themes": ["Social Protection & Safety Nets", "Agriculture & Food Security", "Education & Skills"], "methods": ["PSM"]}, {"id": 38, "title": "Promoting the Itemized Educational Spending of Rural Coastal Households in Bangladesh Through Unconditional Cash and Food Assistance", "authors": "Bari et al.", "authorsFull": "Bari, MD Abdul; Khan, Ghulam Dastgir; Yoshida, Yuichiro; Kusakabe, Tatsuya", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Asia Pacific Education Review", "doi": "https://doi.org/10.1007/s12564-024-09936-7", "url": "https://link.springer.com/content/pdf/10.1007/s12564-024-09936-7.pdf", "abstract": "The vulnerable households in the rural coastal regions of Bangladesh have been sufering from chronic poverty because of a lack of resources to invest in the human capital development, such as education and training. The unconditional cash and food (UCF) assistance programs in Bangladesh have been designed to combat chronic poverty. This study examines the impact of the UCF assistance receipt on the itemized educational spending: the total spending on education, school tifn, educational stationery, uniforms, admission fees, examinations, textbooks, education-related Internet, and education-related transportation by the households. A Fuzzy regression discontinuity design (RDD) is used as an identifcation strategy, in which the assignment variable is the land ownership by the households. The RDD method is based on the idea that the households just below and above the cutof of the assignment variable are locally randomized, therefore free from any selection bias. The results consistently show that the UCF assistance increases the spending on all educational items, except for textbooks and education-related transportation. This study suggests that the UCF assistance can be used as a policy tool to accelerate the sustainable development goal of inclusive quality education for rural coastal areas by increasing the itemized spending on education", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Education & Skills", "Social Protection & Safety Nets"], "methods": ["RDD"]}, {"id": 39, "title": "Enhancing Adaptive Capacities of Coastal Communities, Especially Women, To Cope With Climate Change Induced Salinity", "authors": "Gillaizeau et al.", "authorsFull": "Gillaizeau, Marc; Avdeenko, Alexandra; Gartner, Jakob; Aladysheva, Anastasia; Abdullah, Harun Al", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Published protocol", "journal": "Other", "doi": "10.1257/rct.10209-1.0", "url": "https://www.socialscienceregistry.org/trials/10209", "abstract": "Households residing in the coastal areas of bangladesh are extremely vulnerable to the effects of climate change. The higher incidence of floods and storms as well as the rise of the sea level induce frequent saltwater intrusion into freshwater resources. Consequently, the productivity of traditional agricultural activities decreases significantly while access to clean drinking water deteriorates. We use a clustered phase-in randomized control trial to study the impact of a project that aims to sustainably increase household resilience to natural disasters and to their consequences in terms of soil and water salinity. This project, implemented in the districts of Khulna and Satkhira, focusses on climate change adaptation and aims to provide households with access to sources of clean drinking water located closer to their house, thereby allowing women to re-allocate time from fetching water (for which they are responsible in the vast majority of surveyed households) towards: i) training on climate-adaptive livelihoods, and ii) income-generating activities promoted by the project. Women who participate in the project are organized into Women Livelihood Groups, through which they receive training on climate-adaptive livelihoods, as well as input support to implement said livelihoods. The project targets 101 wards in 39 Union Parishads (UPs) located across five Upazilas in the districts of Khulna and Satkhira. The RCT design includes two phases, with project implementation starting in February 2022 in the \"early\" group, and in October 2022 in the \"late\" group. We stratified randomization by Upazila and randomly allocated 25 UPs to the \"early\" group, and 15 UPs to the \"late\" group. Baseline data were collected on 3,120 beneficiaries in October 2021, and follow-up endline data will be collected in October 2022. The main key indicators for the impact study are: resilience to natural shocks, captured in different dimensions, e.g., financial improvements (income, savings), self-reported preparedness; food security and diversity; income diversification and stability. Finally, we will analyze whether impacts arise through the intended key mechanism, namely that the drinking water solutions provided by the project allow women to re-allocate time towards income generation through adaptive livelihoods.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Agriculture & Food Security", "WASH", "Financial Inclusion & Cash"], "methods": ["RCT"]}, {"id": 40, "title": "Impact of farmer field school on crop income, agroecology, and farmer's behavior in farming: a case study on Cumilla district in Bangladesh", "authors": "Bhuiyan et al.", "authorsFull": "Bhuiyan, Mohammad; Maharjan, Keshav", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Sustainability", "doi": "10.3390/su14074190", "url": "https://www.mdpi.com/2071-1050/14/7/4190", "abstract": "", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": []}, {"id": 41, "title": "Does Access to Agricultural Credit Help Disaster-Affected Farming Households to Invest More on Agricultural Input?", "authors": "Moahid et al.", "authorsFull": "Moahid, Masaood; Khan, Ghulam Dastgir; Bari, MD Abdul; Yoshida, Yuichiro", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Agricultural Finance Review", "doi": "10.1108/AFR-12-2021-0168", "url": "https://www.emerald.com/insight/content/doi/10.1108/AFR-12-2021-0168/full/html", "abstract": "PurposeNatural calamities impair agricultural households' ability to invest in their farms. Facilitating access to agricultural credit may assist farmers in the face of negative revenue shocks. The aim of this study is to investigate the impact of agricultural credit on the agricultural input expenditure of disaster-affected farmers in Bangladesh.Design/methodology/approachThe study utilizes data on 2,519 disaster-affected farming households from Bangladesh's Household Income and Expenditure Study (HIES) 2016–2017, which employs a nationwide representative five-year interval survey. Further, propensity score matching (PSM) identification strategy is used to estimate the average treatment effect on the treated (ATET), and Mahalanobis distance matching (MDM) is used for the robustness test. In addition, heterogeneous analysis has been conducted to explore the impact of agricultural credit on different types of farming households.FindingsThe findings reveal that access to agricultural credit has a favorable and significant effect on farm input expenditure for disaster-affected farmers. Therefore, agricultural credit accessibility could be utilized as a policy tool to assist disaster-affected farmers in improving their investment capacity, and hence, agricultural output.Originality/valueThis study, using a quasi-experimental design of access to agricultural credit on agricultural input expenditures of the disaster-affected farming households in coastal areas of Bangladesh to estimate the causal effect.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Financial Inclusion & Cash", "Climate, Energy & Environment"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 42, "title": "Do Climate-Smart Agricultural Practices Impact the Livelihoods of Vulnerable Farmers in the Southern Part of Bangladesh?", "authors": "Mazumder", "authorsFull": "Mazumder, Mohummed Shofi Ullah", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Climate Services", "doi": "10.1016/j.cliser.2024.100524", "url": "https://www.sciencedirect.com/science/article/pii/S2405880724000797?via%3Dihub", "abstract": "Efforts to reduce food insecurity must include building resilience in rural farmers to shocks. One way to achieve this is through climate-smart agriculture (CSA). This paper analyzes the impact of CSA on farmers’ livelihoods. Data were collected in two phases in 2010 and 2018 from a study (CSA practitioners) and control group (CSA non-practitioners) of climate-affected farmers (240 farmers in each group) using a quasi-experimental survey design considering all possible biases. Descriptive statistics, variance inflation factor analysis, multiple regression, path analysis, FE-IV, and propensity score matching models were applied. Practicing CSA technologies improved food security and the incomes of the farmers through increased agricultural productivity. The impact of CSA technologies differed based on farmers’ understanding of technologies, the time and amount of financial support, availability of extension staff, the provision of technical and other logistical support, and CSA practitioners’ experience, such as knowing how to enhance plant resilience. Specific policy interventions, including financing of CSA, would benefit rural farmers. CSA provides a path towards sustainable livelihood development and food security. These findings will be useful for policymakers, planners, administrators, and development workers.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 43, "title": "Community-based natural resource management: an effective tool to reduce poverty and inequality?", "authors": "Khan et al.", "authorsFull": "Khan, Akhtaruzzaman; Islam, Khan Jahirul; Haque, A.B.M. Mahfuzul", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Development Effectiveness", "doi": "https://doi.org/10.1080/19439342.2023.2173272", "url": "https://www.tandfonline.com/doi/full/10.1080/19439342.2023.2173272", "abstract": "With exclusive property rights, community-based natural resource management (CBNRM) may provide economies of scale and scope in a joint production system. This paper examines the impact of CBNRM on poverty and inequality, using household-level panel data from Bangladesh. Results from the propensity score matching method and the random effectmodels reveal that project participants' employment increased by 60 person-days, and their fish income increased by 37.4%. We find a positive significant effect of the project in reducing both the incidence and depth of poverty and income inequality. The findings suggest CBNRM is an effective tool to achieve sustainable development goals.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["PSM"]}, {"id": 44, "title": "ShishuPushti Trial: a cluster randomized controlled trial to evaluate extended peer counselling for improving feeding practices and reducing undernutrition in children aged 0-48 months in urban Bangladesh.", "authors": "Mihrshahi et al.", "authorsFull": "Mihrshahi, Seema; Khanam, Mansura; Ara, Gulshan; Rasheed, Sabrina; Agho, Kingsley Emwinyore; Kabir, Iqbal; Roy, S.K.; Haider, Rukhsana; Hamadani, Jena Derakhshani; Tofail, Fahmida; Alam, Ashraful; Dibley, Michael J.", "year": 2022, "type": "Impact Evaluation", "status": "Protocol", "pubType": "Published protocol", "journal": "JMIR Research Protocols", "doi": "10.2196/31475", "url": "https://www.researchprotocols.org/2022/2/e31475/", "abstract": "Background: The aim of this study is to assess if peer counseling of women improves breastfeeding, complementary feeding practices, and child growth, and thus reduces the prevalence of undernutrition in children up to 4 years of age.Objective: Lack of exclusive breastfeeding and inappropriate complementary feeding are critical factors in reducing child undernutrition, morbidity, and mortality. There are reported trials of peer counseling to improve breastfeeding; however, they did not examine the efficacy of peer counseling to improve complementary feeding or the long-term impacts on child growth and development.Methods: This study has used a community-based, cluster-randomized controlled trial with a superiority design and 2 parallel treatment arms. It is assessing the impact of peer counseling, starting in late pregnancy up to 1 year after delivery, on child feeding practices, growth, and development with follow-up until 48 months of age. The study site was Mirpur, a densely populated area in Dhaka. Using satellite maps and geographic information system mapping, we constructed 36 clusters with an average population of 5000 people. We recruited pregnant women in the third trimester aged 16-40 years, with no more than 3 living children. Trained peer counselors visited women at home twice before delivery, 4 times in the first month, monthly from 2 to 6 months, and again at 9 and 12 months. Trained research assistants collected anthropometric measurements. The primary outcome will be differences in child stunting and mean length for age at 6, 12, 15, and 18 months. Secondary outcomes will be differences in the percentage of women exclusively breastfeeding in the mean duration of any breastfeeding and in the percentage of children at 6 and 9 months of age who receive solid, semisolid, or soft foods; and the percentage of children consuming foods from 4 or more food groups at 9, 12, 15, and 18 months. We will assess the mean cognitive function scores from the Ages and Stages Questionnaire (9 and 18 months) and Bayley tests (24 and 36 months).Results: We identified 65,535 people in mapped residences, from which we defined 36 clusters and randomly allocated them equally to intervention or control groups stratified by cluster socioeconomic status. From July 2011 to May 2013, we identified 1056 pregnant women and 993 births in the intervention group and 994 pregnancies and 890 births in the control group. At 18 months, 692 children remained in the intervention group and 551 in the control group. From January 2015 to February 2017, we conducted the long-term follow-up of the cohort. We have now completed the data collection and processing and have started analyses.Conclusions: This study will help fill the evidence gap about the short- and long-term impact of peer counseling on improving infant feeding, preventing childhood undernutrition, and enhancing child cognitive development.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Early Childhood Development", "Maternal & Child Health"], "methods": ["RCT"]}, {"id": 45, "title": "Narrowing the Gender Gap in Mobile Banking", "authors": "Lee et al.", "authorsFull": "Lee, Jean N.; Morduch, Jonathan; Ravindran, Saravana; Shonchoy, Abu S.", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Economic Behavior & Organization", "doi": "10.1016/j.jebo.2021.10.005", "url": "https://www.sciencedirect.com/science/article/pii/S0167268121004376", "abstract": "Mobile banking and related digital financial technologies can make financial services cheaper and more widely accessible in low-income economies, but gender gaps persist. We present evidence from two connected field experiments in Bangladesh designed to encourage the adoption and use of mobile banking by poor, illiterate households. The study focuses on migrants who live in Dhaka and send money back to their extended families. Despite large differences between female and male migrants in income and education, the first experiment shows that a training program led to similarly large, positive impacts on mobile banking use by female migrants (a 51 percentage point increase) and male migrants (46 percentage point increase), substantially narrowing the gender gap. However, the increases in adoption did not lead to similar patterns in usage: men increased digital remittances by 11 times as much as women. A second experiment tests whether introducing the technology in the context of family networks made an additional difference to gender gaps. The evidence suggests an 11 percentage point increase in adoption by women and just a 1 percentage point increase by men, although statistical power is low for this comparison and estimates are imprecise.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Women's Empowerment & Gender", "Labour, Jobs & Garment Sector"], "methods": ["RCT"]}, {"id": 46, "title": "The Effect of Maternal Education on Child Mortality in Bangladesh", "authors": "Wu", "authorsFull": "Wu, Hanbo", "year": 2022, "type": "Impact Evaluation", "status": "Unknown", "pubType": "Journal article", "journal": "Population and Development Review", "doi": "10.1111/padr.12467", "url": "https://onlinelibrary.wiley.com/doi/10.1111/padr.12467", "abstract": "This paper examines the effect of maternal education on child mortality in Bangladesh by exploiting quasi?experimental variations in the duration of exposure to a school stipend project for identification. Results from the instrumental variable estimation indicate that an additional year of maternal schooling reduces both under?five and infant mortality by about 20 percent. The findings are statistically significant and robust to a number of model specifications, including survival models controlling for right censoring of child mortality. Analysis of potential mechanisms suggests that maternal education reduces child mortality through greater wealth and literacy, positive assortative mating, lower fertility, delayed marriage and childbearing, greater health?related knowledge, better health?seeking behaviors, and female empowerment, but not through female employment. [ABSTRACT FROM AUTHOR] Copyright of Population & Development Review is the property of Wiley-Blackwell and its content may not be copied or emailed to multiple sites or posted to a listserv without the copyright holder's express written permission. However, users may print, download, or email articles for individual use. This abstract may be abridged. No warranty is given about the accuracy of the copy. Users should refer to the original published version of the material for the full abstract. (Copyright applies to all Abstracts.)", "primaryTheme": "Education & Skills", "themes": ["Education & Skills", "Maternal & Child Health", "Women's Empowerment & Gender"], "methods": ["IV"]}, {"id": 47, "title": "The large-scale community-based programme 'Suchana' improved maternal healthcare practices in north-eastern Bangladesh: Findings from a cluster randomized pre-post study", "authors": "Haque et al.", "authorsFull": "Haque, Md Ahshanul; Choudhury, Nuzhat; Ahmed, S. M. Tanvir; Farzana, Fahmida Dil; Ali, Mohammad; Naz, Farina; Raihan, Mohammad Jyoti; Rahman, Sheikh Shahed; Siddiqua, Towfida Jahan; Faruque, Abu Syed Golam; Ahmed, Tahmeed", "year": 2022, "type": "Impact Evaluation", "status": "Unknown", "pubType": "Journal article", "journal": "Maternal & Child Nutrition", "doi": "10.1111/mcn.13258", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1111/mcn.13258", "abstract": "Adequate maternal healthcare practices are crucial to both maternal and infant nutrition outcomes. The Sylhet region of Bangladesh is vulnerable and performs poorly, as maternal and child health indicators are falling behind compared to other areas. Suchana, a large-scale intervention programme aims to improve the health and nutritional status of mothers and children in this region. The objective of the present analysis is to assess the changes in indicators related to maternal healthcare practices among Suchana beneficiaries. We obtained data from the Suchana baseline and endline evaluation survey. Descriptive statistics were employed to summarize data. The following maternal healthcare practices were considered: if a Suchana beneficiary mother received antenatal care (ANC) from skilled service providers, took day time resting during pregnancy, consumed additional diet during pregnancy, took at least 100 iron-folic acid (IFA) tablets during pregnancy and took a vitamin A capsule after delivery. Logistic regression analysis was performed to assess the impact of the Suchana intervention on maternal healthcare practices. The prevalence of the outcome variables at endline in the intervention area were as follows: 40% of mothers received at least four ANC from skilled service providers, 50% practiced daytime resting during pregnancy, 51% consumed additional diet during pregnancy, 41% took at least 100 iron-folic acid tablets during pregnancy, 39% received postnatal care and 30% took a vitamin A capsule after delivery. The Suchana intervention significantly, positively improved indicators related to maternal healthcare practices; these findings support future larger-scale programmes to improve maternal healthcare practices among vulnerable people in rural Bangladesh.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Nutrition & Diet"], "methods": ["RCT", "Quasi-experimental"]}, {"id": 48, "title": "Evaluation of Occupational Health And Safety Intervention For The Waste And Sanitation Workers in Bangladesh During COVID-19", "authors": "Shoaib et al.", "authorsFull": "Shoaib,Dewan Muhammad; Ahmed,Tanvir; Tabassum,Kazy Farhat; Hasan,Mehedi; Sharior,Fazle; Rahman,Mahbubur; Farah,Makfie; Rahman,Md Azizur; Ahmed,Alauddin; Tidwell,James B.; Alam,Mahbub-Ul", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "International Journal of Hygiene and Environmental Health", "doi": "https://doi.org/10.1016/j.ijheh.2023.114288", "url": "https://www.sciencedirect.com/science/article/pii/S1438463923001797?via%3Dihub", "abstract": "", "primaryTheme": "WASH", "themes": ["WASH"], "methods": []}, {"id": 49, "title": "Water, Sanitation and Hygiene (WASH) Practices and Deworming Improve Nutritional Status and Anemia of Unmarried Adolescent Girls in Rural Bangladesh", "authors": "Jolly et al.", "authorsFull": "Jolly, Saira Parveen; Chowdhury, Tridib Roy; Sarkar, Tanbi Tanaya; Afsana, Kaosar", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Health, Population and Nutrition", "doi": "10.1186/s41043-023-00453-8", "url": "https://link.springer.com/article/10.1186/s41043-023-00453-8", "abstract": "Background In Bangladesh, undernutrition and anemia are more occurrent among adolescent girls. BRAC, the largest non-governmental organization (NGO), has been implementing a community-based nutrition education service package targeting adolescent girls for reducing their undernutrition and anemia. Objective We aimed to explore the underlying factors associated with nutritional status and anemia among adolescent girls under the BRAC nutrition program areas to improve their existing intervention package. Methodology We conducted a cross-sectional and comparative study in 2016, in 24 upazilas of Bogra, Barguna, Comilla, Dinajpur, Feni, Jessore, and Meherpur districts where the BRAC nutrition program was implemented while the remaining 27 upazilas of those districts were selected as comparison area. We followed a multistage cluster random sampling for selecting 1620 unmarried adolescent girls aged 10–19 years for interviewing in the intervention and comparison areas. Data were collected on socio-demographic information, dietary intake, morbidity, water, sanitation, and hygiene (WASH) practice, anthropometry, and serum hemoglobin (Hb) level by using a pre-structured questionnaire. The nutritional status of the adolescent girls was expressed as height-for-age Z (HAZ) and body mass index-for-age Z (BMIZ) score, while anemia referred to the serum Hb at the level of below 12 g/dl for adolescent girls. All statistical analyses were done in STATA version 17 (Chicago Inc.). Findings The prevalence of stunting (22.9% vs. 22.5%), thinness (12% vs. 14%), and anemia (34.5% vs. 37.3%) exhibited similarities between the intervention and comparison regions. Stunting and thinness were predictors for each other for this population group. Our fndings indicated that adolescent girls who were not washing hands with soap after defecation were likely to be stunted [AOR 1.51 (95% CI 1.12–2.04)], and who did not utilize sanitary latrines had an increased likelihood of being thin [AOR 2.38 (95% CI 1.11–5.08)]. Conversely, those who did not watch television [AOR 1.69 (95% CI 1.12–2.56)] and did not have deworming tablets [AOR 1.33 (95% CI 1.07–1.64)] in the 6 months leading up to the interview had a 69% and 33% higher probability of being anemic, respectively. Conclusion For sustainable improvement in the undernutrition and anemia of adolescent girls, integration of WASH, consistent administration of deworming tablets and broadcasting awareness programs through television are urgent to scale up the nutrition intervention programs in similar settings like Bangladesh.", "primaryTheme": "WASH", "themes": ["WASH", "Nutrition & Diet", "Education & Skills"], "methods": ["RCT"]}, {"id": 50, "title": "Effects of the Involvement of Male Counterparts in the Menstrual Hygiene Management of Women and Adolescent Girls With Disabilities in Selected Sub-districts of Bangladesh: Protocol for a Quasi-experimental Study", "authors": "Murshid et al.", "authorsFull": "Murshid, Munzur E.; Shimpuku, Yoko; Islam, Md Ziaul; Rahman, Md Moshiur; Chen, Sanmei", "year": 2023, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Journal article", "journal": "Other", "doi": "10.7759/cureus.47704", "url": "https://www.cureus.com/articles/198689-effects-of-the-involvement-of-male-counterparts-in-the-menstrual-hygiene-management-of-women-and-adolescent-girls-with-disabilities-in-selected-sub-districts-of-bangladesh-protocol-for-a-quasi-experimental-study?score_article=true#!/authors", "abstract": "Background Women and adolescent girls with disabilities suffer the most difficulties during menstruation days in developing countries like Bangladesh. They deal with menstruation in a hazardous and unclean manner. In Bangladesh, men serve as the family's gatekeepers for health-seeking behavior. But they frequently have no idea how unpleasant and demanding menstruation can be. Menstrual hygiene care for women and adolescent girls with disabilities can be improved by involving male peers. In Bangladesh, no such intervention has been assessed. The purpose of the study is to assess the effects of male participation on menstrual hygiene management of women and adolescent girls with disabilities in Bangladesh. Methods This will be a quasi-experimental study with a sample size of 120 (60 - control, 60 - intervention). The study will be conducted in a sub-district of Bogura and Chapainawabganj in Bangladesh. Inclusion criteria for the study participants are women and adolescent girls with disabilities (intervention and control groups) and male counterparts (intervention group). The exclusion criteria for this study are women and adolescent girls with mental and intellectual disabilities. Engaging male peers in menstrual hygiene management is the key intervention in the study. No blinding or randomization will be applied. The expected primary outcome in the intervention group will be an improvement in the menstrual hygiene management of women and adolescent girls with disabilities in the selected sub-districts of Bangladesh. Two times data will be collected from the intervention and control groups using the ‘Menstrual Practice Needs Scale-36’, ‘Perceived Stress Scale’, and ‘Multi-dimensional Scale of Perceived Social Support’. The analysis of variance (ANOVA) test will be applied to a two-point data series to assess statistical significance. Results The result of the study will be published in a scientific journal. The outcomes of the research will be disseminated to local policymakers and health planners. The health administrator will get evidence-based information on gender-inclusive menstrual hygiene management for women and adolescent girls with disabilities through study result dissemination events. Conclusion This protocol for a quasi-experimental study in Bangladesh highlights the potential advantages of involving male peers in the menstrual hygiene management of women and adolescent girls with disabilities. It may promote gender-inclusive behavior in selected subdistricts of Bangladesh.", "primaryTheme": "Women's Empowerment & Gender", "themes": ["Women's Empowerment & Gender", "WASH"], "methods": ["Quasi-experimental"]}, {"id": 51, "title": "Impact of conditional cash transfer on health outcome of expectant mothers in Bangladesh- Zhaocheng Gu", "authors": "Farjana et al.", "authorsFull": "Farjana, Fariha; Islam, Karimul; Khanam, Rabeya; Mamun, Tasnim Murad", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "International Journal of Social Economics", "doi": "10.1108/IJSE-08-2022-0512", "url": "https://www.emerald.com/insight/content/doi/10.1108/IJSE-08-2022-0512/full/html", "abstract": "Purpose – Conditional Cash Transfer (CCT) aims to assist expectant mothers in low-income households. It might address the insufficient prenatal and postnatal healthcare services in rural areas of low-income nations, including Bangladesh. However, the effectiveness of such intervention is rarely investigated in rural Bangladesh. The study aims to explore the impact of CCT on certain health outcomes of expectant mothers in southwestern rural Bangladesh. Design/methodology/approach – The study applied the quasi-experimental Propensity Score Matching method to assess the effectiveness of CCT in health outcomes of expectant mothers. The authors also deployed logistic regression to explore the predictors of three health issues – blood pressure, hemoglobin adequacy and morning sickness. Findings – The Average Treatment Effect shows that the CCT program significantly improves maternal health by lowering the extent of blood pressure and morning sickness and enhancing the hemoglobin adequacy of the CCT recipient women compared to the non-recipient. The result reveals that CCT beneficiary status as well as the education and immunization are positively and significantly associated with normal blood pressure and hemoglobin adequacy. CCT is also a negative predictor of morning sickness. The study recommends to expand the coverage of the CCT program and also emphasize on the improvement of education, training and immunization for rural pregnant women. Originality/value – To assist in scaling purchasing power and nutritious food for poor pregnant and lactating mothers in low-income households, “Nobojatra” project initiated the CCTs in the southwest region of Bangladesh. Yet, the impact of such cash transfers on their health outcomes is rarely explored in the context of Bangladesh. This study provides evidence regarding the effectiveness of cash transfers to pregnant women of low-income households in rural Bangladesh.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Maternal & Child Health", "Health Systems & Disease Control", "Nutrition & Diet"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 52, "title": "Effect of Gut Microbiota-Directed Complementary Food Supplementation on Fecal and Plasma Biomarkers of Gut Health and Environmental Enteric Dysfunction in Slum-Dwelling Children with Moderate Acute Malnutrition.", "authors": "Mostafa et al.", "authorsFull": "Mostafa, Ishita; Sthity, Rahvia Alam; Lamiya, Umme Habiba; Tariqujjaman, Md; Mahfuz, Mustafa; Hasan, S. M. Tafsir; Ahmed, Tahmeed", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.3390/children11010069", "url": "https://www.mdpi.com/2227-9067/11/1/69", "abstract": "Abstract: Dietary supplementation with a gut microbiota-directed complementary food (MDCF-2) significantly improved weight gain and repaired gut microbiota, as reported in a recent randomized controlled trial on Bangladeshi children with moderate acute malnutrition (MAM). Environmental enteric dysfunction (EED) is a small bowel disorder, and recent evidence shows that it is linked to growth failure in children. Therefore, we intended to investigate whether supplementation with MDCF-2 has any role in modifying gut health by changing the levels of biomarkers of EED and gut inflammation in children with MAM. We randomly assigned 124 children aged 12–18 months to one of two intervention diets, either MDCF-2 or ready-to-use supplementary food (RUSF). Approximately 50 g of the diet was administered in two feeding sessions daily for 12 weeks. Stool and plasma biomarkers were assessed to evaluate intestinal health. Results showed that the average change in citrulline concentration (µmol/L) significantly increased among children who consumed MDCF-2 compared to those who consumed RUSF (mean difference-in-differences: 123.10; 95% CI: 3.60, 242.61; p = 0.044). The research findings demonstrated that MDCF-2 might have a beneficial effect on improving the gastrointestinal health of malnourished children.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["RCT", "DiD"]}, {"id": 53, "title": "Impact of Motivational Workshop on Financial Inclusion of Rural People in Bangladesh: Evidence from Randomized Controlled Trial", "authors": "Morshed et al.", "authorsFull": "Morshed, Md Monzur; Maharjan, Keshav Lall", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.3390/ijfs11040151", "url": "https://doi.org/10.3390/ijfs11040151", "abstract": "Despite the expansion of financial institutions and the proliferation of mobile financial services, reaching the unbanked and bringing them under formal financial services has become a policy concern in many developing countries. Due to the lack of financial accounts, unbanked people prefer informal, risky, and inconvenient mechanisms for receiving, sending, and transferring money. Previous studies rely much on common interventions like no account maintenance and opening fees, easy documentation processes, and money subsidies for opening financial accounts. This study aims to examine the impact of the motivational workshop on opening savings accounts through causality among the unbanked people in a setting where the respondents are unbanked despite having all the requirements and many institutional offers to open savings accounts. We encouraged the unbanked people through a one-hour-long motivational workshop to open savings accounts. Based on our cross-sectional data and randomized controlled trial experiment among the 505 unbanked rural people at Dhubil union under Sirajganj in Bangladesh, we have evidence that motivational workshop positively impacts opening accounts by 32.33 percent. However, the account opening rate differs in terms of respondent’s preference for financial institutions. Our study also finds that unbanked people have the highest preference for mobile financial services for opening accounts resulting in 15.33 percent. The result of this study has some policy implications for adopting effective strategies for universal financial access in many developing countries.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash"], "methods": ["RCT"]}, {"id": 54, "title": "Efficacy of a School-Based Education Intervention on the Consumption of Fruits, Vegetables and Carbonated Soft Drinks Among Adolescents", "authors": "Ahmed et al.", "authorsFull": "Ahmed, Kazi R; Kolbe-Alexander, Tracy; Khan, Asaduzzaman", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Public Health Nutrition", "doi": "https://doi.org/10.1017/S1368980023002094", "url": "https://doi.org/10.1017/S1368980023002094", "abstract": "Objectives: To evaluate the efficacy of a school-based education intervention on the consumption of fruit, vegetables and carbonated soft drinks among adolescents. Design: Cluster-randomised controlled trial. Setting: Eight secondary schools from Dhaka, Bangladesh, participated in this trial and were randomly allocated to intervention (n 160) and control groups (n 160). Participants: A total of 320 students from 8th to 9th grades participated and completed the self-reported questionnaires at baseline, and at 8 and 12 weeks. The intervention included weekly classroom-based nutrition education sessions for students and healthy eating materials for students and parents. Repeated measures ANCOVA was used to assess the effects of the intervention. Results: Daily fresh fruit intake was more frequent in the intervention (26 %) compared to the control group (3 %) at 12 weeks (p = 0·006). Participants from the intervention group also reported a significantly (P < 0·001) higher (49 %) proportion of fresh vegetable intake compared to the control group (2 %) at 12 weeks. Frequency of daily carbonated soft drinks intake decreased (25 %) in the intervention group at 12 weeks compared to baseline, while it remained unchanged in the control group; the interaction effect was observed significant (P = 0·002). Conclusion: Our school-based education intervention increased the daily frequency of fresh vegetables and fruit intake and decreased carbonated soft drink consumption among adolescents in the intervention group. There is a need for scaling up the intervention to engage students and empower them to develop healthy dietary habits.", "primaryTheme": "Education & Skills", "themes": ["Education & Skills", "Nutrition & Diet"], "methods": ["RCT"]}, {"id": 55, "title": "Improved Menstrual Health and the Workplace: An RCT with Female Bangladeshi Garment Workers", "authors": "Czura et al.", "authorsFull": "Czura, Kristina; Menzel, Andreas; Miotto, Martina", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "CESifo Working Paper Series", "doi": "No DOI", "url": "https://www.sciencedirect.com/science/article/pii/S030438782300130X?casa_token=ck7ZKijPL20AAAAA:otXfJB9dbqX9yIFBhRwokIF0LohdcmDYU0Ic0RFavzwDn8p6bgKQgNxe5MMplXPsuIwLInKa", "abstract": "Menstruation can limit female labor force participation, especially in low-income countries, where menstrual hygiene practices are constrained by lack of finances and information. In a randomized controlled trial with around 1,900 female workers from four Bangladeshi garment factories, we relax both constraints individually and jointly by providing free sanitary pads and information on hygienic menstrual practices. Both access to sanitary pads and information improve menstrual practices, either by the adoption of new products, or by knowledge gains and improved use of traditional materials, and both interventions improve health outcomes. However, these positive effects do not translate to better labor outcomes, such as earnings and work attendance.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector", "Women's Empowerment & Gender", "WASH"], "methods": ["RCT"]}, {"id": 56, "title": "Edutainment and the Prevention of Under-Age Marriages: The Evaluation of a Television Series Designed To Promote Positive Role Models in Bangladesh", "authors": "Islam et al.", "authorsFull": "Islam, Muhammed Nazmul; Rabbani, Atonu; Talukder, Animesh; Siddiqua, Rubaiya Riya; Nujhat, Sanjana; Rahman, Mushfiqur; Roy, Antara; Sarker, Malabika", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Development Effectiveness", "doi": "https://doi.org/10.1080/19439342.2023.2195851", "url": "https://www.tandfonline.com/doi/abs/10.1080/19439342.2023.2195851", "abstract": "Edutainment intervention is a popular and inexpensive behavioural change communication toolkit to raise positive social norms through broadcast media. We evaluated a 26-episode nationally broadcasted television series targeted to improve attitudes towards preventing child marriage in Bangladesh. We applied a randomised encouragement design to motivate our subjects to watch the series, addressing their self-selection issues concerning viewership. We randomly assigned a sample of 1,162 households into three arms: (T1) received weekly SMS reminders, (T2) received weekly SMSs and telephone calls, and (C) pure control. We followed up with 1,096 households, collected information on viewership and self-reported attitudes, and conducted a dictator game experiment to understand their revealed attitudes towards child marriage. We found considerable variations in viewership across the arms, suggesting associations with reminder intensity. Compared to the average control group viewership of about 0.15 episodes (SD = 0.82), T2 generated a difference of about 1.50–1.93 episodes (P < 0.01), depending on the respondent types. Following an instrumental variable approach, we found that exposure was not associated with both stated and revealed attitudes towards preventing child marriage. However, we found behavioural experiment was less prone to social desirability bias in assessing sensitive topics such as child marriage", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms", "Education & Skills"], "methods": ["RCT", "IV"]}, {"id": 57, "title": "Conservation Agriculture-Based Sustainable Intensification Improves Technical Efficiency in Northern Bangladesh: The Case of Rangpur", "authors": "Paz et al.", "authorsFull": "Paz, Bruno; Hailu, Atakelty; Rola-Rubzen, Maria Fay; Rashid, Md Mamunur", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.1111/1467-8489.12537", "url": "https://doi.org/10.1111/1467-8489.12537", "abstract": "The dissemination of conservation agriculture (CA) technologies has become the objective of a growing number of projects aimed at reducing food insecurity in vulnerable areas of the world. While many studies have found that CA increases farm productivity, little is known about the components of the productivity gains related to CA adoption. CA is a knowledge-intensive technology, and it is expected to affect both technical efficiency (TE) and input productivity positively. Using cross-sectional farm-level data of 220 maize farmers in Bangladesh, we measure the impact of CA on farmers' TE. We first apply propensity score matching (PSM) to create comparable counterfactual groups of CA and non-CA farmers. Then, we use stochastic frontier with correction for self-selection bias to analyse TE. Finally, we fit a stochastic meta-frontier (SMF) model to the data and use it to compare TE across the two farmer groups. The analysis showed that CA farmers exhibit greater TE levels than non-CA farmers. This can be attributed to enhancements in farm management, leading to 8% and 9% increases in their productivity and TE, respectively. Thus, there is a case for policymakers to strengthen programmes delivering CA technologies that improve food security in Bangladesh.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["PSM"]}, {"id": 58, "title": "Effectiveness of Combined Interventions To Empower Girls and Address Social Norms in Reducing Child Marriage in a Rural Sub-District of Bangladesh: A Cluster Randomised Controlled Trial of the Tipping Point Initiative", "authors": "Naved et al.", "authorsFull": "Naved, Ruchira Tabassum; Mahmud, Sultan; Mamun, Mahfuz Al; Parvin, Kausar; Kalra, Sadhvi; Laterra, Anne; Sprinke, Anne", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Global Health", "doi": "https://dx.doi.org/10.7189/jogh.14.04020", "url": "https://dx.doi.org/10.7189/jogh.14.04020", "abstract": "Background Elimination of girl child marriage (CM) globally at the current pace is projected to take about 300 years. Thus, innovative and effective solutions are urgently warranted. Bangladesh reports one of the highest rates of CM in the world. We present the impact of Tipping Point Initiative (TPI), a combined intervention to empower girls and to address social norms on CM in Bangladesh. Methods A three-arm non-blinded Cluster Randomised Controlled Trial was conducted in 51 villages/clusters in a sub-district of Bangladesh. Clusters were randomly assigned to the arms: Tipping Point Program (TPP), Tipping Point Program Plus (TPP+), and Pure Control. TPP conducted 40 weekly single-gender group sessions with never-married adolescent girls and boys recruited at 12−<16 years; and 18-monthly gender-segregated group sessions with the parents. On top of TPP, TPP+ included cross-gender and -generation dialogues, girls’ movement building and girl-led community sensitisation. Intention-to-treat analysis was performed to assess the impact of TPI on the hazard of CM, the primary outcome. The impact of girls’ session attendance on CM was also assessed. At baseline 1275 girls (TPP=412; TPP+=420; Control=443) were interviewed between February–April 2019. At endline 1123 girls (TPP=363; TPP+=366; Control=394) were interviewed and included in the analyses. Results No intervention impact was detected on the full sample (TPP vs. Control: adjusted hazard ratio (aHR)=1.14; 95% CI=0.79–1.63, P=0.47), (TPP+vs. Control: aHR=1.24; 95% CI=0.89–1.71, P=0.19, (TPP vs. TPP+: aHR=1.03; 95% CI=0.72–1.47, P=0.87). However, in the TPP arm, the hazard of CM was reduced by 54% (aHR=0.46; 95% CI=0.23–0.92, P=0.03) among the girls in the highest tertile of session attendance, compared to the lowest. In the TPP+arm, this hazard was reduced by 49% (aHR=0.51; 95% CI=0.23–0.92, P=0.03) among girls in the highest tertile, compared to the lowest tertile. Conclusions Although TPI did not show an effect on CM in any of the intervention arms, within each intervention arm, a positive effect was detected in reducing CM among girls in the highest tertile of session attendance despite implementation challenges due to COVID-19.", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms"], "methods": ["RCT"]}, {"id": 59, "title": "The Process of Scaling an Early Childhood Development Parenting Programme by Integrating Into Primary Health Care Services in Bangladesh.", "authors": "Mehrin", "authorsFull": "Mehrin, Syeda F", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Thesis", "journal": "", "doi": "No DOI", "url": "https://research.bangor.ac.uk/portal/en/theses/the-process-of-scaling-an-early-childhood-development-parenting-programme-by-integrating-into-primary-health-care-services-in-bangladesh(3ee2e794-bd8c-4594-914b-dfa8ac774abd).html", "abstract": "We conducted a cluster-randomised controlled trial in 40 community clinics in the Kishorganj district of Bangladesh. We randomly assigned clinics (1:1) to deliver a group-based parenting interventions or to a comparison group that received no intervention. Participants were children aged 5-24 months, with weight-for-age z-score of ≤ -1.5 SDs of the WHO standards, living within a thirty-minute walking distance from the clinic (n=419 intervention, 366 control). Government health staff facilitated parenting sessions in the clinic with groups of four mother/child dyads fortnightly for one year as part of their routine duties.", "primaryTheme": "Early Childhood Development", "themes": ["Early Childhood Development"], "methods": ["RCT"]}, {"id": 60, "title": "Learning from Self and Learning from Others: Experimental Evidence from Bangladesh", "authors": "Florence Kondylis et al.", "authorsFull": "Florence Kondylis; John Loeser; Mobarak, Ahmed Mushfiq; Maria Jones; Daniel Stein", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "Policy Research Working Paper Series", "doi": "Not specified", "url": "https://documents.worldbank.org/en/publication/documents-reports/documentdetail/099859108102328324/idu01b511bf60206204197098e30c0ea53ab56d1", "abstract": "Can decentralizing demonstration accelerate learning about new technologies? This paper randomizes access to a fixed demonstration kit for new flood-saline-resilient seeds across villages in Bangladesh, with demonstration either by a single farmer or spread across many farmers. In the short run, higher learning from self and others under decentralization increases technology adoption. In the long run, the impacts of any demonstration persist, but the additional impacts of decentralization vanish. A Bayesian model of learning the returns to a new technology suggests belief dispersion caused noisy adoption along the learning path, and farmers’ expected gains from demonstration are four times higher under decentralization.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment"], "methods": []}, {"id": 61, "title": "The Importance of Nutrition Education in Achieving Food Security and Adequate Nutrition of the Poor: Experimental Evidence from Bangladesh", "authors": "TAUSEEF", "authorsFull": "TAUSEEF, SALAUDDIN", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Oxford Bulletin of Economics and Statistics", "doi": "10.1111/obes.12465", "url": "https://onlinelibrary.wiley.com/doi/epdf/10.1111/obes.12465", "abstract": "Nutrition-sensitive social protection that enhances household resources and nutrition knowledge can be an important avenue of addressing food security and nutrition concerns of the poor. This paper studies a cluster randomized intervention of cash and food transfers, with or without nutrition behavioral change communication (BCC), on food security and nutrition outcomes in rural Bangladesh. We find that addition of the BCC to transfers led to the greatest impact on the quantity and quality of food consumed by household members, especially women and children. Addition of BCC also had the greatest impact in reducing the incidence and intensity of deprivations measured using a nutrition-sensitive multidimensional poverty index. Evidence suggests this occurs through the BCC inducing increased consumption of flesh food, egg, dairy, fruits, and vegetables and through investments in housing, sanitation, and assets", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet", "Education & Skills", "WASH", "Social Protection & Safety Nets"], "methods": ["RCT"]}, {"id": 62, "title": "The Impact of Antenatal Balanced Plate Nutrition Education for Pregnant Women on Birth Weight: a Cluster Randomised Controlled Trial in Rural Bangladesh", "authors": "Chowdhury et al.", "authorsFull": "Chowdhury, Morseda; Raynes-Greenow, Camille; Alam, Ashraful; Dibley, Michael J", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "BMJ Open", "doi": "https://doi.org/10.3390/nu14214687", "url": "https://www.mdpi.com/2072-6643/14/21/4687", "abstract": "Low birth weight (LBW) is a global public health problem with the highest prevalence in South Asia. It is strongly associated with maternal undernutrition. In South Asia, intra-household food distribution is inequitable, with lower dietary adequacy in women. Evidence that nutrition education improves diet during pregnancy and reduces LBW is weak. We assessed the impact of nutrition education for pregnant women on birth weight in rural Bangladesh. We conducted a parallel, two-arm, cluster-randomised controlled trial, with 36 clusters allocated equally to intervention (n = 445) or standard care (n = 448). From their first trimester until delivery, intervention participants received education about eating balanced meals to meet daily dietary requirements with diverse food groups. The primary outcome of mean birth weight was 127.5 g higher in the intervention compared to control women, and the intervention reduced the risk of LBW by 57%. Post hoc analyses showed a significantly higher birth weight and a greater reduction in LBW amongst adolescent mothers. The mean number of food groups consumed was significantly higher in the intervention from the third month of pregnancy than in the control. A community-based balanced plate nutrition education intervention effectively increased mean birth weight and reduced LBW, and improved dietary diversity in rural Bangladeshi women.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Education & Skills"], "methods": ["RCT"]}, {"id": 63, "title": "Effect of Nutrition Counselling With a Digital Job Aid on Child Dietary Diversity: Analysis of Secondary Outcomes From a Cluster Randomised Controlled Trial in Rural Bangladesh", "authors": "Billah et al.", "authorsFull": "Billah, Sk Masum; Ferdous, Tarana E.; Kelly, Patrick; Raynes-Greenow, Camille; Siddique, Abu Bakkar; Choudhury, Nuzhat; Ahmed, Tahmeed; Gillespie, Stuart; Hoddinott, John; Menon, Purnima; Dibley, Michael John; Arifeen, Shams El", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Maternal & Child Nutrition", "doi": "10.1111/mcn.13267", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1111/mcn.13267", "abstract": "Adequate dietary diversity among infants is often suboptimal in developing countries. We assessed the impact of nutrition counselling using a digital job aid on dietary diversity of children aged 623 months using data from a cluster randomised controlled trial in Bangladesh. The trial had five arms, each with 25 clusters. The four intervention arms provided counselling using a digital job aid and different prenatal and post-natal combinations of lipid-based supplements and the comparison arm with usual practice. We enrolled 1500 pregnant women and followed them until the children reached their second birthday. We developed a tablet-based system for intervention delivery, data collection and project supervision. We combined the four intervention arms (n = 855), in which community health workers (CHWs) provided age-appropriate complementary feeding counselling, to compare against the comparison arm (n = 403). We calculated the outcome indicators from the children's 24-h dietary recalls. Overall, the intervention increased the mean dietary diversity score by 0.09 (95% confidence interval [CI]: 0.20.16) and odds of minimum dietary diversity by 18% (95% CI: 0.991.40). However, there was a significant interaction on the effect of the intervention on dietary diversity by age. The mean dietary diversity score was 0.24 (95% CI: 0.110.37) higher in the intervention than in the comparison arm at 9 months and 0.14 (95% CI: 0.0127) at 12 months of age. The intervention effect was non-significant at an older age. Overall, consumption of flesh food was 1.32 times higher in the intervention arm (odds ratio [OR] 1.32, 95% CI: 1.111.57) in 623 months of age. The intervention significantly improved child dietary diversity score in households with mild and moderate food insecurity by 0.27 (95% CI: 0.060.49) and 0.16 (0.0527), respectively, but not with food-secure and severely food-insecure households. Although the study did not evaluate the impact of digital job aid alone, the findings indicate the utility of nutrition counselling by CHWs using a digital job aid to improve child feeding practices in broader programmes.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Health Systems & Disease Control", "Agriculture & Food Security", "Maternal & Child Health"], "methods": ["RCT"]}, {"id": 64, "title": "The Impact of Unconditional Cash and Food Assistance on Contraceptive Expenditure of Rural Households in Coastal Bangladesh: Evidence from Fuzzy RDD", "authors": "Bari et al.", "authorsFull": "Bari, Abdul; Ghulam, Khan; He, Bing; Yoshira, Yuichiro", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "PLoS One", "doi": "10.1371/journal.pone.0262031", "url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0262031", "abstract": "This study investigates the impact of unconditional cash and food (UCF) assistance on themonthly contraceptive expenditure of rural households in coastal Bangladesh using a fuzzyregression discontinuity design (RDD). Eligibility for UCF assistance was based on the running variable of land ownership in acres. We used eligibility as an instrumental variable toestimate the local average treatment effect of UCF assistance on contraceptive expenditures.
