sabilities (ages 14–35) living in poverty. It is a disability-targeted adaptation to an existing, effective intervention (STAR), which has been designed to address barriers to decent work for people with disabilities. This protocol describes the design of a cluster randomised controlled trial of STAR+ in 39 of the 64 districts of Bangladesh.MethodsBRAC has identified 1500 youth with disabilities eligible for STAR+ across its 91 branch offices (typically a geographical areas covering about 8 km radius from local BRAC office) catchment areas (clusters). BRAC has limited funding to deliver STAR+ and so 45 of the 91 branches have been randomly allocated to implement STAR+ (intervention arm). The remaining 46 branches will not deliver STAR+ at this time (control arm). Participants in the control-arm will receive usual care, meaning they are free to enrol in any other livelihood programmes run by BRAC or other organisations including standard STAR (being run in 15 control branches). The cRCT will assess the impact of STAR+ after 12 months on employment status and earnings (primary outcomes), as well as poverty, participation and quality of life (secondary outcomes). Analysis will be through intention-to-treat, with a random mixed effect at cluster level to account for the clustered design. Complementary qualitative research with participants will be conducted to triangulate findings of the cRCT, and a process evaluation will assess implementation fidelity, mechanisms of impact and the role of contextual factors in shaping variations in outcomes.DiscussionThis trial will provide evidence on the impact of a large-scale, disability-targeted intervention. Knowledge on the effectiveness of programmes is critical for informing policy and programming to address poverty and marginalisation amongst this group. Currently, there is little robust data on the effectiveness of livelihood programmes amongst people with disabilities, and so this trial will fill an important evidence gap.", "primaryTheme": "Social Protection & Safety Nets", "themes": ["Social Protection & Safety Nets", "Labour, Jobs & Garment Sector"], "methods": ["RCT"]}, {"id": 101, "title": "Tackling Women's Unemployment: Evidence from an Online Freelancing Experiment in Bangladesh", "authors": "Das et al.", "authorsFull": "Das, Narayan; Arman, Md. Raied; Bhattacharjee, Anindita; Gomes, Mohima; Mahmood, Sakib", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "SSRN Electronic Journal", "doi": "10.2139/ssrn.4843957", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4843957", "abstract": "In developing countries, cultural barriers often limit women’s movement outside the household. With the additional burden of childcare requiring flexible working hours and a muted demand for female employment in local markets, women’s labor force participation has persistently lagged in these countries. Providing remote work, flexible hours, and linkages to the global market, online freelancing offers a promising avenue to mitigate female unemployment. In this paper, we experimentally measure the effects of online freelancing training on females. Results indicate that a year after the intervention, women in treatment are 19% more likely to be employed, with a corresponding increase in income by 40% and hours worked by 29%. Welfare, as proxied by food expenditure, increases by 29%. Even though more than a half the participants were students, the program does not reduce school enrollment. The benefit-cost ratio of the intervention is estimated at 6.55, suggesting considerable benefits compared to costs.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector"], "methods": []}, {"id": 102, "title": "The Effects of Job Training on Labour Market Outcomes: Evidence from Bangladesh", "authors": "Adiba et al.", "authorsFull": "Adiba, Afsana; Ahmed, Md. Shakil; Das, Narayan; Islam, Md. Karimul; Mozumder, Tanvir Ahmed; Siddiquee, Muhammad Shahadat Hossain", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The Journal of Development Studies", "doi": "10.1080/00220388.2025.2525848", "url": "https://www.tandfonline.com/doi/full/10.1080/00220388.2025.2525848?src=", "abstract": "Youth unemployment has been a decisive policy concern for both developing and developed economies, and many labour market interventions (for example, job training) have been put in place to bring unemployed youth into productive activities. This study conducts a randomised controlled trial of a job training programme that provides on-the-job and classroom training to disadvantaged youth living in urban areas of Bangladesh. ITT results show that 12 months after the intervention, the programme increases earnings by 28 per cent (LATE is 48%) and this is mainly achieved by the substantial effects on women’s earnings. The effect on employment is positive though not statistically significant. Moreover, findings suggest that the programme has increased hours worked, labour productivity, and career progression. The benefit-cost ratio of the programme is estimated at 1.93, suggesting that the programme can be scaled up cost-effectively.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector"], "methods": ["RCT"]}, {"id": 103, "title": "The Impact of an Online Job Fair: Experimental Evidence from Bangladesh", "authors": "Matsuda et al.", "authorsFull": "Matsuda, Norihiko; Hayashi, Ryotaro", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "Asian Development Bank (ADB) Economics Working Paper Series", "doi": "10.22617/WPS230227-2", "url": "https://www.adb.org/publications/impact-online-job-fair-experimental-evidence-bangladesh", "abstract": "Online job fairs are a new labor market intervention. This paper provides the first experimental evidence on their impact by evaluating an online fair for information and communication technology jobs in Bangladesh. The fair generated a non-negligible number of job offers; however, over 90% of them were rejected, so no effect on employment probability or type was found. Interestingly, jobseekers lowered their reservation wages, kept their jobs longer, and ended up in worse skill-matched jobs. The reason is that jobseekers initially had overoptimistic expectations, but learned about market conditions at the fair, lowered their expectations, and became discouraged from job search. As a result, those who had already been employed kept their jobs longer, even if the jobs did not match their skills, and those who had initially been unemployed ended up with lower employment probabilities and lower skill-match quality.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector"], "methods": []}, {"id": 104, "title": "Three Essays on Applied Economics", "authors": "Mahmood", "authorsFull": "Mahmood, Towhid Iqram", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Thesis", "journal": "Master's Theses", "doi": "No DOI", "url": "", "abstract": "This dissertation comprises three distinct studies that collectively examine critical aspects of applied economics through empirical analysis and theoretical insights. The first essay investigates the impact of anti-sweatshop activism on employment and firm dynamics in Bangladesh's garment industry following the Rana Plaza disaster. Utilizing the synthetic control method, the study reveals significant reductions in both the number of garment factories and employment, highlighting the complex trade-offs between improved safety standards and economic outcomes in developing economies. The second essay studies the causal relationship between corruption control and press freedom using matching methods. The analysis demonstrates that improved corruption control significantly increases press freedom over the medium to long term. However, the reverse effect is less evident, suggesting the need for complementary institutions to amplify the benefits of press freedom in curbing corruption. The third essay assesses the economic and political impacts of Bangladesh's transition from autocracy to democracy in 1991 and subsequent economic liberalization. Applying the synthetic control method, the study finds that while there were noticeable improvements in economic and social indicators post-transition, these changes were not statistically significant when compared to a constructed counterfactual. This underscores the nuanced and context-dependent nature of democratic and economic reforms. Together, these essays contribute to the broader discourse on the intersection of economic policies, institutional reforms, and development outcomes, providing valuable insights for policymakers and scholars in applied economics.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector", "Climate, Energy & Environment", "Trade & Macroeconomy"], "methods": []}, {"id": 105, "title": "Impact of Facility Based Versus Home Based Growth Monitoring and Promotion Programs on Child Nutritional Status in Rural Bangladesh.", "authors": "Hossain", "authorsFull": "Hossain, Muttaquina", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Scientific Reports", "doi": "https://dx.doi.org/10.1038/s41598-025-33899-3", "url": "https://dx.doi.org/10.1038/s41598-025-33899-3", "abstract": "The delivery platform for growth monitoring and promotion (GMP) programs to improve child nutrition remains debated. This study compared the impact of facility-based plus nongovernmental organization supported home-based GMP (FGMP+NGO-supported HGMP) versus facility-based GMP (FGMP) on child nutritional status in rural Bangladesh. Using a quasi-experimental design, 1,519 children aged 6–12 months were enrolled in each program and assessed at baseline and after 12 months. The primary outcome was linear growth (length-for-age Z-scores, LAZ), while secondary outcomes included weight-for-age (WAZ), weight-for-height (WHZ), stunting, wasting, and underweight prevalence, minimum dietary diversity, minimum meal frequency, and caregivers’ complementary feeding practices. Child linear growth (Difference-in-difference, D-I-D: -4.5; 95% CI: -15.2, 6.1) and weight (D-I-D: -3.5; 95% CI: - 11.7, 4.6) faltered in both groups, with no significant differences between the programs. Stunting (D-I-D: 2.8%; 95% CI: -1.3, 7.1) and wasting (D-I-D: 0.43%; 95% CI: -3.2, 4.1) prevalence increased equally across programs. Underweight prevalence rose more in FGMP+NGOsupported HGMP (D-I-D: 4.7%; 95% CI: 1.7,7.8) than in FGMP programs. Caregivers in FGMP areas showed slight improvements in complementary feeding practices (D-I-D: -1.4%; 95% CI:- 6.5, 3.7) and significantly improved meal frequency (D-I-D: -4.7%; 95% CI: -9.1,-0.3). No significant differences were observed in minimum dietary diversity (D-I-D: -1.5%; 95% CI: -6.1, 3.1) or acceptable diet (D-I-D: -2.0%; 95% CI: -6.6, 2.6) between the programs. Findings highlight the need to strengthen both FGMP and FGMP+NGO-supported HGMP programs by actively engaging caregivers and incorporating the influential role of family members and local social networks, which appeared to have a stronger impact on child feeding practices than GMP providers.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["DiD", "Quasi-experimental"]}, {"id": 106, "title": "The Impact of Entrepreneurship Training and Credit on the Labour Market Outcomes of Disadvantaged Young People", "authors": "Khan et al.", "authorsFull": "Khan, Tahsina Naz; Bhattacharjee, Anindita; Das, Narayan; Hossain, Marzuk A. N.; Rahman, Atiya; Tabassum, Asma", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Development in Practice", "doi": "10.1080/09614524.2024.2312387", "url": "https://www.tandfonline.com/doi/full/10.1080/09614524.2024.2312387", "abstract": "", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Labour, Jobs & Garment Sector"], "methods": []}, {"id": 107, "title": "Social Learning among Urban Manufacturing Firms: Energy-Efficient Motors in Bangladesh", "authors": "Verhoogen et al.", "authorsFull": "Verhoogen, Eric; Chaurey, Ritam; Gu, Yunfan; Nayyar, Gaurav; Sharma, Siddharth", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "NBER Working Paper Series", "doi": "10.3386/w34296", "url": "https://www.nber.org/papers/w34296", "abstract": "Knowledge spillovers among firms are widely viewed as a key driver of agglomeration and growth, but are difficult to estimate cleanly. We randomly allocated an energy-efficient motor --- a “servo'” motor --- among leather-goods firms in Dhaka, Bangladesh, and tracked adoption, information flows, beliefs about energy savings, and other variables. We use the difference between actual exposure and expected exposure (from simulated randomization draws) to identify the effect of exposure. We find a robust positive effect of exposure to treated neighbors within a small geographic area (500 meters in our baseline specification) on information flows and adoption. A marginal value of public funds (MVPF) calculation taking learning spillovers into account yields a significantly larger value than one considering only treated firms and suggests that adoption subsidies would be a cost-effective policy intervention.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Agriculture & Food Security", "Financial Inclusion & Cash"], "methods": ["RCT"]}, {"id": 108, "title": "Building Resilience in the Chars of Bangladesh: An Impact Assessment", "authors": "Milanz", "authorsFull": "Milanz, Elasma", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of International Development", "doi": "https://doi.org/10.1002/jid.3653", "url": "https://doi.org/10.1002/jid.3653", "abstract": "Recent evidence highlights that integrated interventions have sustainable impacts on household welfare. This paper evaluates the ‘Char Development and Settlement Program,’ which targets marginalized, coastal populations of Bangladesh and is implemented by the NGO BRAC, which pioneers integrated programs in over 20 countries. The analysis exploits household panel data (2012, 2016) for over 2500 households living in 11 chars to measure the impact of a programme, comprising microfinance, health services and legal aid. Employing a difference‐in‐difference approach, we find considerable, programme‐induced increases in consumption, food security and legal awareness suggesting that an integrated ‘big push’ is efficient for poverty alleviation.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Agriculture & Food Security", "Financial Inclusion & Cash"], "methods": []}, {"id": 109, "title": "Impact of Integrated Community-Facility Interventions Model on Neonatal Mortality in Rural Bangladesh- A Quasi-Experimental Study", "authors": "Huda", "authorsFull": "Huda, Tanvir M.", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "PLoS One", "doi": "https://doi.org/10.1371/journal.pone.0274836", "url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0274836", "abstract": "BackgroundNeonatal mortality remains unacceptably high in many countries. WHO recommends that all newborns be assessed during the postnatal period and should seek prompt medical care if there is any danger sign. However, in many developing countries, only a small proportion of women receive postnatal care. Also, the quality of care in public health facilities is sub-optimal.MethodsWe designed an intervention package that included community health worker-assisted pregnancy and birth surveillance, post-natal visits to assess newborns on the first, third, seventh and twenty-eighth days of birth, referral for facility-based care, and establishing a newborn stabilization unit at the first level referral health facility. We did a quasi-experimental, propensity-score matched, controlled study in the Sylhet region of Bangladesh. We used a cross-sectional survey method at baseline and endline to measure the effect of our intervention. We considered two indicators for the primary outcome–(a) all-cause neonatal mortality rate and (b) case fatality of severe illness. Secondary outcomes were the proportion of neonates with signs and symptoms of severe illness who sought care in a hospital or a medically qualified provider.ResultsOur sample size was 9,940 live births (4,257 at baseline, 5,683 at end line). Our intervention was significantly associated with a 39% reduction (aRR = 0.61, 95% CI: 0.40–0.93; p = 0.046) in the risk of neonatal mortality and 45% reduction (aRR = 0.55, 95% CI: 0.35–0.86; p = 0.001) in the risk of case fatality of severe illness among newborns in rural Bangladesh. The intervention significantly increased the care-seeking for severe illness at the first-level referral facility (DID 36.6%; 95% CI % 27.98 to 45.22; p<0.001).InterpretationOur integrated community-facility interventions model resulted in early identification of severely sick neonates, early care seeking and improved treatment. The interventions led to a significant reduction in all-cause neonatal mortality and case fatality from severe illness.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Health Systems & Disease Control"], "methods": ["Quasi-experimental"]}, {"id": 110, "title": "Can Adaptive Co-Management Reduce Poverty and Inequality in the Coastal Fishing Community? An Impact Evaluation in the Riverine System in Bangladesh", "authors": "Haque", "authorsFull": "Haque, A.B.M. Mahfuzul", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "Other", "doi": "", "url": "https://www.sciencedirect.com/science/article/abs/pii/S2352485522003164", "abstract": "Adaptive co-management is an effective tool for reducing poverty among poor fishers who lives in the coastal fisheries. This approach can ensure the highest possible sustainable output from capture fisheries, increasing revenue and reducing inequality. Using household panel data from coastal areas of Bangladesh, this study assessed the impact of ECOFISH project’s adaptive co-management approach on poverty, income and inequality through difference in differences (DiD) method. Using two-stage cluster sampling, data was collected from 1200 fishers’ households of six coastal districts, which were separated into project and control groups. Poverty and inequality were measured using the Foster–Greer–Thorbecke (FGT) indices and Gini decomposition, respectively. In addition, a fixed-effect model was also employed to identify the factors influencing their income change. The findings from DiD reveal that the project had a positive impact on the fisher’s income, especially in the case of fishing and on-farm sources. Due to the unconfined implementation in open-water fisheries, the study had minor effects on inequality. However, the adaptive co-management approach effectively reduced poverty among the fishers. Moreover, the intensity and severity of their poverty situation had significantly declined. The fixed-effect model elicited that ECOFISH has successfully increased fishing and total income, whereas the off-farm income was curtailed. The household head’s age, size, fishing boat ownership, varied livelihood, social network, and household assets contributed to a considerable rise in overall income. This research could help policymakers in the food systems approach make better judgments on poverty reduction.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["DiD"]}, {"id": 111, "title": "Seasonal Influenza Vaccine Uptake Among Healthcare Workers in Tertiary Care Hospitals, Bangladesh: Study Protocol for Influenza Vaccine Supply and Awareness Intervention", "authors": "Hassan", "authorsFull": "Hassan, Md Zakiul", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "—", "journal": "BMC Public Health", "doi": "https://doi.org/10.1186/s12889-022-14182-w", "url": "https://link.springer.com/article/10.1186/s12889-022-14182-w", "abstract": "BackgroundHealthcare workers (HCWs), such as doctors, nurses, and support staffs involved in direct or indirect patient care, are at increased risk of influenza virus infections due to occupational exposures. Vaccination is the most effective way to prevent influenza. Despite the World Health Organization (WHO) recommendations, Bangladesh lacks a seasonal influenza vaccination policy for HCWs, and thus vaccination rates remain low. The current project aims to investigate the effect of interventions on influenza vaccine awareness and availability of vaccine supply, explore HCWs’ knowledge and perceptions about influenza vaccination, understand the barriers and motivators for influenza vaccine uptake, and understand policymakers' views on the practicality of influenza vaccination among HCWs.MethodWe will conduct the study at four tertiary care teaching hospitals in Bangladesh, using a cluster randomized controlled trial approach, with the hospital as the unit of randomization and intervention. The study population will include all types of HCWs.The four different types of intervention will be randomly allocated and implemented in four study hospitals separately. The four interventions will be: i) ensuring the availability of influenza vaccine supply; ii) developing influenza vaccine awareness; iii) both ensuring influenza vaccine supply and developing influenza vaccine awareness and iv) control arm with no intervention. Both quantitative and qualitative approaches will be applied to assess the intervention effect. We will estimate the Difference in Differences (DID) with 95% CI of the proportion of vaccine uptake between each intervention and control (non-intervention) arm, adjusting for the clustering effect. The qualitative data will be summarised using a framework matrix method.DiscussionThe results of this study will inform the development and implementation of a context-specific strategy to enhance influenza vaccination rates among Bangladeshi HCWs.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["RCT", "DiD"]}, {"id": 112, "title": "Engaging Rural Communities in Bangladesh to Address Antimicrobial Resistance via the Community Dialogue Approach: A Protocol for a Cluster-Randomized Controlled Trial.", "authors": "King", "authorsFull": "King, Rebecca", "year": 2025, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Journal article", "journal": "Frontiers in public health", "doi": "https://dx.doi.org/10.3389/fpubh.2025.1432635", "url": "https://dx.doi.org/10.3389/fpubh.2025.1432635", "abstract": "Introduction: To effectively tackle antibiotic resistance (ABR) a One Health approach is required, focusing on the human, animal and environmental sectors together, and that public education and engagement programs must be part of the overall approach. However, there has been limited research on such programs in low−/middle-income countries (LMICs). Here we describe our plans to evaluate a community-engagement program, known as the community dialogue approach, that takes a One Health approach to tackling ABR in rural communities in Bangladesh, and involves community-led and community-based education and discussion forums. Members of our team previously developed this approach and used it to address other health issues in other LMIC contexts, while our team has previously adapted it for this topic and setting. Methods: We will use a pragmatic, non-blinded, two-arm, parallel-group, clusterrandomized, controlled trial to primarily evaluate whether the intervention can improve (1) the level of correct and appropriate knowledge about antibiotics, ABR, and antibiotic usage from a One Health perspective, (2) levels of awareness about the existence of antibiotics and ABR, and (3) the relative frequency of selfreported and observable indicators of best practices related to antibiotic usage. Within Cumilla district, we will randomize 50 clusters of villages in a 1:1 ratio. In intervention community clusters trained community volunteers will deliver a set of 11 health education and discussion forums across a 12-month period, while control community clusters will receive no inputs. We will collect outcomes at baseline (pre-randomization) and endline (following the final community dialogue) via two repeated cross-sectional household surveys (each aiming to survey 2,200 participants across all clusters). We will also conduct nested process evaluation and costing studies. Discussion: Community engagement approaches have successfully addressed other health issues in low resource settings, but there is limited evidence on using community engagement approaches to address ABR in low resource contexts, particularly in Bangladesh. We will closely involve the Bangladeshi health system in this research to ensure feasibility and facilitate scale-up via an embedded approach. Clinical trial registration: https://doi.org/10.1186/ISRCTN93756764, identifier ISRCTN93756764.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["RCT"]}, {"id": 113, "title": "Effectiveness of an Integrated Community-Based Livelihood and Rehabilitation Intervention on the Social Capital of Caregivers of Children With Cerebral Palsy: Secondary Analysis of an Existing Cluster Randomized Controlled Trial in Rural Bangladesh", "authors": "Asali", "authorsFull": "Asali, Muhammad", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.3390/children12121687", "url": "https://doi.org/10.3390/children12121687", "abstract": "Background/Objectives: Social capital is a multifaceted concept that comprises structural and cognitive portions, and from the perspective of caregivers, it enables access to assistance and participation, improving well-being in resource-constrained settings. In lowand middle-income countries (LMICs) like Bangladesh, mothers are often the sole carers of children with cerebral palsy (CP), which may affect their social capital and livelihood; however, evidence in this regard is limited. This study assessed the effectiveness of integrated microfinance and community-based rehabilitation (IMCBR) on caregivers’ social capital in rural Bangladesh. Methods: This study was part of a randomized controlled trial (RCT) conducted in Shahjadpur, Sirajganj, with three study arms. Children aged ≤5 years with CP and their primary caregivers were enrolled. Twenty-four clusters (10–14 child–caregiver pairs per cluster) were randomly assigned to Arm-A: IMCBR, Arm-B: community-based rehabilitation (CBR) only, and Arm-C: standard care. Data were collected at the baseline, midline (6 months), and endline (12 months) using a structured questionnaire. Social capital was measured using the Short Adapted Social Capital Assessment Tool (SASCAT), which assesses structural and cognitive dimensions; higher scores indicated greater social capital. The SASCAT was culturally adapted and validated for use in Bangladesh. Descriptive, bivariate, and multivariate analyses were performed. Results: There were 251 dyads enrolled into the trial. At baseline, Arm-A had the lowest social capital scores but showed the greatest improvement by endline (60.0%), followed by Arm-B (54.1%) and Arm-C (6.0%). Structural social capital increased significantly in Arm-A compared with Arm-C (mean difference 2.88; 95% CI: 2.45–3.31; p 0.05). In Arm-A, improvements in social capital were inversely associated with the child’s Gross Motor Function Classification System (GMFCS) level (β = −0.69; 95% CI: −1.28 to −0.10; p < 0.05). Conclusions: IMCBR significantly improved caregivers’ social capital, particularly its structural components, in rural Bangladesh.", "primaryTheme": "Child Marriage & Social Norms", "themes": ["Child Marriage & Social Norms", "Financial Inclusion & Cash"], "methods": ["RCT"]}, {"id": 114, "title": "Effect of the Social Safety Net on Child Labor and School Retention in Bangladesh: Empirical Evidence from HIES 2016", "authors": "Emran", "authorsFull": "Emran, Sheikh Jafar", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The Journal of Developing Areas", "doi": "10.1353/jda.2024.a924536", "url": "https://muse.jhu.edu/article/924536", "abstract": "In Bangladesh Social Safety Net (SSN) interventions are intended to achieve specific goals, e.g., reduction in poverty, decrease in early school dropout, and nutrition supplementation. This study investigates the effectiveness of SSN participation on less explored goals of child labor reduction and school retention in Bangladesh. Empirical evidence is provided to evaluate the success of existing programs to combat child labor and early school dropout. This study utilizes the Household Income and Expenditure Survey (HIES), 2016 of Bangladesh. We employ the Propensity Score Matching (PSM) framework to show the causal relationship between SSN participation and its impact on the use of child labor and school retention. Given the nature and availability of data, the matching method provides us an estimate of the impact of SSN based on a quasi-experimental setting. We estimate counterfactuals based on observed characteristics of the household that affect both SSN participation and our outcome variables. Our results suggest that households that receive SSN tend to employ less child labor domestic or paid compared to their counterparts. Our Propensity Score Matching (PSM) results show that SSN participation reduces child labor prevalence in Bangladesh by 2.4% to 2.9%. This is an indication that families essentially substitute SSN income with child labor earnings. Thus, SSN programs in Bangladesh are effective in reducing child labor though the magnitude is not overwhelming. On the contrary, our results show that children from SSN-participating families have a higher incidence of early school dropout. This may be due to inefficiency or poorly designed programs that effectively keep the children in school. We estimate early school dropout is higher by 3.6% to 6.6% for households that receive SSN compared to the control group. Our findings are important for policymakers to redesign the programs that retain children in school. We suggest targeted interventions that will help to keep these children in school, which is conducive to human capital accrual and increasing lifetime earnings. Additionally, our insights will assist policymakers in rethinking SSN coverage, efficient selection of beneficiaries, and initiation of the correct intervention.", "primaryTheme": "Social Protection & Safety Nets", "themes": ["Social Protection & Safety Nets", "Nutrition & Diet"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 115, "title": "Essays on Health Behaviors in Developing Countries", "authors": "Sardar", "authorsFull": "Sardar, Ferdous Zaman", "year": 2022, "type": "Impact Evaluation", "status": "Unknown", "pubType": "Thesis", "journal": "University of Washington", "doi": "No DOI", "url": "https://digital.lib.washington.edu/researchworks/items/f8303413-9b44-4b13-b483-faa63f1f1832/full", "abstract": "This thesis contains three essays on how access to health care and health information affect health behaviors and health beliefs in developing countries. In the first chapter, I study why rural households in Bangladesh keep seeking health advice from untrained informal providers when mobile health services (MHS) are freely available from qualified public healthcare providers and how they can be nudged to adopt the MHS. Using a randomized controlled trial among 2900 rural households from 580 neighborhoods in Bangladesh, this paper studies whether and how the adoption of mobile health services can be improved. I find that information about the service improves households’ awareness by more than 30 percentage points but does not affect the adoption in the following two months. Among the participants who were also encouraged to call at one of the MHS phone numbers to see how the service works, 63% attempted during the intervention and 22% of them used the service in the following two months. The adoption of MHS decreases households’ health expenditure, mostly driven by the reduction in medicine consumption. This happened because households, who adopted MHS, also made fewer visits to informal providers who usually overprescribe medicine. The second chapter studies how information can affect people’s health risk beliefs and health behaviors. The local prevalence of infections and the severity of its consequences are among the key determinants of the adoption of preventive behaviors for an infectious disease. By conducting a survey among more than 2000 adults in Bangladesh, I find that most people either do not know or underestimate the local prevalence of COVID-19 infections and overestimate its fatality rate. In a randomized experiment, I give the treatment group information about the coronavirus case number in their districts and the case fatality rate in Bangladesh and worldwide. Immediately after receiving the information, the treatment group perceives higher infection risk. Nine to fifteen days after the intervention, those who received information underestimate the local prevalence less and, consequently, still perceive higher infection risk than the control group. The treatment group also updates their belief about the fatality rate downward. Potentially due to this countervailing update of risk beliefs, the information does not have any effect on the self-reported preventive behaviors. In the final chapter, I develop a simple model which illustrates why opposition leaders can be very effective for the COVID-19 vaccination awareness campaign. To test this empirically, I also conduct an experiment in Bangladesh where 3,781 individuals in Bangladesh randomly received information about COVID-19 and its vaccines, the vaccination status of ruling and opposition leaders. While all treatments improved confidence on COVID-19 vaccines, the information about the opposition leaders’ vaccination status decreased the perceived side effects. The participants from the opposition treatment are 11 percentage points more likely to intend to get vaccinated than the participants of the information treatment.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["RCT"]}, {"id": 116, "title": "Evaluating the Impact of E-Registration and mHealth on Institutional Delivery in Hazard-Prone Areas of Bangladesh: A Protocol for A Non-Randomized Controlled Cluster Trial.", "authors": "Chowdhury et al.", "authorsFull": "Chowdhury, Anika Tasneem; Jabeen, Sabrina; Sultana, Zeeba Zahra; Rahman, Ahmed Ehsanur; Arifeen, Shams El; Hossain, Ahmed", "year": 2023, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "PLoS One", "doi": "10.1371/journal.pone.0271364", "url": "http://ovidsp.ovid.com/ovidweb.cgi?T=JS&PAGE=reference&D=mesx&NEWS=N&AN=37756321", "abstract": "Despite substantial progress, Bangladesh still has a high rate of maternal deaths owing to difficulties during pregnancy, delivery, and the postpartum period. Increasing facility delivery is mandatory to reach the goal of bringing down the MMR to <70 deaths/100,000 live births by 2030. In the era of digitalization, the introduction of e-registration and mHealth may aid the government in reaching this target. The southern part of Bangladesh is a hazard-prone area, where service uptake from institutions is low. This study aims to determine the effect of an e-registration tracking system and mHealth counseling on institutional deliveries to pregnant mothers in hazard-prone areas of southern Bangladesh. We will conduct an openlabel, two-arm, non-randomized controlled cluster trial for six months and use three hazardprone areas for intervention and another three hazard-prone areas for control. We will collect data at baseline and end-line of the study period using a structured questionnaire. We will enroll at least 268 pregnant mothers from the intervention and 268 pregnant mothers from the control areas after screening based on the inclusion and exclusion criteria. Pregnancy information will be obtained from the Family Welfare Assistant register. The respondents of the intervention arm will be registered in the e-Registration system, and receive voice call and text messages from the midwives to have their deliveries done in healthcare facilities. We will follow the participants until their delivery and exclude those respondents from the study who will have post-dated delivery, migrate out, lost to follow-up, or die during the study period. Random-intercept mixed-effect logistic regression will be performed to explain the relationship of e-registration and mHealth package with institutional delivery. Institutional delivery is still uncommon in Southern Bangladesh despite several interventions. Innovative approaches like e-registration and mHealth counseling may be helpful to bring women to health facilities. The findings from the study might enable the policy makers of Bangladesh to integrate the intervention package into the existing healthcare system. This experiment is registered in the open science framework.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health"], "methods": ["RCT"]}, {"id": 117, "title": "The Effect of Electronic Job Aid Assisted One-To-One Counselling To Support Exclusive Breastfeeding Among 0-5-Month-Old Infants in Rural Bangladesh.", "authors": "Billah et al.", "authorsFull": "Billah, Sk Masum; Ferdous, Tarana E.; Siddique, Abu Bakkar; Raynes-Greenow, Camille; Kelly, Patrick; Choudhury, Nuzhat; Ahmed, Tahmeed; Gillespie, Stuart; Hoddinott, John; Haider, Rukhsana; Menon, Purnima; El Arifeen, Shams; Dibley, Michael J.", "year": 2022, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "Maternal & Child Nutrition", "doi": "10.1111/mcn.13377", "url": "http://ovidsp.ovid.com/ovidweb.cgi?T=JS&PAGE=reference&D=medp&NEWS=N&AN=35590451", "abstract": "Exclusive breastfeeding (EBF) for the first 6 months has established benefits, yet had slow improvements globally. Little is known about electronic job aid‐assisted counselling to support EBF. As a secondary outcome of a cluster randomized controlled trial in Bangladesh, we assessed the effect of electronic job aid‐supported nutrition counselling and practical demonstration on EBF. We randomized pregnant women to one of five study arms in the trial and followed mother–child dyads until 2 years of age. Community health workers (CHWs) provided breastfeeding counselling with or without prenatal and complementary nutrient supplements in all four intervention arms. The comparison arm continued with the usual practice where mothers could receive nutrition counselling at routine antenatal and postnatal care, and during careseeking for childhood illnesses. We assessed breastfeeding indicators at birth and monthly until the child was 6 months old, in both intervention and comparison arms. To evaluate the effect of nutrition counselling on breastfeeding, we combined all four intervention arms and compared them with the comparison arm. Intervention newborns had half the risk (relative risk [RR]: 0.54, 95% confidence interval [CI]: 0.39, 0.76) of receiving prelacteal feeds than those in the comparison arm. EBF declined steeply in the comparison arm after 3 months of age. EBF was 16% higher in the intervention than the comparison arm at 4 months (RR: 1.16, 95% CI: 1.08, 1.23) and 22% higher at 5 months of age (RR: 1.22, 95% CI: 1.12, 1.33). Maternal background and household characteristics did not modify the intervention effect, and we observed no difference in EBF among caesarean versus vaginal births. Breastfeeding counselling and practical demonstration using an electronic job aid by CHWs are promising interventions to improve EBF and are scalable into existing community‐based programmes.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Maternal & Child Health", "Health Systems & Disease Control"], "methods": ["RCT"]}, {"id": 118, "title": "Multi-Stakeholder Safety Enforcement: Implications for Employment and Factories in Bangladesh’s Export-Oriented RMG Industry", "authors": "Pervin", "authorsFull": "Pervin, Shahida", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "SAFETY SCIENCE", "doi": "10.1016/j.ssci.2025.107032", "url": "https://www.sciencedirect.com/science/article/pii/S0925753525002577?via%3Dihub", "abstract": "Industrial workplace safety and workers’ rights remain vulnerable in many developing countries. Safety enforcement, wherein existing safety assurance mechanisms are underdeveloped, may impose additional costs, resulting in consequences for workers and industries. This study examines the effects of the post-Rana Plaza multinational stakeholder-led safety measures in the Ready-Made Garment (RMG), or apparel, industry in Bangladesh. A difference-in-difference approach is applied to compare the industry’s size in apparel- and nonapparel-dominant sub-districts (upazilas) before and after the inception of safety enforcement. Dhaka district was closely investigated by linking factories or establishments. The findings suggest that, in the decade prior to the 2013 safety initiatives, places where apparel was the dominant manufacturing industry experienced substantially higher employment growth than those where the industry’s footprint was limited. In the following decade, registered employment and the number of establishments declined in apparel-dominant upazilas, while they increased in other upazilas. Although the industry’s steady export performance over the period indicates an increasing productivity or technological advancement, the results suggest an adverse impact of safety enforcement on employment and the number of establishments.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector", "Governance & Service Delivery"], "methods": ["DiD"]}, {"id": 119, "title": "Transparency, Governance, and Water and Sanitation: Experimental Evidence from Schools in Rural Bangladesh", "authors": "Allakulov et al.", "authorsFull": "Allakulov, Umrbek; Cocciolo, Serena; Das, Binayak; Habib, Md. Ahasan; Rambjer, Lovisa; Tompsett, Anna", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Development Economics", "doi": "10.7910/DVN/U9 I4Z2", "url": "https://www.sciencedirect.com/science/article/pii/S0304387823000378", "abstract": "Can transparency interventions improve WASH service provision? We use a randomized experiment to evaluate the impacts of a transparency intervention, a deliberative multi-stakeholder workshop initiated with a community scorecard exercise, in schools in rural Bangladesh. To measure impacts, we combine survey data, direct observations, and administrative data. The intervention leads to moderate but consistent improvements in knowledge of WASH standards and practices, and institutions for WASH service management, but does not improve school WASH service provision or change WASH facility use patterns. Drawing on rich descriptive data, we suggest several reasons why the intervention we evaluate did not improve WASH service outcomes and propose ways to improve the design of future interventions.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": []}, {"id": 120, "title": "Impact of a Homestead Food Production Program on Poultry Rearing and Egg Consumption: A Cluster-Randomized Controlled Trial in Bangladesh", "authors": "Lambrecht et al.", "authorsFull": "Lambrecht, Nathalie J.; Waid, Jillian L.; Wendt, Amanda S.; Sobhan, Shafinaz; Kader, Abdul; Gabrysch, Sabine", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Maternal & Child Nutrition", "doi": "10.1111/mcn.13505", "url": "https://onlinelibrary.wiley.com/doi/10.1111/mcn.13505", "abstract": "Women and children in Bangladesh face high levels of micronutrient deficiencies from inadequate diets. We evaluated the impact of a Homestead Food Production (HFP) intervention on poultry production, as a pathway outcome, and women's and children's egg consumption, as secondary outcomes, as part of the Food and Agricultural Approaches to Reducing Malnutrition cluster-randomized trial in Sylhet division, Bangladesh. The 3-year intervention (2015−2018) promoted home gardening, poultry rearing, and nutrition counseling. We randomly allocated 96 clusters to intervention (48 clusters; 1337 women) or control (48 clusters; 1368 women). Children < 3 years old born to participants were enrolled during the trial. We analyzed poultry production indicators, measured annually, and any egg consumption (24-h recall), measured every 2−6 months for women and their children. We conducted intention-to-treat analyses using mixed-effects logistic regression models with repeat measures, with minimal adjustment to increase precision. Poultry ownership increased by 16% points (pp) and egg production by 13 pp in the final intervention year. The intervention doubled women's odds of egg consumption in the final year (Odds Ratio [OR]: 2.31, 95% CI: 1.68−3.18), with positive effects sustained 1-year post-intervention (OR: 1.58, 95% CI: 1.16−2.15). Children's odds of egg consumption were increased in the final year (OR: 3.04, 95% CI: 1.87−4.95). Poultry ownership was associated with women's egg consumption, accounting for 12% of the total intervention effect, but not with children's egg consumption. Our findings demonstrate that an HFP program can have longer-term positive effects on poultry production and women's and children's diets.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet"], "methods": ["RCT"]}, {"id": 121, "title": "Assessing Sustained Uptake of Latrine and Child Feces Management Interventions: Extended Follow-Up of a Cluster-Randomized Controlled Trial in Rural Bangladesh 1–3.5 Years After Intervention Initiation", "authors": "Islam", "authorsFull": "Islam, Mahfuza", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "International Journal of Hygiene and Environmental Health", "doi": "https://doi.org/10.1016/j.ijheh.2023.114149", "url": "https://www.sciencedirect.com/science/article/pii/S1438463923000408", "abstract": "BackgroundSanitation interventions typically result in modest increases in latrine access, and any gains in latrine access and use are often not sustained over time. Sanitation programs also rarely include child-focused interventions such as potties. We aimed to assess the sustained effect of a multi-component sanitation intervention on access to and use of latrines and child feces management tools in rural Bangladesh.MethodsWe conducted a longitudinal substudy nested within the WASH Benefits randomized controlled trial. The trial provided latrine upgrades, child potties and sani-scoops for feces removal, along with behavior change promotion to encourage use of the delivered hardware. Promotion visits to intervention recipients were frequent during the first 2 years after intervention initiation, decreased in frequency between years 2–3, and ceased after 3 years. We enrolled a random subset of 720 households from the sanitation and control arms of the trial in a substudy and visited them quarterly between 1 and 3.5 years after intervention initiation. At each visit, field staff recorded sanitation-related behaviors through spot-check observations and structured questionnaires. We assessed intervention effects on observed indicators of hygienic latrine access, potty use and sani-scoop use and investigated whether these effects were modified by duration of follow-up, ongoing behavior change promotion and household characteristics.ResultsThe intervention increased hygienic latrine access from 37% among controls to 94% in the sanitation arm (p < 0.001). Access among intervention recipients remained high 3.5 years after intervention initiation, including periods with no active promotion. Gains in access were higher among households with less education, less wealth and larger number of residents. The intervention increased availability of child potties from 29% among controls to 98% in the sanitation arm (p < 0.001). However, fewer than 25% of intervention households reported exclusive child defecation in a potty or had observed indicators of potty and sani-scoop use, and gains in potty use declined over the follow-up period, even with ongoing promotion.ConclusionOur findings from an intervention that provided free products and intensive initial behavior change promotion suggest a sustained increase in hygienic latrine access up to 3.5 years after intervention initiation but infrequent use of child feces management tools. Studies should investigate strategies to ensure sustained adoption of safe child feces management practices.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["RCT"]}, {"id": 122, "title": "Drinking Water Chlorination Has Minor Effects on the Intestinal Flora and Resistomes of Bangladeshi Children", "authors": "Nadimpalli", "authorsFull": "Nadimpalli, Maya L.", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "Other", "doi": "https://doi.org/10.1038/s41564-022-01101-3", "url": "https://www.nature.com/articles/s41564-022-01101-3", "abstract": "Healthy development of the gut microbiome provides long-term health benefits. Children raised in countries with high infectious disease burdens are frequently exposed to diarrhoeal pathogens and antibiotics, which perturb gut microbiome assembly. A recent cluster-randomized trial leveraging >4,000 child observations in Dhaka, Bangladesh, found that automated water chlorination of shared taps effectively reduced child diarrhoea and antibiotic use. In this substudy, we leveraged stool samples collected from 130 children 1 year after chlorine doser installation to examine differences between treatment and control children’s gut microbiota. Water chlorination was associated with increased abundance of several bacterial genera previously linked to improved gut health; however, we observed no effects on the overall richness or diversity of taxa. Several clinically relevant antibiotic resistance genes were relatively more abundant in the gut microbiome of treatment children, possibly due to increases in Enterobacteriaceae. While further studies on the long-term health impacts of drinking chlorinated water would be valuable, we conclude that access to chlorinated water did not substantially impact child gut microbiome development in this setting, supporting the use of chlorination to increase global access to safe drinking water.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": []}, {"id": 123, "title": "Unraveling the Effects of a Rehabilitation Program on the Socioeconomic Wellbeing of Beggars and Begging Motivation: Evidence From an Urban Area of Bangladesh", "authors": "Islam", "authorsFull": "Islam, Md. Karimul", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "Other", "doi": "https://doi.org/10.1057/s41599-023-02196-7", "url": "https://www.nature.com/articles/s41599-023-02196-7#citeas", "abstract": "Beggars have largely been leading miserable lives in the lower stratum of society since time immemorial. Government or private-led policies are rarely undertaken to improve the lives of this unfortunate societal segment. The local governments in divisional cities of Bangladesh have adopted a series of interventions aimed at improving the socioeconomic wellbeing of beggars and equipping them with alternative livelihood management options. We evaluated the effectiveness of this intervention (the rehabilitation of beggars) in the Khulna City Corporation (KCC) area, Bangladesh; we gathered a sample of 385 beggars by employing the non-equivalent group design and instrumental variable regression method. The results provide an interesting inference, showing that the rehabilitation program seemingly has no far-reaching significant impact on the socioeconomic wellbeing of the beggars. To be precise, the program provides evidence of no significant differences in earnings, expenditure, food security, or personal wellbeing between the beneficiary and the non-beneficiary group of beggars. In addition, the program fails to deter beggars from continuing to beg, as the result shows no significant association between taking part in the program and begging demotivation. Consequently, the beggars are continuing begging, which indicates a critical policy failure on the part of both government and implementation bodies. Therefore, the study implicitly recommends on-track monitoring and timely evaluation of such interventions so that immediate action can be taken beforehand to empower beggars and move them up the social ladder both socially and economically.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["IV"]}, {"id": 124, "title": "Widow, Deserted, and Destitute Women Allowances and Rural Female Labor Force Participation in Bangladesh: Linking Social Protection to the Sustainable Development Goals", "authors": "Murshed", "authorsFull": "Murshed, Muntasir", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "Other", "doi": "https://doi.org/10.1002/pa.2652", "url": "https://onlinelibrary.wiley.com/doi/10.1002/pa.2652", "abstract": "In developing countries, often a major segment of the population is characterized as poor. Thus, social protection programs play a crucial role in facilitating the attainment of the Sustainable Development Goals (SDG) agenda across these nations. Among the several socioeconomic benefits associated with the social safety net programs, the impacts on female labor force participation are vital from the perspectives of enhancing women empowerment and welfare. Against this backdrop, this paper aims to evaluate the impacts of social transfers under the “allowances for the widow, deserted, and destitute women” social protection program on the rural female labor force participation responses in Bangladesh. The overall results from the probit, IV-probit, and propensity score matching techniques provide statistical evidence regarding the cash transfers acting as a “mini-push” to nudge greater participation of the beneficiary women in the labor force. Moreover, the cash transfers are also found to positively influence the labor force participation decisions of the other female members within the households of the program beneficiaries. Besides, the female labor force participation decisions are evidenced to be heterogeneous across the age cohorts, marital statuses, and the gender of the household head. In line with the major findings from the analyses, some key policy interventions are recommended.", "primaryTheme": "Social Protection & Safety Nets", "themes": ["Social Protection & Safety Nets", "Labour, Jobs & Garment Sector", "Women's Empowerment & Gender", "Financial Inclusion & Cash"], "methods": ["PSM"]}, {"id": 125, "title": "An experiment of health services and additional microcredit in 128 villages of Bangladesh.", "authors": "Becker Stan et al.", "authorsFull": "Becker Stan; Amin Ruhul; Chakraborty Nirali; Zimmerman Linnea", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Health, Population & Nutrition", "doi": "10.1186/s41043-022-00292-z", "url": "https://link.springer.com/article/10.1186/s41043-022-00292-z", "abstract": "BACKGROUND: Studies in the literature have found mixed results on the effect of microcredit on health outcomes. Of the five previous experimental studies that included microcredit and a health intervention, three reported no significant changes in health status or behaviors. The purpose of this study was to test for marginal and interactive effects of increased microcredit and provision of basic health services., METHODS: This study had a 4-celled experimental design in 128 villages in rural Bangladesh. For villages in one cell, an additional microcredit worker was assigned. For those in a second cell, a health assistant visited households each month, provided simple medicines and announced a satellite clinic held monthly in each village. For a third cell, both interventions were combined, and villages in a fourth cell served as control. A baseline survey was completed and a follow-up survey was done three years later. Outcome measures were food security, contraceptive use, having a trained birth attendant at last birth, and measles immunization., RESULTS: Comparison of follow-up with baseline levels of the four outcome measures (for 3787 households (96% completeness) and 3687 women (94% completeness)) showed significant improvement in food security in all study arms and a significant increase in trained birth attendant at last birth in the health services villages. Due to confusion within Grameen Bank about which workers would provide the additional microcredit work, that intervention was poorly implemented so in multivariate analyses, the data for that intervention arm were grouped with data from the control arm. Logistic regression with values of the outcomes at follow-up as dependent variable and study arm and women's schooling as covariates showed no significant effects of either separate or grouped study arms., CONCLUSION: Two of the three health behaviors showed no significant changes over time but having a trained birth attendant at last delivery did increase significantly in the health services arm. Therefore, community health education can sometimes be effective in promoting healthy behaviors.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control", "Financial Inclusion & Cash", "Agriculture & Food Security"], "methods": []}, {"id": 126, "title": "Effects of iron supplementation on neural indices of habituation in Bangladeshi children", "authors": "Larson et al.", "authorsFull": "Larson, Leila M.; Feuerriegel, Daniel; Hasan, Mohammed Imrul; Braat, Sabine; Jin, Jerry; Tipu, Sm Mulk Uddin; Shiraji, Shamima; Tofail, Fahmida; Biggs, Beverley-Ann; Hamadani, Jena D.; Johnson, Katherine A; Bode, Stefan; Pasricha, Sant-Rayn", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The American Journal of Clinical Nutrition", "doi": "10.1016/j.ajcnut.2022.11.023", "url": "https://www.sciencedirect.com/science/article/pii/S0002916522105551?via%3Dihub", "abstract": "BACKGROUND: Iron deficiency and anemia have been associated with poor cognition in children, yet the effects of iron supplementation on neurocognition remain unclear., OBJECTIVE: We aimed to examine the effects of supplementation with iron on neural indices of habituation using auditory event-related brain potentials (ERPs)., METHODS: This substudy was nested within a 3-arm, double-blind, double-dummy, individual randomized trial in Bangladesh, in which 3300 8-mo-old children were randomly selected to receive 3 mo of daily iron syrup (12.5 mg iron), multiple micronutrient powders (MNPs) (including 12.5 mg iron), or placebo. Children were assessed after 3 mo of intervention (mo 3) and 9 mo thereafter (mo 12). The neurocognitive substudy comprised a randomly selected subset of children from the main trial. Brain activity elicited during an auditory roving oddball task was recorded using electroencephalography to provide an index of habituation. The differential response to a novel (deviant) compared with a repeated (standard) sound was examined. The primary outcome was the amplitude of the mismatch response (deviant minusstandard tone waveforms) at mo 3. Secondary outcomes included the deviant and standard tone-evoked amplitudes, N2 amplitude differences, and differences in mean amplitudes evoked by deviant tones presented in the second compared with first half of the oddball sequence at mo 3 and 12., RESULTS: Data were analyzed from 329 children at month 3 and 363 at mo 12. Analyses indicated no treatment effects of iron interventions compared with placebo on the amplitude of the mismatch response (iron syrup compared with placebo: mean difference (MD) = 0.07muV [95% CI: -1.22, 1.37]; MNPs compared with placebo: MD = 0.58muV [95% CI: -0.74, 1.90]) nor any secondary ERP outcomes at mo 3 or 12, despite improvements in hemoglobin and ferritin concentrations from iron syrup and MNPs in this nested substudy., CONCLUSION: In Bangladeshi children with >40% anemia prevalence, iron or MNP interventions alone are insufficient to improve neural indices of habituation. This trial was registered at the Australian New Zealand Clinical Trials Registry as ACTRN12617000660381. Copyright © 2022 The Author(s). Published by Elsevier Inc. All rights reserved.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": []}, {"id": 127, "title": "Impact of a Homestead Food Production Program on Dietary Diversity: Seasonal and Annual Results from the Cluster-Randomized FAARM Trial in Sylhet, Bangladesh", "authors": "Waid et al.", "authorsFull": "Waid, Jillian L.; Wendt, Amanda S; Kader, Abdul; Sobhan, Shafinaz; Gabrysch, Sabine", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Nutrition", "doi": "https://doi.org/10.1016/j.tjnut.2023.10.014", "url": "https://doi.org/10.1016/j.tjnut.2023.10.014", "abstract": "Background: Rice-predominant diets are common in Bangladesh, leading to widespread nutritional deficiencies. The Food and Agricultural Approaches to Reducing Malnutrition (FAARM) cluster-randomized controlled trial in rural Sylhet, Bangladesh evaluated a homestead food production intervention implemented 2015–2018 through Helen Keller International, aiming to improve child growth. Objectives: We estimated the intervention’s impact on women’s and children’s dietary diversity, a secondary trial objective. Methods: We collected dietary diversity throughout the trial (March 2015 to June 2020) at multiple times each year using standard, United Nations-endorsed, self-reported measures for women (10-food group scale) and children (7-food group scale). We included 28,282 observations of 2701 women (out of 2705 enrolled) and 17,445 observations of their 3257 children (aged 6–37 mo) in 96 settlements, 48 of which received the intervention. We estimated the intervention’s impact on dietary diversity by year of intervention, overall periods following the start of the intervention, and seasonally, using multilevel regression with the control group as the counterfactual, controlling for seasonality, baseline dietary diversity, and clustering by settlement and repeated measures. Results: At baseline, approximately one-third of women and children consumed a minimally diverse diet. Over the entire intervention and postintervention period, women’s and children’s odds of consuming a minimally diverse diet nearly doubled (odds ratio [OR] 1.8, P < 0.001, for both). This benefit was barely present in the first year, increased in the second, and peaked in the last intervention year (OR 2.4 for women, OR 2.5 for children, both P < 0.001) before settling at around double the odds in postintervention years (P < 0.001). Dietary improvement was observed throughout the year for both women and children with incremental increases in nearly all food groups. Conclusions: The nutrition-sensitive agriculture intervention successfully increased dietary diversity in women and children, and these impacts persisted after the project closed, including during the early COVID 19 lockdown period. This trial was registered at clinicaltrials.gov as NCT02505711.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Agriculture & Food Security"], "methods": ["RCT"]}, {"id": 128, "title": "Low-Cost Informational Intervention Reduced Drinking Water Arsenic Exposure in Bangladesh", "authors": "Reddy", "authorsFull": "Reddy, Raghav R.", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1093/pnasnexus/pgac284", "url": "https://academic.oup.com/pnasnexus/article/2/3/pgac284/7087066", "abstract": "Thirty million Bangladeshis continue to drink water with unacceptable levels of arsenic (>10μg/L), resulting in a large public health burden. The vast majority of the Bangladeshi population relies on private wells, and less than 12% use piped water, increasing the complexity of mitigation efforts. While mass testing and informational campaigns were successful in the early 2,000 s, they have received little attention in recent years, even though the number of wells in the country has likely more than doubled. We investigated the effect of a low-cost (<USD 10/household) informational intervention on reducing arsenic exposure through a randomized control trial design. The sample size was ∼10% of the study area households, and the intervention provided exposure awareness material, the arsenic concentration of the household’s drinking water, and information about alternate water sources nearby with improved water quality. The informational intervention lowered household arsenic exposure (P = 0.0002), with an average reduction in arsenic levels of ∼60%. Approximately one third of the study households requested to test an additional water source at no cost. Providing the intervention a second time led to more households changing their water source but did not further reduce exposure (P = 0.39). Our study establishes a causal relationship between the informational intervention and the observed reduction in household arsenic exposure.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["RCT"]}, {"id": 129, "title": "Mandatory Employer-Sponsored Health Financing Scheme for Semiformal Workers in Bangladesh: An Experimental Assessment", "authors": "Rabbani", "authorsFull": "Rabbani, Atonu", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Social Science & Medicine", "doi": "10.1016/j.socscimed.2021.114590", "url": "https://www.sciencedirect.com/science/article/pii/S0277953621009060", "abstract": "In this study, we present findings from an experimental evaluation of a mandatory employer-sponsored health insurance scheme in Bangladesh. We randomly introduced the scheme to female artisans to understand the impacts on healthcare utilisation, expenditure and subjective well-being using both survey and administrative data. Our findings suggest that the scheme broke even; however, it covered only six percent of the overall health expenditure and 16 percent of the hospitalisation costs. We find higher inpatient care utilisation, particularly among women, and in favour of empanelled hospitals causally associated with the intervention, consistent with the design of the scheme. We do not find significant healthcare savings or improvement in subjective well-being, consistent with low coverage. The findings suggest the scheme to be financially sustainable and it changes the healthcare seeking behaviours as the scheme incentivises. However, meaningful savings and protection against catastrophic health expenditures will require a higher level of coverage.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash"], "methods": []}, {"id": 130, "title": "1/​2- Bangladesh Center for Global Environmental and Occupational Health- Bangladesh (GEOHealth-II)", "authors": "Raqib", "authorsFull": "Raqib, Rubhana", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Ongoing study", "journal": "Cochrane Library", "doi": "No DOI", "url": "https://clinicaltrials.gov/study/NCT05570552", "abstract": "Almost 3 billion people worldwide, including 89% people in Bangladesh, are exposed to harmful household air pollutants (HAP) emitted from combustion of biomass (wood, agricultural residue, cow dung, etc.) fuel use for cooking. While health risks associated with air-pollution have been reasonably well-studied in developed countries, there is little evidence on health benefits achievable by HAP reduction through clean fuel use, especially in low- and middle-income countries (LMICs). Earlier the investigators showed that Liquid Petroleum Gas (LPG) for 24 months, reduced personal PM2.5 exposure by 58.17 percent which induced novel changes in immune and inflammatory responses in the participants; however cardiopulmonary markers remained relatively stable in post-intervention assessment.In this study, the investigators aim to evaluate the effects of mobile phone based (mHealth) Behavioural Change Communication (BCC) intervention on adoption and exclusive use of LPG. The investigators also aimed to observe whether long-term effects of HAP reduction can impact the subclinical measures of cardio-vascular and pulmonary dysfunction and regulate innate and inflammatory immune function among women and children in semi-rural settings in Bangladesh. The investigators will also investigate the influence of exposure to HAP on antibody response to vaccines (adaptive immunity). The BCC intervention will be provided by conducting a large household level randomized controlled trial by educational intervention using mHealth based technology. In addition, the investigators will continue following the cohort and will conduct rigorous and repeated personalized (24 hours) and area (over 5 days) assessments of PM2.5 and black carbon (BC) exposure to examine the long-term effects of HAP reduction on subclinical measures of cardio-pulmonary and immune dysfunction including effect of HAP exposure on antibody response to vaccine.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Health Systems & Disease Control", "Agriculture & Food Security"], "methods": ["RCT"]}, {"id": 131, "title": "Transforming Households With Refraction and Innovative Financial Technology", "authors": "Congdon", "authorsFull": "Congdon, Nathan", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Ongoing study", "journal": "Cochrane Library", "doi": "No DOI", "url": "https://clinicaltrials.gov/study/NCT05510687", "abstract": "The aim of the proposed Randomised Clinical Trial (RCT) is to assess the impact of presbyopia correction and basic digital financial training on greater adoption and use of digital financial services (primary outcome) and other welfare impacts (secondary outcomes)) for safety-net beneficiaries in Bangladesh. Trial participants will be Old Age Allowance (OAA) and Widows Allowance (WA) beneficiaries who regularly receive payments as part of a government safety net program for the very poor.The primary objective of the THRIFT trial is to assess whether the combined complementary intervention of providing free eyeglasses and basic digital financial services training in the use of mobile phones to recipients of government OAA and WA safety-net payments can lead to greater financial inclusion and improved quality of life.THRIFT's primary outcome is the adoption and effective use of the DFS platform in receiving digital OAA and WA transfers using the mobile banking platform, as measured by the difference between the treatment and control groups.The secondary outcomes analysed under the THRIFT trial will be:total data consumption, independent use of the mobile banking application, purchase of eyeglasses (for control group members), access to medication and healthcare, subjective well-being, mobility, social connectedness, percentage of household consumption, reasons for using or avoiding smartphone based DFS, and decision-making power within the household.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Women's Empowerment & Gender", "Social Protection & Safety Nets"], "methods": []}, {"id": 132, "title": "Assessing the Impact of a Handwashing Knowledge and Practices Program among Poor Households in Rural Bangladesh: A Cluster-Randomized Pre-Post Study", "authors": "Siddiqua et al.", "authorsFull": "Siddiqua, Towfida Jahan; Choudhury, Nuzhat; Haque, Md Ahshanul; Farzana, Fahmida Dil; Ali, Mohammad; Naz, Farina; Ahmed, S. M. Tanvir; Rahman, Sheikh Shahed; Faruque, A. S. G.; Ahmed, Tahmeed", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "The American Journal of Tropical Medicine and Hygiene", "doi": "10.4269/ajtmh.21-0555", "url": "http://ovidsp.ovid.com/ovidweb.cgi?T=JS&PAGE=reference&D=medp&NEWS=N&AN=37487567", "abstract": "Improvement in hand hygiene has been strongly associated with positive outcomes in maternal and child health. Although Bangladesh has a high level of awareness of key hygiene messages, the practice of handwashing, the most effective hygiene behavior, is low. Suchana, a multisectoral nutrition program, aims to increase knowledge and practices around various water, sanitation, and hygiene settings in Sylhet region, the northeast of rural Bangladesh. This study aimed to investigate the changes in indicators related to handwashing knowledge and practices among Suchana beneficiaries in final compared with baseline evaluations. Data were derived from the baseline and final cross-sectional evaluation survey. The following handwashing knowledge and practices were considered: handwashing before preparing food, before eating food and feeding children, before serving food, after defecation, and after touching animals. The descriptive findings indicate that Suchana intervention improved handwashing knowledge and practices in the intervention area compared with the control. The odds of having knowledge of hand washing before preparing food (adjusted odds ratio [aOR]: 1.60; 95% CI: 1.30-1.98), before eating food and feeding children (aOR: 1.68; 95% CI: 1.25-2.25), before serving food (aOR: 1.35; 95% CI: 1.04-1.76), after defecation (aOR: 1.74; 95% CI: 1.25-2.41), and after touching animals (aOR: 1.67; 95% CI: 1.29-2.16) were higher in intervention area than the control area. Similarly, the impact on maternal handwashing practices at final evaluation indicated successful effects of the intervention. These results suggest scaling-up of similar interventions for larger populations living in vulnerable areas of rural Bangladesh.", "primaryTheme": "WASH", "themes": ["WASH", "Nutrition & Diet"], "methods": ["Quasi-experimental"]}, {"id": 133, "title": "Essays on Policy Evaluation", "authors": "Tasneem", "authorsFull": "Tasneem, Farah", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Thesis", "journal": "Other", "doi": "No DOI", "url": "https://aura.american.edu/articles/thesis/Essays_on_Policy_Evaluation/23504283/1/files/41222238.pdf", "abstract": "This dissertation examines two policies that affect women’s education, bargaining power, son preference, and awareness of domestic violence in developing countries. The first chapter evaluates a conditional cash transfer program in Bangladesh to identify its impact on the education of multiple generations and explores the pathways behind the impact. The second chapter examines a domestic violence policy in Bangladesh to identify its impact on women’s justification of violence. Globally, about 254 million school-aged children are not enrolled in school, weakening their future productivity and slowing the economic development of their societies. The first chapter shows that investment in educating young women is an effective development policy because they also increase their children’s education. To identify a causal effect, I use a difference-indifference and instrumental variable approach to exploit the exogenous variation provided by a program that temporarily made secondary education free for girls in rural Bangladesh. In addition, I explore the causal role of various pathways by which a mother’s education increases her child’s education: marital matching, fertility, labor market participation, bargaining power, and son preference. The paper contributes by providing evidence of education spillovers in a developing country setting, where there is surprisingly little causal evidence. Additionally, it unpacks the multiple pathways through which an increase in the mother’s education contributes to an increase in the child’s education, an aspect previously overlooked in the literature. The second chapter investigates how domestic violence laws impact women’s attitudes toward intimate partner violence (IPV). Around 736 million women worldwide have been victims of domestic violence at least once in their lifetime. Violence can contribute to higher health and economic costs and reduced economic activities. Using the enactment of the Bangladesh Domestic Violence (Prevention and Protection) Act 2010 as a natural experiment and a differencein-difference approach, I show that the implementation of the law significantly reduced women’s justification of violence. The study provides evidence that laws can change personal beliefs and social norms, even in patriarchal countries with a conservative outlook toward women. Overall, this dissertation highlights the importance of policies affecting women in developing countries. The findings suggest that education policies are cost-effective in addressing educational inequality in developing countries. The results also provide evidence that in countries with higher rates of violence toward women, a law criminalizing and defining violence can make women more aware of abuse, which can then reduce their justification of violence.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Child Marriage & Social Norms", "Trade & Macroeconomy"], "methods": ["IV"]}, {"id": 134, "title": "Impact of Health Sector Support Project on Essential Nutrition Services: Evidence from Bangladesh", "authors": "Raza et al.", "authorsFull": "Raza, Wameq; Chaudhery, Deepika", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published report", "journal": "The World Bank Group", "doi": "No DOI", "url": "https://doi.org/10.1596/38328", "abstract": "Despite progress over the past two decades, poor nutrition remains a significant public health challenge in Bangladesh. Stunting among children under five years declined from 43 to 31 percent between 2007 and 2018, while 42 percent of women between 15 to 49 years are anemic. The Ministry of Health and Family Welfare is implementing the Health Sector Support Project (HSSP) with financing and technical assistance from the World Bank in the Sylhet and Chattogram divisions of the country. The project considers improving nutrition outcomes as a core priority. Leveraging administrative data from 13,855 community clinics (CCs) from 2018 to 2020 and a difference-in-difference approach, the analysis finds that HSSP led to imp
