 The results show that UCF assistance results in increases in monthly contraceptiveexpenditures.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Social Protection & Safety Nets"], "methods": ["RDD", "IV"]}, {"id": 65, "title": "Targeted Subsidies for Water Conservation in Smallholder Agriculture", "authors": "Bhandari et al.", "authorsFull": "Bhandari, Humnath; Chakravorty, Ujjayant; Habib, Muhammad Ashraful; Emerick, Kyle", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "not applicable", "doi": "NO DOI", "url": "https://580ac0f3-b858-4661-9ce9-79f3d7a4dbed.filesusr.com/ugd/9a2b09_491aaa8338834f56aaee1530725a83fb.pdf", "abstract": "Groundwater depletion threatens long-term food security in developing countries. We evaluate the effect of targeted subsidies for technology to use groundwater more efﬁciently in agriculture. Using a randomized controlled trial across 360 villages in Bangladesh, we show that subsidies reduce electricity used for pumping by 38 percent, but only when targeted to water sellers. Subsidizing technology to individual farmers has much smaller effects. This result can be explained by collective management of groundwater. Water sellers charge ﬁxed fees to farmers, but maintain a role in irrigation planning, incentivizing them to adopt conservation practices.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["RCT"]}, {"id": 66, "title": "Improved Child Feces Management Mediates Reductions in Childhood Diarrhea from an On‑Site Sanitation Intervention: Causal Mediation Analysis of a Cluster‑Randomized Trial in Rural Bangladesh", "authors": "Contreras et al.", "authorsFull": "Contreras, Jesse D.; Islam, Mahfuza; Mertens, Andrew; Pickering, Amy J.; Arnold, Benjamin F.; Benjamin‑Chung, Jade; Hubbard,Alan E.; Rahman, Mahbubur; Unicomb, Leanne; Luby, Stephen P.; Jr., John M. Colford; Ercumen, Ayse", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://doi.org/10.1007/s44197-024-00210-y", "url": "https://link.springer.com/article/10.1007/s44197-024-00210-y", "abstract": "Background The WASH benefits Bangladesh trial multi-component sanitation intervention reduced diarrheal disease among children<5 years. Intervention components included latrine upgrades, child feces management tools, and behavioral promotion. It remains unclear which components most impacted diarrhea. Methods We conducted mediation analysis within a subset of households (n=720) from the sanitation and control arms. Potential mediators were categorized into indicators of latrine quality, latrine use practices, and feces management practices. We estimated average causal mediation effects (ACME) as prevalence differences (PD), defined as the intervention’s effect on diarrhea through its effect on the mediator. Results The intervention improved all indicators compared to controls. We found significant mediation through multiple latrine use and feces management practice indicators. The strongest mediators during monsoon seasons were reduced open defecation among children aged<3 and 3–8 years, and increased disposal of child feces into latrines. The strongest mediators during dry seasons were access to a flush/pour-flush latrine, reduced open defecation among children aged 3–8 years, and increased disposal of child feces into latrines. Individual mediation effects were small (PD=0.5–2 percentage points) compared to the overall intervention effect but collectively describe significant mediation pathways. Discussion The effect of the WASH Benefits Bangladesh sanitation intervention on diarrheal disease was mediated through improved child feces management and reduced child open defecation. Although the intervention significantly improved latrine quality, relatively high latrine quality at baseline may have limited benefits from additional improvements. Targeting safe child feces management may increase the health benefits of rural sanitation interventions.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": []}, {"id": 67, "title": "A Sustainable Organizational Structure To Integrate Psycho-Social Stimulation Programme Into Primary Health Care Services in Bangladesh: Protocol for a Pragmatic Cluster Randomized Controlled Trial on Scaling Up Early Childhood Development Activities", "authors": "Tipu", "authorsFull": "Tipu, S. M. Mulk Uddin", "year": 2025, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "Other", "doi": "10.1186/s40359-025-02795-w", "url": "https://bmcpsychology.biomedcentral.com/articles/10.1186/s40359-025-02795-w", "abstract": "BackgroundEarly childhood development (ECD) in low to middle-income nations has been a pressing concern for the last two to three decades. It is estimated that approximately 250 million children under the age of five are not reaching their full developmental potential due to factors such as poverty, malnutrition, and insufficient home stimulation. It is estimated that in Bangladesh, 44% of the children under 5 years live in poverty and 31% are stunted, and both factors are risks for poor childhood development. We aim to develop a sustainable, scaled ECD programme using an evidence-based curriculum of psychosocial stimulation for disadvantaged Bangladeshi children.MethodsApproximately 10,000 malnourished children aged 6–24 months will be identified by mid-upper arm circumference (MUAC) < 13.5 cm, assessed by government health staff in over 500 community clinics (CCs) in 21 sub-districts of Hobiganj, Brahmanbaria, Laxmipur and Narsingdi districts. The children and their mothers will participate in the psychosocial stimulation programme that will be delivered fortnightly for one year to small groups at the CCs by health workers. We will train approximately 1,500 health staff in rural CCs to deliver the ECD sessions. We will follow a cascade training model to train personnel at all levels of the primary health care system. A subsample will be evaluated using a cluster randomized controlled trial in 48 CCs (24 intervention and 24 control). From each CC, 10 children aged 6–24 months will be tested before and after the programme. The primary outcome is children’s cognitive development and we will also measure language composite scores on the Bayley Scales of Infant and Toddler Development. Secondary outcomes are children’s growth, maternal knowledge and depressive symptoms, and stimulation in the home. Intention-to-treat analysis will be used to assess intervention effects.DiscussionThere are no existing ECD services for the children under three years delivered by the health care system in Bangladesh. This study will help policy makers to consider incorporating ECD activities into the treatment of malnourished children in rural CCs, under the government’s primary health care system, thereby developing a sustainable structure for improving disadvantaged children’s development. The findings will also provide information to facilitate scaling ECD in the primary health care systems in other low and middle-income countries.Trial registrationClinicalTrials.gov Identifier: NCT04093934 (Date: 13 April 2022).", "primaryTheme": "Early Childhood Development", "themes": ["Early Childhood Development", "Nutrition & Diet", "Health Systems & Disease Control"], "methods": ["RCT"]}, {"id": 68, "title": "Impact of Home Gardens Promoted Among Urban Residents in Dhaka, Bangladesh", "authors": "Schreinemachers et al.", "authorsFull": "Schreinemachers, Pepijn; Kumar, Sandhya S.; Uddin, Nasir Md.", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Food Security", "doi": "10.1007/s12571-025-01543-7", "url": "https://link.springer.com/article/10.1007/s12571-025-01543-7", "abstract": "Promoting gardening among urban residents holds the potential to improve urban diets in low- and middle-income countries, but there is a lack of evidence of impact. This study tests the hypothesis that training urban residents in gardening increases their intake of fruit and vegetables. It uses panel data for 254 control and 425 treatment households from four city corporations in the Dhaka metropolitan area of Bangladesh. Urban residents, 85% of whom were women, were interviewed before the start of an urban gardening program and one year after training and inputs were provided to the treatment group. The study estimated the average treatment effects using a difference-in-difference estimator. Of the 38 outcomes tested, 20 are significant (p < 0.05) with 19 indicating a beneficial effect and one indicating an adverse effect. Among the beneficial effects, there is an increase in the diversity of fruits and vegetables produced (+ 5 species, p < 0.01), the frequency of harvesting (+ 0.64 times/week; p < 0.01), and increased sharing of produce with neighbors (+ 8%, p < 0.01). Regarding food and nutrition, there is an increase in women’s dietary diversity score (+ 0.37 on a 0–10 scale; p < 0.01), women’s minimum dietary diversity (+ 4%; p < 0.01), and in the number of portions of cooked vegetables eaten (+ 0.96 portions/day; p < 0.01). The gardening intervention also contributes to a range of perceived social, personal, and psychological benefits. The adverse effect is an increase in ultra-processed food consumption (+ 19%, p = 0.04). Nevertheless, the results confirm that urban gardening interventions can improve the quality of urban diets alongside other benefits.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["DiD"]}, {"id": 69, "title": "Information and Behavior: Evidence from Fertilizer Quantity Recommendations in Bangladesh", "authors": "Beg et al.", "authorsFull": "Beg, Sabrin; Islam, Mahnaz; Rahman, Khandker Wahedur", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Development Economics", "doi": "https://doi.org/10.1016/j.jdeveco.2023.103195", "url": "https://www.sciencedirect.com/science/article/abs/pii/S0304387823001517", "abstract": "We use a field experiment in Bangladesh to test if two types of variety-specific fertilizer recommendations—government provided, community-level recommendations and plot-specific recommendations based on individual soil tests—affect fertilizer use, yield, and profits. Treatment farmers do not change their fertilizer application behavior in response to either recommendation. One exception is the case of TSP (phosphate fertilizer), which is recommended for all crops but recommended quantities are significantly lower than the baseline average usage. Treatment farmers over-react to the recommendations by stopping TSP use after the intervention. In the soil-testing treatment arm farmers also shift their seed choice to varieties for which their baseline fertilizer consumption aligns with the recommendation. Opting out of using TSP, an essential fertilizer, ultimately hurts productivity as farmers in the community-based recommendation arm experience a 3.9% yield reduction. Attention costs may explain the extensive margin but no intensive margin effect in response to the treatments.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security"], "methods": ["RCT"]}, {"id": 70, "title": "The Effect of Iron Fortification of Lentils on Blood and Cognitive Status Among Adolescent Girls in Bangladesh", "authors": "Barnett et al.", "authorsFull": "Barnett, Amy L.; Wenger, Michael J.; Yunus, Fakir M.; Jalal, Chowdhury; DellaValle, Diane M.", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Nutrients", "doi": "https://doi.org/10.3390/nu15235001", "url": "https://doi.org/10.3390/nu15235001", "abstract": "Background: Iron deficiency is highly prevalent in South Asia, especially among women and children in Bangladesh. Declines in cognitive performance are among the many functional consequences of iron deficiency. Objective: We tested the hypothesis that, over the course of a 4-month iron fortification trial, cognitive performance would improve, and that improvement would be related to improvements in iron status. Methods: Participants included 359 adolescent girls attending Bangladesh Rural Advancement Committee (BRAC) clubs as a subsample of a larger double-blind, cluster-randomized community trial in which participants were assigned to one of three conditions: a condition in which no lentils were supplied (NL, n = 118, but which had the usual intake of lentils), a control (non-fortified) lentil condition (CL, n = 124), and an iron-fortified lentil condition (FL, n = 117). In the FL and CL conditions, approximately 200 g of cooked lentils were served five days per week for a total of 85 feeding days. In addition to biomarkers of iron status, five cognitive tasks were measured at baseline (BL) and endline (EL): simple reaction time task (SRT), go/no-go task (GNG), attentional network task (ANT), the Sternberg memory search Task (SMS), and a cued recognition task (CRT). Results: Cognitive performance at EL was significantly better for those in the FL relative to the CL and NL conditions, with this being true for at least one variable in each task, except for the GNG. In addition, there were consistent improvements in cognitive performance for those participants whose iron status improved. Although there were overall declines in iron status from BL to EL, the declines were smallest for those in the FL condition, and iron status was significantly better for those in FL condition at EL, relative to those in the CL and NL conditions. Conclusions: the provision of iron-fortified lentils provided a protective effect on iron status in the context of declines in iron status and supported higher levels of cognitive performance for adolescent girls at-risk of developing iron deficiency.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": []}, {"id": 71, "title": "Impact of Farmers' Participation in Community-Based Organizations on Adoption of Flood Adaptation Strategies: A Case Study in a Char-Land Area of Sirajganj District Bangladesh", "authors": "Faruk et al.", "authorsFull": "Faruk, M. O.; Maharjan, K. L.", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Sustainability", "doi": "10.3390/su14148959", "url": "https://doi.org/10.3390/su14148959", "abstract": "Community-based organizations (CBOs) are gaining popularity in Bangladesh as a tool for relaying flood risk information and adaptation strategies. However, to our knowledge, no attempts have been made to determine the impact of CBOs on farmers' adoption of flood adaptation strategies. Therefore, in this paper, we identify the determinants that influence farmers' decisions to participate in CBOs and how this participation impacts farmers' adoption of flood adaptation strategies. A multistage sampling procedure was employed to select 359 farmers for the study. An endogenous switching regression model was applied to control for possible selection bias due to unobserved factors, while propensity score matching (PSM) and inverse probability-weighted regression adjustment (IPWRA) were employed to test for the robustness of the results. The results reveal a positive selection bias, indicating that farmers with above-average flood adaptation strategies are more willing to participate in CBOs. Farmers' flood experience, having children under 10 years, distance to the village center, and access to information mainly determine the participation in CBOs. It is also found that CBO participation significantly increases farmers' adoption of flood adaptation strategies. ESR results show that farmers who participated in CBOs have 3.76 higher average flood adaptation strategies compared to CBO non-participation, and this finding is also consistent with PSM and IPWRA results. Therefore, policy intervention aimed at further strengthening and institutionalizing CBOs is necessary for successful flood adaptation.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment"], "methods": ["PSM"]}, {"id": 72, "title": "Exchangeable Zinc Pool Size Reflects Form of Zinc Supplementation in Young Children and Is Not Associated with Markers of Inflammation", "authors": "Long et al.", "authorsFull": "Long, Julie M.; Khandaker, Afsana Mim; Sthity, Rahvia Alam; Westcott, Jamie E.; Matveev, Andrei; Black, Robert E.; King, Janet C.; Islam, Kazi Munisul; El Arifeen, Shams; Ahmed, Tahmeed; Islam, M. Munirul; McDonald, Christine M.; Krebs, Nancy F.", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Nutrients", "doi": "10.3390/nu14030481", "url": "https://www.mdpi.com/2072-6643/14/3/481", "abstract": "AbstractA sensitive and reliable biomarker of zinc status has yet to be identified, but observational research suggests that the exchangeable zinc pool (EZP) size may be a possible biomarker. This randomized, placebo-controlled trial aimed to compare the change in EZP size from baseline to endline in 174 children who were preventatively supplemented with 10 mg of zinc as part of a multiple micronutrient power (MNP) or as a standalone dispersible tablet for 24 weeks versus a placebo powder. The effects of systemic inflammation on EZP size were also evaluated. Zinc stable isotopes were administered intravenously to children at baseline and endline, and the EZP was measured by the urine extrapolation method. A total of 156 children completed the study with the zinc dispersible tablet group having the greatest increase in EZP (14.1 mg) over 24 weeks when compared with the MNP group (6.8 mg) (p < 0.01) or placebo group (2.0 mg) (p < 0.001). Median EZP size was not different between children with normal or elevated serum inflammatory markers. EZP size was responsive to longitudinal zinc supplementation and reflected the expected difference in bioavailability for two forms of supplementation. The apparent absence of an effect of inflammatio", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": []}, {"id": 73, "title": "A comprehensive intervention package improves the linear growth of children under 2-years-old in rural Bangladesh: a community-based cluster randomized controlled trial", "authors": "Ara et al.", "authorsFull": "Ara, Gulshan; Sanin, Kazi Istiaque; Khanam, Mansura; Sarker, Shafiqul Alam; Khan, Sihan Sadat; Rifat, Mahfuza; Chowdhury, Imran; Ahmed Askari, Sufia; Afsana, Kaosar; Ahmed, Tahmeed", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "—", "journal": "", "doi": "", "url": "https://www.nature.com/articles/s41598-022-26269-w", "abstract": "", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["RCT"]}, {"id": 74, "title": "Effect of Input Subsidies and Extension Services: Evidence From Rice Productivity in Bangladesh", "authors": "Hazrana et al.", "authorsFull": "Hazrana, Jaweriah; Mishra, Ashok K.", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Food Policy", "doi": "https://doi.org/10.1016/j.foodpol.2024.102628", "url": "https://www.sciencedirect.com/science/article/pii/S0306919224000393?casa_token=pFOeNRGZazkAAAAA:w3SLtqk2S1ddNHJtqZhY8-CnaJomTheE06KXrT_ycN832tsm9D_82zeKJxyVKyA5bhK4iKGD8QXH", "abstract": "This study examines the effect of agricultural input subsidy cards and extension services on Bangladesh’s rice productivity, using plot level panel data from three waves (2011–2019) of the Bangladesh Integrated Household Survey. To control for endogeneity of the two programs, instrumental variable and control function approaches are used. Findings reveal that access to input subsidy cards and extension services raise productivity in riceplanted plots by nearly 20% and 22%, respectively. Further, the channels and type of advisory services matter. Finally, access to input subsidy cards and extension services is more beneficial in areas prone to droughts and excessive rainfall. These findings underscore the value of complementary investments in robust extension systems, especially in vulnerable regions, to optimize the performance of input subsidy programs. Expanded extension services coupled with input subsidies can be an effective policy mix to raise productivity, strengthen climate resilience, and promote inclusive agricultural growth in Bangladesh.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Climate, Energy & Environment"], "methods": ["IV"]}, {"id": 75, "title": "Maternal and Child Health Handbook to Improve Continuum of Maternal and Child Care in Rural Bangladesh: Findings of a Cluster Randomized Controlled Trial", "authors": "Tobe et al.", "authorsFull": "Tobe, Ruoyan Gai; Haque, Syed Emdadul; Mubassara, Sanzida; Rahman, Rushdana; Ikegami, Kiyoko; Mori, Rintaro", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "PLoS One", "doi": "10.1371/journal.pone.0266074", "url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0266074", "abstract": "This study aimed to evaluate the effectiveness of maternal and child health handbook (MCH) enhanced by mobile tools and to generate evidence informing the adoption of the program in Bangladesh. A cluster randomized controlled trial (RCT) has been implemented in Lohagora of Narail District and Dhamrai of Dhaka District. Unions of the study settings were randomly allocated in either one of three groups: (1) Intervention 1 using both mobile platform and MCH, (2) Intervention 2 using MCH alone, or (3) the Control. A total of 3,002 participants were recruited. The interventions were designed to promote two-way communications between pregnant women/their families and community health workers by an empowering approach. A total of 3,002 pregnant women were recruited. As the results, the interventions both significantly improved the utilization of CoC, although the overall proportion of CoC was relevantly low: 2.79% in the Control (95% CI: 1.37–3.54%), 6.16% in Intervention 2 (95% CI: 4.67–7.86%), and 7.89% in Intervention 1 (95% CI: 6.29–9.90%). Neonatal mortality rate with and without CoC was 5.43 per 1,000 (95% CI: 3.63–9.57 per 1,000) and 34.8 per 1,000 (95% CI: 24.3–45.4 per 1,000), respectively. Our study indicated the effectiveness of the interventions by leveraging MCH and a mobile platform to promote uptake of CoC throughout prepartum, intrapartum and postpartum/neonatal periods, potentially bringing long-lasting benefits to mothers and their offspring. The explicit approach is expected to guide policy makers to adopt MCH interventions in primary healthcare strengthening at the community level.Trial registration: UMIN000025628 Registered June 13, 2016.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health", "Health Systems & Disease Control"], "methods": ["RCT"]}, {"id": 76, "title": "Flexible Loan Contracts for Microentrepreneurs in Bangladesh", "authors": "Battaglia et al.", "authorsFull": "Battaglia, Marianna; Selim Gulesci, Selim; Madestam, Andreas", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published report", "journal": "Abdul Latif Jameel Poverty Action Lab (JPAL)", "doi": "NoDOI", "url": "https://www.povertyactionlab.org/evaluation/flexible-loan-contracts-microentrepreneurs-bangladesh", "abstract": "Lack of access to credit and insurance markets can prevent small-scale rms in low- and middle-income countries from making protable investments. In Bangladesh, researchers partnered with BRAC to evaluate the impact of repayment exibility in loan contracts for microentrepreneurs. Repayment exibility beneted traditional micronance borrowers primarily through the provision of insurance, enabling riskier investments at lower default rates.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash"], "methods": []}, {"id": 77, "title": "Fishing Rights to Water Estates and Food Security in Coastal Bangladesh", "authors": "Haque et al.", "authorsFull": "Haque, Samiul; ABEDIN, NAVEEN; Hossain, M. Ismail; Akbar, Rushde Elahi", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Oxford Development Studies", "doi": "10.1080/13600818.2025.2517579", "url": "https://www.tandfonline.com/doi/abs/10.1080/13600818.2025.2517579", "abstract": "We examine how access rights to water estates affect food security outcomes of 211 rural households in coastal Bangladesh under the Jalmahal Management Policy. Using distance to water estates as an instrument, we employ IV-2SLS and instrumental variable quantile treatment effect methods to address endogeneity and examine distributional effects. Results indicate that fishing rights signifi cantly improve macro and micronutrient consumption for the aver age household. However, these benefits primarily accrue to households already meeting or close to meeting their nutritional requirements. We find that socioeconomic factors – higher income, assets, and education – enhance households’ ability to translate access rights into improved food security. Our findings suggest that while rights-based approaches can improve average nutritional outcomes, complementary support mechanisms are needed to benefit the most vulnerable households.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet"], "methods": ["IV"]}, {"id": 78, "title": "Re‐Striking the Indications in the Improvement of Avoidable Caesarian Section: A Cluster Randomized Control Trial", "authors": "Ashraf", "authorsFull": "Ashraf, Fatema", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Health Science Reports", "doi": "10.1002/hsr2.70890", "url": "https://pmc.ncbi.nlm.nih.gov/articles/PMC12153216/pdf/HSR2-8-e70890.pdf", "abstract": "Background and AimsCesarean section (CS) rates are on the rise globally, creating serious public health concern with their increased risk of morbidity and mortality for low‐risk pregnancies. The aim of this study is to identify whether re‐striking the indications of CS can reduce the rate of unnecessary procedures at a system level, whilst preserving maternal and fetal outcomes.MethodsThis cluster randomized controlled trial recruited 277 Bangladeshi antenatal patients between 2020 and 2021, evaluating them in two groups: 138 individuals in the intervention group and 139 in the control group. A CS was recommended for any deviation from normal labor progression, with clinical experts providing second opinions and ongoing patient care in the intervention group. The incidence risk ratio (IRR) was calculated utilizing bias‐corrected multivariable Poisson regression models and adjusting for cluster variation and plausible confounders.ResultsWe utilized cluster‐adjusted samples with identical baseline characteristics among study groups. Re‐striking the indication reduces the likelihood of CS (IRR = 0.87, 95% CI = 0.82–0.93; p < 0.001). The difference in the likelihood of maternal birth canal injury (p = 0.16) and the requirement of maternal resuscitation (p = 0.31) remained similar across the study arms. Although the APGAR score and perinatal mortality were identical across the two clusters, the likelihood of neonatal admission decreased (IRR = 0.59, 95% CI = 0.37–0.93; p = 0.02) in re‐striking arms. After re‐striking, the CS indication rate in the intervention group dropped from 60.1% to 44.2%, resulting in a 15.9% net reduction in CS events.ConclusionRe‐striking the primary indications for cesarean sections is crucial for reducing avoidable deliveries; that is why it should be integrated into hospital policy to benefit patients and the healthcare system.", "primaryTheme": "Maternal & Child Health", "themes": ["Maternal & Child Health"], "methods": ["RCT"]}, {"id": 79, "title": "Promoting Healthy Practices Among Schools and Children in Rural Bangladesh: A Randomised Controlled Trial of Skill-Based Health Education", "authors": "Omura et al.", "authorsFull": "Omura, Makiko; Venkatesh, Mohini; Khandekar, Ikhtiar; Rahman, Md. Ataur", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "BMC Public Health", "doi": "10.1186/s12889-024-20787-0", "url": "https://bmcpublichealth.biomedcentral.com/articles/10.1186/s12889-024-20787-0#citeas", "abstract": "BackgroundPoor child health and hygiene practices are persistent issues in resource-constrained settings, particularly in low-income countries. This study assessed the impact of skill-based health education (SBHE) on school and child hygiene practices in rural Bangladesh.MethodsA cluster-randomised-controlled intervention with cross-cutting/factorial design was conducted in 180 randomly selected primary schools, stratified by school type, in Jhenaidah District, Bangladesh. Weekly SBHE sessions were delivered to half of the schools by locally recruited para-teachers for one year. A cross-cutting soap provision treatment was given monthly to half of the SBHE-treatment schools and half of the SBHE-control schools. Treatment assignment was masked to all baseline and endline surveyors. Data were collected at both the school and child levels, with child-level data aggregated at the school level. Outcome measures were grouped into five thematic families. The primary outcome families were school hygiene practice & maintenance, school-aggregated child handwashing and school-aggregated child dentalcare. Utilising the difference-in-differences estimator with seemingly unrelated regression, we estimated the average treatment effect for each family of multiple outcomes. The intervention spillover effect to neighbouring schools along with the time-period effect were also evaluated. The project’s cost-effectiveness was additionally assessed.ResultsOur findings revealed that SBHE had a positive impact on primary outcomes related to healthy practices and behavioural changes, resulting in a 0.32SD improvement in school hygiene practices and maintenance (p < 0.001), a 0.47SD increase in child handwashing (p < 0.001), and a 0.43SD enhancement in child dentalcare (p < 0.01). Despite its imperfect implementation, the provision of soap itself showed no significant effect. Furthermore, significant spillover effects of healthy practices were observed in neighbouring non-treatment schools. The cost-effectiveness analysis indicated that our SBHE program was cost-effective.ConclusionsOur study provides compelling evidence of the positive impact of SBHE on school hygiene and child health practices in rural Bangladesh, with notable spillover effects. The cost-effectiveness analysis underscores the value of SBHE, affirming its potential as an effective intervention method in improving school health and hygiene practices in primary schools and beyond.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["RCT", "DiD"]}, {"id": 80, "title": "Impact of Mobile Health-Based Nutritional Education on Hemoglobin Levels in Anemic Adolescent Girls in Rural Bangladesh: A Randomized Controlled Trial", "authors": "Rahman et al.", "authorsFull": "Rahman, Jiaur; Rahman, Moshiur; Kakehashi, Masayuki; Matsuyama, Ryota; Sarker, Mohammad Habibur Rahman; Ali, Mohammad; Promitee, Sumaita Kabir; Prihanto, Junaidi Budi; Ahmed, Ashir; Shimpuku, Yoko", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "BMC Public Health", "doi": "10.4103/jfmpc.jfmpc_1010_23", "url": "https://bmcpublichealth.biomedcentral.com/articles/10.1186/s12889-025-23687-z", "abstract": "BackgroundAnemia is a global public health concern, particularly among adolescent girls in rural Bangladesh, owing to inadequate knowledge and insufficient nutritional intake. Mobile health (mHealth) education has the potential to solve these limitations. This study aimed to evaluate the impact of mHealth education on raising hemoglobin levels and reducing anemia among adolescent girls in rural Bangladesh.MethodsThis open-label, parallel-group, randomized controlled trial was conducted at two schools in Chandpur district, Bangladesh from late May 2022 to January 2023. We randomly assigned one school to the intervention group and another to the control group and then performed simple random sampling to recruit 138 adolescent girls with anemia from the intervention (n = 69) and control (n = 69) groups. The intervention group received online counseling sessions and health education via mHealth technology, whereas the control group received usual care, and both groups were observed for 8 months. We performed mixed-effects model and generalized estimating equations (GEE) to evaluate the outcomes.ResultsThe study analyzed 121 participants (intervention group, 62; control group, 59). After adjusting for covariates, mixed-effects model observed that body mass index (BMI) [coefficient: 1.10, 95% confidence interval (CI): 0.44–1.76, P = 0.001], mid-upper arm circumference (MUAC) (coefficient: 0.77, 95% CI: 0.27–1.26, P = 0.002), hip circumference (coefficient: 2.24, 95% CI: 0.62–3.87, P = 0.007), and waist circumference (coefficient: 2.20, 95% CI: 0.74–3.66, P = 0.003) were significantly improved in intervention group. Although hemoglobin levels improved in the intervention group, the change was not statistically significant. However, the intervention group experienced a higher anemia recovery than the control group (25.8% vs. 13.6%). The GEE showed improvement in knowledge (coefficient: 4.11, 95% CI: 3.63–4.58, p = < 0.001), attitude (coefficient: 1.59, 95% CI: 1.24–1.96, p = < 0.001), and practice (coefficient: 0.39, 95% CI: 0.13–0.66, p = 0.004) in the intervention group compared to the control group after adjusting for relevant covariates.ConclusionsThe mHealth education led to improvements in knowledge, attitude, and practice (KAP) scores related to anemia among adolescent girls. Furthermore, the intervention resulted in improvements in BMI, MUAC, and hip and waist circumference measurements. Additionally, there were positive trends indicating a reduction in anemia prevalence, accompanied by an upward trend in hemoglobin levels. Therefore, implementing this strategy could enhance KAP and contribute to reducing adolescent girls’ anemia in low-resource settings.Trial registrationNCT05185661 (https://www.clinicaltrials.gov/), registered [January 11, 2022] with ClinicalTrials.gov.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet"], "methods": ["RCT"]}, {"id": 81, "title": "Comparing Delivery Channels to Promote Nutrition-sensitive Agriculture: A Cluster-randomized Controlled Trial in Bangladesh", "authors": "Ahmed et al.", "authorsFull": "Ahmed, Akhter; Coleman, Fiona; Hoddinott, John F.; Menon, Purnima; Roy, Shalini; Parvin, Aklima; Pereira, Audrey; Quisumbing, Agnes", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published report", "journal": "IFPRI - Discussion Papers", "doi": "https://doi.org/10.2499/p15738coll2.136473", "url": "https://www.ifpri.org/publication/comparing-delivery-channels-promote-nutrition-sensitive-agriculture-cluster-randomized", "abstract": "We use a randomized controlled trial in rural Bangladesh to compare two models of delivering nutrition content jointly to husbands and wives: deploying female nutrition workers versus mostly male agriculture extension workers. Both approaches increased nutrition knowledge of men and women, household and individual diet quality, and women’s empowerment. Intervention effects on agriculture and nutrition knowledge, agricultural production diversity, dietary diversity, women’s empowerment, and gender parity do not significantly differ between models where nutrition workers versus agriculture extension workers provide the training. The exception is in an attitudes score, where results indicate same-sex agents may affect scores differently than opposite-sex agents. Our results suggest opposite-sex agents may not necessarily be less effective in providing training. In South Asia, where agricultural extension systems and the pipeline to those systems are male-dominated, training men to deliver nutrition messages may offer a temporary solution to the shortage of female extension workers and offer opportunities to scale promote nutrition-sensitive agriculture.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Agriculture & Food Security", "Women's Empowerment & Gender"], "methods": ["RCT"]}, {"id": 82, "title": "Impacts of a home garden intervention in Bangladesh after one, three and six years", "authors": "Baliki et al.", "authorsFull": "Baliki, Ghassan; Schreinemachers, Pepijn; Bruck, Tilman; Uddin, Nasir Md.", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Agriculture & Food Security", "doi": "10.1186/s40066-022-00388-z", "url": "https://doi.org/10.1186/s40066-022-00388-z", "abstract": "Background: Training women in home gardening and nutrition has been shown to increase household production and consumption of nutritious food and contribute to women’s empowerment, but evidence is limited to short-term effects. Here, we investigate whether home garden support leads to long-term improvements in household nutrition and women’s empowerment. To do this we use four waves of household-level survey data collected over a 7-year period (2013–2019) from an intervention (n = 395) and a control (n = 224) group in four rural districts of Bangladesh. We estimate the intent-to-treat effect using a difference-in-difference estimator.Results: We find an immediate increase in the quantity of vegetables harvested from home gardens (+ 29.6 kg/year; p = 0.01) and this effect is sustained in years three (+ 42.3 kg; p < 0.01) and six (+ 37.0 kg; p < 0.01). The nutrient yield from the gardens also remained positive and significant, but the effect declined due to changes in the composition of vegetables. The effect on per capita vegetable intake, significant in years one and three, turned not significant in year six. Effects on nutrition knowledge, food preparation practices, and women’s empowerment all remained significant in year six.Conclusions: Home garden interventions in Bangladesh create sustained impact on a range of social, economic and nutritional outcomes. Refresher training after 5 or 6 years may help to maintain the full range of impacts observed.Keywords: Nutrition-sensitive agriculture, Sustainability, Vegetable, Homestead food production, Micronutrient, Women’s empowerment", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Nutrition & Diet", "Women's Empowerment & Gender"], "methods": ["DiD"]}, {"id": 83, "title": "Leaning in at Home: Women's Promotions and Intra-household Bargaining in Bangladesh", "authors": "Uckat", "authorsFull": "Uckat, Hannah", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Published working paper", "journal": "Policy Research Working Papers", "doi": "10986/39586", "url": "https://openknowledge.worldbank.org/entities/publication/6a4ba087-2b62-48e0-b2db-7e7003c53faa", "abstract": "It is established that entering employment improves a woman's bargaining position in the household. This paper investigates whether a woman's career advancement further improves her intra-household bargaining power. The analysis exploits quasi-random participation in a career promotion program in Bangladesh's garment industry to causally estimate the impact of women's promotion on household decision-making. The findings show that women who participate in the promotion program gain bargaining power as measured by higher expenditures on women (51%) and girls (74%), and on remittances (58%). The promotion-related income effect only partially explains these increases, suggesting that women gain more agency over household income more generally. Further, these new female managers now serve as role models to their staff. The paper finds that the direct effects spill over to women who are quasi-randomly exposed to the new female managers, who also report more say in household decisions. Complementarities between women's positions in the workplace and in the household appear important.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector", "Financial Inclusion & Cash"], "methods": []}, {"id": 84, "title": "Digital Technology and Inclusive Development During Global Crisis: Evidence from a Randomised Experiment in Bangladesh", "authors": "Fu et al.", "authorsFull": "Fu, Xiaolan; Ghauri, Pervez; Lu, Jianan", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Research Policy", "doi": "https://doi.org/10.1016/j.respol.2025.105173", "url": "https://www.sciencedirect.com/science/article/pii/S0048733325000022", "abstract": "We investigate the role of digital technology in inclusive development by conducting a randomised control trial (RCT) in Bangladesh. We analyse the mechanisms through which access to content-based digital platforms empower marginalised communities' entrepreneurship and employment and hence contributes to their income and resilience. Based on a sample of 2974 respondents, we found that the treatment group, who received our content-based digital platform usage training, manifested higher income resilience and better employment status during the COVID-19 pandemic in 2020–2021. The results are underpinned by sub-group studies, real-usage studies, mechanism validity checks and qualitative analyses. This study contributes to the literature by analysing the impact of digital entrepreneurial support programmes in developing economies and the transmission mechanisms through which they include marginalised communities in economic activities. It also provides the first RCT-based empirical evidence on the developmental impact of content-related digital platform technology that requires low capital investment.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment"], "methods": ["RCT"]}, {"id": 85, "title": "Effectiveness of Participatory Trainings in Improving Nutrition Knowledge and Dietary Diversity in Rural Bangladesh", "authors": "Davidson", "authorsFull": "Davidson, Kelly A.", "year": 2025, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "Agriculture & Food Security", "doi": "10.1186/s40066-024-00517-w", "url": "https://agricultureandfoodsecurity.biomedcentral.com/articles/10.1186/s40066-024-00517-w", "abstract": "BackgroundDespite improvements in recent decades, Bangladesh continues to face malnutrition rates that are among the highest in the world. Consuming a nutrient-rich diverse diet can mitigate the risk of malnutrition-induced health problems. However, consumers often lack knowledge about what constitutes a healthy diet, and often knowledge improvements do not necessarily translate to behavior change due to social norms and access constraints.ObjectivesThis study evaluates the effectiveness of participatory nutrition education in improving nutrition knowledge and dietary diversity among rural men and women in Bangladesh, investigates whether increased nutrition knowledge leads to changes in dietary behavior, and explores the factors limiting behavior change to aid in the development and implementation of nutrition-sensitive interventions.DesignThree-arm randomized control study. We randomize participants into two participatory workshop interventions or the control group of no training. The first intervention consisted of workshop activities related to selecting a balanced diet. The second intervention included the activities of the first intervention as well as activities related to gender and intrahousehold food allocation.Participants358 adult men and women in two districts of Bangladesh.ResultsUsing pre- and post-intervention survey data and lagged dependent variable regression analyses, we find an 8–11% increase (p = 0.010) in the comprehensive nutrition knowledge score among workshop attendees, compared to the control. We find larger effects, up to a 30% increase (p = 0.002), on targeted scores measuring knowledge around food groups and nutrients. Despite increases in knowledge, we find little to no evidence that the workshops impact dietary diversity or that nutrition knowledge translates to behavior change. Our survey responses reveal economic factors such as income and food access limit participants from putting their improved nutrition knowledge into action.ConclusionsHabits, social norms and economic factors such as income and access constraints can prevent participants from putting improved nutrition knowledge into action. Short-term, low-cost participatory workshops may be more effective when coupled with economic incentives, gifts-in-kind, or nutrition-sensitive agriculture.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Agriculture & Food Security", "Education & Skills", "Child Marriage & Social Norms", "Governance & Service Delivery"], "methods": ["RCT"]}, {"id": 86, "title": "Assessing the Efficacy of Cash Incentive Policies in Enhancing Remittance Inflows: Evidence From Bangladesh", "authors": "Farabi et al.", "authorsFull": "Farabi, Muhammad N. S.; Mobin, Mahadee Al; Khan, Asir N.", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "PLoS One", "doi": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0318342", "url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0318342", "abstract": "The Government of Bangladesh (GoB) first implemented the cash incentive of 2 percent in July 2019 and continued the scheme with some modifications amid the pandemic to enhance remittance inflows through formal channels and ensure macroeconomic stability in the country. This study examines the impact of the cash incentive introduced by the GoB to boost remittance inflow using the Interrupted Time Series (ITS) analysis along with the Chow test for structural stability. While ITS analysis has been employed by numerous stud- ies in the healthcare sector, but this paper uses such analysis for the first time in any type of migration study in Bangladesh. We have used ITS as it is most effective in measuring the impact of policy interventions that are expected to act either quickly after an intervention or within a stipulated time frame. The study is also the first to examine the region wise efficacy of policy intervention in the country. Monthly Remittance Inflow data from July 2013 to December 2021 has been used for the analysis. Chow test results conclude that the policy intervention had a significant impact while the ITS analysis findings demonstrated that the cash intervention significantly increased both aggregated and region-specific remittance inflows, highlighting the significance of the action. The overall findings revealed that the introduction of cash incentive in July 2019 resulted in an immediate, sustained increase of 6.68 percent in remittance inflows, with a further increase of 0.25 percent every month. Region wise analysis shows that the impact was highest in the USA & UK region and lowest in the Middle Eastern region, which signifies issues related to prevalence of hundi market, skillset of migrant workers, average monthly salary, and remittance sending costs. Our research provides policymakers with significant information to implement customized policies that ensure macroeconomic stability by enhancing remittance inflows through formal channels.", "primaryTheme": "Financial Inclusion & Cash", "themes": ["Financial Inclusion & Cash", "Governance & Service Delivery", "Labour, Jobs & Garment Sector"], "methods": []}, {"id": 87, "title": "Impact of a Homestead Food Production Intervention on Infant and Young Child Feeding and Home Environment in Bangladesh", "authors": "Wendt et al.", "authorsFull": "Wendt, Amanda; Waid, Jillian; Ali, Masum; Gabrysch, Sabine", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Current Developments in Nutrition", "doi": "https://doi.org/10.1093/cdn/nzac060.072", "url": "https://doi.org/10.1093/cdn/nzac060.072", "abstract": "Objectives:Optimal child growth and development depend on many factors including proper nutrition and feeding practices as well as a stimulating home environment. We aimed to assess the impact of a Homestead Food Production (HFP) program on infant and child feeding as well as child stimulation practices as part of the Food and Agricultural Approaches to Reducing Malnutrition (FAARM) cluster-randomized trial in rural Bangladesh.Methods:The HFP program promoted increased dietary diversity and improved child feeding practices based on the WHO’s Essential Nutrition Actions, including responsive feeding and the importance of vitamin A capsules. Practices for child stimulation were not promoted although both intervention and control groups received toys (e.g., finger puppets, balls, etc.) during data collection. The 2019–20 FAARM endline survey included measures on infant and young child feeding (IYCF), responsive feeding, and family care indicators. Data were collected on 1,142 children (0–39 months of age) and sub-samples were analyzed based on age restrictions for IYCF (6–23m) and responsive feeding (6–39m). We used multilevel linear and logistic regression to assess intervention impact, adjusting for child age and cluster.Results:Children in the FAARM intervention group were more likely to have achieved minimum dietary diversity (OR (95% CI): 1.9 (1.3, 2.7)), minimum adequate diet (OR (95% CI): 1.9 (1.3, 2.7)), and more likely to have received a vitamin A capsule in the last six months (OR (95% CI): 1.6 (1.2, 2.1)). In their home environment, children in the intervention group had toys from a greater number of sources and were more likely to have toys for pretending. No differences were seen in exclusive breastfeeding, iron-rich food consumption, or responsive feeding indicators.Conclusions:The FAARM intervention was able to improve children’s diets and selected aspects of child stimulation.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Agriculture & Food Security"], "methods": []}, {"id": 88, "title": "The Role of Rural Credit in Agricultural Technology Adoption: The Case of Boro Rice Farming in Bangladesh", "authors": "Rayhan et al.", "authorsFull": "Rayhan, Shah Johir; Rahman, Sadique; Lyu, Kaiyu", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Agriculture", "doi": "10.3390/ agriculture13122179", "url": "https://www.mdpi.com/2077-0472/13/12/2179/pdf?version=1700638431", "abstract": "Rice agriculture provides millions of households with a steady source of income and employment. However, for small and marginal farmers, the exorbitant cost of production inputs presents a formidable obstacle in their pursuit of acquiring it. Credit constraints are a significant impediment to the adoption of agricultural technologies. Therefore, this paper identifies the determinant of access to rural credit and its impact on Boro rice production technology adoption in Bangladesh using cross-sectional data. The study employed probit regression, propensity score matching (PSM), inverse probability weighting (IPW), and inverse probability weighted regression adjustment (IPWRA) techniques. The findings indicate that age, family size, working members, and involvement in safety net programs negatively and significantly influence access to rural credit, while earning persons in the family, literacy, rice farming experience, remittance, and total income positively influence access to rural credit. The positive and significant ATT values suggested that access to rural credit has a positive and significant effect on technology adoption and the level of technology use. It was also found that access to rural credit has a heterogeneous effect. In particular, non-government organization (NGO) credit has a more significant impact on technology adoption than formal bank credit. Access to credit and the adoption of agricultural technologies can be greatly improved with the help of a location-specific rural credit policy and strong monitoring from the formal banking sector.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Financial Inclusion & Cash", "Social Protection & Safety Nets", "Education & Skills"], "methods": ["PSM"]}, {"id": 89, "title": "Protecting Infants from Natural Disasters: The Case of Vitamin A Supplementation and a Tornado in Bangladesh", "authors": "Snaebjorn et al.", "authorsFull": "Snaebjorn, Gunnsteinsson; Molina, Teresa; Adhvaryu, Achyuta; Christian, Parul; Labrique, Alain; Sugimoto, Jonathan; Shamim, Abu Ahmed; West Jr, Keith P.", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Development Economics", "doi": "10.1016/j.jdeveco.2022.102914", "url": "https://www.sciencedirect.com/science/article/abs/pii/S0304387822000724", "abstract": "Environmental disasters have increased in frequency and intensity as a result of climate change. Can timely intervention help protect against the health impacts of these disasters? We study this question by leveraging data from a double-blind cluster-randomized controlled trial of at-birth vitamin A supplementation, which boosts immune system functioning, in Bangladesh. During the trial, a large tornado swept through the study area, affecting both treatment and control clusters. Tornado exposure in infancy decreased physical growth and increased the incidence of severe fevers. But infants who received supplementation were protected from these negative effects.", "primaryTheme": "Climate, Energy & Environment", "themes": ["Climate, Energy & Environment", "Nutrition & Diet"], "methods": ["RCT"]}, {"id": 90, "title": "Effects of Household Concrete Floors on Maternal and Child Health – the Cradle Trial: A Randomised Controlled Trial Protocol", "authors": "Rahman et al.", "authorsFull": "Rahman, Mahbubur; Jahan, Farjana; Hanif, Suhi; Yeamin, Afsana; Shoab, Abul Kasham; Andrews, Jason R.; Lu, Ying; Billington, Sarah; Pilotte, Nils; Shanta, Ireen S.; Jubair, Mohammad; Rahman, Mustafizur; Kabir, Mamun; Haque, Rashidul; Tofail, Fahmida; Hossain, Sakib; Mahmud, Zahid Hayat; Ercumen, Ayse; Benjamin-Chung, Jade", "year": 2024, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Ongoing study", "journal": "BMJ Open", "doi": "https://doi.org/10.1136/bmjopen-2024-090703", "url": "https://bmjopen.bmj.com/content/15/3/e090703.abstract", "abstract": "Introduction Early life soil-transmitted helminth (STH) infection and diarrhoea are associated with growth faltering, anaemia, impaired child development and mortality. Exposure to faecally contaminated soil inside the home may be a key contributor to enteric infections, and a large fraction of rural homes in low-income countries have soil floors. The objective of this study is to measure the effect of installing concrete floors in homes with soil floors on child STH infection and other maternal and child health outcomes in rural Bangladesh.Methods and analysis The Cement-based flooRs AnD chiLd hEalth trial is an individually randomised trial in Sirajganj and Tangail districts, Bangladesh. Households with a pregnant woman, a soil floor, walls that are not made of mud and no plan to relocate for 3 years will be eligible. We will randomise 800 households to intervention or control (1:1) within geographical blocks of 10 households to account for strong geographical clustering of enteric infection. Laboratory staff and data analysts will be blinded; participants will be unblinded. We will instal concrete floors when the birth cohort is in utero and measure outcomes at child ages 3, 6, 12, 18 and 24 months. The primary outcome is prevalence of any STH infection (Ascaris lumbricoides, Necator americanus or Trichuris trichiura) detected by quantitative PCR at 6, 12, 18 or 24 months follow-up in the birth cohort. Secondary outcomes include household floor and child hand contamination with Escherichia coli, extended-spectrum beta-lactamase producing E. coli and STH DNA; child diarrhoea, growth and cognitive development; and maternal stress and depression.Ethics and dissemination Study protocols have been approved by institutional review boards at Stanford University and the International Centre for Diarrheal Disease Research, Bangladesh. We will report findings on ClinicalTrials.gov, in peer-reviewed publications and in stakeholder workshops in Bangladesh.Trial registration number NCT05372068.", "primaryTheme": "Early Childhood Development", "themes": ["Early Childhood Development", "Nutrition & Diet", "Maternal & Child Health", "WASH"], "methods": ["RCT"]}, {"id": 91, "title": "Bridge to Bigpush or Backwash? Market Integration, Reallocation, and Productivity Effects of Jamuna Bridge in Bangladesh", "authors": "Blankespoor et al.", "authorsFull": "Blankespoor, Brian; Emran, M. Shahe; Shilpi, Forhad; Xu, Lu", "year": 2022, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of Economic Geography", "doi": "https://doi.org/10.1093/jeg/lbab024", "url": "https://academic.oup.com/joeg/article/22/4/853/6323969", "abstract": "We study the effects of Jamuna Bridge in Bangladesh that reduced the average trade costs by 50% and connected 26 million people by road to the capital city. We use a difference-in-difference design where the isolated Padma hinterland constitutes the comparison. Balance tests for an array of economic characteristics support the parallel trends assumption. The bridge led to economic revival in the Jamuna hinterland with increased agricultural productivity and population density despite a decline in the share of manufacturing employment. The effects are spatially heterogeneous with substantial manufacturing decline in the middle subregion, and the remote areas reaping the highest benefits.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Trade & Macroeconomy"], "methods": ["DiD"]}, {"id": 92, "title": "Graduation approach to poverty reduction in the humanitarian context: Evidence from Bangladesh", "authors": "Rahman et al.", "authorsFull": "Rahman, Atiya; Bhattacharjee, Anindita; Nisat, Rafia; Das, Narayan", "year": 2023, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Journal of International Development", "doi": "10.1002/jid.3728", "url": "https://onlinelibrary.wiley.com/doi/epdf/10.1002/jid.3728", "abstract": "Increasing forcibly displaced populations worldwide are adversely affecting the poorest host communities' livelihoods. Livelihood programmes can reduce this tension by addressing host communities' skills and capital constraints. In this paper, we examine the effect of a customised version of BRAC's Ultra-Poor Graduation (UPG) programme on the livelihoods of the host communities of Rohingya refugees. We find that the programme increases labour supply in self-employment of working-age men and women, household income, food expenditure and productive asset. Further, we find some weak evidence that the programme decreases the tension between hosts and Rohingya refugees.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector"], "methods": []}, {"id": 93, "title": "Evaluation of a Multicomponent Child Development Intervention Delivered Through the Government Health System: A Feasibility Study", "authors": "Sultana", "authorsFull": "Sultana, Jesmin", "year": 2025, "type": "Impact Evaluation", "status": "Unknown", "pubType": "Journal article", "journal": "BMJ Glob Health", "doi": "BMJ Glob Health . 2025 Jul 20;10(7):e018736.", "url": "https://pubmed.ncbi.nlm.nih.gov/40685160/#full-view-affiliation-1", "abstract": "Introduction Small efficacy trials have demonstrated that multicomponent interventions can improve early child development. We evaluated the large-scale delivery of a multicomponent intervention delivered by government health workers throughout a rural subdistrict in northwestern Bangladesh. Methods We evaluated a group-based, multicomponent intervention with a curriculum covering responsive parenting, caregivers’ mental health, lead exposure prevention strategies at the household level, water, sanitation, hygiene and nutrition. Group sessions were held throughout a rural subdistrict of Bangladesh (August 2019–March 2020). A longitudinal sample of caregivers (n=517) of children 6–24 months was assessed at baseline and endline (primary cohort), and 1179 additional caregivers were assessed only at endline (supplementary cross-sectional). Outcomes were the variety of child play activities and materials, number of books, caregiver depressive symptoms and nutrition and lead knowledge. For primary analyses, we used difference-in-difference. Results Over half (n=276, 53%) of the cohort participants attended any of the 16 intervention sessions and of these, 83% (228) attended 2+. Caregivers attending 2+ sessions, compared with ≤1 session, had more play materials (adjusted mean difference: 0.58; 95% CI: 0.30, 0.85) and were more likely to have any children’s books (adjusted prevalence difference (aPD): 0.26; 95% CI: 0.18, 0.34), to have heard of lead (aPD: 0.13; 95% CI: 0.07, 0.19) or to know how to avoid harm from lead (unadjusted PD: 0.13; 95% CI: 0.08, 0.17). These findings were similar to those from the supplementary cross-sectional analysis. There were no differences in caregiver depressive symptoms in either analysis. More child play activities and nutrition knowledge were associated with attendance in the cross-sectional sample. Conclusions A multicomponent child development intervention delivered by government health workers increased the presence of children’s toys and books and caregiver knowledge of lead in families who attended two or more sessions. Further adaptation and alternative delivery methods are likely to improve the reach and the breadth of impacts. Trial registration number NCT04111016.", "primaryTheme": "WASH", "themes": ["WASH", "Health Systems & Disease Control", "Early Childhood Development", "Nutrition & Diet"], "methods": ["DiD"]}, {"id": 94, "title": "Participation in Livestock-Based Interventions and Its Impact on Food Security in Bangladesh: A Quasi-Experimental Method", "authors": "Sarma", "authorsFull": "Sarma, Paresh Kumar", "year": 2024, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "10.1016/j.clcb.2024.100098", "url": "https://www.sciencedirect.com/science/article/pii/S2772801324000265?via%3Dihub", "abstract": "Livestock-based interventions play a critical role in enhancing food security in developing countries like Bangladesh, contributing to enhanced livestock productivity, improved household income, ensured food security, women's empowerment, livelihoods advancement, and positioning agriculture as a catalyst for economic growth. The study specifically examines the impact of the livestock and dairy development project (LDDP) intervention on food security in rural livestock farming households in Bangladesh. We gathered data, we are employing simple random sampling, and collecting 180 cross-sectional primary data from both LDDP participants and non-participants. Descriptive statistics, inferential statistics, and propensity score matching approaches were utilized to achieve our research objectives. Livestock farming households with LDDP participants exhibited higher food security, with beneficiaries surpassing non-participants by 52 % and 40 %, respectively. The mean per capita calorie intake for LDDP participant households was 1966.134 (Kcal), whereas non-participant households recorded 1762.130 (Kcal). The results demonstrate that LDDP intervention significantly and positively impacts food security, women's empowerment, household welfare, and income. These interventions have the potential to enhance nutrition and boost household income, thereby contributing to the stability of food security. Consequently, we recommended an expansion of LDDP intervention, encompassing less resourceful farmers with adequate logistical support. This study illustrates how employing propensity score matching method (PSM) and implementing the LDDP intervention can effectively improve food security in livestock farming households in Bangladesh.", "primaryTheme": "Agriculture & Food Security", "themes": ["Agriculture & Food Security", "Women's Empowerment & Gender", "Nutrition & Diet"], "methods": ["PSM", "Quasi-experimental"]}, {"id": 95, "title": "Does Physician Recruitment Impact Access and Health of Rural Residents? Evidence From the 2014 Recruitment of 6000 Physicians in Bangladesh.", "authors": "BinAbdulBaten", "authorsFull": "BinAbdulBaten, Redwan", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "Other", "doi": "https://dx.doi.org/10.22605/RRH9715", "url": "https://dx.doi.org/10.22605/RRH9715", "abstract": "Introduction: We analyze a 2014 policy that increased physician supply in rural Bangladesh and assess its impact on access to care and health outcomes for rural residents. Methods: We use data from the Household Income and Expenditure Survey for 2005–2016 and employ a difference-indifferences model. Our analysis focuses on five key outcome categories: access to providers, access to medicine, cost of care, health status, and travel time to reach healthcare providers. Results: Rural residents’ likelihood of visiting a government doctor increased by 14 percentage points, while visits to private doctors decreased by 15 percentage points. Rural residents are more likely to receive medication from public facilities, and their total monthly cost of care has decreased. We found a rise in reported cases of chronic conditions like heart disease and arthritis among rural residents. Conclusion: Our findings indicate that increasing physician availability in rural Bangladesh positively impacted healthcare access and utilization.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": []}, {"id": 96, "title": "The Impact of Accord & Alliance Compliance Measures on RMG Firm Performance in Bangladesh", "authors": "Hossain et al.", "authorsFull": "Hossain, Monzur; Iqbal, Kazi; Chowdhury, Tahreen Tahrima", "year": 2025, "type": "Impact Evaluation", "status": "Completed", "pubType": "Journal article", "journal": "The World Economy", "doi": "10.1111/twec.70004", "url": "https://onlinelibrary.wiley.com/doi/10.1111/twec.70004", "abstract": "This paper examines the impact of a buyer-driven compliance initiative on ready-made garment (RMG) firms. Following the devastating Rana Plaza collapse in 2013, U.S. and European garment buyers launched two workplace safety compliance initiatives, the Accord and the Alliance (A&A), aimed at improving workplace safety and labour conditions in the RMG sector, a major source of export earnings and female employment in Bangladesh. Approximately 2000 RMG firms, which account for nearly 60% of the total, entered into a five-year agreement with A&A from 2014 to 2018 to enhance compliance standards [Correction added on 7 July 2025, after first online publication: The percentage of RMG firms in this sentence was incorrectly stated as 660%. This has been corrected to 60% in this version.]. Using primary survey data from 322 firms—179 treatment and 143 non-treatment—we apply the difference-in-differences method to investigate the causal impact of compliance measures on various firm outcomes. Our results indicate that the compliance impact is positive and significant only for labour productivity, but not for profitability or market access. Improved workplace safety protocols enhance job satisfaction, which in turn boosts labour productivity. However, the positive effect of workplace safety on profitability or market access may be realised in the long run, alongside increased labour productivity.", "primaryTheme": "Labour, Jobs & Garment Sector", "themes": ["Labour, Jobs & Garment Sector"], "methods": ["DiD"]}, {"id": 97, "title": "Health Effects of Street-Vended Fresh-Cut Fruits: A Randomized Controlled Trial in Bangladesh", "authors": "Nahiduzzaman", "authorsFull": "Nahiduzzaman, F. N. U.", "year": 2025, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "PLoS One", "doi": "https://doi.org/10.1371/journal.pone.0335979", "url": "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0335979", "abstract": "Foodborne infections, particularly from street-vended fresh-cut fruits, are a growing public health concern in urban settings of developing countries. This study evaluated the gastrointestinal effects of consuming street-vended fruits in a randomized controlled trial (RCT) in Mymensingh, Bangladesh. A total of 300 participants were recruited and randomized into Treatment (n = 150) and Control (n = 150) groups. Treatment participants consumed guava, pineapple, or watermelon purchased from street vendors, while Control participants avoided street-vended fruits. Microbial analysis of fruits included total viable count (TVC), S. aureus, and E. coli. Participants recorded GI symptoms for 4 days post-intervention, with a 10-day follow-up. At least one GI symptom occurred in 41 (27.3%) treatment participants compared with 15 (10%) controls. Nausea affected 20 (13.3%) versus 2 (1.3%) participants (RR = 10, 95% CI: 2.38–42.03, p < 0.001), abdominal cramps 13 (8.7%) versus 0 (0%) participants (p < 0.001), and diarrhea 7 (4.7%) versus 0 (0%) participants (p = 0.02). Cox modeling indicated a markedly higher hazard of symptom development in the Treatment group (HR = 162.68, 95% CI: 21.53–1229.43, p < 0.001), while higher hygienic practice scores modestly reduced risk (HR = 0.90, 95% CI: 0.82–0.99, p = 0.028). Higher total viable counts (TVC 5.78–5.86 log CFU/ml) were strongly associated with weakness (r = 0.66, p < 0.001, OR=11.28), abdominal cramps (r = 0.56, p < 0.001, OR=6.16), and diarrhea (r = 0.51, p < 0.001, OR=6.73). E. coli (6–10% prevalence) showed the strongest correlations with abdominal cramps, weakness, and diarrhea (ρ = 0.69–0.78, p < 0.001), whereas S. aureus (20–34%) correlated primarily with weakness and abdominal cramps (ρ = 0.44–0.47, p < 0.001). Abdominal cramps, weakness, and diarrhea demonstrated the highest sensitivity to microbial contamination (AUC = 0.801–0.908). These findings provide robust evidence that consumption of street-vended fresh-cut fruits is associated with a significant increase in GI symptoms linked to microbial contamination, supporting behavioral interventions, such as consumer awareness and improved hygiene practices, and informing policy measures to enhance food safety and protect public health.", "primaryTheme": "WASH", "themes": ["WASH"], "methods": ["RCT"]}, {"id": 98, "title": "Maternal Beliefs, Mental Health, and Economic Resources on Human Capital Accumulation in Early Life", "authors": "Shyamal et al.", "authorsFull": "Shyamal, Chowdhury; Victoria, Baranov; Valentina, Duque", "year": 2023, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "", "doi": "", "url": "https://www.cochranelibrary.com/central/doi/10.1002/central/CN-02574625/full", "abstract": "NTERVENTION: The study will provide three interventions through the Kapasia Model of Maternal and Child Health (henceforth, Kapasia Model): 1) In treatment 1, project officers employed by the research team, who will be located in study area, will provide information over the phone to each treated household on their eligibility (yes or no) of government’s cash and food transfer programs, as well as where and how to enrol, and assistance with enrolment for eligible mothers. Treatment 2 involves providing information to pregnant mothers and their families on the importance of the early‐life environment, and especially the 9‐month in utero period, in laying the foundations for a child’s lifelong success. Eligible and willing participants who would be randomly assigned to receive this treatment will be contacted by our project officers, and the officer will provide the following information over the phone: “A healthy pregnancy, wherein mothers take care of themselves and their children during their pregnancy, is extremely important for their children health and economic outcomes. Starting from as early as the 9th week of pregnancy, mothers who eat nutritious food and think positively give birth to healthier children who grow up to be healthier adults. A healthy diet during pregnancy such as this one, (this is based on study conducted in a similar setting, see: https://bmjopen.bmj.com/content/bmjopen/7/8/e015393.full.pdf) can protect a child against low birth weight and stunting (short height) in infancy, and psychological problems, and diabetes or hypertension in adulthood. In contrast, children of mothers who suffer from long periods of stress during pregnancy can develop future health problems when they become adults themselves. Therefore, taking nutritious food r CONDITION: Maternal well‐being; ; Maternal well‐being Public Health ‐ Other public health PRIMARY OUTCOME: Child’s health at birth (birth weight and low birth weight) will be collected from administrative records as well as from parents through visiting their households. [Eight months after the start of the interventions, the research team will visit all participants and collect this information through measuring children.; ] INCLUSION CRITERIA: Eligibility criteria for inclusion: 1. Listed in the digital database of Kapasia Model 2. Permanent residence of any of the two subdistricts of Gazipur district in Bangladesh 3. Newly married women 4. Pregnant women 5. Mothers with young children aged 6 months or younger To be eligible, women must fulfill the first and the second criteria, any of the criteria from 3 to 5 must be fulfilled. SECONDARY OUTCOME: Intimate partner violence, which will be measured through a battery of questions designed to measure intimate partner violence. These questions will be asked to each participating woman at the follow‐up survey, which will take place after eight months of the interventions. [Eight months after the start of the interventions, the research team will visit all participants and collect this information from all participating women] Parental investment on children (time, monetary, and warmth) will be collected from parents (mothers) by using a survey instrument designed for this study. The components will be combined in an inde Xand will be measured as a composite index. [Eight months after the start of the interventions] Stress. Participating women Hair sample will be collected. The analysis of the hair sample is subject to receive additional funding. [Eight months after the start of the interventions, the research team will visit all participants and collect this information from all participating women] Women mental health, which will be collected through PHQ, and GAD7. [Eight months after the start of the interventions, the research team will visit all participants and collect this information from all participating women] Women's empowerment, which will be measured through a battery of questions designed to measure women's empowerment. These questions will be asked to each participating woman at the follow‐up survey, which will take place after eight months of the interventions.", "primaryTheme": "Nutrition & Diet", "themes": ["Nutrition & Diet", "Women's Empowerment & Gender", "Maternal & Child Health"], "methods": ["RCT"]}, {"id": 99, "title": "Promoting COVID-19 Vaccination In Rural Bangladesh", "authors": "Dinesh et al.", "authorsFull": "Dinesh, Arora; Tarannum, Azim Baigh; Ahmedul, Kabir; Meerjady, Sabrina Flora; Diwakar, Mohan; Debayan, Pakrashi; Patrick, Osewe; Piyush, Bhutani; Armand, Sim; Shafiun, Shimul; Hyuncheol, Bryant Kim; Asad, Islam", "year": 2022, "type": "Impact Evaluation", "status": "Unknown", "pubType": "—", "journal": "", "doi": "", "url": "https://www.cochranelibrary.com/central/doi/10.1002/central/CN-02379317/full", "abstract": "Background The objective of the study is to evaluate the effectiveness of low-cost and scalable strategies in increasing COVID-19 vaccine take-up rates among the unvaccinated adult population in Bangladesh. Methods A cluster randomized controlled trial was conducted in four districts of Bangladesh. 12,609 unvaccinated individuals from 685 rural villages aged 18 years and above were screened. 7,299 (548) and 2,445 (137) individuals (villages) were enrolled and randomly allocated to treatment and control groups, respectively. Three interventions were randomly allocated at the village level: (1) information campaign delivered by field workers (T1), (2) information campaign by local eminent individuals (T2), and (3) information campaign by field workers and improving vaccine accessibility (T3). The control group did not receive any intervention. The study was registered on ANZ Clinical Trials Registry (ID number: ACTRN12622000068763). Findings Vaccine uptake rates in all intervention groups were significantly higher than in the control group for both first and second dose. T3 was the most effective, which led to an increase in first dose take-up by 38.5 percentage points (95% CI 35.7 to 41.3), while T1 increased uptake of first dose by 17.1 (13.9 to 20.3) and T2 by 18.8 percentage points (15.6 to 22.0), respectively. T1, T2, and T3 increased second dose take-ups by 8.9 (6.70 to 11.1), 12.3 (9.8 to 14.9), and 10.9 (8.9 to 12.8) percentage points, respectively. T3 generated the largest positive spillover effects on male and female household members, and friends. Among those living in the same village as the respondent but were not part of their family and friends’ network, the largest positive spillover effect was observed for T2. Interpretation Our results highlights that targeted information campaign and logistical support to remove barriers of accessibility in rural villages can be used to promote vaccination among those unvaccinated.", "primaryTheme": "Health Systems & Disease Control", "themes": ["Health Systems & Disease Control"], "methods": ["RCT"]}, {"id": 100, "title": "Impact of a Disability-Targeted Livelihoods Programme in Bangladesh: Study Protocol for a Cluster Randomised Controlled Trial of STAR.", "authors": "Banks et al.", "authorsFull": "Banks, Lena M.; Das, Narayan; Davey, Calum; Adiba, Afsana; Ali, Mahzuz M.; Shakespeare, Tom; Fleming, Coral; Kuper, Hannah", "year": 2022, "type": "Impact Evaluation", "status": "Protocol/ongoing", "pubType": "Ongoing study", "journal": "Trials", "doi": "10.1186/s13063-022-06987-2", "url": "https://trialsjournal.biomedcentral.com/articles/10.1186/s13063-022-06987-2", "abstract": "IntroductionThere is little evidence on the impact of livelihood interventions amongst people with disabilities. Effective programmes are critical for reducing the heightened risk of poverty and unemployment facing persons with disabilities. STAR+ is a skills development and job placement programme targeted to out-of-school youth with di
